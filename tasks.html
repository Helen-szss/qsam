        // 更新人员选项
        function updateMemberOptions() {
            const teamSelect = document.getElementById('assignTeam');
            const memberSelect = document.getElementById('assignMember');
            const hintEl = document.getElementById('assignMemberHint');
            const submitBtn = document.getElementById('assignSubmitBtn');
            
            if (!teamSelect || !memberSelect) return;
            
            const selectedTeamId = teamSelect.value;
            
            // 清空现有选项（保留第一个选项）
            while (memberSelect.options.length > 0) {
                memberSelect.remove(0);
            }

            // 保留之前多队伍选择状态（如果存在），然后移除容器
            let previousCheckedTeams = null;
            const existingMulti = document.getElementById('teamMultiContainer');
            if (existingMulti) {
                previousCheckedTeams = Array.from(existingMulti.querySelectorAll('input[name="multiTeamChk"]'))
                    .filter(c => c.checked)
                    .map(c => c.value);
                existingMulti.remove();
            }

            // 清理“多人执行”成员复选框容器（如有）
            let previousCheckedMembers = null;
            const existingMemberMulti = document.getElementById('memberMultiContainer');
            if (existingMemberMulti) {
                previousCheckedMembers = Array.from(existingMemberMulti.querySelectorAll('input[name="multiMemberChk"]'))
                    .filter(c => c.checked)
                    .map(c => c.value);
                existingMemberMulti.remove();
            }

            // 帮助函数：获取所有成员（从teams聚合）
            function getAllMembers() {
                const all = [];
                teams.forEach(team => all.push(...team.members));
                return [...new Set(all)];
            }

            if (selectedTeamId === '多队伍联合执行') {
                // 创建一个多队伍选择器（复选框）
                const container = document.createElement('div');
                container.id = 'teamMultiContainer';
                container.style.margin = '8px 0 12px 0';

                TEAM_NAMES.forEach(tname => {
                    const id = `chk_${tname}`;
                    const label = document.createElement('label');
                    label.style.marginRight = '10px';
                    const chk = document.createElement('input');
                    chk.type = 'checkbox';
                    chk.id = id;
                    chk.name = 'multiTeamChk';
                    chk.value = tname;
                    // 如果之前有选择状态则使用之，否则默认选中
                    chk.checked = previousCheckedTeams ? previousCheckedTeams.includes(tname) : true;
                    chk.addEventListener('change', () => updateMemberOptions());
                    label.appendChild(chk);
                    const txt = document.createTextNode(' ' + tname);
                    label.appendChild(txt);
                    container.appendChild(label);
                });

                // 将容器插入到队伍选择之后（在同一form-group后面）
                const teamFormGroup = teamSelect.parentElement;
                teamFormGroup.parentElement.insertBefore(container, teamFormGroup.nextSibling);

                // 聚合被选中队伍的所有成员
                const checkedTeams = Array.from(document.getElementsByName('multiTeamChk')).filter(c => c.checked).map(c => c.value);
                const members = [];
                checkedTeams.forEach(tn => {
                    const t = teams.find(tt => tt.name === tn);
                    if (t) members.push(...t.members);
                });

                const uniqueMembers = [...new Set(members)];
                uniqueMembers.forEach(member => {
                    const option = document.createElement('option');
                    option.value = member;
                    option.textContent = member;
                    option.selected = true; // 默认全部参与
                    memberSelect.appendChild(option);
                });

                memberSelect.multiple = true;
                memberSelect.size = Math.min(10, Math.max(3, uniqueMembers.length));
                // keep the select enabled/visible for multi-team aggregated selection
                memberSelect.style.display = '';
                memberSelect.disabled = false;
                memberSelect.required = true;
                if (hintEl) hintEl.textContent = '';
                if (submitBtn) submitBtn.disabled = false;

            } else if (selectedTeamId === '多人执行') {
                // 多人执行：可多选，最多5人
                const members = getAllMembers();

                // 隐藏原下拉框，改用复选框列表以便直观多选
                memberSelect.style.display = 'none';
                memberSelect.disabled = true;
                memberSelect.required = false;

                const container = document.createElement('div');
                container.id = 'memberMultiContainer';
                container.style.margin = '8px 0 12px 0';
                container.style.display = 'grid';
                container.style.gridTemplateColumns = 'repeat(auto-fill, minmax(160px, 1fr))';
                container.style.gap = '6px 12px';

                members.forEach(member => {
                    const id = `mem_${member}`;
                    const wrap = document.createElement('label');
                    wrap.setAttribute('for', id);
                    wrap.style.display = 'flex';
                    wrap.style.alignItems = 'center';
                    wrap.style.gap = '6px';
                    const chk = document.createElement('input');
                    chk.type = 'checkbox';
                    chk.id = id;
                    chk.name = 'multiMemberChk';
                    chk.value = member;
                    chk.checked = previousCheckedMembers ? previousCheckedMembers.includes(member) : false;
                    chk.addEventListener('change', () => {
                        // 限制最多5人
                        const checked = Array.from(document.getElementsByName('multiMemberChk')).filter(c => c.checked);
                        if (checked.length > 5) {
                            chk.checked = false;
                        }
                        // 更新校验与提交按钮状态
                        validateAssigneeSelection();
                        const submitBtnLocal = document.getElementById('assignSubmitBtn');
                        if (submitBtnLocal) {
                            const curCount = Array.from(document.getElementsByName('multiMemberChk')).filter(c => c.checked).length;
                            submitBtnLocal.disabled = !(curCount >= 2 && curCount <= 5);
                        }
                    });
                    const txt = document.createTextNode(member);
                    wrap.appendChild(chk);
                    wrap.appendChild(txt);
                    container.appendChild(wrap);
                });

                // 插入到成员选择框后面
                const memberFormGroup = memberSelect.parentElement;
                memberFormGroup.insertBefore(container, document.getElementById('assignMemberHint'));

                if (hintEl) hintEl.textContent = '多人执行：请选择 2-5 名人员';
                validateAssigneeSelection();

            } else if (selectedTeamId === '单独指派') {
                // 单独指派：仅能选一人
                const members = getAllMembers();
                // 添加一个提示项
                const placeholder = document.createElement('option');
                placeholder.value = '';
                placeholder.textContent = '请选择人员（只能选择一名）';
                memberSelect.appendChild(placeholder);

                members.forEach(member => {
                    const option = document.createElement('option');
                    option.value = member;
                    option.textContent = member;
                    memberSelect.appendChild(option);
                });

                memberSelect.multiple = false;
                memberSelect.size = 1;
                memberSelect.style.display = '';
                memberSelect.disabled = false;
                memberSelect.required = true;
                if (hintEl) hintEl.textContent = '';
                if (submitBtn) submitBtn.disabled = false;

            } else if (selectedTeamId) {
                // 选择具体队伍（例如：综合管理组等），默认该队全体参与：隐藏成员选择框，提示已默认分配全队
                const selectedTeam = teams.find(team => team.id === selectedTeamId || team.name === selectedTeamId);
                if (selectedTeam) {
                    // 填充但不显示成员下拉（保留数据来源），前端无需手动选择
                    selectedTeam.members.forEach(member => {
                        const option = document.createElement('option');
                        option.value = member;
                        option.textContent = member;
                        option.selected = true;
                        memberSelect.appendChild(option);
                    });
                }

                memberSelect.multiple = true;
                memberSelect.size = Math.min(10, Math.max(3, (selectedTeam && selectedTeam.members.length) || 3));
                // hide the select to avoid browser required-field validation, but keep it populated
                memberSelect.style.display = 'none';
                memberSelect.disabled = true;
                memberSelect.required = false;
                if (hintEl) hintEl.textContent = (selectedTeam && selectedTeam.members.length)
                    ? `已默认分配该队全部成员（${selectedTeam.members.length} 人）`
                    : '已默认分配该队全部成员';
                if (submitBtn) submitBtn.disabled = false;

            } else {
                // 未选择队伍，清空并设置为单选占位
                const placeholder = document.createElement('option');
                placeholder.value = '';
                placeholder.textContent = '请选择人员';
                memberSelect.appendChild(placeholder);
                memberSelect.multiple = false;
                memberSelect.size = 1;
                memberSelect.style.display = '';
                memberSelect.disabled = false;
                memberSelect.required = true;
                if (hintEl) hintEl.textContent = '';
                if (submitBtn) submitBtn.disabled = false;
            }
        }

        // 校验“多人执行”的人员选择，控制提示与提交按钮状态
        function validateAssigneeSelection() {
            const teamSelect = document.getElementById('assignTeam');
            const memberSelect = document.getElementById('assignMember');
            const hint = document.getElementById('assignMemberHint');
            const submitBtn = document.getElementById('assignSubmitBtn');
            if (!teamSelect || !memberSelect || !submitBtn) return;

            // 如果选择的是具体某个队伍，则默认全员接取，无需选择人员
            if (TEAM_NAMES.includes(teamSelect.value)) {
                const selTeam = teams.find(t => t.name === teamSelect.value || t.id === teamSelect.value);
                const cnt = selTeam ? selTeam.members.length : 0;
                if (hint) hint.textContent = cnt ? `已默认分配该队全部成员（${cnt} 人）` : '已默认分配该队全部成员';
                submitBtn.disabled = false;
                return;
            }

            if (teamSelect.value === '多人执行') {
                const count = document.getElementById('memberMultiContainer')
                    ? Array.from(document.getElementsByName('multiMemberChk')).filter(c => c.checked).length
                    : Array.from(memberSelect.selectedOptions).length;
                if (count < 2) {
                    if (hint) hint.textContent = '多人执行：请至少选择2名人员';
                    submitBtn.disabled = true;
                } else if (count > 5) {
                    if (hint) hint.textContent = '多人执行：最多可选择5名人员';
                    submitBtn.disabled = true;
                } else {
                    if (hint) hint.textContent = `已选择 ${count} 名人员（需2-5人）`;
                    submitBtn.disabled = false;
                }
            } else {
                if (hint) hint.textContent = '';
                submitBtn.disabled = false;
            }
        }
        
        // 清除任务详情
        function clearTaskDetail() {
            document.getElementById('taskDetailContent').innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-tasks"></i>
                    <h3>选择任务查看详情</h3>
                    <p>点击左侧列表中的任务以查看详细信息</p>
                </div>
            `;
        }
        
        // 处理任务分配（同步云端）
        async function handleAssignTask(taskId) {
            const teamSelect = document.getElementById('assignTeam');
            const memberSelect = document.getElementById('assignMember');
            const difficultySelect = document.getElementById('assignDifficulty');
            
            if (!teamSelect || !memberSelect || !difficultySelect) {
                showError('分配表单未找到');
                return;
            }
            
            // 计算被分配的队伍与人员（人员可以为多选）
            let assignedTeam = teamSelect.value || '未分配';
            let assignedMembers = [];

            if (assignedTeam === '多队伍联合执行') {
                const checked = Array.from(document.getElementsByName('multiTeamChk')).filter(c => c.checked).map(c => c.value);
                if (checked.length === 0) {
                    showError('请选择至少一个队伍进行联合执行');
                    return;
                }
                assignedTeam = '多队伍联合执行: ' + checked.join(',');
                assignedMembers = Array.from(memberSelect.selectedOptions).map(o => o.value);
            } else if (assignedTeam === '单独指派') {
                assignedMembers = memberSelect.value ? [memberSelect.value] : [];
            } else if (TEAM_NAMES.includes(assignedTeam)) {
                // 如果是选择的具体队伍，默认分配该队全部成员
                const selTeam = teams.find(t => t.name === assignedTeam || t.id === assignedTeam);
                assignedMembers = selTeam ? selTeam.members.slice() : [];
            } else {
                // 对于多人执行或其他复杂情况
                const memberMultiContainer = document.getElementById('memberMultiContainer');
                if (memberMultiContainer) {
                    assignedMembers = Array.from(document.getElementsByName('multiMemberChk'))
                        .filter(c => c.checked)
                        .map(c => c.value);
                } else if (memberSelect.multiple && memberSelect.style.display !== 'none') {
                    assignedMembers = Array.from(memberSelect.selectedOptions).map(o => o.value);
                } else {
                    assignedMembers = memberSelect.value ? [memberSelect.value] : [];
                }
            }

            const difficulty = difficultySelect.value;
            
            if (!assignedMembers || assignedMembers.length === 0 || !difficulty) {
                showError('请填写完整的分配信息（包括人员与难度）');
                return;
            }

            // 校验人数限制
            if (teamSelect.value === '多人执行') {
                if (assignedMembers.length > 5) {
                    showError('多人执行最多可选择5人');
                    return;
                }
                if (assignedMembers.length < 2) {
                    showError('多人执行至少需选择2人');
                    return;
                }
            }

            if (teamSelect.value === '单独指派' && assignedMembers.length !== 1) {
                showError('单独指派请仅选择一名人员');
                return;
            }
            
            showLoading('正在分配任务...');
            
            try {
                // 更新任务数据
                const taskIndex = allTasks.findIndex(task => task.id === taskId);
                if (taskIndex !== -1) {
                    allTasks[taskIndex].assigned_team = assignedTeam;
                    allTasks[taskIndex].assigned_member = assignedMembers.join(',');
                    allTasks[taskIndex].difficulty = difficulty;
                    allTasks[taskIndex].status = '已接取';
                    allTasks[taskIndex].updated_at = new Date().toISOString();
                    
                    // 保存到本地存储
                    const isAdminTask = taskId.includes('ADMIN-TASK');
                    const storageKey = isAdminTask ? 'admin_tasks' : 'guest_tasks';
                    const tasks = JSON.parse(localStorage.getItem(storageKey) || '[]');
                    const taskToUpdateIndex = tasks.findIndex(task => task.id === taskId);
                    
                    if (taskToUpdateIndex !== -1) {
                        tasks[taskToUpdateIndex] = allTasks[taskIndex];
                        localStorage.setItem(storageKey, JSON.stringify(tasks));
                    }

                    // 同步到云端数据库
                    if (supabaseClient) {
                        try {
                            const { data: updated, error } = await supabaseClient
                                .from('tasks')
                                .update({
                                    assigned_team: assignedTeam,
                                    assigned_member: assignedMembers.join(','),
                                    difficulty: difficulty,
                                    status: '已接取',
                                    updated_at: new Date().toISOString()
                                })
                                .eq('id', taskId)
                                .select();

                            if (error) {
                                console.warn('云端同步分配失败：', error);
                                showError('云端同步分配失败：' + (error.message || JSON.stringify(error)));
                            } else if (updated && updated.length > 0) {
                                // 如果云端返回了更新后的记录，使用云端最新数据覆盖本地（按需）
                                const ret = updated[0];
                                const idx = allTasks.findIndex(t => t.id === taskId);
                                if (idx !== -1) {
                                    allTasks[idx] = Object.assign({}, allTasks[idx], ret);
                                    // 更新本地存储
                                    const tasksLocal = JSON.parse(localStorage.getItem(storageKey) || '[]');
                                    const li = tasksLocal.findIndex(t => t.id === taskId);
                                    if (li !== -1) {
                                        tasksLocal[li] = allTasks[idx];
                                        localStorage.setItem(storageKey, JSON.stringify(tasksLocal));
                                    }
                                }
                            }
                        } catch (err) {
                            console.error('云端同步分配异常：', err);
                            showError('云端同步分配异常：' + (err.message || err));
                        }
                    }
                    
                    // 更新显示
                    renderTaskTable(allTasks);
                    showTaskDetail(taskId);
                    
                    showSuccess(`任务已分配给 ${assignedMembers.join(', ')}（${assignedTeam}）`);
                } else {
                    showError('未找到任务数据');
                }
            } catch (error) {
                console.error('分配任务失败:', error);
                showError('分配任务失败，请重试');
            } finally {
                hideLoading();
            }
        }

        // 只设置难度并保持任务未分配（允许成员在成员界面接取）
        async function updateTaskDifficultyOnly(taskId) {
            if (!confirm('确定只更新任务难度并保持任务未分配吗？成员将可以在成员界面接取该任务。')) {
                return;
            }

            const difficultySelect = document.getElementById('assignDifficulty');
            if (!difficultySelect) {
                showError('未找到难度选择控件');
                return;
            }

            const difficulty = difficultySelect.value;
            if (!difficulty) {
                showError('请选择难度评级');
                return;
            }

            showLoading('正在保存难度...');

            try {
                const taskIndex = allTasks.findIndex(t => t.id === taskId);
                if (taskIndex === -1) {
                    showError('未找到任务数据');
                    return;
                }

                // 更新本地数据：只修改难度并清空分配信息，设置为未接取以供成员接取
                allTasks[taskIndex].difficulty = difficulty;
                allTasks[taskIndex].assigned_team = '未分配';
                allTasks[taskIndex].assigned_member = '未分配';
                allTasks[taskIndex].status = '未接取';
                allTasks[taskIndex].updated_at = new Date().toISOString();

                // 保存到本地存储
                const isAdminTask = taskId.includes('ADMIN-TASK');
                const storageKey = isAdminTask ? 'admin_tasks' : 'guest_tasks';
                const tasks = JSON.parse(localStorage.getItem(storageKey) || '[]');
                const taskToUpdateIndex = tasks.findIndex(task => task.id === taskId);
                if (taskToUpdateIndex !== -1) {
                    tasks[taskToUpdateIndex] = allTasks[taskIndex];
                    localStorage.setItem(storageKey, JSON.stringify(tasks));
                }

                // 同步到云端数据库（如可用）
                if (supabaseClient) {
                    try {
                        const { data: updated, error } = await supabaseClient
                            .from('tasks')
                            .update({
                                difficulty: difficulty,
                                assigned_team: '未分配',
                                assigned_member: '未分配',
                                status: '未接取',
                                updated_at: allTasks[taskIndex].updated_at
                            })
                            .eq('id', taskId)
                            .select();

                        if (error) {
                            console.warn('云端同步难度失败：', error);
                            showError('云端同步难度失败：' + (error.message || JSON.stringify(error)));
                        } else if (updated && updated.length > 0) {
                            // 使用云端返回的记录覆盖本地
                            allTasks[taskIndex] = Object.assign({}, allTasks[taskIndex], updated[0]);
                            const tasksLocal = JSON.parse(localStorage.getItem(storageKey) || '[]');
                            const li = tasksLocal.findIndex(t => t.id === taskId);
                            if (li !== -1) {
                                tasksLocal[li] = allTasks[taskIndex];
                                localStorage.setItem(storageKey, JSON.stringify(tasksLocal));
                            }
                        }
                    } catch (err) {
                        console.error('云端同步难度异常：', err);
                        showError('云端同步难度异常：' + (err.message || err));
                    }
                }

                // 更新界面
                renderTaskTable(allTasks);
                showTaskDetail(taskId);

                showSuccess('已保存难度，任务保持未分配，成员可在成员界面接取');
            } catch (error) {
                console.error('更新难度失败:', error);
                showError('更新难度失败，请重试');
            } finally {
                hideLoading();
            }
        }
        
        // 更新任务状态（同步云端）
        async function updateTaskStatus(taskId, newStatus) {
            if (!confirm(`确定要将任务状态更改为"${newStatus}"吗？`)) {
                return;
            }
            
            showLoading('正在更新任务状态...');
            
            try {
                // 更新任务数据
                const taskIndex = allTasks.findIndex(task => task.id === taskId);
                if (taskIndex !== -1) {
                    allTasks[taskIndex].status = newStatus;
                    allTasks[taskIndex].updated_at = new Date().toISOString();
                    
                    // 保存到本地存储
                    const isAdminTask = taskId.includes('ADMIN-TASK');
                    const storageKey = isAdminTask ? 'admin_tasks' : 'guest_tasks';
                    const tasks = JSON.parse(localStorage.getItem(storageKey) || '[]');
                    const taskToUpdateIndex = tasks.findIndex(task => task.id === taskId);
                    
                    if (taskToUpdateIndex !== -1) {
                        tasks[taskToUpdateIndex] = allTasks[taskIndex];
                        localStorage.setItem(storageKey, JSON.stringify(tasks));
                    }

                    // 同步到云端数据库
                    if (supabaseClient) {
                        try {
                            const { data: updated, error } = await supabaseClient
                                .from('tasks')
                                .update({
                                    status: newStatus,
                                    updated_at: new Date().toISOString()
                                })
                                .eq('id', taskId)
                                .select();

                            if (error) {
                                console.warn('云端同步状态失败：', error);
                                showError('云端同步状态失败：' + (error.message || JSON.stringify(error)));
                            } else if (updated && updated.length > 0) {
                                // 使用云端返回的最新记录覆盖本地
                                const ret = updated[0];
                                allTasks[taskIndex] = Object.assign({}, allTasks[taskIndex], ret);
                                const tasksLocal = JSON.parse(localStorage.getItem(storageKey) || '[]');
                                const li = tasksLocal.findIndex(t => t.id === taskId);
                                if (li !== -1) {
                                    tasksLocal[li] = allTasks[taskIndex];
                                    localStorage.setItem(storageKey, JSON.stringify(tasksLocal));
                                }
                            }
                        } catch (err) {
                            console.error('云端同步状态异常：', err);
                            showError('云端同步状态异常：' + (err.message || err));
                        }
                    }
                    
                    // 更新显示
                    renderTaskTable(allTasks);
                    showTaskDetail(taskId);
                    
                    showSuccess(`任务状态已更新为"${newStatus}"`);
                } else {
                    showError('未找到任务数据');
                }
            } catch (error) {
                console.error('更新任务状态失败:', error);
                showError('更新任务状态失败，请重试');
            } finally {
                hideLoading();
            }
        }
        
        // 删除任务（同步云端）
        async function deleteTask(taskId) {
            if (!confirm('确定要删除此任务吗？此操作不可撤销。')) {
                return;
            }
            
            showLoading('正在删除任务...');
            
            try {
                // 从任务列表中移除
                allTasks = allTasks.filter(task => task.id !== taskId);
                
                // 从本地存储中删除
                const isAdminTask = taskId.includes('ADMIN-TASK');
                const storageKey = isAdminTask ? 'admin_tasks' : 'guest_tasks';
                const tasks = JSON.parse(localStorage.getItem(storageKey) || '[]');
                const filteredTasks = tasks.filter(task => task.id !== taskId);
                localStorage.setItem(storageKey, JSON.stringify(filteredTasks));

                // 从云端删除
                if (supabaseClient) {
                    try {
                        const { data: deleted, error } = await supabaseClient
                            .from('tasks')
                            .delete()
                            .eq('id', taskId)
                            .select();
                        if (error) {
                            console.warn('云端删除任务失败：', error);
                            showError('云端删除任务失败：' + (error.message || JSON.stringify(error)));
                        }
                    } catch (err) {
                        console.error('云端删除任务异常：', err);
                        showError('云端删除任务异常：' + (err.message || err));
                    }
                }
                
                // 更新显示
                renderTaskTable(allTasks);
                clearTaskDetail();
                selectedTaskId = null;
                
                showSuccess('任务已删除');
            } catch (error) {
                console.error('删除任务失败:', error);
                showError('删除任务失败，请重试');
            } finally {
                hideLoading();
            }
        }
        
        // 打开发布任务模态框
        function openPublishModal() {
            document.getElementById('publishForm').reset();
            showModal('publishModal');
        }
        
        // 处理发布任务（同步云端）
        async function handlePublishTask(e) {
            e.preventDefault();
            
            // 获取表单数据
            const taskName = document.getElementById('publishTaskName').value.trim();
            const taskType = document.getElementById('publishTaskType').value;
            const taskDifficulty = document.getElementById('publishTaskDifficulty').value;
            const timeLimit = parseInt(document.getElementById('publishTimeLimit').value);
            const taskDescription = document.getElementById('publishTaskDescription').value.trim();
            
            // 验证数据
            if (!taskName || !taskType || !taskDifficulty || !timeLimit || !taskDescription) {
                showError('请填写所有字段');
                return;
            }
            
            if (timeLimit < 1 || timeLimit > 365) {
                showError('时限要求在1-365天之间');
                return;
            }
            
            // 生成任务数据
            const taskId = generateTaskId();
            const taskData = {
                id: taskId,
                name: taskName,
                type: taskType,
                time_limit: timeLimit,
                description: taskDescription,
                difficulty: taskDifficulty,
                status: '未接取',
                created_by: '管理员',
                assigned_team: '未分配',
                assigned_member: '未分配',
                created_at: new Date().toISOString(),
                updated_at: new Date().toISOString()
            };
            
            showLoading('正在发布任务...');
            
            try {
                let cloudSaved = false;
                let cloudErrorMessage = '';

                // 保存到本地存储
                const adminTasks = JSON.parse(localStorage.getItem('admin_tasks') || '[]');
                adminTasks.push(taskData);
                localStorage.setItem('admin_tasks', JSON.stringify(adminTasks));
                
                // 保存到云端
                if (supabaseClient) {
                    try {
                        // 直接使用前端生成的 id 插入（与你提供的表定义兼容）
                        const insertPayload = Object.assign({}, taskData);

                        const { data: insertedData, error } = await supabaseClient
                            .from('tasks')
                            .insert([insertPayload])
                            .select();

                        if (error) {
                            console.warn('云端发布任务失败：', error);
                            cloudErrorMessage = error.message || JSON.stringify(error);
                        } else if (insertedData && insertedData.length > 0) {
                            cloudSaved = true;
                            // 如果云端返回了记录（包含生成的id），使用云端id覆盖本地记录的id
                            const returned = insertedData[0];
                            if (returned.id && returned.id !== taskData.id) {
                                // 更新本地任务的 id
                                const idx = allTasks.findIndex(t => t.id === taskId);
                                if (idx !== -1) {
                                    allTasks[idx].id = returned.id;
                                    // 更新本地存储中的记录
                                    const adminTasks = JSON.parse(localStorage.getItem('admin_tasks') || '[]');
                                    const i = adminTasks.findIndex(t => t.id === taskId);
                                    if (i !== -1) {
                                        adminTasks[i].id = returned.id;
                                        localStorage.setItem('admin_tasks', JSON.stringify(adminTasks));
                                    }
                                }
                            }
                        }
                    } catch (err) {
                        console.error('云端发布任务异常：', err);
                        cloudErrorMessage = err.message || String(err);
                    }
                } else {
                    cloudErrorMessage = 'Supabase 客户端未初始化';
                }
                
                // 添加到当前任务列表
                allTasks.push(taskData);
                
                // 关闭模态框
                closeModal('publishModal');
                
                // 更新显示
                renderTaskTable(allTasks);

                if (cloudSaved) {
                    showSuccess(`任务 "${taskName}" 已成功发布并同步到云端`);
                } else {
                    showError(`任务 "${taskName}" 已保存到本地，但未同步到云端：${cloudErrorMessage || '未知错误'}`);
                }
                
            } catch (error) {
                console.error('发布任务失败:', error);
                showError('发布任务失败，请重试');
            } finally {
                hideLoading();
            }
        }
        
        // 返回
        function goBack() {
            if (!confirm('确定要返回吗？未保存的更改可能会丢失。')) return;

            try {
                const role = (localStorage.getItem('auth_role') || '').toLowerCase();

                // 优先按登录身份返回：管理员始终回管理员控制台。
                if (role === 'admin') {
                    window.location.href = 'admin.html';
                } else if (getUserIsManagement()) {
                    window.location.href = 'viewer.html';
                } else if (role === 'member') {
                    window.location.href = 'member.html';
                } else {
                    window.location.href = 'index.html';
                }
            } catch (e) {
                // 兜底到管理员控制台
                window.location.href = 'admin.html';
            }
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
