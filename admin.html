<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员控制台 - 管理局资料库</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        :root{
            --desktop-bg: radial-gradient(circle at center, #0a2463, #000000);
            --status-bg: rgba(10, 36, 99, 0.8);
            --panel-bg: rgba(6,22,60,0.92);
            --panel-border: rgba(0,150,255,0.25);
            --accent-1: #ff6b6b;
            --accent-2: #ffd93d;
            --text-primary: #e0f7ff;
            --muted-color: #a3d5ff;
            --icon-glow: rgba(79, 195, 255, 0.2);
        }
        /* 桌面样式 */
        .desktop {
            min-height: 100vh;
            background: var(--desktop-bg);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        
        /* 顶部状态栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: var(--status-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 150, 255, 0.3);
            margin-bottom: 40px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .system-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .system-logo {
            width: 40px;
            height: 40px;
            filter: drop-shadow(0 0 10px rgba(0, 150, 255, 0.7));
        }
        
        .system-name {
            font-size: 1.5rem;
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0066cc, #0099ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
        }
        
        .time-display {
            color: var(--muted-color);
            font-size: 1.1rem;
            letter-spacing: 1px;
        }
        
        /* 桌面图标网格 */
        .desktop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 桌面图标样式 */
        .desktop-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 150px;
            height: 150px;
            padding: 20px;
            background: rgba(10, 36, 99, 0.7);
            border-radius: 20px;
            border: 2px solid rgba(0, 150, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            position: relative;
            overflow: hidden;
            text-decoration: none;
        }
        
        .desktop-icon:hover {
            transform: translateY(-10px);
            border-color: rgba(0, 150, 255, 0.8);
            box-shadow: 
                0 10px 30px rgba(0, 150, 255, 0.3),
                inset 0 0 30px rgba(0, 150, 255, 0.1);
        }
        
        .desktop-icon.active {
            background: rgba(0, 60, 120, 0.8);
            border-color: rgba(0, 200, 255, 0.8);
        }
        
        .icon-image {
            width: 60px;
            height: 60px;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px rgba(0, 150, 255, 0.7));
            transition: transform 0.3s ease;
        }
        
        .desktop-icon:hover .icon-image {
            transform: scale(1.1);
        }
        
        .icon-label {
            color: #e0f7ff;
            font-size: 1rem;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(0, 150, 255, 0.5);
            line-height: 1.3;
        }
        
        .icon-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: white;
        }
        
        /* 统一图标容器 */
        .icon-container {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            position: relative;
        }
        
        .icon-base {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #4fc3ff, #6b9ccc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(79, 195, 255, 0.5));
        }
        
        .icon-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            background: radial-gradient(circle, var(--icon-glow) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
        }
        
        /* 特殊图标颜色 */
        .icon-danger .icon-base {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            filter: drop-shadow(0 0 8px rgba(255, 107, 107, 0.5));
        }
        
        .icon-danger .icon-glow {
            background: radial-gradient(circle, rgba(255, 107, 107, 0.2) 0%, transparent 70%);
        }
        
        .icon-success .icon-base {
            background: linear-gradient(135deg, #6bffb8, #8effcc);
            filter: drop-shadow(0 0 8px rgba(107, 255, 184, 0.5));
        }
        
        .icon-success .icon-glow {
            background: radial-gradient(circle, rgba(107, 255, 184, 0.2) 0%, transparent 70%);
        }
        
        .icon-warning .icon-base {
            background: linear-gradient(135deg, #ffd93d, #ffa93d);
            filter: drop-shadow(0 0 8px rgba(255, 217, 61, 0.5));
        }
        
        .icon-warning .icon-glow {
            background: radial-gradient(circle, rgba(255, 217, 61, 0.2) 0%, transparent 70%);
        }
        
        /* 加载动画 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            backdrop-filter: blur(10px);
        }
        
        .loading-spinner {
            width: 80px;
            height: 80px;
            border: 5px solid rgba(79, 195, 255, 0.3);
            border-top: 5px solid #4fc3ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #e0f7ff;
            margin-top: 20px;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }
        
        /* 欢迎提示 */
        .welcome-toast {
            position: fixed;
            top: 100px;
            right: 20px;
            padding: 20px 30px;
            background: rgba(10, 36, 99, 0.9);
            border: 1px solid rgba(0, 150, 255, 0.5);
            border-radius: 15px;
            color: #e0f7ff;
            box-shadow: 0 10px 30px rgba(0, 150, 255, 0.3);
            z-index: 1000;
            animation: slideIn 0.5s ease, fadeOut 0.5s ease 4.5s forwards;
            backdrop-filter: blur(10px);
        }
        
        .welcome-title {
            font-size: 1.2rem;
            margin-bottom: 5px;
            color: #4fc3ff;
        }
        
        .welcome-message {
            font-size: 1.5rem;
            background: linear-gradient(90deg, #ffd93d, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
        }
        
        /* 底部功能面板样式已移除（功能被删除） */
        /* 底部功能面板 - 管理员专用（保留简洁两个按钮） */
        .function-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            background: rgba(10,36,99,0.9);
            border-radius: 40px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0,150,255,0.25);
            display: flex;
            gap: 18px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .panel-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: rgba(0,60,120,0.85);
            border: 1px solid rgba(0,150,255,0.35);
            color: #a3d5ff;
            display:flex;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            transition: all .2s ease;
            font-size:1.2rem;
        }

        .panel-btn:hover {
            background: rgba(0,150,255,0.35);
            transform: scale(1.12);
            box-shadow: 0 0 12px rgba(0,150,255,0.4);
        }
        
        /* 动画 */
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        @keyframes fadeOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
                transform: translateX(100%);
            }
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .desktop-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 20px;
            }
            
            .desktop-icon {
                width: 120px;
                height: 120px;
            }
            
            .icon-container {
                width: 50px;
                height: 50px;
            }
            
            .icon-base {
                font-size: 2rem;
            }
        }
        
        /* 退出按钮样式 */
        .logout-btn {
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid rgba(255, 107, 107, 0.5);
            color: #ff6b6b;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-left: 15px;
        }
        
        .logout-btn:hover {
            background: rgba(255, 107, 107, 0.3);
            transform: scale(1.05);
        }

        /* 底部虚拟面板样式 */
        .bottom-panel {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            width: min(920px, 92%);
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 14px;
            padding: 14px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            display: none;
            z-index: 2500;
        }

        .bottom-panel[aria-hidden="false"] {
            display: block;
        }

        .bottom-panel .panel-header {
            font-size: 1.1rem;
            color: #4fc3ff;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .bottom-panel .panel-body { color: #e0f7ff; }

        .panel-grid { display:grid; grid-template-columns: repeat(4,1fr); gap:12px; }
        .panel-item { background: rgba(0,30,80,0.5); padding:12px; border-radius:8px; text-align:center; }
        .muted { color: #6b9ccc; font-size:0.85rem; }

        .metric { display:flex; align-items:center; gap:12px; margin-bottom:8px; }
        .meter { flex:1; height:10px; background: rgba(255,255,255,0.06); border-radius:6px; overflow:hidden; }
        .meter-fill { height:100%; background: linear-gradient(90deg,#4fc3ff,#00ccff); }

        .panel-footer { margin-top:12px; text-align:right; }
        /* 面板通用小样式 */
        .bottom-panel .close-btn {
            background: rgba(255,107,107,0.2);
            border: 1px solid rgba(255,107,107,0.35);
            color: #ff6b6b;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        .notes-area { width: 100%; height: 160px; padding: 10px; border-radius:8px; border:1px solid rgba(255,255,255,0.06); background: rgba(0,0,0,0.45); color:#e0f7ff; resize:vertical; }

        .theme-option { display:flex; gap:8px; align-items:center; margin:10px 0; }

        /* 主题类：覆盖变量以切换主题 */
        .theme-dark { /* 默认，使用 :root 变量 — 无需覆盖 */ }

        .theme-light {
            --desktop-bg: radial-gradient(circle at center, #e6f0ff, #ffffff);
            --status-bg: rgba(240,248,255,0.95);
            --panel-bg: rgba(250,250,255,0.95);
            --panel-border: rgba(0,120,200,0.12);
            --accent-1: #0066cc;
            --accent-2: #0099ff;
            --text-primary: #0a2463;
            --muted-color: #0a2463;
            --icon-glow: rgba(0, 150, 255, 0.12);
        }

        .theme-high-contrast {
            --desktop-bg: linear-gradient(180deg,#000000,#111111);
            --status-bg: #000000;
            --panel-bg: #000000;
            --panel-border: #ffffff;
            --accent-1: #ffffff;
            --accent-2: #ffffff;
            --text-primary: #ffffff;
            --muted-color: #ffffff;
            --icon-glow: rgba(255,255,255,0.08);
        }
    </style>
</head>
<body>
    <!-- 欢迎提示 -->
    <div class="welcome-toast" id="welcomeToast">
        <div class="welcome-title" id="timeGreeting"></div>
        <div class="welcome-message">卡西亚女士。</div>
    </div>
    
    <!-- 加载动画 -->
    <div class="loading-overlay" id="loadingOverlay" style="display: none;">
        <div>
            <div class="loading-spinner"></div>
            <div class="loading-text" id="loadingText">正在加载...</div>
        </div>
    </div>
    
    <!-- 桌面界面 -->
    <div class="desktop">
        <!-- 顶部状态栏 -->
        <div class="status-bar">
            <div class="system-info">
                <img src="qsamlogo.png" alt="系统标志" class="system-logo">
                <div class="system-name">管理局 - 最高权限控制台</div>
            </div>
            
            <div class="user-info">
                <div class="time-display" id="currentTime">00:00:00</div>
                <div class="user-avatar">
                    <i class="fas fa-user-shield"></i>
                </div>
                <div>
                    <div style="color: #ffd93d;">Ophelia</div>
                    <div style="font-size: 0.8rem; color: #a3d5ff;">最高权限管理员</div>
                </div>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> 退出
                </button>
            </div>
        </div>
        
        <!-- 桌面图标网格 -->
        <div class="desktop-grid">
            <!-- 管理成员 -->
            <a href="members.html" class="desktop-icon" data-page-name="管理成员">
                <div class="icon-container">
                    <i class="fas fa-users icon-base"></i>
                    <div class="icon-glow"></div>
                </div>
                <div class="icon-label">管理成员</div>
                <div class="icon-badge">17</div>
            </a>
            
            <!-- 队伍名单 -->
            <a href="teams.html" class="desktop-icon" data-page-name="队伍名单">
                <div class="icon-container">
                    <i class="fas fa-layer-group icon-base"></i>
                    <div class="icon-glow"></div>
                </div>
                <div class="icon-label">队伍名单</div>
                <div class="icon-badge">5</div>
            </a>
            
            <!-- 任务详情 -->
            <a href="tasks.html" class="desktop-icon" data-page-name="任务详情">
                <div class="icon-container">
                    <i class="fas fa-tasks icon-base icon-warning"></i>
                    <div class="icon-glow"></div>
                </div>
                <div class="icon-label">任务详情</div>
                <div class="icon-badge" style="background: linear-gradient(135deg, #ffd93d, #ffa93d);">1</div>
            </a>

            <!-- 终审简历（管理员专用） -->
            <a href="final-check.html" class="desktop-icon" data-page-name="终审简历">
                <div class="icon-container">
                        <i class="fas fa-file-alt icon-base icon-success"></i>
                    <div class="icon-glow"></div>
                </div>
                <div class="icon-label">终审简历</div>
            </a>
            
            <!-- 已收录裂隙怪物 -->
            <a href="monsters.html" class="desktop-icon" data-page-name="裂隙怪物">
                <div class="icon-container">
                    <i class="fas fa-dragon icon-base icon-danger"></i>
                    <div class="icon-glow"></div>
                </div>
                <div class="icon-label">已收录<br>裂隙怪物</div>
                <div class="icon-badge" style="background: linear-gradient(135deg, #ff6b6b, #ff8e8e);">47</div>
            </a>
            
            <!-- 已收录实验体 -->
            <a href="subjects.html" class="desktop-icon" data-page-name="实验体">
                <div class="icon-container">
                    <i class="fas fa-flask icon-base icon-success"></i>
                    <div class="icon-glow"></div>
                </div>
                <div class="icon-label">已收录<br>实验体</div>
                <div class="icon-badge" style="background: linear-gradient(135deg, #6bffb8, #8effcc);">1</div>
            </a>
            
            <!-- 已移除：系统日志 / 系统设置 / 回收站（按需求删除） -->
        </div>
        
        
        <!-- 底部功能面板（管理员）：笔记 与 主题 -->
        <div class="function-panel">
            <div class="panel-btn" title="笔记" onclick="openPanel('notesPanel')">
                <i class="fas fa-sticky-note"></i>
            </div>
            <div class="panel-btn" title="主题" onclick="openPanel('themePanel')">
                <i class="fas fa-palette"></i>
            </div>
        </div>

    </div>

    <!-- Notes 面板 -->
    <div id="notesPanel" class="bottom-panel" aria-hidden="true">
        <div class="panel-header">笔记 &nbsp; <button class="close-btn" onclick="closePanel('notesPanel')">关闭</button></div>
        <div id="notesBody" class="panel-body">
            <textarea id="notesTextarea" class="notes-area" placeholder="在此记录管理员笔记..."></textarea>
            <div style="margin-top:10px; display:flex; justify-content:space-between; align-items:center;">
                <div id="notesStatus" class="muted"></div>
                <div>
                    <button onclick="saveNotes()" style="background:rgba(79,195,255,0.2);border:1px solid rgba(79,195,255,0.4);color:#4fc3ff;padding:8px 12px;border-radius:6px;cursor:pointer;">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Theme 面板 -->
    <div id="themePanel" class="bottom-panel" aria-hidden="true">
        <div class="panel-header">界面主题 &nbsp; <button class="close-btn" onclick="closePanel('themePanel')">关闭</button></div>
        <div id="themeBody" class="panel-body">
            <div class="theme-option"><input type="radio" name="themeChoice" id="themeDark" value="dark" onclick="applyTheme('dark', false)"><label for="themeDark">深色（默认）</label></div>
            <div class="theme-option"><input type="radio" name="themeChoice" id="themeLight" value="light" onclick="applyTheme('light', false)"><label for="themeLight">浅色（演示）</label></div>
            <div class="theme-option"><input type="radio" name="themeChoice" id="themeHC" value="high-contrast" onclick="applyTheme('high-contrast', false)"><label for="themeHC">高对比</label></div>
            <div style="margin-top:8px;color:#6b9ccc;font-size:0.95rem;">切换为预览后点击“应用”保存为本地偏好。</div>
            <div style="margin-top:10px; display:flex; gap:10px; align-items:center;">
                <div id="themePreview" style="flex:1; height:44px; border-radius:8px; border:1px solid rgba(255,255,255,0.04); display:flex; align-items:center; justify-content:center;" data-theme="dark">预览区域</div>
                <div>
                    <button onclick="applyThemeAndClose()" style="background:rgba(79,195,255,0.2);border:1px solid rgba(79,195,255,0.4);color:#4fc3ff;padding:8px 12px;border-radius:6px;cursor:pointer;">应用</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 页面链接配置
        const pageConfig = {
            'members': {
                url: 'members.html',
                name: '管理成员',
                description: '管理局所有成员的详细资料和权限管理'
            },
            'teams': {
                url: 'teams.html',
                name: '队伍名单',
                description: '行动队伍的组成、状态和任务分配'
            },
            'tasks': {
                url: 'tasks.html',
                name: '任务详情',
                description: '当前进行中和已完成的各项任务详情'
            },
            'monsters': {
                url: 'monsters.html',
                name: '裂隙怪物',
                description: '已收录的裂隙怪物档案和研究数据'
            },
            'subjects': {
                url: 'subjects.html',
                name: '实验体',
                description: '已收录的实验体样本和实验结果'
            },
            // 已移除: 'logs', 'settings', 'recycle'（图标已从桌面中删除）
        };

        // Supabase 默认配置（可用 localStorage 覆盖）
        const DEFAULT_SUPABASE_URL = 'https://owfyycgomqclytnswobj.supabase.co';
        const DEFAULT_SUPABASE_KEY = 'sb_publishable_65fjjNxcUjAFpFJ3AEW9Tg_ctW41ZsV';

        // 初始化 supabase-js 客户端（若 CDN 可用），优先使用 localStorage 中的配置覆盖默认值
        const SUPABASE_URL = (localStorage.getItem('supabase_url') || DEFAULT_SUPABASE_URL).trim();
        const SUPABASE_ANON_KEY = (localStorage.getItem('supabase_key') || DEFAULT_SUPABASE_KEY).trim();
        const _supabase = (window.supabase || window.supabaseJs) && typeof (window.supabase || window.supabaseJs).createClient === 'function'
            ? (window.supabase || window.supabaseJs).createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
            : null;
        
        // 检查登录状态
        const role = localStorage.getItem('auth_role');
        if (role !== 'admin') {
            alert('请先以管理员身份登录！');
            window.location.href = 'index.html';
        }
        
        // 获取时间并显示问候语
        function updateTime() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const seconds = now.getSeconds().toString().padStart(2, '0');
            
            // 更新时间显示
            document.getElementById('currentTime').textContent = `${hours}:${minutes}:${seconds}`;
            
            // 问候语
            let greeting = '';
            if (hours >= 5 && hours < 12) {
                greeting = '早上好';
            } else if (hours >= 12 && hours < 18) {
                greeting = '下午好';
            } else if (hours >= 18 && hours < 22) {
                greeting = '晚上好';
            } else {
                greeting = '夜深了';
            }
            
            document.getElementById('timeGreeting').textContent = greeting;
        }
        
        // 显示加载动画
        function showLoading(message = '正在加载...') {
            const overlay = document.getElementById('loadingOverlay');
            const text = document.getElementById('loadingText');
            text.textContent = message;
            overlay.style.display = 'flex';
        }
        
        // 隐藏加载动画
        async function populateDesktopPanel() {
            // 保持与同步版本一致：仅展示本地纯文本信息（不访问云端或系统信息）
            const tasksListEl = document.getElementById('tasksList');
            const iconsListEl = document.getElementById('iconsList');
            const peopleListEl = document.getElementById('peopleList');
            const cloudSyncEl = document.getElementById('cloudSyncStatus');

            if (tasksListEl) {
                tasksListEl.textContent = '桌面快捷（异步入口）：\n- 点击图标以打开对应页面。\n- 本面板仅显示本地静态说明，不连接任何云端或系统信息。';
                tasksListEl.style.whiteSpace = 'pre-wrap';
            }

            if (iconsListEl) {
                iconsListEl.innerHTML = '';
                const names = [];
                document.querySelectorAll('.desktop-grid .desktop-icon').forEach(a => {
                    const name = (a.getAttribute('data-page-name') || a.textContent || '').trim().split('\n')[0];
                    if (name) names.push(name);
                });
                if (names.length) {
                    names.forEach(n => {
                        const li = document.createElement('li');
                        li.style.padding = '6px 0';
                        li.textContent = n;
                        iconsListEl.appendChild(li);
                    });
                } else {
                    iconsListEl.innerHTML = '<li class="muted">无桌面图标。</li>';
                }
            }

            if (peopleListEl) {
                peopleListEl.textContent = '成员信息：\n- 请在“管理成员”页面查看详细成员资料（本地静态提示）。';
                peopleListEl.style.whiteSpace = 'pre-wrap';
            }

            if (cloudSyncEl) {
                cloudSyncEl.textContent = '本地模式：不连接云端。所有数据仅为本地展示。';
            }
        }
        // Modal popup removed per user request: no automatic popup on admin login.
        
        // 页面加载时显示欢迎信息
        window.onload = function() {
            updateTime();
            setInterval(updateTime, 1000);
            
            // 应用已保存的主题（若有）
            try { applyTheme(localStorage.getItem('admin_theme') || 'dark', false); } catch(e) {}
            
            // 5秒后隐藏欢迎提示
            setTimeout(() => {
                document.getElementById('welcomeToast').style.display = 'none';
            }, 5000);
        };
        
        // 显示桌面（收起所有窗口）
        // 打开底部虚拟面板（只打开一个）
        function openPanel(panelId) {
                // 关闭并打开目标面板（仅保留帮助、笔记与主题面板）
                ['helpPanel','notesPanel','themePanel'].forEach(id => {
                    const el = document.getElementById(id);
                    if (!el) return;
                    if (id === panelId) {
                        el.setAttribute('aria-hidden','false');
                    } else {
                        el.setAttribute('aria-hidden','true');
                    }
                });

                // 填充动态数据
                if (panelId === 'helpPanel') populateHelpPanel();
                if (panelId === 'notesPanel') populateNotesPanel();
                if (panelId === 'themePanel') populateThemePanel();
        }

        function closePanel(panelId) {
            const el = document.getElementById(panelId);
            if (el) el.setAttribute('aria-hidden','true');
        }

        // 填充桌面面板（简化版：仅本地纯文本，不访问云端或系统信息）
        function populateDesktopPanel() {
            const tasksListEl = document.getElementById('tasksList');
            const iconsListEl = document.getElementById('iconsList');
            const peopleListEl = document.getElementById('peopleList');
            const cloudSyncEl = document.getElementById('cloudSyncStatus');

            if (tasksListEl) {
                tasksListEl.textContent = '桌面快捷：\n- 点击图标以打开对应页面。\n- 本面板仅显示本地静态说明，不连接任何云端或系统信息。';
                tasksListEl.style.whiteSpace = 'pre-wrap';
            }

            if (iconsListEl) {
                // 列出桌面图标名称（仅作为本地纯文本展示）
                const names = [];
                document.querySelectorAll('.desktop-grid .desktop-icon').forEach(a => {
                    const name = (a.getAttribute('data-page-name') || a.textContent || '').trim().split('\n')[0];
                    if (name) names.push(name);
                });
                if (names.length) {
                    iconsListEl.innerHTML = '';
                    names.forEach(n => {
                        const li = document.createElement('li');
                        li.style.padding = '6px 0';
                        li.textContent = n; // 纯文本
                        iconsListEl.appendChild(li);
                    });
                } else {
                    iconsListEl.innerHTML = '<li class="muted">无桌面图标。</li>';
                }
            }

            if (peopleListEl) {
                peopleListEl.textContent = '成员信息：\n- 请在“管理成员”页面查看详细成员资料（本地静态提示）。';
                peopleListEl.style.whiteSpace = 'pre-wrap';
            }

            if (cloudSyncEl) {
                cloudSyncEl.textContent = '本地模式：不连接云端。所有数据仅为本地展示。';
            }
        }

        async function fetchCloudSummary() {
                    // 如果配置了 Supabase，则优先使用 Supabase REST API（需要在 localStorage 中配置 `supabase_url` 与 `supabase_key`）
                    // 首选使用 supabase-js 客户端（更可靠，避免手动构造 REST 过滤字符串）
                    if (_supabase) {
                        try {
                            const { data: tasks, error: tErr } = await _supabase
                                .from('tasks')
                                .select('title,created_at')
                                .order('created_at', { ascending: false })
                                .limit(5);
                            const { data: people, error: uErr } = await _supabase
                                .from('users')
                                .select('id,username,name,email')
                                .limit(8);
                            return { tasks: tasks || [], people: people || [], updated: new Date().toISOString(), errors: [tErr, uErr].filter(Boolean) };
                        } catch (e) {
                            // 如果 supabase-js 请求抛错，继续回退逻辑
                        }
                    }

                    // 兼容此前的通用 cloud_api 回退
                    const endpoints = [];
                    const configured = localStorage.getItem('cloud_api');
                    if (configured) endpoints.push(configured.replace(/\/$/, '') + '/summary');
                    endpoints.push('/api/summary');
                    endpoints.push('https://api.example.com/qsam/summary');
                    for (const url of endpoints) {
                        try {
                            if (!url) continue;
                            const r = await fetch(url, { credentials: 'include' });
                            if (!r.ok) continue;
                            const j = await r.json();
                            return j;
                        } catch (e) {
                            // try next
                        }
                    }
                    return null;
        }

        async function populateDesktopPanel() {
            const tasksEl = document.getElementById('tasksList');
            const iconsListEl = document.getElementById('iconsList');
            const peopleEl = document.getElementById('peopleList');
            const cloudEl = document.getElementById('cloudSyncStatus');

            if (iconsListEl) {
                iconsListEl.innerHTML = '';
                document.querySelectorAll('.desktop-grid .desktop-icon').forEach(a => {
                    const name = a.getAttribute('data-page-name') || a.textContent.trim().split('\n')[0];
                    const badgeEl = a.querySelector('.icon-badge');
                    const badge = badgeEl ? ` <span class="muted">(${escapeHtml(badgeEl.textContent.trim())})</span>` : '';
                    const li = document.createElement('li');
                    li.style.padding = '6px 0';
                    li.innerHTML = escapeHtml(name) + badge;
                    iconsListEl.appendChild(li);
                });
            }

            if (cloudEl) cloudEl.textContent = '正在从云端获取...';
            let cloud = null;
            try { cloud = await fetchCloudSummary(); } catch (e) { cloud = null; }

            if (cloud) {
                if (tasksEl) {
                    const tasks = Array.isArray(cloud.tasks) ? cloud.tasks : [];
                    tasksEl.innerHTML = tasks.length ? ('<ul style="list-style:none;padding-left:0;color:#6b9ccc;">' + tasks.slice(0,5).map(t => `<li>${escapeHtml(t.title || t)}</li>`).join('') + '</ul>') : '<div class="muted">无近期任务。</div>';
                }
                if (peopleEl) {
                    const people = Array.isArray(cloud.people) ? cloud.people : [];
                    peopleEl.innerHTML = people.length ? ('<ul style="list-style:none;padding-left:0;color:#6b9ccc;">' + people.slice(0,8).map(p => `<li>${escapeHtml(p.name || p)}</li>`).join('') + '</ul>') : '<div class="muted">未发现在线成员。</div>';
                }
                if (cloudEl) cloudEl.textContent = '已从云端同步' + (cloud.updated ? ('（' + escapeHtml(cloud.updated) + '）') : '。');
                return;
            }

            if (cloudEl) cloudEl.textContent = '无法连接云端，改用本地数据。';

            if (tasksEl) {
                try {
                    const tasksData = JSON.parse(localStorage.getItem('tasks') || 'null');
                    if (Array.isArray(tasksData) && tasksData.length) {
                        tasksEl.innerHTML = '<ul style="list-style:none;padding-left:0;color:#6b9ccc;">' + tasksData.slice(0,5).map(t => `<li>${escapeHtml(t.title || t)}</li>`).join('') + '</ul>';
                    } else {
                        fetch('tasks.html').then(r => r.text()).then(txt => {
                            const liMatches = txt.match(/<li[^>]*>(.*?)<\/li>/g);
                            const snippets = [];
                            if (liMatches && liMatches.length) {
                                for (let i = 0; i < Math.min(5, liMatches.length); i++) snippets.push(liMatches[i].replace(/<[^>]+>/g, ''));
                            } else {
                                const hMatches = txt.match(/<h[1-6][^>]*>(.*?)<\/h[1-6]>/g);
                                if (hMatches && hMatches.length) for (let i = 0; i < Math.min(5, hMatches.length); i++) snippets.push(hMatches[i].replace(/<[^>]+>/g, ''));
                            }
                            tasksEl.innerHTML = snippets.length ? ('<ul style="list-style:none;padding-left:0;color:#6b9ccc;">' + snippets.map(s => `<li>${escapeHtml(s)}</li>`).join('') + '</ul>') : '<div class="muted">无本地任务数据。</div>';
                        }).catch(() => { tasksEl.innerHTML = '<div class="muted">无法加载任务页面（可能在 file:// 环境下被阻止）。</div>'; });
                    }
                } catch (e) { tasksEl.innerHTML = '<div class="muted">无法读取本地任务数据。</div>'; }
            }

            if (peopleEl) {
                try {
                    const membersData = JSON.parse(localStorage.getItem('members') || 'null');
                    if (Array.isArray(membersData) && membersData.length) {
                        peopleEl.innerHTML = '<ul style="list-style:none;padding-left:0;color:#6b9ccc;">' + membersData.slice(0,8).map(m => `<li>${escapeHtml(m.name || m)}</li>`).join('') + '</ul>';
                    } else {
                        fetch('members.html').then(r => r.text()).then(txt => {
                            const liMatches = txt.match(/<li[^>]*>(.*?)<\/li>/g);
                            const snippets = [];
                            if (liMatches && liMatches.length) for (let i = 0; i < Math.min(8, liMatches.length); i++) snippets.push(liMatches[i].replace(/<[^>]+>/g, ''));
                            peopleEl.innerHTML = snippets.length ? ('<ul style="list-style:none;padding-left:0;color:#6b9ccc;">' + snippets.map(s => `<li>${escapeHtml(s)}</li>`).join('') + '</ul>') : '<div class="muted">无成员数据。</div>';
                        }).catch(() => { peopleEl.innerHTML = '<div class="muted">无法加载成员页面（文件访问受限）。</div>'; });
                    }
                } catch (e) { peopleEl.innerHTML = '<div class="muted">无法读取本地成员数据。</div>'; }
            }
        }

        // `performQuickSearch` 已删除（快速搜索功能按用户要求移除）

        function populateHelpPanel() {
            const el = document.getElementById('helpBody');
            if (!el) return;
            // 仅显示本地纯文本的帮助说明，不包含任何系统或云端信息
            el.innerHTML = '';
            const lines = [];
            lines.push('帮助中心：');
            lines.push('- 如何发布任务：管理员点击“任务详情”并使用页面内的发布表单。');
            lines.push('- 成员接取：成员可在“成员任务”页面查看并接取可用任务。');
            lines.push('- 权限说明：不同角色拥有不同操作权限，请咨询管理员。');
            lines.push('');
            lines.push('说明：本帮助为本地静态文本，程序不会访问云端或读取系统信息。');
            const p = document.createElement('div');
            p.style.whiteSpace = 'pre-wrap';
            p.textContent = lines.join('\n');
            el.appendChild(p);
        }

        // 笔记面板：加载与保存本地笔记
        function populateNotesPanel() {
            const el = document.getElementById('notesBody');
            if (!el) return;
            const ta = document.getElementById('notesTextarea');
            const status = document.getElementById('notesStatus');
            if (status) status.textContent = '';
            try {
                const notes = localStorage.getItem('admin_notes') || '';
                if (ta) ta.value = notes;
            } catch (e) {
                if (ta) ta.value = '';
            }
        }

        function saveNotes() {
            const ta = document.getElementById('notesTextarea');
            const status = document.getElementById('notesStatus');
            if (!ta) return;
            try {
                localStorage.setItem('admin_notes', ta.value);
                if (status) {
                    status.textContent = '已保存';
                    setTimeout(() => status.textContent = '', 1500);
                }
            } catch (e) {
                if (status) status.textContent = '保存失败';
            }
        }

        // 主题面板：选择并应用简单主题
        function populateThemePanel() {
            const current = localStorage.getItem('admin_theme') || 'dark';
            const radios = document.getElementsByName('themeChoice');
            radios.forEach(r => r.checked = (r.value === current));
            // preview without persisting
            applyTheme(current, /*persist*/ false);
            // update preview swatch
            const preview = document.getElementById('themePreview');
            if (preview) preview.setAttribute('data-theme', current);
        }

        function applyTheme(theme, persist = true) {
            // remove any existing theme- classes and set the requested one
            document.documentElement.classList.remove('theme-dark','theme-light','theme-high-contrast');
            if (!theme || theme === 'dark') document.documentElement.classList.add('theme-dark');
            else if (theme === 'light') document.documentElement.classList.add('theme-light');
            else if (theme === 'high-contrast') document.documentElement.classList.add('theme-high-contrast');
            if (persist) localStorage.setItem('admin_theme', theme || 'dark');
            // update preview indicator if present
            const preview = document.getElementById('themePreview');
            if (preview) preview.setAttribute('data-theme', theme || 'dark');
        }

        function applyThemeAndClose() {
            const radios = document.getElementsByName('themeChoice');
            let selected = 'dark';
            radios.forEach(r => { if (r.checked) selected = r.value; });
            applyTheme(selected, true);
            closePanel('themePanel');
        }

        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }
        
        // 退出登录
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.clear();
                showLoading('正在退出系统...');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            }
        }

       
    </script>
