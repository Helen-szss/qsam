<html lang="zh-CN">
<head>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        :root{
            --desktop-bg: radial-gradient(circle at center, #0a2463, #000000);
            --status-bg: rgba(10, 36, 99, 0.8);
            --panel-bg: rgba(6,22,60,0.92);
            --panel-border: rgba(0,150,255,0.25);
            --accent-1: #ff6b6b;
            --accent-2: #ffd93d;
            --text-primary: #e0f7ff;
            --muted-color: #a3d5ff;
            --icon-glow: rgba(79, 195, 255, 0.2);
        }
        /* 妗岄潰鏍峰紡 */
        .desktop {
            min-height: 100vh;
            background: var(--desktop-bg);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        
        /* 椤堕儴鐘舵€佹爮 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: var(--status-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 150, 255, 0.3);
            margin-bottom: 40px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .system-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .system-logo {
            width: 40px;
            height: 40px;
            filter: drop-shadow(0 0 10px rgba(0, 150, 255, 0.7));
        }
        
        .system-name {
            font-size: 1.5rem;
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0066cc, #0099ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
        }
        
        .time-display {
            color: var(--muted-color);
            font-size: 1.1rem;
            letter-spacing: 1px;
        }
        
        /* 妗岄潰鍥炬爣缃戞牸 */
        .desktop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 妗岄潰鍥炬爣鏍峰紡 */
        .desktop-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 150px;
            height: 150px;
            padding: 20px;
            background: rgba(10, 36, 99, 0.7);
            border-radius: 20px;
            border: 2px solid rgba(0, 150, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            position: relative;
            overflow: hidden;
            text-decoration: none;
        }
        
        .desktop-icon:hover {
            transform: translateY(-10px);
            border-color: rgba(0, 150, 255, 0.8);
            box-shadow: 
                0 10px 30px rgba(0, 150, 255, 0.3),
                inset 0 0 30px rgba(0, 150, 255, 0.1);
        }
        
        .desktop-icon.active {
            background: rgba(0, 60, 120, 0.8);
            border-color: rgba(0, 200, 255, 0.8);
        }
        
        .icon-image {
            width: 60px;
            height: 60px;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px rgba(0, 150, 255, 0.7));
            transition: transform 0.3s ease;
        }
        
        .desktop-icon:hover .icon-image {
            transform: scale(1.1);
        }
        
        .icon-label {
            color: #e0f7ff;
            font-size: 1rem;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(0, 150, 255, 0.5);
            line-height: 1.3;
        }
        
        .icon-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: white;
        }
        
        /* 缁熶竴鍥炬爣瀹瑰櫒 */
        .icon-container {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            position: relative;
        }
        
        .icon-base {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #4fc3ff, #6b9ccc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(79, 195, 255, 0.5));
        }
        
        .icon-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            background: radial-gradient(circle, var(--icon-glow) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
        }
        
        /* 鐗规畩鍥炬爣棰滆壊 */
        .icon-danger .icon-base {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            filter: drop-shadow(0 0 8px rgba(255, 107, 107, 0.5));
        }
        
        .icon-danger .icon-glow {
            background: radial-gradient(circle, rgba(255, 107, 107, 0.2) 0%, transparent 70%);
        }
        
        .icon-success .icon-base {
            background: linear-gradient(135deg, #6bffb8, #8effcc);
            filter: drop-shadow(0 0 8px rgba(107, 255, 184, 0.5));
        }
        
        .icon-success .icon-glow {
            background: radial-gradient(circle, rgba(107, 255, 184, 0.2) 0%, transparent 70%);
        }
        
        .icon-warning .icon-base {
            background: linear-gradient(135deg, #ffd93d, #ffa93d);
            filter: drop-shadow(0 0 8px rgba(255, 217, 61, 0.5));
        }
        
        .icon-warning .icon-glow {
            background: radial-gradient(circle, rgba(255, 217, 61, 0.2) 0%, transparent 70%);
        }
        
        /* 鍔犺浇鍔ㄧ敾 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            backdrop-filter: blur(10px);
        }
        
        .loading-spinner {
            width: 80px;
            height: 80px;
            border: 5px solid rgba(79, 195, 255, 0.3);
            border-top: 5px solid #4fc3ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #e0f7ff;
            margin-top: 20px;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }
        
        /* 娆㈣繋鎻愮ず */
        .welcome-toast {
            position: fixed;
            top: 100px;
            right: 20px;
            padding: 20px 30px;
            background: rgba(10, 36, 99, 0.9);
            border: 1px solid rgba(0, 150, 255, 0.5);
            border-radius: 15px;
            color: #e0f7ff;
            box-shadow: 0 10px 30px rgba(0, 150, 255, 0.3);
            z-index: 1000;
            animation: slideIn 0.5s ease, fadeOut 0.5s ease 4.5s forwards;
            backdrop-filter: blur(10px);
        }
        
        .welcome-title {
            font-size: 1.2rem;
            margin-bottom: 5px;
            color: #4fc3ff;
        }
        
        .welcome-message {
            font-size: 1.5rem;
            background: linear-gradient(90deg, #ffd93d, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
        }
        
        /* 搴曢儴鍔熻兘闈㈡澘鏍峰紡宸茬Щ闄わ紙鍔熻兘琚垹闄わ級 */
        /* 搴曢儴鍔熻兘闈㈡澘 - 绠＄悊鍛樹笓鐢紙淇濈暀绠€娲佷袱涓寜閽級 */
        .function-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            background: rgba(10,36,99,0.9);
            border-radius: 40px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0,150,255,0.25);
            display: flex;
            gap: 18px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .panel-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: rgba(0,60,120,0.85);
            border: 1px solid rgba(0,150,255,0.35);
            color: #a3d5ff;
            display:flex;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            transition: all .2s ease;
            font-size:1.2rem;
        }

        .panel-btn:hover {
            background: rgba(0,150,255,0.35);
            transform: scale(1.12);
            box-shadow: 0 0 12px rgba(0,150,255,0.4);
        }
        
        /* 鍔ㄧ敾 */
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        @keyframes fadeOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
                transform: translateX(100%);
            }
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 鍝嶅簲寮忚璁?*/
        @media (max-width: 768px) {
            .desktop-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 20px;
            }
            
            .desktop-icon {
                width: 120px;
                height: 120px;
            }
            
            .icon-container {
                width: 50px;
                height: 50px;
            }
            
            .icon-base {
                font-size: 2rem;
            }
        }
        
        /* 閫€鍑烘寜閽牱寮?*/
        .logout-btn {
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid rgba(255, 107, 107, 0.5);
            color: #ff6b6b;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-left: 15px;
        }
        
        .logout-btn:hover {
            background: rgba(255, 107, 107, 0.3);
            transform: scale(1.05);
        }

        /* 搴曢儴铏氭嫙闈㈡澘鏍峰紡 */
        .bottom-panel {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            width: min(920px, 92%);
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 14px;
            padding: 14px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            display: none;
            z-index: 2500;
        }

        .bottom-panel[aria-hidden="false"] {
            display: block;
        }

        .bottom-panel .panel-header {
            font-size: 1.1rem;
            color: #4fc3ff;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .bottom-panel .panel-body { color: #e0f7ff; }

        .panel-grid { display:grid; grid-template-columns: repeat(4,1fr); gap:12px; }
        .panel-item { background: rgba(0,30,80,0.5); padding:12px; border-radius:8px; text-align:center; }
        .muted { color: #6b9ccc; font-size:0.85rem; }

        .metric { display:flex; align-items:center; gap:12px; margin-bottom:8px; }
        .meter { flex:1; height:10px; background: rgba(255,255,255,0.06); border-radius:6px; overflow:hidden; }
        .meter-fill { height:100%; background: linear-gradient(90deg,#4fc3ff,#00ccff); }

        .panel-footer { margin-top:12px; text-align:right; }
        /* 闈㈡澘閫氱敤灏忔牱寮?*/
        .bottom-panel .close-btn {
            background: rgba(255,107,107,0.2);
            border: 1px solid rgba(255,107,107,0.35);
            color: #ff6b6b;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        .notes-area { width: 100%; height: 160px; padding: 10px; border-radius:8px; border:1px solid rgba(255,255,255,0.06); background: rgba(0,0,0,0.45); color:#e0f7ff; resize:vertical; }

        .theme-option { display:flex; gap:8px; align-items:center; margin:10px 0; }

        /* 涓婚绫伙細瑕嗙洊鍙橀噺浠ュ垏鎹富棰?*/
        .theme-dark { /* 榛樿锛屼娇鐢?:root 鍙橀噺 鈥?鏃犻渶瑕嗙洊 */ }

        .theme-light {
            --desktop-bg: radial-gradient(circle at center, #e6f0ff, #ffffff);
            --status-bg: rgba(240,248,255,0.95);
            --panel-bg: rgba(250,250,255,0.95);
            --panel-border: rgba(0,120,200,0.12);
            --accent-1: #0066cc;
            --accent-2: #0099ff;
            --text-primary: #0a2463;
            --muted-color: #0a2463;
            --icon-glow: rgba(0, 150, 255, 0.12);
        }

        .theme-high-contrast {
            --desktop-bg: linear-gradient(180deg,#000000,#111111);
            --status-bg: #000000;
            --panel-bg: #000000;
            --panel-border: #ffffff;
            --accent-1: #ffffff;
            --accent-2: #ffffff;
            --text-primary: #ffffff;
            --muted-color: #ffffff;
            --icon-glow: rgba(255,255,255,0.08);
        }
    </style>
</head>

                    }

                localStorage.setItem('admin_notes', ta.value);
                if (status) {
                    status.textContent = '宸蹭繚瀛?;
                    setTimeout(() => status.textContent = '', 1500);
                }
            } catch (e) {
                if (status) status.textContent = '淇濆瓨澶辫触';
            }
        }

        // 涓婚闈㈡澘锛氶€夋嫨骞跺簲鐢ㄧ畝鍗曚富棰?
        function populateThemePanel() {
            const current = localStorage.getItem('admin_theme') || 'dark';
            const radios = document.getElementsByName('themeChoice');
            radios.forEach(r => r.checked = (r.value === current));
            // preview without persisting
            applyTheme(current, /*persist*/ false);
            // update preview swatch
            const preview = document.getElementById('themePreview');
            if (preview) preview.setAttribute('data-theme', current);
        }

        function applyTheme(theme, persist = true) {
            // remove any existing theme- classes and set the requested one
            document.documentElement.classList.remove('theme-dark','theme-light','theme-high-contrast');
            if (!theme || theme === 'dark') document.documentElement.classList.add('theme-dark');
            else if (theme === 'light') document.documentElement.classList.add('theme-light');
            else if (theme === 'high-contrast') document.documentElement.classList.add('theme-high-contrast');
            if (persist) localStorage.setItem('admin_theme', theme || 'dark');
            // update preview indicator if present
            const preview = document.getElementById('themePreview');
            if (preview) preview.setAttribute('data-theme', theme || 'dark');
        }

        function applyThemeAndClose() {
            const radios = document.getElementsByName('themeChoice');
            let selected = 'dark';
            radios.forEach(r => { if (r.checked) selected = r.value; });
            applyTheme(selected, true);
            closePanel('themePanel');
        }

        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }
        
        // 閫€鍑虹櫥褰?
        function logout() {
            if (confirm('纭畾瑕侀€€鍑虹櫥褰曞悧锛?)) {
                localStorage.clear();
                showLoading('姝ｅ湪閫€鍑虹郴缁?..');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            }
        }

       
    </script>
