<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的队伍 - 成员控制台</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 添加 Supabase 客户端库 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* 控制台样式 */
        .desktop {
            min-height: 100vh;
            width: 100%;
            background: radial-gradient(circle at center, #0a2463, #000000);
            padding: 0;
            position: relative;
        }
        
        /* 顶部状态栏 */
        .status-bar {
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(10, 36, 99, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 150, 255, 0.3);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .system-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        /* 返回按钮样式 */
        .back-btn {
            background: rgba(0, 150, 255, 0.2);
            border: 1px solid rgba(0, 150, 255, 0.5);
            color: #4fc3ff;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            white-space: nowrap;
            margin-right: 15px;
        }

        .back-btn:hover {
            background: rgba(0, 150, 255, 0.3);
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(0, 150, 255, 0.3);
        }

        .back-btn i {
            font-size: 0.8rem;
        }
        
        .system-logo {
            width: 40px;
            height: 40px;
            filter: drop-shadow(0 0 10px rgba(0, 150, 255, 0.7));
        }
        
        .system-name {
            font-size: 1.5rem;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0066cc, #0099ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
        }
        
        .time-display {
            color: #a3d5ff;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }
        
        /* 主要内容区域 */
        .main-content {
            width: 100%;
            min-height: calc(100vh - 80px);
            padding: 30px;
            overflow: auto;
        }
        
        /* 内容容器 */
        .content-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }
        
        /* 页面标题 */
        .page-header {
            margin-bottom: 30px;
            text-align: center;
        }
        
        .page-title {
            font-size: 2.2rem;
            background: linear-gradient(90deg, #4fc3ff, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(79, 195, 255, 0.3);
        }
        
        .page-subtitle {
            color: #a3d5ff;
            font-size: 1.1rem;
            letter-spacing: 1px;
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.5;
        }
        
        /* 用户身份徽章 */
        .user-role-badge {
            display: inline-block;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            margin-left: 15px;
        }
        
        .role-leader {
            background: linear-gradient(135deg, #ffd93d, #ffa93d);
            color: #000;
        }
        
        .role-member {
            background: linear-gradient(135deg, #4fc3ff, #0066cc);
            color: white;
        }
        
        /* 我的队伍卡片 */
        .my-team-card {
            background: rgba(10, 36, 99, 0.7);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 40px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .my-team-card:hover {
            background: rgba(0, 60, 120, 0.3);
            border-color: rgba(0, 200, 255, 0.5);
            box-shadow: 0 15px 35px rgba(0, 150, 255, 0.2);
        }
        
        .my-team-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--team-color, #4fc3ff), transparent);
        }
        
        .team-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .team-icon-large {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            background: rgba(0, 150, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: var(--team-color, #4fc3ff);
            flex-shrink: 0;
        }
        
        .team-basic-info {
            flex: 1;
        }
        
        .team-basic-info h2 {
            font-size: 1.8rem;
            color: #e0f7ff;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }
        
        .team-code {
            font-size: 1.1rem;
            color: #a3d5ff;
            margin-bottom: 10px;
        }
        
        .team-description {
            color: #a3d5ff;
            line-height: 1.6;
            font-size: 1rem;
        }
        
        /* 队伍信息网格 */
        .team-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .info-card {
            background: rgba(0, 30, 80, 0.5);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(0, 150, 255, 0.2);
        }
        
        .info-card-title {
            font-size: 1.1rem;
            color: #4fc3ff;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 150, 255, 0.1);
        }
        
        .info-label {
            color: #6b9ccc;
            font-size: 0.9rem;
        }
        
        .info-value {
            color: #e0f7ff;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        /* 成员列表 */
        .members-section {
            margin-top: 40px;
        }
        
        .members-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .members-title {
            font-size: 1.4rem;
            color: #e0f7ff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .members-count {
            color: #a3d5ff;
            font-size: 1rem;
        }
        
        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }
        
        .member-card {
            background: rgba(0, 30, 80, 0.5);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
            border: 1px solid rgba(0, 150, 255, 0.2);
            position: relative;
        }
        
        .member-card:hover {
            background: rgba(0, 60, 120, 0.3);
            transform: translateY(-5px);
            border-color: rgba(0, 200, 255, 0.5);
            box-shadow: 0 10px 25px rgba(0, 150, 255, 0.2);
        }
        
        .member-card.current-user {
            border: 2px solid #ffd93d;
            background: rgba(255, 217, 61, 0.1);
        }
        
        .member-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .member-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0066cc, #0099ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            flex-shrink: 0;
        }
        
        .member-avatar.leader {
            background: linear-gradient(135deg, #ffd93d, #ffa93d);
        }
        
        .member-name {
            flex: 1;
        }
        
        .member-name h4 {
            font-size: 1.1rem;
            color: #e0f7ff;
            margin-bottom: 5px;
        }
        
        .member-position {
            font-size: 0.9rem;
            color: #a3d5ff;
        }
        
        .member-position.leader {
            color: #ffd93d;
            font-weight: bold;
        }
        
        .member-details {
            font-size: 0.85rem;
            color: #6b9ccc;
        }
        
        .member-detail-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        
        .current-user-badge {
            position: absolute;
            top: -10px;
            right: 15px;
            background: #ffd93d;
            color: #000;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: bold;
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b9ccc;
            grid-column: 1 / -1;
        }
        
        .empty-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            color: rgba(0, 150, 255, 0.3);
        }
        
        /* 队伍详情模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal-content {
            background: radial-gradient(circle at center, #0a2463, #000000);
            border: 2px solid rgba(0, 150, 255, 0.5);
            border-radius: 20px;
            padding: 30px;
            max-width: 800px;
            width: 95%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 0 60px rgba(0, 150, 255, 0.4);
            transform: translateY(20px);
            transition: transform 0.3s ease;
            position: relative;
        }
        
        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 150, 255, 0.3);
        }
        
        .modal-title {
            background: linear-gradient(90deg, #4fc3ff, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.6rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .close-btn {
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid rgba(255, 107, 107, 0.5);
            color: #ff6b6b;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .close-btn:hover {
            background: rgba(255, 107, 107, 0.3);
            transform: rotate(90deg);
        }
        
        /* 操作按钮 */
        .action-btn {
            padding: 10px 20px;
            background: rgba(10, 36, 99, 0.7);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 10px;
            color: #a3d5ff;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            white-space: nowrap;
        }
        
        .action-btn:hover {
            background: rgba(0, 150, 255, 0.2);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 150, 255, 0.2);
        }
        
        .action-btn.primary {
            background: linear-gradient(135deg, #0066cc, #0099ff);
            color: white;
            border: none;
        }
        
        .action-btn.primary:hover {
            background: linear-gradient(135deg, #0099ff, #00ccff);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 150, 255, 0.3);
        }
        
        /* 退出按钮 */
        .logout-btn {
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid rgba(255, 107, 107, 0.5);
            color: #ff6b6b;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-left: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .logout-btn:hover {
            background: rgba(255, 107, 107, 0.3);
            transform: scale(1.05);
        }
        
        /* 加载动画 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            backdrop-filter: blur(10px);
            flex-direction: column;
        }
        
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(79, 195, 255, 0.3);
            border-top: 5px solid #4fc3ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #e0f7ff;
            margin-top: 20px;
            font-size: 1.1rem;
            letter-spacing: 2px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .main-content {
                padding: 20px 15px;
            }
            
            .status-bar {
                padding: 15px 20px;
                flex-wrap: wrap;
                gap: 15px;
            }
            
            .team-header {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }
            
            .team-icon-large {
                width: 70px;
                height: 70px;
                font-size: 2rem;
            }
            
            .members-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
            
            .page-title {
                font-size: 1.8rem;
            }
            
            .page-subtitle {
                font-size: 1rem;
            }
            
            .modal-content {
                padding: 20px;
                width: 98%;
            }
            
            /* 响应式下的返回按钮 */
            .back-btn {
                margin-right: 10px;
                padding: 6px 12px;
                font-size: 0.8rem;
            }
            
            .back-btn span {
                display: none; /* 在小屏幕上隐藏"返回"文字 */
            }
            
            .back-btn i {
                margin-right: 0;
                font-size: 0.9rem;
            }
        }
        
        /* 队伍定义（与teams.html保持一致） */
        .team-card {
            background: rgba(10, 36, 99, 0.7);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 15px;
            padding: 25px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .team-card:hover {
            background: rgba(0, 60, 120, 0.3);
            border-color: rgba(0, 200, 255, 0.5);
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 150, 255, 0.2);
        }
        
        .team-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--team-color), transparent);
        }
    </style>
</head>

        // 初始化Supabase
        async function initSupabase() {
            try {
                console.log('初始化Supabase连接...');
                
                // 等待Supabase库加载完成
                if (typeof window.supabase === 'undefined') {
                    console.error('Supabase库未加载！');
                    updateCloudStatus('error', 'Supabase库未加载');
                    return false;
                }
                
                // 检查配置是否完整
                if (!SUPABASE_URL || SUPABASE_URL.includes('your-project-id') || 
                    !SUPABASE_ANON_KEY || SUPABASE_ANON_KEY.includes('your-anon-key')) {
                    console.warn('Supabase配置不完整');
                    updateCloudStatus('disabled', 'Supabase配置不完整');
                    return false;
                }
                
                // 创建Supabase客户端
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
                    auth: {
                        persistSession: false,
                        autoRefreshToken: false
                    }
                });
                
                // 测试连接
                const connected = await testSupabaseConnection();
                if (connected) {
                    cloudEnabled = true;
                    console.log('✅ Supabase连接成功');
                    updateCloudStatus('connected', '云端数据库连接成功');
                    return true;
                } else {
                    updateCloudStatus('error', '云端连接失败');
                    return false;
                }
                
            } catch (e) {
                console.error('Supabase初始化失败:', e);
                updateCloudStatus('error', '初始化失败: ' + e.message);
                return false;
            }
        }
        
        // 测试Supabase连接
        async function testSupabaseConnection() {
            if (!supabaseClient) return false;
            
            try {
                updateLoadingText('正在测试云端连接...');
                
                // 尝试查询users表
                const { data, error } = await supabaseClient
                    .from('users')
                    .select('id')
                    .limit(1);
                
                if (error) {
                    console.error('❌ Supabase连接测试失败:', error);
                    return false;
                }
                
                console.log('✅ Supabase连接测试成功');
                return true;
            } catch (e) {
                console.error('连接测试异常:', e);
                return false;
            }
        }
        
        // 更新加载文本
        function updateLoadingText(text) {
            const loadingText = document.getElementById('loadingText');
            if (loadingText) {
                loadingText.textContent = text;
            }
        }
        
        // 更新云端状态显示
        function updateCloudStatus(status, message) {
            const cloudIcon = document.getElementById('cloudIcon');
            const cloudStatus = document.getElementById('cloudStatus');
            
            if (!cloudIcon || !cloudStatus) return;
            
            switch(status) {
                case 'connected':
                    cloudIcon.style.color = '#6bffb8';
                    cloudIcon.className = 'fas fa-cloud';
                    cloudStatus.textContent = message;
                    break;
                case 'connecting':
                    cloudIcon.style.color = '#ffd93d';
                    cloudIcon.className = 'fas fa-spinner fa-spin';
                    cloudStatus.textContent = message;
                    break;
                case 'error':
                    cloudIcon.style.color = '#ff6b6b';
                    cloudIcon.className = 'fas fa-cloud-slash';
                    cloudStatus.textContent = message;
                    break;
                case 'disabled':
                    cloudIcon.style.color = '#a3d5ff';
                    cloudIcon.className = 'fas fa-cloud-slash';
                    cloudStatus.textContent = message;
                    break;
            }
        }

        // 加载当前用户和队伍信息
        async function loadCurrentUserAndTeam(username) {
            try {
                updateLoadingText('正在加载用户信息...');
                
                // 1. 获取当前用户信息
                currentUser = await loadUserByUsername(username);
                
                if (!currentUser) {
                    showErrorMessage('无法获取用户信息');
                    return;
                }
                
                // 2. 更新用户界面显示
                updateUserDisplay(currentUser);
                
                // 3. 检查用户是否有分配队伍
                if (!currentUser.team || currentUser.team === '') {
                    showNoTeamMessage();
                    return;
                }
                
                // 4. 获取队伍信息
                userTeam = TEAMS_INFO[currentUser.team];
                
                if (!userTeam) {
                    showErrorMessage('未找到队伍信息');
                    return;
                }
                
                // 5. 获取队伍成员
                await loadTeamMembers(currentUser.team);
                
                // 6. 渲染队伍信息
                renderMyTeam();
                
            } catch (error) {
                console.error('加载用户和队伍信息失败:', error);
                showErrorMessage('数据加载失败: ' + error.message);
            }
        }
        
        // 根据用户名加载用户信息（云端优先）
        async function loadUserByUsername(username) {
            if (cloudEnabled && supabaseClient) {
                try {
                    updateLoadingText('正在从云端获取用户信息...');
                    
                    // 从云端获取用户
                    const { data: user, error } = await supabaseClient
                        .from('users')
                        .select('*')
                        .eq('username', username)
                        .single();
                    
                    if (error) {
                        console.error('从云端获取用户失败:', error);
                        // 回退到本地数据
                    } else {
                        console.log('从云端获取用户成功:', user.username);
                        return {
                            id: user.id,
                            name: user.name,
                            username: user.username,
                            role: user.role,
                            status: user.status,
                            department: user.department || '未分配',
                            team: user.team || '',
                            position: user.position || '',
                            joinDate: user.join_date,
                            notes: user.notes
                        };
                    }
                } catch (error) {
                    console.error('云端查询异常:', error);
                }
            }
            
            // 使用本地数据
            updateLoadingText('正在从本地获取用户信息...');
            const stored = localStorage.getItem('qs_users_data');
            
            if (stored) {
                try {
                    const usersData = JSON.parse(stored);
                    const user = usersData[username];
                    
                    if (user) {
                        return {
                            id: user.id,
                            name: user.name,
                            username: username,
                            role: user.role,
                            status: user.status,
                            department: user.department || '未分配',
                            team: user.team || '',
                            position: user.position || '',
                            joinDate: user.joinDate,
                            notes: user.notes
                        };
                    }
                } catch (e) {
                    console.error('解析本地用户数据失败:', e);
                }
            }
            
            return null;
        }
        
        // 加载队伍成员
        async function loadTeamMembers(teamName) {
            if (cloudEnabled && supabaseClient) {
                try {
                    updateLoadingText('正在从云端获取队伍成员...');
                    
                    // 从云端获取该队伍的所有成员
                    const { data: members, error } = await supabaseClient
                        .from('users')
                        .select('*')
                        .eq('team', teamName)
                        .order('position', { ascending: false }) // 队长排前面
                        .order('name', { ascending: true });
                    
                    if (error) throw error;
                    
                    console.log(`从云端获取了 ${members.length} 名${teamName}成员`);
                    
                    teamMembers = members.map(user => ({
                        id: user.id,
                        name: user.name,
                        username: user.username,
                        role: user.role,
                        status: user.status,
                        department: user.department || '未分配',
                        team: user.team || '',
                        position: user.position || '',
                        joinDate: user.join_date,
                        notes: user.notes,
                        isCurrentUser: user.username === currentUser.username
                    }));
                    
                } catch (error) {
                    console.error('从云端加载队伍成员失败，回退到本地数据:', error);
                    // 回退到本地数据
                    loadTeamMembersFromLocal(teamName);
                }
            } else {
                // 直接使用本地数据
                loadTeamMembersFromLocal(teamName);
            }
        }
        
        // 从本地加载队伍成员
        function loadTeamMembersFromLocal(teamName) {
            updateLoadingText('正在从本地获取队伍成员...');
            const stored = localStorage.getItem('qs_users_data');
            
            if (stored) {
                try {
                    const usersData = JSON.parse(stored);
                    teamMembers = Object.entries(usersData)
                        .filter(([username, user]) => user.team === teamName)
                        .map(([username, user]) => ({
                            id: user.id,
                            name: user.name,
                            username: username,
                            role: user.role,
                            status: user.status,
                            department: user.department || '未分配',
                            team: user.team || '',
                            position: user.position || '',
                            joinDate: user.joinDate,
                            notes: user.notes,
                            isCurrentUser: username === currentUser.username
                        }))
                        .sort((a, b) => {
                            // 队长排前面，然后按姓名排序
                            if (a.position === '队长' && b.position !== '队长') return -1;
                            if (a.position !== '队长' && b.position === '队长') return 1;
                            return a.name.localeCompare(b.name);
                        });
                    
                    console.log(`从本地获取了 ${teamMembers.length} 名${teamName}成员`);
                } catch (e) {
                    console.error('解析本地队伍成员数据失败:', e);
                    teamMembers = [];
                }
            } else {
                teamMembers = [];
            }
        }

                                    ${teamMembers.map(member => `
                                        <tr style="${member.isCurrentUser ? 'background: rgba(255, 217, 61, 0.1);' : ''}">
                                            <td style="padding: 12px; border-bottom: 1px solid rgba(0, 150, 255, 0.1); color: #e0f7ff;">
                                                <div style="display: flex; align-items: center; gap: 10px;">
                                                    <div style="width: 30px; height: 30px; border-radius: 50%; background: ${member.position === '队长' ? 'linear-gradient(135deg, #ffd93d, #ffa93d)' : 'linear-gradient(135deg, #0066cc, #0099ff)'}; display: flex; align-items: center; justify-content: center; color: ${member.position === '队长' ? '#000' : 'white'}; font-weight: ${member.position === '队长' ? 'bold' : 'normal'}">
                                                        ${(member.name || member.username).charAt(0).toUpperCase()}
                                                    </div>
                                                    ${member.name || member.username}
                                                    ${member.isCurrentUser ? '<span style="background: #ffd93d; color: #000; padding: 2px 8px; border-radius: 8px; font-size: 0.7rem; margin-left: 8px;">我</span>' : ''}
                                                </div>
                                            </td>
                                            <td style="padding: 12px; border-bottom: 1px solid rgba(0, 150, 255, 0.1); color: ${member.position === '队长' ? '#ffd93d' : '#e0f7ff'}; font-weight: ${member.position === '队长' ? 'bold' : 'normal'}">${member.position || '队员'}</td>
                                            <td style="padding: 12px; border-bottom: 1px solid rgba(0, 150, 255, 0.1);">
                                                <span style="display: inline-block; padding: 3px 10px; border-radius: 10px; font-size: 0.8rem; background: ${member.status === 'active' ? 'rgba(107, 255, 184, 0.2)' : 'rgba(255, 107, 107, 0.2)'}; color: ${member.status === 'active' ? '#6bffb8' : '#ff6b6b'}; border: 1px solid ${member.status === 'active' ? 'rgba(107, 255, 184, 0.5)' : 'rgba(255, 107, 107, 0.5)'}">
                                                    ${member.status === 'active' ? '活跃' : '未激活'}
                                                </span>
                                            </td>
                                            <td style="padding: 12px; border-bottom: 1px solid rgba(0, 150, 255, 0.1); color: #e0f7ff;">${member.joinDate || '未知'}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    ` : `
                        <div style="text-align: center; padding: 40px 20px; color: #6b9ccc;">
                            <i class="fas fa-user-slash" style="font-size: 3rem; margin-bottom: 15px; opacity: 0.5;"></i>
                            <p>该队伍当前没有分配成员</p>
                        </div>
                    `}
                </div>
            `;
        }
        
        // 关闭队伍详情模态框
        function closeTeamModal() {
            document.getElementById('teamModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }
        
        // ================================================
        // 5. 辅助函数
        // ================================================
        
        // 显示未分配队伍消息
        function showNoTeamMessage() {
            const container = document.getElementById('myTeamContainer');
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">
                        <i class="fas fa-users-slash"></i>
                    </div>
                    <h3>您尚未被分配到任何队伍</h3>
                    <p>您当前属于${currentUser.department || '未分配部门'}，但未被分配到具体队伍</p>
                    <p style="font-size: 0.9rem; margin-top: 15px; color: #a3d5ff;">
                        如需加入队伍，请联系管理员或部门负责人为您分配
                    </p>
                    <button class="action-btn primary" style="margin-top: 20px;" onclick="refreshData()">
                        <i class="fas fa-redo"></i> 刷新信息
                    </button>
                </div>
            `;
        }
        
        // 返回成员控制台
        function goBackToMember() {
            if (confirm('确定要返回吗？')) {
                // 显示加载状态
                const backBtn = document.querySelector('.back-btn');
                if (backBtn) {
                    const originalHTML = backBtn.innerHTML;
                    backBtn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> 返回中...`;
                    backBtn.disabled = true;
                }
                
                // 模拟延迟后跳转
                setTimeout(() => {
                    window.location.href = 'member.html';
                }, 500);
            }
        }
        
        // 更新时间显示
        function updateTime() {
            try {
                const now = new Date();
                const hours = now.getHours().toString().padStart(2, '0');
                const minutes = now.getMinutes().toString().padStart(2, '0');
                const seconds = now.getSeconds().toString().padStart(2, '0');
                
                const timeDisplay = document.getElementById('currentTime');
                if (timeDisplay) {
                    timeDisplay.textContent = `${hours}:${minutes}:${seconds}`;
                }
            } catch (e) {
                console.error('更新时间失败:', e);
            }
        }
        
        // 显示错误消息
        function showErrorMessage(message) {
            const container = document.getElementById('myTeamContainer');
            if (container) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <i class="fas fa-exclamation-triangle"></i>
                        </div>
                        <h3>数据加载失败</h3>
                        <p>${message}</p>
                        <button onclick="refreshData()" class="action-btn primary" style="margin-top: 20px;">
                            <i class="fas fa-redo"></i> 重新加载
                        </button>
                    </div>
                `;
            }
        }
        
        // 刷新数据
        function refreshData() {
            const username = localStorage.getItem('auth_user');
            if (!username) {
                window.location.href = 'index.html';
                return;
            }
            
            document.getElementById('loadingOverlay').style.display = 'flex';
            document.getElementById('mainContent').style.display = 'none';
            
            // 重置数据
            currentUser = null;
            userTeam = null;
            teamMembers = [];
            
            loadCurrentUserAndTeam(username).then(() => {
                document.getElementById('loadingOverlay').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            });
        }
        
        // 退出登录
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('auth_user');
                localStorage.removeItem('auth_role');
                localStorage.removeItem('auth_time');
                window.location.href = 'index.html';
            }
        }
        
        // 添加键盘快捷键
        document.addEventListener('keydown', function(e) {
            // F5 刷新
            if (e.key === 'F5') {
                e.preventDefault();
                refreshData();
            }
            // Ctrl+R 刷新
            if (e.ctrlKey && e.key === 'r') {
                e.preventDefault();
                refreshData();
            }
        });
    </script>
</body>
</html>
