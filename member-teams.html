        // 鍒濆鍖朣upabase
        async function initSupabase() {
            try {
                console.log('鍒濆鍖朣upabase杩炴帴...');
                
                // 绛夊緟Supabase搴撳姞杞藉畬鎴?
                if (typeof window.supabase === 'undefined') {
                    console.error('Supabase搴撴湭鍔犺浇锛?);
                    updateCloudStatus('error', 'Supabase搴撴湭鍔犺浇');
                    return false;
                }
                
                // 妫€鏌ラ厤缃槸鍚﹀畬鏁?
                if (!SUPABASE_URL || SUPABASE_URL.includes('your-project-id') || 
                    !SUPABASE_ANON_KEY || SUPABASE_ANON_KEY.includes('your-anon-key')) {
                    console.warn('Supabase閰嶇疆涓嶅畬鏁?);
                    updateCloudStatus('disabled', 'Supabase閰嶇疆涓嶅畬鏁?);
                    return false;
                }
                
                // 鍒涘缓Supabase瀹㈡埛绔?
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
                    auth: {
                        persistSession: false,
                        autoRefreshToken: false
                    }
                });
                
                // 娴嬭瘯杩炴帴
                const connected = await testSupabaseConnection();
                if (connected) {
                    cloudEnabled = true;
                    console.log('鉁?Supabase杩炴帴鎴愬姛');
                    updateCloudStatus('connected', '浜戠鏁版嵁搴撹繛鎺ユ垚鍔?);
                    return true;
                } else {
                    updateCloudStatus('error', '浜戠杩炴帴澶辫触');
                    return false;
                }
                
            } catch (e) {
                console.error('Supabase鍒濆鍖栧け璐?', e);
                updateCloudStatus('error', '鍒濆鍖栧け璐? ' + e.message);
                return false;
            }
        }
        
        // 娴嬭瘯Supabase杩炴帴

        // 鏇存柊鍔犺浇鏂囨湰
        function updateLoadingText(text) {
            const loadingText = document.getElementById('loadingText');
            if (loadingText) {
                loadingText.textContent = text;
            }
        }
        
        // 鏇存柊浜戠鐘舵€佹樉绀?
        function updateCloudStatus(status, message) {
            const cloudIcon = document.getElementById('cloudIcon');
            const cloudStatus = document.getElementById('cloudStatus');
            
            if (!cloudIcon || !cloudStatus) return;
            
            switch(status) {
                case 'connected':
                    cloudIcon.style.color = '#6bffb8';
                    cloudIcon.className = 'fas fa-cloud';
                    cloudStatus.textContent = message;
                    break;
                case 'connecting':
                    cloudIcon.style.color = '#ffd93d';
                    cloudIcon.className = 'fas fa-spinner fa-spin';
                    cloudStatus.textContent = message;
                    break;
                case 'error':
                    cloudIcon.style.color = '#ff6b6b';
                    cloudIcon.className = 'fas fa-cloud-slash';
                    cloudStatus.textContent = message;
                    break;
                case 'disabled':
                    cloudIcon.style.color = '#a3d5ff';
                    cloudIcon.className = 'fas fa-cloud-slash';
                    cloudStatus.textContent = message;
                    break;
            }
        }

        // 鍔犺浇褰撳墠鐢ㄦ埛鍜岄槦浼嶄俊鎭?

            try {
                updateLoadingText('姝ｅ湪鍔犺浇鐢ㄦ埛淇℃伅...');
                
                // 1. 鑾峰彇褰撳墠鐢ㄦ埛淇℃伅

                if (!currentUser) {
                    showErrorMessage('鏃犳硶鑾峰彇鐢ㄦ埛淇℃伅');
                    return;
                }
                
                // 2. 鏇存柊鐢ㄦ埛鐣岄潰鏄剧ず
                updateUserDisplay(currentUser);
                
                // 3. 妫€鏌ョ敤鎴锋槸鍚︽湁鍒嗛厤闃熶紞
                if (!currentUser.team || currentUser.team === '') {
                    showNoTeamMessage();
                    return;
                }
                
                // 4. 鑾峰彇闃熶紞淇℃伅
                userTeam = TEAMS_INFO[currentUser.team];
                
                if (!userTeam) {
                    showErrorMessage('鏈壘鍒伴槦浼嶄俊鎭?);
                    return;
                }
                
                // 5. 鑾峰彇闃熶紞鎴愬憳

                // 6. 娓叉煋闃熶紞淇℃伅
                renderMyTeam();
                
            } catch (error) {
                console.error('鍔犺浇鐢ㄦ埛鍜岄槦浼嶄俊鎭け璐?', error);
                showErrorMessage('鏁版嵁鍔犺浇澶辫触: ' + error.message);

        // 鏍规嵁鐢ㄦ埛鍚嶅姞杞界敤鎴蜂俊鎭紙浜戠浼樺厛锛?
        async function loadUserByUsername(username) {
            if (cloudEnabled && supabaseClient) {
                try {
                    updateLoadingText('姝ｅ湪浠庝簯绔幏鍙栫敤鎴蜂俊鎭?..');
                    
                    // 浠庝簯绔幏鍙栫敤鎴?
                    const { data: user, error } = await supabaseClient
                        .from('users')
                        .select('*')
                        .eq('username', username)
                        .single();
                    
                    if (error) {
                        console.error('浠庝簯绔幏鍙栫敤鎴峰け璐?', error);
                        // 鍥為€€鍒版湰鍦版暟鎹?
                    } else {
                        console.log('浠庝簯绔幏鍙栫敤鎴锋垚鍔?', user.username);
                        return {
                            id: user.id,
                            name: user.name,
                            username: user.username,
                            role: user.role,
                            status: user.status,
                            department: user.department || '鏈垎閰?,
                            team: user.team || '',
                            position: user.position || '',
                            joinDate: user.join_date,
                            notes: user.notes
                        };
                    }
                } catch (error) {
                    console.error('浜戠鏌ヨ寮傚父:', error);
                }
            }
            
            // 浣跨敤鏈湴鏁版嵁
            updateLoadingText('姝ｅ湪浠庢湰鍦拌幏鍙栫敤鎴蜂俊鎭?..');
            const stored = localStorage.getItem('qs_users_data');
            
            if (stored) {
                try {
                    const usersData = JSON.parse(stored);
                    const user = usersData[username];
                    
                    if (user) {
                        return {
                            id: user.id,
                            name: user.name,
                            username: username,
                            role: user.role,
                            status: user.status,
                            department: user.department || '鏈垎閰?,
                            team: user.team || '',
                            position: user.position || '',
                            joinDate: user.joinDate,
                            notes: user.notes
                        };
                    }
                } catch (e) {
                    console.error('瑙ｆ瀽鏈湴鐢ㄦ埛鏁版嵁澶辫触:', e);
                }
            }
            
            return null;
        }
        
        // 鍔犺浇闃熶紞鎴愬憳
        async function loadTeamMembers(teamName) {
            if (cloudEnabled && supabaseClient) {
                try {
                    updateLoadingText('姝ｅ湪浠庝簯绔幏鍙栭槦浼嶆垚鍛?..');
                    
                    // 浠庝簯绔幏鍙栬闃熶紞鐨勬墍鏈夋垚鍛?
                    const { data: members, error } = await supabaseClient
                        .from('users')
                        .select('*')
                        .eq('team', teamName)
                        .order('position', { ascending: false }) // 闃熼暱鎺掑墠闈?
                        .order('name', { ascending: true });
                    
                    if (error) throw error;
                    
                    console.log(`浠庝簯绔幏鍙栦簡 ${members.length} 鍚?{teamName}鎴愬憳`);
                    
                    teamMembers = members.map(user => ({
                        id: user.id,
                        name: user.name,
                        username: user.username,
                        role: user.role,
                        status: user.status,
                        department: user.department || '鏈垎閰?,
                        team: user.team || '',
                        position: user.position || '',
                        joinDate: user.join_date,
                        notes: user.notes,
                        isCurrentUser: user.username === currentUser.username
                    }));
                    
                } catch (error) {
                    console.error('浠庝簯绔姞杞介槦浼嶆垚鍛樺け璐ワ紝鍥為€€鍒版湰鍦版暟鎹?', error);
                    // 鍥為€€鍒版湰鍦版暟鎹?
                    loadTeamMembersFromLocal(teamName);
                }
            } else {
                // 鐩存帴浣跨敤鏈湴鏁版嵁
                loadTeamMembersFromLocal(teamName);
            }
        }
        
        // 浠庢湰鍦板姞杞介槦浼嶆垚鍛?
        function loadTeamMembersFromLocal(teamName) {
            updateLoadingText('姝ｅ湪浠庢湰鍦拌幏鍙栭槦浼嶆垚鍛?..');
            const stored = localStorage.getItem('qs_users_data');
            
            if (stored) {
                try {
                    const usersData = JSON.parse(stored);
                    teamMembers = Object.entries(usersData)
                        .filter(([username, user]) => user.team === teamName)
                        .map(([username, user]) => ({
                            id: user.id,
                            name: user.name,
                            username: username,
                            role: user.role,
                            status: user.status,
                            department: user.department || '鏈垎閰?,
                            team: user.team || '',
                            position: user.position || '',
                            joinDate: user.joinDate,
                            notes: user.notes,
                            isCurrentUser: username === currentUser.username
                        }))
                        .sort((a, b) => {
                            // 闃熼暱鎺掑墠闈紝鐒跺悗鎸夊鍚嶆帓搴?
                            if (a.position === '闃熼暱' && b.position !== '闃熼暱') return -1;
                            if (a.position !== '闃熼暱' && b.position === '闃熼暱') return 1;
                            return a.name.localeCompare(b.name);
                        });
                    
                    console.log(`浠庢湰鍦拌幏鍙栦簡 ${teamMembers.length} 鍚?{teamName}鎴愬憳`);
                } catch (e) {
                    console.error('瑙ｆ瀽鏈湴闃熶紞鎴愬憳鏁版嵁澶辫触:', e);
                    teamMembers = [];
                }
            } else {
                teamMembers = [];
            }
        }

        // 鍏抽棴闃熶紞璇︽儏妯℃€佹
        function closeTeamModal() {
            document.getElementById('teamModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }
        
        // ================================================
        // 5. 杈呭姪鍑芥暟
        // ================================================
        
        // 鏄剧ず鏈垎閰嶉槦浼嶆秷鎭?
        function showNoTeamMessage() {
            const container = document.getElementById('myTeamContainer');
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">
                        <i class="fas fa-users-slash"></i>
                    </div>
                    <h3>鎮ㄥ皻鏈鍒嗛厤鍒颁换浣曢槦浼?/h3>
                    <p>鎮ㄥ綋鍓嶅睘浜?{currentUser.department || '鏈垎閰嶉儴闂?}锛屼絾鏈鍒嗛厤鍒板叿浣撻槦浼?/p>
                    <p style="font-size: 0.9rem; margin-top: 15px; color: #a3d5ff;">
                        濡傞渶鍔犲叆闃熶紞锛岃鑱旂郴绠＄悊鍛樻垨閮ㄩ棬璐熻矗浜轰负鎮ㄥ垎閰?
                    </p>
                    <button class="action-btn primary" style="margin-top: 20px;" onclick="refreshData()">
                        <i class="fas fa-redo"></i> 鍒锋柊淇℃伅
                    </button>
                </div>
            `;
        }
        
        // 杩斿洖鎴愬憳鎺у埗鍙?
        function goBackToMember() {
            if (confirm('纭畾瑕佽繑鍥炲悧锛?)) {
                // 鏄剧ず鍔犺浇鐘舵€?
                const backBtn = document.querySelector('.back-btn');
                if (backBtn) {
                    const originalHTML = backBtn.innerHTML;
                    backBtn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> 杩斿洖涓?..`;
                    backBtn.disabled = true;
                }
                
                // 妯℃嫙寤惰繜鍚庤烦杞?
                setTimeout(() => {
                    window.location.href = 'member.html';
                }, 500);
            }
        }
        
        // 鏇存柊鏃堕棿鏄剧ず
        function updateTime() {
            try {
                const now = new Date();
                const hours = now.getHours().toString().padStart(2, '0');
                const minutes = now.getMinutes().toString().padStart(2, '0');
                const seconds = now.getSeconds().toString().padStart(2, '0');
                
                const timeDisplay = document.getElementById('currentTime');
                if (timeDisplay) {
                    timeDisplay.textContent = `${hours}:${minutes}:${seconds}`;
                }
            } catch (e) {
                console.error('鏇存柊鏃堕棿澶辫触:', e);
            }
        }
        
        // 鏄剧ず閿欒娑堟伅
        function showErrorMessage(message) {
            const container = document.getElementById('myTeamContainer');
            if (container) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <i class="fas fa-exclamation-triangle"></i>
                        </div>
                        <h3>鏁版嵁鍔犺浇澶辫触</h3>
                        <p>${message}</p>
                        <button onclick="refreshData()" class="action-btn primary" style="margin-top: 20px;">
                            <i class="fas fa-redo"></i> 閲嶆柊鍔犺浇
                        </button>
                    </div>
                `;
            }
        }
        
        // 鍒锋柊鏁版嵁
        function refreshData() {
            const username = localStorage.getItem('auth_user');
            if (!username) {
                window.location.href = 'index.html';
                return;
            }
            
            document.getElementById('loadingOverlay').style.display = 'flex';
            document.getElementById('mainContent').style.display = 'none';
            
            // 閲嶇疆鏁版嵁
            currentUser = null;
            userTeam = null;
            teamMembers = [];
            
            loadCurrentUserAndTeam(username).then(() => {
                document.getElementById('loadingOverlay').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            });
        }
        
        // 閫€鍑虹櫥褰?
        function logout() {
            if (confirm('纭畾瑕侀€€鍑虹櫥褰曞悧锛?)) {
                localStorage.removeItem('auth_user');
                localStorage.removeItem('auth_role');
                localStorage.removeItem('auth_time');
                window.location.href = 'index.html';
            }
        }
        
        // 娣诲姞閿洏蹇嵎閿?
        document.addEventListener('keydown', function(e) {
            // F5 鍒锋柊
            if (e.key === 'F5') {
                e.preventDefault();
                refreshData();
            }
            // Ctrl+R 鍒锋柊
            if (e.ctrlKey && e.key === 'r') {
                e.preventDefault();
                refreshData();
            }
        });
    </script>
