<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初审简历 - 后勤部观察员</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 添加 Supabase 客户端库 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            min-height: 100vh;
            overflow: auto;
        }
        
        /* 控制台样式 */
        .desktop {
            min-height: 100vh;
            width: 100%;
            background: radial-gradient(circle at center, #0a2463, #000000);
            padding: 0;
            position: relative;
            overflow: visible;
        }
        
        /* 顶部状态栏 */
        .status-bar {
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(10, 36, 99, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 150, 255, 0.3);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .system-info {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: nowrap;
        }
        
        /* 返回按钮样式 */
        .back-btn {
            background: rgba(0, 150, 255, 0.2);
            border: 1px solid rgba(0, 150, 255, 0.5);
            color: #4fc3ff;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            white-space: nowrap;
            margin-right: 15px;
        }

        .back-btn:hover {
            background: rgba(0, 150, 255, 0.3);
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(0, 150, 255, 0.3);
        }

        .system-logo {
            width: 40px;
            height: 40px;
            filter: drop-shadow(0 0 10px rgba(0, 150, 255, 0.7));
        }
        
        .system-name {
            font-size: 1.5rem;
            background: linear-gradient(90deg, #4fc3ff, #a3d5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6b9ccc, #a3d5ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
        }
        
        .time-display {
            color: #a3d5ff;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }
        
        /* 主要内容区域 */
        .main-content {
            width: 100%;
            min-height: calc(100vh - 80px);
            padding: 30px 20px;
            overflow: auto;
        }
        
        .content-wrapper {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* 页面标题 */
        .page-header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0, 150, 255, 0.3);
        }
        
        .page-title {
            font-size: 2.2rem;
            background: linear-gradient(90deg, #4fc3ff, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(79, 195, 255, 0.3);
        }
        
        .page-subtitle {
            font-size: 1.1rem;
            color: #a3d5ff;
            line-height: 1.6;
        }
        
        /* 控制面板 */
        .control-panel {
            background: rgba(10, 36, 99, 0.7);
            border: 2px solid rgba(0, 150, 255, 0.3);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .stats-box {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .stat-item {
            padding: 12px 20px;
            background: rgba(0, 30, 80, 0.5);
            border-radius: 10px;
            border: 1px solid rgba(0, 150, 255, 0.2);
            min-width: 150px;
        }
        
        .stat-label {
            color: #a3d5ff;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }
        
        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #4fc3ff;
        }
        
        .stat-value.pending { color: #ffa93d; }
        .stat-value.approved { color: #6bffb8; }
        .stat-value.rejected { color: #ff6b6b; }
        
        .filter-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .filter-select {
            padding: 10px 20px;
            background: rgba(0, 30, 80, 0.7);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 8px;
            color: #e0f7ff;
            cursor: pointer;
            min-width: 150px;
        }
        
        .refresh-btn {
            padding: 10px 20px;
            background: rgba(0, 100, 200, 0.7);
            border: 1px solid rgba(0, 150, 255, 0.5);
            border-radius: 8px;
            color: #e0f7ff;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .refresh-btn:hover {
            background: rgba(0, 150, 255, 0.7);
            transform: scale(1.05);
        }
        
        /* 简历列表 */
        .resume-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        
        .resume-card {
            background: rgba(10, 36, 99, 0.7);
            border: 2px solid rgba(0, 150, 255, 0.3);
            border-radius: 15px;
            padding: 25px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .resume-card:hover {
            border-color: rgba(0, 150, 255, 0.8);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 150, 255, 0.2);
        }
        
        .resume-card.pending { border-left: 5px solid #ffa93d; }
        .resume-card.approved { border-left: 5px solid #6bffb8; }
        .resume-card.rejected { border-left: 5px solid #ff6b6b; }
        
        .resume-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }
        
        .applicant-info h3 {
            font-size: 1.3rem;
            color: #e0f7ff;
            margin-bottom: 5px;
        }
        
        .applicant-id {
            color: #a3d5ff;
            font-size: 0.9rem;
        }
        
        .status-badge {
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
        }
        
        .status-pending {
            background: rgba(255, 169, 61, 0.2);
            color: #ffa93d;
            border: 1px solid rgba(255, 169, 61, 0.5);
        }
        
        .status-approved {
            background: rgba(107, 255, 184, 0.2);
            color: #6bffb8;
            border: 1px solid rgba(107, 255, 184, 0.5);
        }
        
        .status-rejected {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.5);
        }
        
        .resume-details {
            margin-bottom: 20px;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 150, 255, 0.1);
        }
        
        .detail-label {
            color: #a3d5ff;
            font-size: 0.9rem;
        }
        
        .detail-value {
            color: #e0f7ff;
            font-size: 0.95rem;
            text-align: right;
            max-width: 60%;
            word-break: break-word;
        }
        
        .resume-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
        
        .action-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn-view {
            background: rgba(79, 195, 255, 0.2);
            color: #4fc3ff;
            border: 1px solid rgba(79, 195, 255, 0.5);
        }
        
        .btn-view:hover {
            background: rgba(79, 195, 255, 0.3);
        }
        
        .btn-approve {
            background: rgba(107, 255, 184, 0.2);
            color: #6bffb8;
            border: 1px solid rgba(107, 255, 184, 0.5);
        }
        
        .btn-approve:hover {
            background: rgba(107, 255, 184, 0.3);
        }
        
        .btn-reject {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.5);
        }
        
        .btn-reject:hover {
            background: rgba(255, 107, 107, 0.3);
        }
        
        /* 加载状态 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(10px);
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(79, 195, 255, 0.3);
            border-top: 5px solid #4fc3ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #e0f7ff;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }
        
        /* 详情模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            backdrop-filter: blur(10px);
            padding: 20px;
            display: none;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal-content {
            background: rgba(10, 36, 99, 0.95);
            border: 2px solid rgba(0, 150, 255, 0.3);
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0, 150, 255, 0.3);
        }
        
        .modal-title {
            font-size: 1.8rem;
            color: #4fc3ff;
        }
        
        .close-modal {
            background: none;
            border: none;
            color: #a3d5ff;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
        }
        
        .close-modal:hover {
            color: #ff6b6b;
        }
        
        .modal-section {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0, 150, 255, 0.1);
        }
        
        .section-title {
            font-size: 1.3rem;
            color: #a3d5ff;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title i {
            font-size: 1.1rem;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
        }
        
        .info-label {
            color: #a3d5ff;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }
        
        .info-value {
            color: #e0f7ff;
            font-size: 1.1rem;
            padding: 10px;
            background: rgba(0, 30, 80, 0.5);
            border-radius: 8px;
            border: 1px solid rgba(0, 150, 255, 0.2);
        }
        
        .full-width {
            grid-column: 1 / -1;
        }
        
        /* 审核表单 */
        .review-form {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid rgba(0, 150, 255, 0.3);
        }
        
        .review-title {
            font-size: 1.3rem;
            color: #4fc3ff;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .review-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .review-option {
            padding: 25px 20px;
            border: 2px solid rgba(0, 150, 255, 0.3);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        
        .review-option:hover {
            transform: translateY(-5px);
        }
        
        .review-option.selected {
            box-shadow: 0 0 25px rgba(79, 195, 255, 0.3);
        }
        
        .option-approve {
            border-color: rgba(107, 255, 184, 0.5);
        }
        
        .option-approve.selected {
            background: rgba(107, 255, 184, 0.1);
            border-color: rgba(107, 255, 184, 0.8);
        }
        
        .option-reject {
            border-color: rgba(255, 107, 107, 0.5);
        }
        
        .option-reject.selected {
            background: rgba(255, 107, 107, 0.1);
            border-color: rgba(255, 107, 107, 0.8);
        }
        
        .option-icon {
            font-size: 2rem;
            margin-bottom: 15px;
        }
        
        .option-approve .option-icon {
            color: #6bffb8;
        }
        
        .option-reject .option-icon {
            color: #ff6b6b;
        }
        
        .option-title {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }
        
        .option-approve .option-title {
            color: #6bffb8;
        }
        
        .option-reject .option-title {
            color: #ff6b6b;
        }
        
        .option-desc {
            color: #a3d5ff;
            font-size: 0.9rem;
        }
        
        .reason-container {
            display: none;
            margin-top: 25px;
            margin-bottom: 30px;
        }
        
        .reason-container.active {
            display: block;
        }
        
        .reason-label {
            color: #a3d5ff;
            margin-bottom: 10px;
            font-size: 1rem;
        }
        
        .reason-textarea {
            width: 100%;
            padding: 15px;
            background: rgba(0, 30, 80, 0.7);
            border: 1px solid rgba(255, 107, 107, 0.5);
            border-radius: 10px;
            color: #e0f7ff;
            font-size: 1rem;
            min-height: 120px;
            resize: vertical;
        }
        
        .review-actions {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 30px;
        }
        
        .btn-cancel {
            padding: 12px 30px;
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid rgba(255, 107, 107, 0.4);
            color: #ff6b6b;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .btn-cancel:hover {
            background: rgba(255, 107, 107, 0.3);
        }
        
        .btn-submit-review {
            padding: 12px 30px;
            background: linear-gradient(135deg, #0066cc, #0099ff);
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .btn-submit-review:hover:not(:disabled) {
            background: linear-gradient(135deg, #0099ff, #00ccff);
            transform: scale(1.05);
        }
        
        .btn-submit-review:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            grid-column: 1 / -1;
        }
        
        .empty-icon {
            font-size: 4rem;
            color: rgba(79, 195, 255, 0.3);
            margin-bottom: 20px;
        }
        
        .empty-text {
            color: #a3d5ff;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }
        
        /* 成功提示 */
        .success-toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(10, 36, 99, 0.95);
            color: #6bffb8;
            padding: 20px 30px;
            border-radius: 15px;
            border: 1px solid rgba(107, 255, 184, 0.5);
            z-index: 10000;
            display: flex;
            align-items: center;
            gap: 15px;
            backdrop-filter: blur(10px);
            animation: slideInUp 0.5s ease;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        
        /* 动画 */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes slideInUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .status-bar {
                padding: 15px 20px;
                flex-wrap: wrap;
                gap: 15px;
            }
            
            .control-panel {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .resume-list {
                grid-template-columns: 1fr;
            }
            
            .modal-content {
                padding: 25px;
            }
            
            .review-options {
                grid-template-columns: 1fr;
            }
            
            .stats-box {
                width: 100%;
                justify-content: space-between;
            }
            
            .stat-item {
                flex: 1;
                min-width: auto;
            }
        }
        
        @media (max-width: 480px) {
            .main-content {
                padding: 20px 15px;
            }
            
            .page-title {
                font-size: 1.8rem;
            }
            
            .modal-content {
                padding: 20px;
            }
            
            .review-actions {
                flex-direction: column;
            }
            
            .btn-cancel, .btn-submit-review {
                width: 100%;
                text-align: center;
                justify-content: center;
            }
            
            .success-toast {
                bottom: 20px;
                right: 20px;
                left: 20px;
                max-width: none;
            }
        }
        
        /* 属性标签 */
        .attributes-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        
        .attribute-tag {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .attr-fire { background: rgba(255, 87, 34, 0.2); color: #ff5722; border: 1px solid rgba(255, 87, 34, 0.5); }
        .attr-ice { background: rgba(3, 169, 244, 0.2); color: #03a9f4; border: 1px solid rgba(3, 169, 244, 0.5); }
        .attr-thunder { background: rgba(255, 193, 7, 0.2); color: #ffc107; border: 1px solid rgba(255, 193, 7, 0.5); }
        .attr-rock { background: rgba(121, 85, 72, 0.2); color: #795548; border: 1px solid rgba(121, 85, 72, 0.5); }
        .attr-wind { background: rgba(76, 175, 80, 0.2); color: #4caf50; border: 1px solid rgba(76, 175, 80, 0.5); }
        .attr-light { background: rgba(255, 235, 59, 0.2); color: #ffeb3b; border: 1px solid rgba(255, 235, 59, 0.5); }
        .attr-life { background: rgba(233, 30, 99, 0.2); color: #e91e63; border: 1px solid rgba(233, 30, 99, 0.5); }
        .attr-gravity { background: rgba(156, 39, 176, 0.2); color: #9c27b0; border: 1px solid rgba(156, 39, 176, 0.5); }
        .attr-fusion { background: rgba(255, 152, 0, 0.2); color: #ff9800; border: 1px solid rgba(255, 152, 0, 0.5); }
        .attr-physics { background: rgba(158, 158, 158, 0.2); color: #9e9e9e; border: 1px solid rgba(158, 158, 158, 0.5); }
        .attr-none { background: rgba(158, 158, 158, 0.1); color: #9e9e9e; border: 1px solid rgba(158, 158, 158, 0.3); }
    </style>
</head>
<body>
    <!-- 控制台界面 -->
    <div class="desktop">
        <!-- 顶部状态栏 -->
        <div class="status-bar">
            <div class="system-info">
                <!-- 返回按钮 -->
                <button class="back-btn" onclick="goBack()" title="返回观察员控制台">
                    <i class="fas fa-chevron-left"></i>
                    <span>返回</span>
                </button>
                
                <img src="qsamlogo.png" alt="系统标志" class="system-logo">
                <div class="system-name">初审简历 - 后勤部观察员</div>
            </div>
            
            <div class="user-info">
                <div class="time-display" id="currentTime">00:00:00</div>
                <div class="user-avatar" id="userAvatar">
                    <i class="fas fa-user-tie"></i>
                </div>
                <div>
                    <div id="userDisplayName" style="color: #a3d5ff;">观察员</div>
                    <div style="font-size: 0.8rem; color: #6b9ccc;">后勤部权限</div>
                </div>
            </div>
        </div>
        
        <!-- 主要内容区域 -->
        <div class="main-content">
            <div class="content-wrapper">
                <!-- 页面标题 -->
                <div class="page-header">
                    <h1 class="page-title">简历初审系统</h1>
                    <p class="page-subtitle">
                        查看并审核从投递简历页面提交的申请。您可以查看申请详情，并通过初审或驳回申请。
                    </p>
                </div>
                
                <!-- 控制面板 -->
                <div class="control-panel">
                    <div class="stats-box">
                        <div class="stat-item">
                            <div class="stat-label">待处理申请</div>
                            <div class="stat-value pending" id="pendingCount">0</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">已通过</div>
                            <div class="stat-value approved" id="approvedCount">0</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">已驳回</div>
                            <div class="stat-value rejected" id="rejectedCount">0</div>
                        </div>
                    </div>
                    
                    <div class="filter-controls">
                        <select class="filter-select" id="statusFilter">
                            <option value="all">全部状态</option>
                            <option value="pending">待处理</option>
                            <option value="approved">已通过</option>
                            <option value="rejected">已驳回</option>
                        </select>
                        
                        <button class="refresh-btn" onclick="loadResumes()">
                            <i class="fas fa-sync-alt"></i> 刷新列表
                        </button>
                    </div>
                </div>
                
                <!-- 简历列表 -->
                <div class="resume-list" id="resumeList">
                    <!-- 简历卡片将通过JavaScript动态生成 -->
                </div>
                
                <!-- 空状态 -->
                <div class="empty-state" id="emptyState" style="display: none;">
                    <div class="empty-icon">
                        <i class="fas fa-file-alt"></i>
                    </div>
                    <div class="empty-text" id="emptyText">暂无简历申请</div>
                    <button class="refresh-btn" onclick="loadResumes()">
                        <i class="fas fa-sync-alt"></i> 刷新列表
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 加载遮罩层 -->
    <div class="loading-overlay" id="loadingOverlay" style="display: none;">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="loadingText">正在加载数据...</div>
    </div>
    
    <!-- 详情模态框 -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">简历详情</h2>
                <button class="close-modal" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <!-- 简历详情内容 -->
            <div id="resumeDetailContent">
                <!-- 内容将通过JavaScript动态生成 -->
            </div>
            
            <!-- 审核表单 -->
            <div class="review-form" id="reviewForm">
                <h3 class="review-title">
                    <i class="fas fa-clipboard-check"></i> 初审审核
                </h3>
                
                <div class="review-options">
                    <div class="review-option option-approve" onclick="selectReviewOption('approve')">
                        <div class="option-icon">
                            <i class="fas fa-check-circle"></i>
                        </div>
                        <div class="option-title">通过初审</div>
                        <div class="option-desc">该申请符合基本要求，建议进入下一轮审核</div>
                    </div>
                    
                    <div class="review-option option-reject" onclick="selectReviewOption('reject')">
                        <div class="option-icon">
                            <i class="fas fa-times-circle"></i>
                        </div>
                        <div class="option-title">驳回申请</div>
                        <div class="option-desc">该申请不符合要求，请填写驳回原因</div>
                    </div>
                </div>
                
                <!-- 驳回原因输入 -->
                <div class="reason-container" id="reasonContainer">
                    <div class="reason-label">
                        <i class="fas fa-comment-dots"></i> 请填写驳回原因：
                    </div>
                    <textarea 
                        class="reason-textarea" 
                        id="rejectReason" 
                        placeholder="请详细说明驳回申请的原因..."
                        maxlength="500"
                    ></textarea>
                    <div style="text-align: right; color: #a3d5ff; font-size: 0.9rem; margin-top: 5px;">
                        <span id="charCount">0</span>/500 字符
                    </div>
                </div>
                
                <div class="review-actions">
                    <button class="btn-cancel" onclick="closeModal()">
                        <i class="fas fa-times"></i> 取消
                    </button>
                    <button class="btn-submit-review" id="submitReviewBtn" onclick="submitReview()" disabled>
                        <i class="fas fa-paper-plane"></i> 提交审核结果
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 成功提示 -->
    <div class="success-toast" id="successToast" style="display: none;">
        <div class="success-icon">
            <i class="fas fa-check-circle"></i>
        </div>
        <div class="success-content">
            <div class="success-title" id="successTitle">操作成功！</div>
            <div class="success-message" id="successMessage">审核结果已提交到云端数据库。</div>
        </div>
        <button onclick="document.getElementById('successToast').style.display='none'" style="background:none; border:none; color:#a3d5ff; cursor:pointer;">
            <i class="fas fa-times"></i>
        </button>
    </div>

<script>
    // ================================================
    // 1. SUPABASE 配置和全局变量
    // ================================================
    const SUPABASE_URL = 'https://owfyycgomqclytnswobj.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_65fjjNxcUjAFpFJ3AEW9Tg_ctW41ZsV';
    
    let supabaseClient = null;
    let cloudEnabled = false;
    let currentUser = null;
    let currentUserRole = null;
    let allResumes = [];
    let filteredResumes = [];
    let currentResumeId = null;
    let selectedReviewOption = null;
    
    // ================================================
    // 2. 页面加载时初始化
    // ================================================
    document.addEventListener('DOMContentLoaded', function() {
        console.log('初审简历页面加载完成，开始初始化...');
        
        // 检查登录状态
        checkLoginStatus();
        
        // 初始化Supabase
        initSupabase();
        
        // 更新时间显示
        updateTime();
        setInterval(updateTime, 1000);
        
        // 加载简历数据
        loadResumes();
        
        // 添加事件监听器
        setupEventListeners();
        
        // 添加ESC键支持
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
    });
    
    // 检查登录状态
    function checkLoginStatus() {
        currentUser = localStorage.getItem('auth_user');
        currentUserRole = localStorage.getItem('auth_role');
        
        if (currentUserRole !== 'viewer') {
            alert('请先以观察员身份登录！');
            window.location.href = 'index.html';
            return;
        }
        
        // 显示用户信息
        document.getElementById('userDisplayName').textContent = currentUser;
        
        // 获取用户首字母作为头像
        if (currentUser && currentUser.length > 0) {
            const firstChar = currentUser.charAt(0).toUpperCase();
            document.getElementById('userAvatar').innerHTML = firstChar;
        }
    }
    
    // 初始化Supabase
    function initSupabase() {
        console.log('开始初始化Supabase...');
        
        try {
            // 检查Supabase库是否加载
            if (typeof window.supabase === 'undefined') {
                console.error('❌ Supabase JS库未加载！');
                showCloudStatus(false);
                return false;
            }
            
            // 检查配置
            if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
                console.warn('Supabase配置不完整');
                showCloudStatus(false);
                return false;
            }
            
            // 创建Supabase客户端
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
                auth: {
                    persistSession: false,
                    autoRefreshToken: false
                }
            });
            
            cloudEnabled = true;
            console.log('✅ Supabase客户端已初始化');
            showCloudStatus(true);
            return true;
            
        } catch (e) {
            console.error('Supabase初始化失败:', e);
            showCloudStatus(false);
            return false;
        }
    }
    
    // 显示云端状态
    function showCloudStatus(isConnected) {
        console.log(`云端状态: ${isConnected ? '已连接' : '未连接'}`);
        // 可以在界面上添加状态指示器
    }
    
    // 更新时间显示
    function updateTime() {
        const now = new Date();
        const hours = now.getHours().toString().padStart(2, '0');
        const minutes = now.getMinutes().toString().padStart(2, '0');
        const seconds = now.getSeconds().toString().padStart(2, '0');
        document.getElementById('currentTime').textContent = `${hours}:${minutes}:${seconds}`;
    }
    
    // 设置事件监听器
    function setupEventListeners() {
        // 状态筛选器变化事件
        const statusFilter = document.getElementById('statusFilter');
        statusFilter.addEventListener('change', function() {
            filterResumes();
        });
        
        // 驳回原因输入框字符计数
        const rejectReason = document.getElementById('rejectReason');
        if (rejectReason) {
            rejectReason.addEventListener('input', function() {
                const charCount = document.getElementById('charCount');
                if (charCount) {
                    charCount.textContent = this.value.length;
                }
            });
        }
    }
    
    // ================================================
    // 3. 简历数据加载和显示
    // ================================================
    
    // 加载简历数据
    async function loadResumes() {
        console.log('开始加载简历数据...');
        showLoading('正在加载简历数据...');
        
        try {
            // 从Supabase加载简历
            const result = await loadResumesFromSupabase();
            
            if (result.success) {
                allResumes = result.data || [];
                console.log(`成功加载 ${allResumes.length} 份简历`);
                
                // 更新统计数据
                updateStats();
                
                // 筛选并显示简历
                filterResumes();
                
                // 隐藏加载动画
                hideLoading();
                
            } else {
                throw new Error(result.message || '加载简历失败');
            }
            
        } catch (error) {
            console.error('加载简历失败:', error);
            hideLoading();
            
            // 显示空状态
            document.getElementById('emptyState').style.display = 'block';
            document.getElementById('emptyText').textContent = '加载简历失败，请检查网络连接';
        }
    }
    
    // 从Supabase加载简历
    async function loadResumesFromSupabase() {
        if (!supabaseClient) {
            return { 
                success: false, 
                message: '云端连接未配置' 
            };
        }
        
        try {
            console.log('从Supabase加载简历数据...');
            
            // 查询resume_applications表
            const { data, error } = await supabaseClient
                .from('resume_applications')
                .select('*')
                .order('created_at', { ascending: false });
            
            if (error) {
                console.error('Supabase查询错误:', error);
                
                // 如果是表不存在，给出提示
                if (error.message.includes('does not exist') || error.code === '42P01') {
                    return { 
                        success: false, 
                        message: '简历表不存在，请先创建resume_applications表' 
                    };
                }
                
                throw error;
            }
            
            console.log(`从云端获取到 ${data ? data.length : 0} 份简历`);
            
            return { 
                success: true, 
                data: data || [] 
            };
            
        } catch (error) {
            console.error('从Supabase加载简历失败:', error);
            return { 
                success: false, 
                message: '云端加载失败: ' + error.message,
                error: error 
            };
        }
    }
    
    // 更新统计数据
    function updateStats() {
        const pendingCount = allResumes.filter(r => r.status === 'pending').length;
        const approvedCount = allResumes.filter(r => r.status === 'approved').length;
        const rejectedCount = allResumes.filter(r => r.status === 'rejected').length;
        
        document.getElementById('pendingCount').textContent = pendingCount;
        document.getElementById('approvedCount').textContent = approvedCount;
        document.getElementById('rejectedCount').textContent = rejectedCount;
    }
    
    // 筛选简历
    function filterResumes() {
        const filterValue = document.getElementById('statusFilter').value;
        
        if (filterValue === 'all') {
            filteredResumes = [...allResumes];
        } else {
            filteredResumes = allResumes.filter(resume => resume.status === filterValue);
        }
        
        // 显示筛选后的简历
        displayResumes();
    }
    
    // 显示简历列表
    function displayResumes() {
        const resumeList = document.getElementById('resumeList');
        const emptyState = document.getElementById('emptyState');
        
        if (filteredResumes.length === 0) {
            resumeList.innerHTML = '';
            emptyState.style.display = 'block';
            document.getElementById('emptyText').textContent = 
                document.getElementById('statusFilter').value === 'all' 
                    ? '暂无简历申请' 
                    : `暂无${getStatusText(document.getElementById('statusFilter').value)}的申请`;
            return;
        }
        
        emptyState.style.display = 'none';
        
        // 生成简历卡片HTML
        resumeList.innerHTML = filteredResumes.map(resume => createResumeCard(resume)).join('');
    }
    
    // 创建简历卡片
    function createResumeCard(resume) {
        const id = resume.id || 'N/A';
        const fullName = resume.full_name || '未填写';
        const age = resume.age || '未填写';
        const gender = resume.gender || '未填写';
        const location = resume.location || '未填写';
        const meme = resume.meme || '无';
        const department = resume.department || '未选择';
        const status = resume.status || 'pending';
        const submissionDate = resume.submission_date ? formatDate(resume.submission_date) : '未记录';
        
        const statusClass = getStatusClass(status);
        const statusText = getStatusText(status);
        
        // 创建属性标签
        let attributesHtml = '';
        if (resume.attributes && Array.isArray(resume.attributes)) {
            attributesHtml = resume.attributes.map(attr => 
                `<span class="attribute-tag attr-${getAttributeClass(attr)}">${attr}</span>`
            ).join('');
        }
        
        return `
            <div class="resume-card ${status}" onclick="openResumeDetail('${id}')">
                <div class="resume-header">
                    <div class="applicant-info">
                        <h3>${fullName}</h3>
                        <div class="applicant-id">申请ID: ${id}</div>
                    </div>
                    <div class="status-badge status-${status}">${statusText}</div>
                </div>
                
                <div class="resume-details">
                    <div class="detail-row">
                        <div class="detail-label">年龄/性别</div>
                        <div class="detail-value">${age}岁 / ${gender}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">居住地</div>
                        <div class="detail-value">${location}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">模因/属性</div>
                        <div class="detail-value">
                            ${meme}
                            ${attributesHtml ? `<div class="attributes-tags">${attributesHtml}</div>` : ''}
                        </div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">申请部门</div>
                        <div class="detail-value">${department}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">提交时间</div>
                        <div class="detail-value">${submissionDate}</div>
                    </div>
                </div>
                
                <div class="resume-actions">
                    <button class="action-btn btn-view" onclick="openResumeDetail('${id}'); event.stopPropagation();">
                        <i class="fas fa-eye"></i> 查看详情
                    </button>
                    ${status === 'pending' ? `
                        <button class="action-btn btn-approve" onclick="approveResume('${id}'); event.stopPropagation();">
                            <i class="fas fa-check"></i> 通过
                        </button>
                        <button class="action-btn btn-reject" onclick="rejectResume('${id}'); event.stopPropagation();">
                            <i class="fas fa-times"></i> 驳回
                        </button>
                    ` : ''}
                </div>
            </div>
        `;
    }
    
    // ================================================
    // 4. 简历详情和审核功能
    // ================================================
    
    // 打开简历详情
    function openResumeDetail(resumeId) {
        currentResumeId = resumeId;
        const resume = allResumes.find(r => r.id == resumeId);
        
        if (!resume) {
            alert('找不到指定的简历');
            return;
        }
        
        // 填充详情内容
        document.getElementById('resumeDetailContent').innerHTML = createResumeDetail(resume);
        document.getElementById('modalTitle').textContent = `${resume.full_name} 的简历详情`;
        
        // 重置审核表单
        resetReviewForm();
        
        // 如果简历已审核，隐藏审核表单
        if (resume.status !== 'pending') {
            document.getElementById('reviewForm').style.display = 'none';
        } else {
            document.getElementById('reviewForm').style.display = 'block';
        }
        
        // 显示模态框
        document.getElementById('detailModal').classList.add('active');
    }
    
    // 创建简历详情HTML
    function createResumeDetail(resume) {
        const fullName = resume.full_name || '未填写';
        const age = resume.age || '未填写';
        const gender = resume.gender || '未填写';
        const location = resume.location || '未填写';
        const contact = resume.contact || '未填写';
        const meme = resume.meme || '无';
        const ability = resume.ability || '无';
        const department = resume.department || '未选择';
        const submissionDate = resume.submission_date ? formatDate(resume.submission_date) : '未记录';
        const reviewer = resume.reviewer || '未审核';
        const reviewDate = resume.review_date ? formatDate(resume.review_date) : '未审核';
        const reviewReason = resume.review_reason || '未填写';
        const status = resume.status || 'pending';
        
        // 创建属性标签
        let attributesHtml = '';
        if (resume.attributes && Array.isArray(resume.attributes)) {
            attributesHtml = resume.attributes.map(attr => 
                `<span class="attribute-tag attr-${getAttributeClass(attr)}">${attr}</span>`
            ).join('');
        }
        
        return `
            <!-- 基本信息 -->
            <div class="modal-section">
                <h3 class="section-title">
                    <i class="fas fa-user"></i> 基本信息
                </h3>
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">姓名</div>
                        <div class="info-value">${fullName}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">年龄</div>
                        <div class="info-value">${age} 岁</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">性别</div>
                        <div class="info-value">${gender}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">居住地</div>
                        <div class="info-value">${location}</div>
                    </div>
                    <div class="info-item full-width">
                        <div class="info-label">联系方式</div>
                        <div class="info-value">${contact}</div>
                    </div>
                </div>
            </div>
            
            <!-- 能力信息 -->
            <div class="modal-section">
                <h3 class="section-title">
                    <i class="fas fa-magic"></i> 能力信息
                </h3>
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">模因</div>
                        <div class="info-value">${meme}</div>
                    </div>
                    <div class="info-item full-width">
                        <div class="info-label">属性</div>
                        <div class="info-value">
                            ${attributesHtml || '无'}
                        </div>
                    </div>
                    <div class="info-item full-width">
                        <div class="info-label">模因能力描述</div>
                        <div class="info-value">${ability}</div>
                    </div>
                </div>
            </div>
            
            <!-- 申请信息 -->
            <div class="modal-section">
                <h3 class="section-title">
                    <i class="fas fa-briefcase"></i> 申请信息
                </h3>
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">申请部门</div>
                        <div class="info-value">${department}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">提交时间</div>
                        <div class="info-value">${submissionDate}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">申请状态</div>
                        <div class="info-value">${getStatusText(status)}</div>
                    </div>
                </div>
            </div>
            
            <!-- 审核信息（如果已审核） -->
            ${status !== 'pending' ? `
            <div class="modal-section">
                <h3 class="section-title">
                    <i class="fas fa-clipboard-check"></i> 审核信息
                </h3>
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">审核人</div>
                        <div class="info-value">${reviewer}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">审核时间</div>
                        <div class="info-value">${reviewDate}</div>
                    </div>
                    ${status === 'rejected' ? `
                    <div class="info-item full-width">
                        <div class="info-label">驳回原因</div>
                        <div class="info-value">${reviewReason}</div>
                    </div>
                    ` : ''}
                </div>
            </div>
            ` : ''}
        `;
    }
    
    // 选择审核选项
    function selectReviewOption(option) {
        selectedReviewOption = option;
        
        // 移除所有选择
        document.querySelectorAll('.review-option').forEach(el => {
            el.classList.remove('selected');
        });
        
        // 添加选择状态
        if (option === 'approve') {
            document.querySelector('.option-approve').classList.add('selected');
            document.getElementById('reasonContainer').classList.remove('active');
        } else if (option === 'reject') {
            document.querySelector('.option-reject').classList.add('selected');
            document.getElementById('reasonContainer').classList.add('active');
        }
        
        // 启用提交按钮
        document.getElementById('submitReviewBtn').disabled = false;
    }
    
    // 重置审核表单
    function resetReviewForm() {
        selectedReviewOption = null;
        
        // 移除所有选择
        document.querySelectorAll('.review-option').forEach(el => {
            el.classList.remove('selected');
        });
        
        // 隐藏驳回原因输入
        document.getElementById('reasonContainer').classList.remove('active');
        
        // 清空驳回原因
        document.getElementById('rejectReason').value = '';
        document.getElementById('charCount').textContent = '0';
        
        // 禁用提交按钮
        document.getElementById('submitReviewBtn').disabled = true;
    }
    
    // 提交审核
    async function submitReview() {
        if (!selectedReviewOption) {
            alert('请选择审核选项');
            return;
        }
        
        // 如果是驳回，必须填写原因
        if (selectedReviewOption === 'reject') {
            const reason = document.getElementById('rejectReason').value.trim();
            if (!reason) {
                alert('请填写驳回原因');
                return;
            }
            if (reason.length < 10) {
                alert('驳回原因至少需要10个字符');
                return;
            }
        }
        
        // 显示加载状态
        showLoading('正在提交审核结果...');
        
        try {
            // 准备审核数据
            const reviewData = {
                status: selectedReviewOption === 'approve' ? 'approved' : 'rejected',
                reviewer: currentUser,
                review_date: new Date().toISOString(),
                review_reason: selectedReviewOption === 'reject' ? 
                    document.getElementById('rejectReason').value.trim() : null
            };
            
            // 更新到Supabase
            const result = await updateResumeReview(currentResumeId, reviewData);
            
            if (result.success) {
                // 更新本地数据
                const resumeIndex = allResumes.findIndex(r => r.id == currentResumeId);
                if (resumeIndex !== -1) {
                    allResumes[resumeIndex] = {
                        ...allResumes[resumeIndex],
                        ...reviewData
                    };
                }
                
                // 更新统计数据
                updateStats();
                
                // 筛选并显示简历
                filterResumes();
                
                // 隐藏加载状态
                hideLoading();
                
                // 显示成功提示
                showSuccessToast(
                    '审核成功！',
                    `已${selectedReviewOption === 'approve' ? '通过' : '驳回'}该申请`
                );
                
                // 关闭模态框
                closeModal();
                
                // 3秒后刷新列表
                setTimeout(() => {
                    loadResumes();
                }, 3000);
                
            } else {
                throw new Error(result.message || '提交审核失败');
            }
            
        } catch (error) {
            console.error('提交审核失败:', error);
            hideLoading();
            alert(`提交审核失败: ${error.message}`);
        }
    }
    
    // 更新简历审核状态到Supabase
    async function updateResumeReview(resumeId, reviewData) {
        if (!supabaseClient) {
            return { 
                success: false, 
                message: '云端连接未配置' 
            };
        }
        try {
            console.log(`更新简历 ${resumeId} 的审核状态...`);

            // 候选字段名映射（逻辑字段 -> 可能的数据库列名列表）
            const candidates = {
                status: ['status'],
                reviewer: ['reviewer', 'review_by', 'reviewed_by', 'reviewer_name'],
                review_date: ['review_date', 'reviewDate', 'reviewed_at', 'reviewedAt', 'review_at', 'reviewAt', 'reviewed_on'],
                review_reason: ['review_reason', 'reviewReason', 'review_reason_text', 'reviewReasonText', 'reason', 'review_comments']
            };

            // 记录已禁用的列名（出现缺失时加入，避免重复尝试）
            const disabledCols = new Set();

            // 当前为每个逻辑字段选择的候选索引
            const idx = Object.keys(candidates).reduce((acc, k) => (acc[k] = 0, acc), {});

            // 构造要发送到DB的payload（会跳过被禁用或无候选的列）
            const buildPayload = () => {
                const payload = {};
                for (const key of Object.keys(candidates)) {
                    if (!reviewData.hasOwnProperty(key)) continue;
                    // 从当前索引开始寻找第一个未被禁用的候选
                    let chosen = null;
                    for (let i = idx[key]; i < candidates[key].length; i++) {
                        const col = candidates[key][i];
                        if (!disabledCols.has(col)) {
                            chosen = col;
                            // store the index so next time we start from here
                            idx[key] = i;
                            break;
                        }
                    }
                    if (chosen) payload[chosen] = reviewData[key];
                }
                // 始终更新updated_at字段（常见列名）
                payload['updated_at'] = new Date().toISOString();
                return payload;
            };

            let lastError = null;
            const maxAttempts = 8;
            for (let attempt = 0; attempt < maxAttempts; attempt++) {
                const payload = buildPayload();

                // If payload only contains updated_at and maybe status, still attempt
                console.log('尝试更新负载:', payload);

                const { data, error } = await supabaseClient
                    .from('resume_applications')
                    .update(payload)
                    .eq('id', resumeId)
                    .select();

                if (!error) {
                    console.log('云端更新成功:', data);
                    return { success: true, message: '云端更新成功', data: data ? data[0] : null };
                }

                const msg = (error && error.message) ? error.message : '';
                console.error('Supabase更新错误:', error);
                lastError = error;

                // 如果是缺列错误，禁用该列并继续尝试
                const missingMatch = msg.match(/Could not find the '(.*?)' column/);
                if (missingMatch) {
                    const missingCol = missingMatch[1];
                    console.warn(`检测到缺失列: ${missingCol}，将其标记为禁用并重试...`);
                    disabledCols.add(missingCol);

                    // Also try advancing the candidate index for any logical key that used this column
                    for (const key of Object.keys(candidates)) {
                        const list = candidates[key];
                        const pos = list.indexOf(missingCol);
                        if (pos !== -1 && pos + 1 < list.length) {
                            idx[key] = pos + 1;
                        }
                    }

                    // try next attempt
                    continue;
                }

                // 不是缺列错误，停止并返回
                break;
            }

            // 最后退化策略：仅更新status字段（如果存在）和updated_at
            try {
                const minimal = { updated_at: new Date().toISOString() };
                if (reviewData.status) minimal.status = reviewData.status;

                console.warn('尝试使用最小负载更新:', minimal);
                const { data: d2, error: e2 } = await supabaseClient
                    .from('resume_applications')
                    .update(minimal)
                    .eq('id', resumeId)
                    .select();

                if (!e2) {
                    console.log('云端最小更新成功:', d2);
                    return { success: true, message: '云端更新成功（最小字段）', data: d2 ? d2[0] : null };
                }
                lastError = e2;
            } catch (e) {
                lastError = e;
            }

            return { success: false, message: '云端更新失败（多次尝试）', error: lastError };

        } catch (error) {
            console.error('更新到云端失败:', error);
            return { 
                success: false, 
                message: '云端更新失败: ' + error.message,
                error: error 
            };
        }
    }
    
    // 快速通过简历
    async function approveResume(resumeId) {
        if (!confirm('确定要通过这份申请吗？')) {
            return;
        }
        
        showLoading('正在通过申请...');
        
        try {
            const reviewData = {
                status: 'approved',
                reviewer: currentUser,
                review_date: new Date().toISOString(),
                review_reason: null
            };
            
            const result = await updateResumeReview(resumeId, reviewData);
            
            if (result.success) {
                // 更新本地数据
                const resumeIndex = allResumes.findIndex(r => r.id == resumeId);
                if (resumeIndex !== -1) {
                    allResumes[resumeIndex] = {
                        ...allResumes[resumeIndex],
                        ...reviewData
                    };
                }
                
                // 更新统计数据
                updateStats();
                
                // 筛选并显示简历
                filterResumes();
                
                hideLoading();
                showSuccessToast('操作成功！', '已通过该申请');
                
                // 3秒后刷新列表
                setTimeout(() => {
                    loadResumes();
                }, 3000);
                
            } else {
                throw new Error(result.message || '操作失败');
            }
            
        } catch (error) {
            console.error('通过申请失败:', error);
            hideLoading();
            alert(`操作失败: ${error.message}`);
        }
    }
    
    // 快速驳回简历
    async function rejectResume(resumeId) {
        const reason = prompt('请输入驳回原因（至少10个字符）：');
        
        if (!reason) {
            return;
        }
        
        if (reason.length < 10) {
            alert('驳回原因至少需要10个字符');
            return;
        }
        
        if (!confirm('确定要驳回这份申请吗？此操作不可撤销。')) {
            return;
        }
        
        showLoading('正在驳回申请...');
        
        try {
            const reviewData = {
                status: 'rejected',
                reviewer: currentUser,
                review_date: new Date().toISOString(),
                review_reason: reason
            };
            
            const result = await updateResumeReview(resumeId, reviewData);
            
            if (result.success) {
                // 更新本地数据
                const resumeIndex = allResumes.findIndex(r => r.id == resumeId);
                if (resumeIndex !== -1) {
                    allResumes[resumeIndex] = {
                        ...allResumes[resumeIndex],
                        ...reviewData
                    };
                }
                
                // 更新统计数据
                updateStats();
                
                // 筛选并显示简历
                filterResumes();
                
                hideLoading();
                showSuccessToast('操作成功！', '已驳回该申请');
                
                // 3秒后刷新列表
                setTimeout(() => {
                    loadResumes();
                }, 3000);
                
            } else {
                throw new Error(result.message || '操作失败');
            }
            
        } catch (error) {
            console.error('驳回申请失败:', error);
            hideLoading();
            alert(`操作失败: ${error.message}`);
        }
    }
    
    // ================================================
    // 5. 辅助函数
    // ================================================
    
    // 显示加载状态
    function showLoading(message = '正在处理...') {
        const overlay = document.getElementById('loadingOverlay');
        const text = document.getElementById('loadingText');
        
        if (overlay && text) {
            text.textContent = message;
            overlay.style.display = 'flex';
        }
    }
    
    // 隐藏加载状态
    function hideLoading() {
        const overlay = document.getElementById('loadingOverlay');
        if (overlay) {
            overlay.style.display = 'none';
        }
    }
    
    // 显示成功提示
    function showSuccessToast(title, message) {
        const toast = document.getElementById('successToast');
        const titleEl = document.getElementById('successTitle');
        const messageEl = document.getElementById('successMessage');
        
        if (toast && titleEl && messageEl) {
            titleEl.textContent = title;
            messageEl.textContent = message;
            toast.style.display = 'flex';
            
            // 5秒后自动隐藏
            setTimeout(() => {
                toast.style.display = 'none';
            }, 5000);
        }
    }
    
    // 关闭模态框
    function closeModal() {
        document.getElementById('detailModal').classList.remove('active');
    }
    
    // 返回上一页
    function goBack() {
        // 优先使用浏览器历史
        if (window.history && window.history.length > 1) {
            window.history.back();
        } else {
            // 如果没有历史记录，返回观察员控制台
            window.location.href = 'viewer.html';
        }
    }
    
    // 格式化日期
    function formatDate(dateString) {
        try {
            const date = new Date(dateString);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        } catch (e) {
            return dateString;
        }
    }
    
    // 获取状态文本
    function getStatusText(status) {
        switch(status) {
            case 'pending': return '待处理';
            case 'approved': return '已通过';
            case 'rejected': return '已驳回';
            default: return '未知';
        }
    }
    
    // 获取状态CSS类
    function getStatusClass(status) {
        return status;
    }
    
    // 获取属性CSS类
    function getAttributeClass(attr) {
        const attrMap = {
            '火': 'fire',
            '冰': 'ice',
            '雷': 'thunder',
            '岩': 'rock',
            '风': 'wind',
            '光': 'light',
            '生命': 'life',
            '重力': 'gravity',
            '融合': 'fusion',
            '物理': 'physics',
            '无': 'none'
        };
        
        return attrMap[attr] || 'none';
    }
