<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成员详情 - 管理局资料库</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 添加 Supabase 客户端库 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            min-height: 100vh;
            overflow: auto;
        }
        
        /* 控制台样式 */
        .desktop {
            min-height: 100vh;
            width: 100%;
            background: radial-gradient(circle at center, #0a2463, #000000);
            padding: 0;
            position: relative;
            overflow: visible;
        }
        
        /* 顶部状态栏 */
        .status-bar {
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(10, 36, 99, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 150, 255, 0.3);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .system-info {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: nowrap;
        }
        
        /* 返回按钮样式 */
        .back-btn {
            background: rgba(0, 150, 255, 0.2);
            border: 1px solid rgba(0, 150, 255, 0.5);
            color: #4fc3ff;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            white-space: nowrap;
            margin-right: 15px;
        }

        .back-btn:hover {
            background: rgba(0, 150, 255, 0.3);
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(0, 150, 255, 0.3);
        }

        .system-logo {
            width: 40px;
            height: 40px;
            filter: drop-shadow(0 0 10px rgba(0, 150, 255, 0.7));
        }
        
        .system-name {
            font-size: 1.5rem;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0066cc, #0099ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
        }
        
        .time-display {
            color: #a3d5ff;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }
        
        /* 主要内容区域 */
        .main-content {
            width: 100%;
            min-height: calc(100vh - 80px);
            padding: 40px 20px;
            overflow: auto;
        }
        
        .content-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }
        
        /* 详情卡片容器 */
        .detail-card {
            background: rgba(10, 36, 99, 0.7);
            border: 2px solid rgba(0, 150, 255, 0.3);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 150, 255, 0.2);
            backdrop-filter: blur(10px);
        }
        
        /* 详情头部 */
        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 1px solid rgba(0, 150, 255, 0.3);
        }
        
        .member-info {
            flex: 1;
        }
        
        .member-name {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #4fc3ff, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(79, 195, 255, 0.3);
        }
        
        .member-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }
        
        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #a3d5ff;
            font-size: 1.1rem;
        }
        
        .meta-item i {
            color: #4fc3ff;
        }
        
        .member-title {
            font-size: 1.3rem;
            color: #ffd93d;
        }
        
        /* 证件照样式 */
        .member-photo-container {
            width: 300px;
            height: 400px;
            position: relative;
            margin-left: 40px;
        }
        
        .member-photo-frame {
            width: 100%;
            height: 100%;
            border: 5px solid rgba(79, 195, 255, 0.5);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            position: relative;
        }
        
        .member-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: linear-gradient(135deg, #1a3b8b, #2a4b9b);
        }
        
        .photo-watermark {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: rgba(255, 255, 255, 0.2);
            font-size: 2rem;
        }
        
        .photo-badge {
            position: absolute;
            top: -10px;
            right: -10px;
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
        }
        
        /* 详情内容网格 */
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }
        
        .detail-section {
            background: rgba(0, 30, 80, 0.5);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(0, 150, 255, 0.2);
        }
        
        .section-title {
            font-size: 1.4rem;
            color: #4fc3ff;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 150, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title i {
            font-size: 1.2rem;
        }
        
        /* 详情行样式 */
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 150, 255, 0.1);
        }
        
        .detail-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        
        .detail-label {
            color: #6b9ccc;
            font-size: 1rem;
            flex: 0 0 120px;
        }
        
        .detail-value {
            color: #e0f7ff;
            font-size: 1.1rem;
            flex: 1;
            text-align: right;
            font-weight: 500;
        }
        
        /* 标签样式 */
        .value-tag {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.9rem;
            font-weight: 500;
            margin-left: 5px;
            margin-bottom: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        /* 属性标签颜色 */
        .attr-fire { background: rgba(255, 87, 34, 0.2); color: #ff5722; border: 1px solid rgba(255, 87, 34, 0.5); }
        .attr-ice { background: rgba(3, 169, 244, 0.2); color: #03a9f4; border: 1px solid rgba(3, 169, 244, 0.5); }
        .attr-thunder { background: rgba(255, 193, 7, 0.2); color: #ffc107; border: 1px solid rgba(255, 193, 7, 0.5); }
        .attr-rock { background: rgba(121, 85, 72, 0.2); color: #795548; border: 1px solid rgba(121, 85, 72, 0.5); }
        .attr-wind { background: rgba(76, 175, 80, 0.2); color: #4caf50; border: 1px solid rgba(76, 175, 80, 0.5); }
        .attr-light { background: rgba(255, 235, 59, 0.2); color: #ffeb3b; border: 1px solid rgba(255, 235, 59, 0.5); }
        .attr-life { background: rgba(233, 30, 99, 0.2); color: #e91e63; border: 1px solid rgba(233, 30, 99, 0.5); }
        .attr-gravity { background: rgba(156, 39, 176, 0.2); color: #9c27b0; border: 1px solid rgba(156, 39, 176, 0.5); }
        .attr-fusion { background: rgba(255, 152, 0, 0.2); color: #ff9800; border: 1px solid rgba(255, 152, 0, 0.5); }
        .attr-physics { background: rgba(158, 158, 158, 0.2); color: #9e9e9e; border: 1px solid rgba(158, 158, 158, 0.5); }
        
        /* 模因标签颜色 */
        .meme-shi { background: rgba(63, 81, 181, 0.2); color: #3f51b5; border: 1px solid rgba(63, 81, 181, 0.5); }
        .meme-xu { background: rgba(0, 188, 212, 0.2); color: #00bcd4; border: 1px solid rgba(0, 188, 212, 0.5); }
        .meme-ling { background: rgba(103, 58, 183, 0.2); color: #673ab7; border: 1px solid rgba(103, 58, 183, 0.5); }
        .meme-gang { background: rgba(96, 125, 139, 0.2); color: #607d8b; border: 1px solid rgba(96, 125, 139, 0.5); }
        .meme-ben { background: rgba(205, 220, 57, 0.2); color: #cddc39; border: 1px solid rgba(205, 220, 57, 0.5); }
        .meme-ying { background: rgba(0, 0, 0, 0.2); color: #000; border: 1px solid rgba(0, 0, 0, 0.5); }
        .meme-sheng { background: rgba(139, 195, 74, 0.2); color: #8bc34a; border: 1px solid rgba(139, 195, 74, 0.5); }
        .meme-xie { background: rgba(255, 87, 34, 0.2); color: #ff5722; border: 1px solid rgba(255, 87, 34, 0.5); }
        .meme-huan { background: rgba(233, 30, 99, 0.2); color: #e91e63; border: 1px solid rgba(233, 30, 99, 0.5); }
        
        /* 其他标签 */
        .team-badge {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 1px solid rgba(76, 175, 80, 0.5);
        }
        
        .position-badge {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
            border: 1px solid rgba(255, 193, 7, 0.5);
        }
        
        /* 能力描述 */
        .ability-desc {
            background: rgba(0, 60, 120, 0.3);
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
            border-left: 4px solid #4fc3ff;
        }
        
        /* 加载状态 */
        .loading-state {
            text-align: center;
            padding: 100px 20px;
            color: #6b9ccc;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(79, 195, 255, 0.3);
            border-top: 4px solid #4fc3ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        /* 错误状态 */
        .error-state {
            text-align: center;
            padding: 100px 20px;
            color: #ff6b6b;
        }
        
        /* 退出按钮 */
        .logout-btn {
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid rgba(255, 107, 107, 0.5);
            color: #ff6b6b;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-left: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .logout-btn:hover {
            background: rgba(255, 107, 107, 0.3);
            transform: scale(1.05);
        }
        
        /* 编辑按钮 */
        .edit-btn {
            background: rgba(255, 193, 7, 0.2);
            border: 1px solid rgba(255, 193, 7, 0.5);
            color: #ffc107;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 20px;
        }
        
        .edit-btn:hover {
            background: rgba(255, 193, 7, 0.3);
            transform: translateY(-2px);
        }
        
        /* 云端状态指示器 */
        .cloud-status {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 10px 15px;
            border-radius: 8px;
            z-index: 1000;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
        }
        
        .cloud-status.connected {
            background: rgba(107, 255, 184, 0.1);
            border: 1px solid rgba(107, 255, 184, 0.3);
            color: #6bffb8;
        }
        
        .cloud-status.disconnected {
            background: rgba(255, 217, 61, 0.1);
            border: 1px solid rgba(255, 217, 61, 0.3);
            color: #ffd93d;
        }
        
        .cloud-status.disabled {
            background: rgba(163, 213, 255, 0.1);
            border: 1px solid rgba(163, 213, 255, 0.3);
            color: #a3d5ff;
        }
        
        /* 同步状态栏 */
        .sync-status-bar {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        
        .sync-btn {
            background: rgba(107, 255, 184, 0.2);
            border: 1px solid rgba(107, 255, 184, 0.5);
            color: #6bffb8;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        
        .sync-btn:hover {
            background: rgba(107, 255, 184, 0.3);
            transform: translateY(-2px);
        }
        
        .sync-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .sync-status-message {
            font-size: 0.8rem;
            color: #a3d5ff;
            margin-top: 5px;
            text-align: center;
            min-height: 20px;
            max-width: 200px;
            word-break: break-word;
        }
        
        /* 动画 */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        /* 响应式设计 */
        @media (max-width: 992px) {
            .detail-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            
            .member-photo-container {
                margin: 30px auto 0;
                width: 250px;
                height: 333px;
            }
            
            .member-meta {
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .sync-status-bar {
                top: 100px;
                right: 10px;
            }
        }
        
        @media (max-width: 768px) {
            .main-content {
                padding: 20px 15px;
            }
            
            .detail-card {
                padding: 25px;
            }
            
            .detail-grid {
                grid-template-columns: 1fr;
            }
            
            .member-photo-container {
                width: 200px;
                height: 266px;
            }
            
            .member-name {
                font-size: 2rem;
            }
            
            .status-bar {
                padding: 15px 20px;
                flex-wrap: wrap;
                gap: 15px;
            }
            
            .detail-row {
                flex-direction: column;
                gap: 5px;
            }
            
            .detail-label {
                flex: none;
                margin-bottom: 5px;
            }
            
            .detail-value {
                text-align: left;
            }
            
            /* 响应式下的返回按钮 */
            .back-btn span {
                display: none;
            }
            
            .back-btn i {
                margin-right: 0;
                font-size: 0.9rem;
            }
            
            .sync-status-bar {
                top: 120px;
                right: 10px;
            }
            
            .sync-btn {
                padding: 6px 12px;
                font-size: 0.8rem;
            }
        }
        
        /* 云端保存提示 */
        .cloud-save-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(10, 36, 99, 0.95);
            color: #6bffb8;
            padding: 15px 25px;
            border-radius: 10px;
            border: 1px solid rgba(107, 255, 184, 0.5);
            z-index: 10000;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(10px);
            animation: slideInRight 0.3s ease;
            max-width: 400px;
        }
        
        .cloud-error-toast {
            background: rgba(10, 36, 99, 0.95);
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.5);
        }
    </style>
</head>
<body>
    <!-- 控制台界面 -->
    <div class="desktop">
        <!-- 顶部状态栏 -->
        <div class="status-bar">
            <div class="system-info">
                <!-- 返回按钮 -->
                <button class="back-btn" onclick="goBackToMembers()" title="返回成员列表">
                    <i class="fas fa-chevron-left"></i>
                    <span>返回</span>
                </button>
                
                <img src="qsamlogo.png" alt="系统标志" class="system-logo">
                <div class="system-name">成员详情档案</div>
            </div>
            
            <div class="user-info">
                <div class="time-display" id="currentTime">00:00:00</div>
                <div class="user-avatar">
                    <i class="fas fa-user-shield"></i>
                </div>
                <div>
                    <div id="headerUserName" style="color: #ffd93d;">加载中...</div>
                    <div id="headerUserRole" style="font-size: 0.8rem; color: #a3d5ff;">--</div>
                </div>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> 退出
                </button>
            </div>
        </div>
        
        <!-- 同步状态栏 -->
        <div class="sync-status-bar" id="syncStatusBar" style="display: none;">
            <button class="sync-btn" id="syncBtn" onclick="forceSyncMemberDetail()">
                <i class="fas fa-sync-alt"></i>
                <span>同步到云端</span>
            </button>
            <div class="sync-status-message" id="syncStatusMessage"></div>
        </div>
        
        <!-- 主要内容区域 -->
        <div class="main-content">
            <div class="content-wrapper">
                <!-- 详情卡片 -->
                <div id="detailContainer">
                    <!-- 详情内容会通过JavaScript动态生成 -->
                    <div class="loading-state" id="loadingState">
                        <div class="loading-spinner"></div>
                        <div>正在加载成员详情...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
    // ================================================
    // 1. SUPABASE 配置和全局变量
    // ================================================
    const SUPABASE_URL = 'https://owfyycgomqclytnswobj.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_65fjjNxcUjAFpFJ3AEW9Tg_ctW41ZsV';
    
    // 全局变量 - 只在这里声明一次
    let supabaseClient = null;
    let cloudEnabled = false;
    let syncInterval = null;
    
    // ================================================
    // 2. 初始化函数
    // ================================================
    
    // 初始化Supabase
    function initSupabase() {
        console.log('开始初始化Supabase...');
        
        try {
            // 检查Supabase库是否加载
            if (typeof window.supabase === 'undefined') {
                console.error('❌ Supabase JS库未加载！请检查CDN链接');
                showCloudSaveToast('Supabase库未加载，请刷新页面重试', false);
                return false;
            }
            
            // 检查配置
            if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
                console.warn('Supabase配置不完整');
                return false;
            }
            
            // 创建Supabase客户端
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
                auth: {
                    persistSession: false,
                    autoRefreshToken: false
                }
            });
            
            cloudEnabled = true;
            console.log('✅ Supabase客户端已初始化');
            
            // 测试连接
            testSupabaseConnection();
            
            // 显示同步按钮
            showSyncButton();
            
            return true;
            
        } catch (e) {
            console.error('Supabase初始化失败:', e);
            showCloudSaveToast('云端初始化失败: ' + e.message, false);
            return false;
        }
    }
    
    // 测试Supabase连接
    async function testSupabaseConnection() {
        if (!supabaseClient) return;
        
        try {
            // 简单查询测试连接
            const { error } = await supabaseClient
                .from('member_details')
                .select('count')
                .limit(1);
            
            if (error) {
                console.warn('Supabase连接测试失败:', error);
                showCloudSaveToast('云端连接测试失败', false);
            } else {
                console.log('✅ Supabase连接测试成功');
            }
        } catch (e) {
            console.warn('连接测试异常:', e);
        }
    }
    
    // 显示同步按钮
    function showSyncButton() {
        const syncBar = document.getElementById('syncStatusBar');
        if (syncBar) {
            syncBar.style.display = 'flex';
        }
    }
    
    // ================================================
    // 3. 页面加载时初始化
    // ================================================
    document.addEventListener('DOMContentLoaded', async function() {
        console.log('页面加载完成，开始初始化...');
        
        // 检查登录状态
        const role = localStorage.getItem('auth_role');
        if (role !== 'admin' && role !== 'member') {
            alert('请先登录！');
            window.location.href = 'index.html';
            return;
        }
        
        // 显示诊断信息

    // 返回 members 页面：优先使用浏览器历史回退（只回到上一级），在无可用历史时再根据角色跳转
    function goBackToMembers() {
        // 优先使用前一页面标记（来自调用处的显式记录），确保一定回到来源页面
        try {
            const prev = sessionStorage.getItem('previousPage');
            if (prev) {
                sessionStorage.removeItem('previousPage');
                // 仅在同源路径下直接跳转
                try {
                    const prevUrl = new URL(prev, location.href);
                    if (prevUrl.origin === location.origin) {
                        window.location.href = prev;
                        return;
                    }
                } catch (e) {
                    // 若解析异常，则直接导航（浏览器会处理）
                    window.location.href = prev;
                    return;
                }
            }
        } catch (e) {
            console.warn('检查 previousPage 失败:', e);
        }
        try {
            // 如果有同源的 referrer，优先回退到 referrer（上一级页面）
            if (document.referrer) {
                try {
                    const refUrl = new URL(document.referrer);
                    if (refUrl.origin === location.origin) {
                        window.history.back();
                        return;
                    }
                } catch (e) {
                    // 解析 referrer 失败，继续使用 history 或回退到角色逻辑
                }
            }

            // 如果历史长度足够，使用 history.back()
            if (window.history && window.history.length > 1) {
                window.history.back();
                return;
            }

        } catch (e) {
            console.warn('尝试使用历史回退失败:', e);
        }

        // 回退不可用时，使用角色跳转作为兜底方案
        const role = localStorage.getItem('auth_role');
        if (role === 'admin') {
            window.location.href = 'admin.html';
        } else if (role === 'member' || role === 'user') {
            window.location.href = 'member.html';
        } else {
            window.location.href = 'index.html';
        }
    }

    // 启动自动同步检查
    function startAutoSync() {
        if (cloudEnabled && supabaseClient) {
            // 每5分钟检查一次云端更新
            syncInterval = setInterval(async () => {
                const memberUsername = localStorage.getItem('viewing_member_username');
                if (memberUsername) {
                    await checkForCloudUpdates(memberUsername);
                }
            }, 5 * 60 * 1000); // 5分钟
            console.log('自动同步检查已启动，每5分钟检查一次');
        }
    }
    
    // 检查云端更新
    async function checkForCloudUpdates(username) {
        try {
            console.log('检查云端更新...');
            const { data: cloudData, error } = await supabaseClient
                .from('member_details')
                .select('updated_at')
                .eq('username', username)
                .single();
            
            if (!error && cloudData) {
                const localLastUpdated = localStorage.getItem(`member_${username}_last_updated`);
                
                if (!localLastUpdated || new Date(cloudData.updated_at) > new Date(localLastUpdated)) {
                    console.log('云端有更新的数据');
                    // 更新同步状态提示
                    const statusMsg = document.getElementById('syncStatusMessage');
                    if (statusMsg) {
                        statusMsg.textContent = '云端有更新，请点击同步按钮获取最新数据';
                        statusMsg.style.color = '#ffd93d';
                        
                        // 5秒后清除提示
                        setTimeout(() => {
                            if (statusMsg.textContent.includes('云端有更新')) {
                                statusMsg.textContent = '';
                            }
                        }, 5000);
                    }
                }
            }
        } catch (e) {
            console.warn('检查云端更新失败:', e);
        }
    }
    
    // 从云端加载成员详情
    async function loadMemberDetailFromSupabase(username) {
        if (!supabaseClient) {
            console.warn('Supabase客户端未初始化');
            return null;
        }
        
        try {
            console.log('从Supabase加载成员详情:', username);
            const { data, error } = await supabaseClient
                .from('member_details')
                .select('*')
                .eq('username', username)
                .single();
            
            if (error) {
                // 如果没有找到，返回null而不是抛出错误
                if (error.code === 'PGRST116') {
                    console.log('云端未找到该成员详情');
                    return null;
                }
                
                console.error('Supabase查询错误:', error);
                return null;
            }
            
            console.log('云端数据加载成功');
            
            // 保存最后更新时间
            if (data.updated_at) {
                localStorage.setItem(`member_${username}_last_updated`, data.updated_at);
            }
            
            return formatDetailData(data);
        } catch (error) {
            console.error('从Supabase加载成员详情失败:', error);
            return null;
        }
    }
    
    // ================================================
    // 5. 云端保存功能
    // ================================================
    
    // 保存到云端
    async function saveMemberDetailToCloud(formData, department, team, position) {
        if (!supabaseClient) {
            return { success: false, message: '云端连接未配置' };
        }
        
        try {
            console.log('开始保存到云端...');
            console.log('表单数据:', formData);
            console.log('部门/队伍/职位:', department, team, position);
            
            // 准备数据
            const userData = {
                username: formData.username,
                name: formData.name,
                photo_url: formData.photo_url || '',
                height: formData.height || '',
                gender: formData.gender || '',
                age: formData.age || '',
                attributes: Array.isArray(formData.attributes) ? formData.attributes : [formData.attributes],
                meme: formData.meme || '',
                meme_name: formData.meme_name || '',
                ability: formData.ability || '',
                weapon: formData.weapon || '',
                department: department || '未分配',
                team: team || '',
                position: position || '',
                other: formData.other || '',
                updated_at: new Date().toISOString()
            };
            
            console.log('准备保存的数据:', userData);
            
            // 使用 upsert 操作（插入或更新）
            const { data, error } = await supabaseClient
                .from('member_details')
                .upsert(userData, {
                    onConflict: 'username',
                    ignoreDuplicates: false
                })
                .select();
            
            if (error) {
                console.error('Supabase保存错误:', error);
                
                // 如果是表不存在，给出提示
                if (error.message.includes('does not exist') || error.code === '42P01') {
                    console.log('member_details表可能不存在');
                    showCloudSaveToast('请先在Supabase中创建member_details表', false);
                }
                
                throw error;
            }
            
            console.log('云端保存成功，返回数据:', data);
            
            // 保存更新时间到本地
            localStorage.setItem(`member_${formData.username}_last_updated`, new Date().toISOString());
            
            return { 
                success: true, 
                message: '云端保存成功', 
                data: data ? data[0] : null 
            };
            
        } catch (error) {
            console.error('保存到云端失败:', error);
            return { 
                success: false, 
                message: '云端保存失败: ' + error.message,
                error: error 
            };
        }
    }

    async function loadMemberDetail() {
        const memberId = localStorage.getItem('viewing_member_id');
        const memberUsername = localStorage.getItem('viewing_member_username');
        
        if (!memberId && !memberUsername) {
            showError('未选择要查看的成员');
            return;
        }
        
        try {
            // 首先获取成员基本信息
            const memberBasic = await getMemberBasicInfo(memberUsername);
            if (!memberBasic) {
                showError('未找到该成员的基本信息');
                return;
            }
            
            // 云端优先：如果开启了云端，优先从云端加载
            let detailData = null;
            let dataSource = '本地';
            
            if (cloudEnabled && supabaseClient) {
                console.log('优先从云端加载成员详情...');
                detailData = await loadMemberDetailFromSupabase(memberUsername);
                
                if (detailData) {
                    dataSource = '云端';
                    console.log('云端数据加载成功，更新本地缓存');
                    
                    // 更新本地缓存
                    const MEMBER_DETAILS_KEY = 'qs_member_details_cloud';
                    const stored = localStorage.getItem(MEMBER_DETAILS_KEY);
                    const details = stored ? JSON.parse(stored) : {};
                    details[memberUsername] = detailData;
                    localStorage.setItem(MEMBER_DETAILS_KEY, JSON.stringify(details));
                    
                    console.log(`已使用${dataSource}数据`);
                } else {
                    console.log('云端无数据，从本地加载...');
                }
            }
            
            // 如果云端没有，尝试本地
            if (!detailData) {
                detailData = await loadMemberDetailFromLocal(memberUsername);
            }
            
            // 如果还是没有，创建默认详情（无照片）
            if (!detailData) {
                console.log('为新成员创建默认详情数据（无照片）');
                detailData = {
                    name: memberBasic.name,
                    username: memberUsername,

                };
                
                // 保存到本地
                const MEMBER_DETAILS_KEY = 'qs_member_details_cloud';
                const stored = localStorage.getItem(MEMBER_DETAILS_KEY);
                const details = stored ? JSON.parse(stored) : {};
                details[memberUsername] = detailData;
                localStorage.setItem(MEMBER_DETAILS_KEY, JSON.stringify(details));
                
                // 显示提示
                setTimeout(() => {
                    showSuccessToast(`欢迎查看 ${memberBasic.name} 的档案！\n这是新成员的默认档案，请点击"编辑详情"按钮来完善信息。`);

            }

            showError('加载成员详情失败：' + error.message);
        }

    // ================================================
    // 8. 手动强制同步功能
    // ================================================
    
    async function forceSyncMemberDetail() {
        const memberUsername = localStorage.getItem('viewing_member_username');
        if (!memberUsername) {
            alert('未找到当前成员信息');
            return;
        }
        
        const btn = document.getElementById('syncBtn');
        const statusMsg = document.getElementById('syncStatusMessage');
        const originalHTML = btn.innerHTML;
        
        if (!btn || !statusMsg) return;
        
        // 显示同步中状态
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 同步中...';
        btn.disabled = true;
        statusMsg.textContent = '正在同步数据...';
        statusMsg.style.color = '#ffd93d';
        
        try {
            // 1. 获取当前本地数据
            const MEMBER_DETAILS_KEY = 'qs_member_details_cloud';
            const stored = localStorage.getItem(MEMBER_DETAILS_KEY);
            const details = stored ? JSON.parse(stored) : {};
            const localDetail = details[memberUsername];
            
            if (!localDetail) {
                throw new Error('本地无数据可同步');
            }
            
            // 2. 获取部门、队伍、职位信息
            const titleText = document.querySelector('.member-title');
            if (!titleText) {
                throw new Error('无法获取部门信息');
            }
            
            const parts = titleText.textContent.split(' - ');
            const department = parts[0] || '未分配';
            const team = parts[1] || '';
            
            const positionElement = document.querySelector('.position-badge');
            const position = positionElement ? positionElement.textContent : '未分配';
            
            // 3. 同步到云端
            const formData = {
                username: memberUsername,
                name: localDetail.name || document.querySelector('.member-name').textContent.split(' ')[0],
                photo_url: localDetail.photo || '',
                height: localDetail.height || '',
                gender: localDetail.gender || '',
                age: localDetail.age || '',
                attributes: localDetail.attributes || ['物理'],
                meme: localDetail.meme || '',
                meme_name: localDetail.memeName || '',
                ability: localDetail.ability || '',
                weapon: localDetail.weapon || '',
                other: localDetail.other || ''
            };
            
            const result = await saveMemberDetailToCloud(formData, department, team, position);
            
            if (result.success) {
                // 同步成功
                btn.innerHTML = '<i class="fas fa-check-circle"></i> 已同步';
                statusMsg.textContent = '同步成功！数据已保存到云端';
                statusMsg.style.color = '#6bffb8';
                
                // 显示云端保存成功的提示
                showCloudSaveToast('数据已成功保存到云端！', true);
                
                // 3秒后恢复原状
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                    btn.disabled = false;
                    statusMsg.textContent = '';
                    
                    // 重新加载数据以显示云端最新状态
                    setTimeout(() => {
                        location.reload();
                    }, 1000);
                }, 3000);
            } else {
                throw new Error(result.message);
            }
            
        } catch (error) {
            console.error('强制同步失败:', error);
            
            btn.innerHTML = '<i class="fas fa-exclamation-triangle"></i> 同步失败';
            statusMsg.textContent = '同步失败: ' + error.message;
            statusMsg.style.color = '#ff6b6b';
            
            // 显示云端保存失败的提示
            showCloudSaveToast('云端保存失败: ' + error.message, false);
            
            // 5秒后恢复
            setTimeout(() => {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
                statusMsg.textContent = '';
            }, 5000);
        }
    }

    // 渲染属性选项（支持多选）
    function renderAttributeOptions(selectedAttributes = []) {
        const attributes = ['火', '冰', '雷', '岩', '风', '光', '生命', '重力', '融合', '物理'];
        const container = document.getElementById('attributesContainer');
        
        if (!container) return;
        
        container.innerHTML = '';
        
        attributes.forEach(attr => {
            const isChecked = selectedAttributes.includes(attr);
            
            const label = document.createElement('label');
            label.style.cssText = 'display: flex; align-items: center; gap: 5px; cursor: pointer;';
            
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.name = 'attributes';
            checkbox.value = attr;
            checkbox.checked = isChecked;
            checkbox.style.display = 'none';
            checkbox.id = `attr_${attr}`;
            
            const span = document.createElement('span');
            span.className = `value-tag attr-${getAttrClass(attr)}`;
            span.textContent = attr;
            span.style.cssText = isChecked ? 
                'opacity: 1; box-shadow: 0 0 10px currentColor; border-width: 2px;' : 
                'opacity: 0.5; box-shadow: none; border-width: 1px;';
            
            // 添加点击事件
            span.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                
                const checkbox = this.parentElement.querySelector('input[type="checkbox"]');
                checkbox.checked = !checkbox.checked;
                
                if (checkbox.checked) {
                    this.style.opacity = '1';
                    this.style.boxShadow = '0 0 10px currentColor';
                    this.style.borderWidth = '2px';
                } else {
                    this.style.opacity = '0.5';
                    this.style.boxShadow = 'none';
                    this.style.borderWidth = '1px';
                }
            });
            
            // 添加悬停效果
            span.addEventListener('mouseenter', function() {
                if (!this.parentElement.querySelector('input[type="checkbox"]').checked) {
                    this.style.opacity = '0.8';
                }
            });
            
            span.addEventListener('mouseleave', function() {
                if (!this.parentElement.querySelector('input[type="checkbox"]').checked) {
                    this.style.opacity = '0.5';
                }
            });
            
            label.appendChild(checkbox);
            label.appendChild(span);
            container.appendChild(label);
        });
    }
    
    // 获取属性类名
    function getAttrClass(attr) {
        const classMap = {
            '火': 'fire',
            '冰': 'ice',
            '雷': 'thunder',
            '岩': 'rock',
            '风': 'wind',
            '光': 'light',
            '生命': 'life',
            '重力': 'gravity',
            '融合': 'fusion',
            '物理': 'physics'
        };
        return classMap[attr] || 'physics';
    }

            const department = parts[0];
            const team = parts[1] || '';
            
            const positionElement = document.querySelector('.position-badge');

            const memberDetail = {
                name: formData.name,
                username: formData.username,

                height: formData.height,
                gender: formData.gender,
                age: formData.age,

                other: formData.other
            };
            
            console.log('要保存的成员详情:', memberDetail);
            
            // 1. 保存到本地缓存
            const MEMBER_DETAILS_KEY = 'qs_member_details_cloud';
            const stored = localStorage.getItem(MEMBER_DETAILS_KEY);
            const details = stored ? JSON.parse(stored) : {};
            details[username] = memberDetail;
            localStorage.setItem(MEMBER_DETAILS_KEY, JSON.stringify(details));
            
            // 2. 尝试保存到云端
            let cloudSuccess = false;
            let cloudMessage = '';
            
            if (cloudEnabled && supabaseClient) {
                try {
                    console.log('开始保存到云端...');
                    const cloudResult = await saveMemberDetailToCloud(formData, department, team, position);
                    cloudSuccess = cloudResult.success;
                    cloudMessage = cloudResult.message;
                    console.log('云端保存结果:', cloudResult);
                    
                    if (cloudSuccess) {
                        showCloudSaveToast('数据已成功保存到云端！', true);
                    } else {
                        showCloudSaveToast('云端保存失败: ' + cloudMessage, false);
                    }
                } catch (cloudError) {
                    console.warn('云端保存失败，但本地保存成功:', cloudError);
                    cloudMessage = '云端保存失败，仅保存到本地';
                    showCloudSaveToast('云端保存失败，仅保存到本地', false);
                }
            } else {
                console.log('云端未启用，仅保存到本地');
                showCloudSaveToast('数据已保存到本地（云端未启用）', true);
            }
            
            // 3. 移除模态框
            document.getElementById('editModal').remove();
            
            // 4. 显示保存结果
            let successMsg = '详细信息已保存到本地！';
            if (cloudEnabled) {
                if (cloudSuccess) {
                    successMsg = '详细信息已保存到本地和云端！';
                } else {
                    successMsg += `\n\n⚠️ ${cloudMessage}`;
                }
            } else {
                successMsg += '\n\n如需跨设备同步，请配置云端数据库';
            }
            
            // 5. 显示成功提示
            showSuccessToast(successMsg);
            
            // 6. 重新加载详情（延迟一秒让用户看到提示）
            setTimeout(() => {
                location.reload();
            }, 1500);
            
        } catch (error) {
            console.error('保存失败:', error);
            alert('保存失败: ' + error.message);
            showCloudSaveToast('保存失败: ' + error.message, false);
        } finally {
            // 恢复按钮状态
            if (submitBtn) {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        }
    }
    
    // ================================================
    // 11. 云端保存提示功能
    // ================================================
    
    // 显示云端保存提示
    function showCloudSaveToast(message, isSuccess) {
        const toast = document.createElement('div');
        toast.className = isSuccess ? 'cloud-save-toast' : 'cloud-save-toast cloud-error-toast';
        
        const icon = isSuccess ? 
            '<i class="fas fa-cloud-upload-alt"></i>' : 
            '<i class="fas fa-exclamation-triangle"></i>';
        
        toast.innerHTML = `
            ${icon}
            <span>${message}</span>
        `;
        
        document.body.appendChild(toast);
        
        // 3秒后自动移除
        setTimeout(() => {
            if (toast.parentNode) {
                toast.parentNode.removeChild(toast);
            }
        }, 3000);
    }
    
    // ================================================
    // 12. 辅助函数
    // ================================================
    
    // 显示成功提示
    function showSuccessToast(message) {
        const toast = document.createElement('div');
        toast.style.cssText = `
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(10, 36, 99, 0.95);
            color: #6bffb8;
            padding: 15px 25px;
            border-radius: 10px;
            border: 1px solid rgba(107, 255, 184, 0.5);
            z-index: 10000;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(10px);
            animation: slideInRight 0.3s ease;
        `;
        toast.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
        document.body.appendChild(toast);
        
        // 3秒后自动移除
        setTimeout(() => {
            if (toast.parentNode) {
                toast.parentNode.removeChild(toast);
            }
        }, 3000);
    }
    
    // 显示错误信息
    function showError(message) {
        const container = document.getElementById('detailContainer');
        container.innerHTML = `
            <div class="error-state">
                <i class="fas fa-exclamation-triangle" style="font-size: 3rem; margin-bottom: 20px;"></i>
                <h3>加载失败</h3>
                <p>${message}</p>
                <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;">
                    <button onclick="goBackToMembers()" style="
                        padding: 10px 20px;
                        background: rgba(0, 150, 255, 0.2);
                        border: 1px solid rgba(0, 150, 255, 0.5);
                        color: #4fc3ff;
                        border-radius: 8px;
                        cursor: pointer;
                    ">
                        <i class="fas fa-arrow-left"></i> 返回成员列表
                    </button>
                    <button onclick="location.reload()" style="
                        padding: 10px 20px;
                        background: rgba(255, 193, 7, 0.2);
                        border: 1px solid rgba(255, 193, 7, 0.5);
                        color: #ffc107;
                        border-radius: 8px;
                        cursor: pointer;
                    ">
                        <i class="fas fa-redo"></i> 重试
                    </button>
                </div>
            </div>
        `;
    }
    
    // 退出登录
    function logout() {
        if (confirm('确定要退出登录吗？')) {
            localStorage.removeItem('auth_user');
            localStorage.removeItem('auth_role');
            localStorage.removeItem('auth_time');
            localStorage.removeItem('viewing_member_id');
            localStorage.removeItem('viewing_member_username');
            
            // 清除同步定时器
            if (syncInterval) {
                clearInterval(syncInterval);
            }
            
            window.location.href = 'index.html';
        }
    }
    
    // 页面卸载时清除定时器
    window.addEventListener('beforeunload', () => {
        if (syncInterval) {
            clearInterval(syncInterval);
        }
    });
</script>
</body>
