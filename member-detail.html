    // 杩斿洖 members 椤甸潰锛氫紭鍏堜娇鐢ㄦ祻瑙堝櫒鍘嗗彶鍥為€€锛堝彧鍥炲埌涓婁竴绾э級锛屽湪鏃犲彲鐢ㄥ巻鍙叉椂鍐嶆牴鎹鑹茶烦杞?
    function goBackToMembers() {
        // 浼樺厛浣跨敤鍓嶄竴椤甸潰鏍囪锛堟潵鑷皟鐢ㄥ鐨勬樉寮忚褰曪級锛岀‘淇濅竴瀹氬洖鍒版潵婧愰〉闈?
        try {
            const prev = sessionStorage.getItem('previousPage');
            if (prev) {
                sessionStorage.removeItem('previousPage');
                // 浠呭湪鍚屾簮璺緞涓嬬洿鎺ヨ烦杞?
                try {
                    const prevUrl = new URL(prev, location.href);
                    if (prevUrl.origin === location.origin) {
                        window.location.href = prev;
                        return;
                    }
                } catch (e) {
                    // 鑻ヨВ鏋愬紓甯革紝鍒欑洿鎺ュ鑸紙娴忚鍣ㄤ細澶勭悊锛?
                    window.location.href = prev;
                    return;
                }
            }
        } catch (e) {
            console.warn('妫€鏌?previousPage 澶辫触:', e);
        }
        try {
            // 濡傛灉鏈夊悓婧愮殑 referrer锛屼紭鍏堝洖閫€鍒?referrer锛堜笂涓€绾ч〉闈級
            if (document.referrer) {
                try {
                    const refUrl = new URL(document.referrer);
                    if (refUrl.origin === location.origin) {
                        window.history.back();
                        return;
                    }
                } catch (e) {
                    // 瑙ｆ瀽 referrer 澶辫触锛岀户缁娇鐢?history 鎴栧洖閫€鍒拌鑹查€昏緫
                }
            }

            // 濡傛灉鍘嗗彶闀垮害瓒冲锛屼娇鐢?history.back()
            if (window.history && window.history.length > 1) {
                window.history.back();
                return;
            }

        } catch (e) {
            console.warn('灏濊瘯浣跨敤鍘嗗彶鍥為€€澶辫触:', e);
        }

        // 鍥為€€涓嶅彲鐢ㄦ椂锛屼娇鐢ㄨ鑹茶烦杞綔涓哄厹搴曟柟妗?
        const role = localStorage.getItem('auth_role');
        if (role === 'admin') {
            window.location.href = 'admin.html';
        } else if (role === 'member' || role === 'user') {
            window.location.href = 'member.html';
        } else {
            window.location.href = 'index.html';
        }
    }

    async function forceSyncMemberDetail() {
        const memberUsername = localStorage.getItem('viewing_member_username');
        if (!memberUsername) {
            alert('鏈壘鍒板綋鍓嶆垚鍛樹俊鎭?);
            return;
        }
        
        const btn = document.getElementById('syncBtn');
        const statusMsg = document.getElementById('syncStatusMessage');
        const originalHTML = btn.innerHTML;
        
        if (!btn || !statusMsg) return;
        
        // 鏄剧ず鍚屾涓姸鎬?
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 鍚屾涓?..';
        btn.disabled = true;
        statusMsg.textContent = '姝ｅ湪鍚屾鏁版嵁...';
        statusMsg.style.color = '#ffd93d';
        
        try {
            // 1. 鑾峰彇褰撳墠鏈湴鏁版嵁
            const MEMBER_DETAILS_KEY = 'qs_member_details_cloud';
            const stored = localStorage.getItem(MEMBER_DETAILS_KEY);
            const details = stored ? JSON.parse(stored) : {};
            const localDetail = details[memberUsername];
            
            if (!localDetail) {
                throw new Error('鏈湴鏃犳暟鎹彲鍚屾');
            }
            
            // 2. 鑾峰彇閮ㄩ棬銆侀槦浼嶃€佽亴浣嶄俊鎭?
            const titleText = document.querySelector('.member-title');
            if (!titleText) {
                throw new Error('鏃犳硶鑾峰彇閮ㄩ棬淇℃伅');
            }
            
            const parts = titleText.textContent.split(' - ');
            const department = parts[0] || '鏈垎閰?;
            const team = parts[1] || '';
            
            const positionElement = document.querySelector('.position-badge');
            const position = positionElement ? positionElement.textContent : '鏈垎閰?;
            
            // 3. 鍚屾鍒颁簯绔?
            const formData = {
                username: memberUsername,
                name: localDetail.name || document.querySelector('.member-name').textContent.split(' ')[0],
                photo_url: localDetail.photo || '',
                height: localDetail.height || '',
                gender: localDetail.gender || '',
                age: localDetail.age || '',
                attributes: localDetail.attributes || ['鐗╃悊'],
                meme: localDetail.meme || '',
                meme_name: localDetail.memeName || '',
                ability: localDetail.ability || '',
                weapon: localDetail.weapon || '',
                other: localDetail.other || ''
            };
            
            const result = await saveMemberDetailToCloud(formData, department, team, position);
            
            if (result.success) {
                // 鍚屾鎴愬姛
                btn.innerHTML = '<i class="fas fa-check-circle"></i> 宸插悓姝?;
                statusMsg.textContent = '鍚屾鎴愬姛锛佹暟鎹凡淇濆瓨鍒颁簯绔?;
                statusMsg.style.color = '#6bffb8';
                
                // 鏄剧ず浜戠淇濆瓨鎴愬姛鐨勬彁绀?
                showCloudSaveToast('鏁版嵁宸叉垚鍔熶繚瀛樺埌浜戠锛?, true);
                
                // 3绉掑悗鎭㈠鍘熺姸
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                    btn.disabled = false;
                    statusMsg.textContent = '';
                    
                    // 閲嶆柊鍔犺浇鏁版嵁浠ユ樉绀轰簯绔渶鏂扮姸鎬?
                    setTimeout(() => {
                        location.reload();
                    }, 1000);
                }, 3000);
            } else {
                throw new Error(result.message);
            }
            
        } catch (error) {
            console.error('寮哄埗鍚屾澶辫触:', error);
            
            btn.innerHTML = '<i class="fas fa-exclamation-triangle"></i> 鍚屾澶辫触';
            statusMsg.textContent = '鍚屾澶辫触: ' + error.message;
            statusMsg.style.color = '#ff6b6b';
            
            // 鏄剧ず浜戠淇濆瓨澶辫触鐨勬彁绀?
            showCloudSaveToast('浜戠淇濆瓨澶辫触: ' + error.message, false);
            
            // 5绉掑悗鎭㈠
            setTimeout(() => {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
                statusMsg.textContent = '';
            }, 5000);
        }
    }

    // 娓叉煋灞炴€ч€夐」锛堟敮鎸佸閫夛級
    function renderAttributeOptions(selectedAttributes = []) {
        const attributes = ['鐏?, '鍐?, '闆?, '宀?, '椋?, '鍏?, '鐢熷懡', '閲嶅姏', '铻嶅悎', '鐗╃悊'];
        const container = document.getElementById('attributesContainer');
        
        if (!container) return;
        
        container.innerHTML = '';
        
        attributes.forEach(attr => {
            const isChecked = selectedAttributes.includes(attr);
            
            const label = document.createElement('label');
            label.style.cssText = 'display: flex; align-items: center; gap: 5px; cursor: pointer;';
            
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.name = 'attributes';
            checkbox.value = attr;
            checkbox.checked = isChecked;
            checkbox.style.display = 'none';
            checkbox.id = `attr_${attr}`;
            
            const span = document.createElement('span');
            span.className = `value-tag attr-${getAttrClass(attr)}`;
            span.textContent = attr;
            span.style.cssText = isChecked ? 
                'opacity: 1; box-shadow: 0 0 10px currentColor; border-width: 2px;' : 
                'opacity: 0.5; box-shadow: none; border-width: 1px;';
            
            // 娣诲姞鐐瑰嚮浜嬩欢
            span.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                
                const checkbox = this.parentElement.querySelector('input[type="checkbox"]');
                checkbox.checked = !checkbox.checked;
                
                if (checkbox.checked) {
                    this.style.opacity = '1';
                    this.style.boxShadow = '0 0 10px currentColor';
                    this.style.borderWidth = '2px';
                } else {
                    this.style.opacity = '0.5';
                    this.style.boxShadow = 'none';
                    this.style.borderWidth = '1px';
                }
            });
            
            // 娣诲姞鎮仠鏁堟灉
            span.addEventListener('mouseenter', function() {
                if (!this.parentElement.querySelector('input[type="checkbox"]').checked) {
                    this.style.opacity = '0.8';
                }
            });
            
            span.addEventListener('mouseleave', function() {
                if (!this.parentElement.querySelector('input[type="checkbox"]').checked) {
                    this.style.opacity = '0.5';
                }
            });
            
            label.appendChild(checkbox);
            label.appendChild(span);
            container.appendChild(label);
        });
    }
    
    // 鑾峰彇灞炴€х被鍚?
    function getAttrClass(attr) {
        const classMap = {
            '鐏?: 'fire',
            '鍐?: 'ice',
            '闆?: 'thunder',
            '宀?: 'rock',
            '椋?: 'wind',
            '鍏?: 'light',
            '鐢熷懡': 'life',
            '閲嶅姏': 'gravity',
            '铻嶅悎': 'fusion',
            '鐗╃悊': 'physics'
        };
        return classMap[attr] || 'physics';
    }

    async function saveMemberDetailChanges(username) {
        if (!username) {

            const checkboxes = document.querySelectorAll('#attributesContainer input[name="attributes"]:checked');
            const attributes = Array.from(checkboxes).map(cb => cb.value);

                other: document.getElementById('editOther').value

            console.log('鏀堕泦鐨勮〃鍗曟暟鎹?', formData);
            
            // 鑾峰彇閮ㄩ棬銆侀槦浼嶃€佽亴浣嶄俊鎭?
            const titleText = document.querySelector('.member-title').textContent;
            const parts = titleText.split(' - ');
            const department = parts[0];
            const team = parts[1] || '';
            
            const positionElement = document.querySelector('.position-badge');
            const position = positionElement ? positionElement.textContent : '鏈垎閰?;
            
            const memberDetail = {
                name: formData.name,
                username: formData.username,
                photo: formData.photo_url,
                height: formData.height,
                gender: formData.gender,
                age: formData.age,
                attributes: formData.attributes,
                meme: formData.meme,
                memeName: formData.meme_name,
                ability: formData.ability,
                weapon: formData.weapon,
                department: department,
                team: team,
                position: position,
                other: formData.other
            };
            
            console.log('瑕佷繚瀛樼殑鎴愬憳璇︽儏:', memberDetail);
            
            // 1. 淇濆瓨鍒版湰鍦扮紦瀛?
            const MEMBER_DETAILS_KEY = 'qs_member_details_cloud';
            const stored = localStorage.getItem(MEMBER_DETAILS_KEY);
            const details = stored ? JSON.parse(stored) : {};
            details[username] = memberDetail;
            localStorage.setItem(MEMBER_DETAILS_KEY, JSON.stringify(details));
            
            // 2. 灏濊瘯淇濆瓨鍒颁簯绔?
            let cloudSuccess = false;
            let cloudMessage = '';
            
            if (cloudEnabled && supabaseClient) {
                try {
                    console.log('寮€濮嬩繚瀛樺埌浜戠...');
                    const cloudResult = await saveMemberDetailToCloud(formData, department, team, position);
                    cloudSuccess = cloudResult.success;
                    cloudMessage = cloudResult.message;
                    console.log('浜戠淇濆瓨缁撴灉:', cloudResult);
                    
                    if (cloudSuccess) {
                        showCloudSaveToast('鏁版嵁宸叉垚鍔熶繚瀛樺埌浜戠锛?, true);
                    } else {
                        showCloudSaveToast('浜戠淇濆瓨澶辫触: ' + cloudMessage, false);
                    }
                } catch (cloudError) {
                    console.warn('浜戠淇濆瓨澶辫触锛屼絾鏈湴淇濆瓨鎴愬姛:', cloudError);
                    cloudMessage = '浜戠淇濆瓨澶辫触锛屼粎淇濆瓨鍒版湰鍦?;
                    showCloudSaveToast('浜戠淇濆瓨澶辫触锛屼粎淇濆瓨鍒版湰鍦?, false);
                }
            } else {

                showCloudSaveToast('鏁版嵁宸蹭繚瀛樺埌鏈湴锛堜簯绔湭鍚敤锛?, true);
            }

            document.getElementById('editModal').remove();
            
            // 4. 鏄剧ず淇濆瓨缁撴灉
            let successMsg = '璇︾粏淇℃伅宸蹭繚瀛樺埌鏈湴锛?;

            setTimeout(() => {

        if (syncInterval) {
            clearInterval(syncInterval);
        }
    });
</script>
