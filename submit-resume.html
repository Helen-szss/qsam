    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            min-height: 100vh;
            overflow: auto;
        }
        
        /* 鎺у埗鍙版牱寮?*/
        .desktop {
            min-height: 100vh;
            width: 100%;
            background: radial-gradient(circle at center, #0a2463, #000000);
            padding: 0;
            position: relative;
            overflow: visible;
        }
        
        /* 椤堕儴鐘舵€佹爮 */
        .status-bar {
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(10, 36, 99, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 150, 255, 0.3);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .system-info {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: nowrap;
        }
        
        /* 杩斿洖鎸夐挳鏍峰紡 */
        .back-btn {
            background: rgba(0, 150, 255, 0.2);
            border: 1px solid rgba(0, 150, 255, 0.5);
            color: #4fc3ff;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            white-space: nowrap;
            margin-right: 15px;
        }

        .back-btn:hover {
            background: rgba(0, 150, 255, 0.3);
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(0, 150, 255, 0.3);
        }

        .system-logo {
            width: 40px;
            height: 40px;
            filter: drop-shadow(0 0 10px rgba(0, 150, 255, 0.7));
        }
        
        .system-name {
            font-size: 1.5rem;
            background: linear-gradient(90deg, #4fc3ff, #a3d5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6b9ccc, #a3d5ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
        }
        
        .time-display {
            color: #a3d5ff;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }
        
        /* 涓昏鍐呭鍖哄煙 */
        .main-content {
            width: 100%;
            min-height: calc(100vh - 80px);
            padding: 40px 20px;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        
        .content-wrapper {
            max-width: 800px;
            width: 100%;
        }
        
        /* 绠€鍘嗚〃鍗曞崱鐗?*/
        .resume-card {
            background: rgba(10, 36, 99, 0.7);
            border: 2px solid rgba(0, 150, 255, 0.3);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 150, 255, 0.2);
            backdrop-filter: blur(10px);
        }
        
        .resume-header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 1px solid rgba(0, 150, 255, 0.3);
        }
        
        .resume-title {
            font-size: 2.2rem;
            background: linear-gradient(90deg, #4fc3ff, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(79, 195, 255, 0.3);
        }
        
        .resume-subtitle {
            font-size: 1.1rem;
            color: #a3d5ff;
            line-height: 1.6;
        }
        
        /* 琛ㄥ崟鏍峰紡 */
        .resume-form {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        
        .form-section {
            background: rgba(0, 30, 80, 0.5);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(0, 150, 255, 0.2);
        }
        
        .section-title {
            font-size: 1.4rem;
            color: #4fc3ff;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 150, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title i {
            font-size: 1.2rem;
        }
        
        /* 琛ㄥ崟琛屾牱寮?*/
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group.full-width {
            grid-column: 1 / -1;
        }
        
        .form-label {
            color: #a3d5ff;
            margin-bottom: 10px;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .required::after {
            content: " *";
            color: #ff6b6b;
            margin-left: 2px;
        }
        
        .form-control {
            padding: 12px 20px;
            background: rgba(0, 30, 80, 0.7);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 10px;
            color: #e0f7ff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            outline: none;
            border-color: rgba(79, 195, 255, 0.7);
            box-shadow: 0 0 15px rgba(79, 195, 255, 0.2);
        }
        
        select.form-control {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234fc3ff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 16px;
            padding-right: 45px;
        }
        
        textarea.form-control {
            resize: vertical;
            min-height: 100px;
        }
        
        /* 灞炴€ф爣绛炬牱寮?*/
        .attributes-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        
        .attribute-tag {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }
        
        /* 灞炴€ф爣绛鹃鑹?*/
        .attr-fire { background: rgba(255, 87, 34, 0.2); color: #ff5722; border: 1px solid rgba(255, 87, 34, 0.5); }
        .attr-ice { background: rgba(3, 169, 244, 0.2); color: #03a9f4; border: 1px solid rgba(3, 169, 244, 0.5); }
        .attr-thunder { background: rgba(255, 193, 7, 0.2); color: #ffc107; border: 1px solid rgba(255, 193, 7, 0.5); }
        .attr-rock { background: rgba(121, 85, 72, 0.2); color: #795548; border: 1px solid rgba(121, 85, 72, 0.5); }
        .attr-wind { background: rgba(76, 175, 80, 0.2); color: #4caf50; border: 1px solid rgba(76, 175, 80, 0.5); }
        .attr-light { background: rgba(255, 235, 59, 0.2); color: #ffeb3b; border: 1px solid rgba(255, 235, 59, 0.5); }
        .attr-life { background: rgba(233, 30, 99, 0.2); color: #e91e63; border: 1px solid rgba(233, 30, 99, 0.5); }
        .attr-gravity { background: rgba(156, 39, 176, 0.2); color: #9c27b0; border: 1px solid rgba(156, 39, 176, 0.5); }
        .attr-fusion { background: rgba(255, 152, 0, 0.2); color: #ff9800; border: 1px solid rgba(255, 152, 0, 0.5); }
        .attr-physics { background: rgba(158, 158, 158, 0.2); color: #9e9e9e; border: 1px solid rgba(158, 158, 158, 0.5); }
        .attr-none { background: rgba(158, 158, 158, 0.1); color: #9e9e9e; border: 1px solid rgba(158, 158, 158, 0.3); }
        
        .attribute-tag.selected {
            opacity: 1;
            box-shadow: 0 0 15px currentColor;
            border-width: 2px;
            transform: scale(1.05);
        }
        
        .attribute-tag:not(.selected) {
            opacity: 0.6;
        }
        
        .attribute-tag:not(.selected):hover {
            opacity: 0.8;
            transform: translateY(-2px);
        }
        
        /* 閮ㄩ棬閫夋嫨鏍峰紡 */
        .department-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }
        
        .department-option {
            padding: 15px;
            background: rgba(0, 30, 80, 0.5);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        
        .department-option:hover {
            background: rgba(0, 60, 120, 0.7);
            border-color: rgba(79, 195, 255, 0.5);
        }
        
        .department-option.selected {
            background: rgba(0, 100, 200, 0.7);
            border-color: rgba(79, 195, 255, 0.8);
            box-shadow: 0 0 20px rgba(79, 195, 255, 0.3);
        }
        
        .department-icon {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #4fc3ff;
        }
        
        .department-name {
            font-size: 1.2rem;
            color: #e0f7ff;
            margin-bottom: 5px;
        }
        
        .department-desc {
            font-size: 0.9rem;
            color: #a3d5ff;
        }
        
        /* 琛ㄥ崟鎿嶄綔鎸夐挳 */
        .form-actions {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid rgba(0, 150, 255, 0.3);
        }
        
        .btn-submit, .btn-reset {
            padding: 15px 40px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 2px;
            min-width: 180px;
            justify-content: center;
        }
        
        .btn-submit {
            background: linear-gradient(135deg, #00a86b, #00cc88);
            color: white;
        }
        
        .btn-submit:hover:not(:disabled) {
            background: linear-gradient(135deg, #00cc88, #00e6a0);
            transform: translateY(-3px);
            box-shadow: 0 0 25px rgba(0, 204, 136, 0.5);
        }
        
        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-reset {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.5);
        }
        
        .btn-reset:hover {
            background: rgba(255, 107, 107, 0.3);
            transform: translateY(-3px);
        }
        
        /* 鍔犺浇鐘舵€?*/
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(10px);
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(79, 195, 255, 0.3);
            border-top: 5px solid #4fc3ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #e0f7ff;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }
        
        /* 鎴愬姛鎻愮ず */
        .success-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(10, 36, 99, 0.95);
            color: #6bffb8;
            padding: 20px 30px;
            border-radius: 15px;
            border: 1px solid rgba(107, 255, 184, 0.5);
            z-index: 10000;
            display: flex;
            align-items: center;
            gap: 15px;
            backdrop-filter: blur(10px);
            animation: slideInRight 0.5s ease;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        
        .success-icon {
            font-size: 2.5rem;
        }
        
        .success-content {
            flex: 1;
        }
        
        .success-title {
            font-size: 1.4rem;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .success-message {
            font-size: 1rem;
            color: #a3d5ff;
            line-height: 1.5;
        }
        
        /* 閿欒鎻愮ず */
        .error-message {
            color: #ff6b6b;
            font-size: 0.9rem;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        /* 浜戠鐘舵€?*/
        .cloud-status {
            text-align: center;
            margin-top: 20px;
            color: #6b9ccc;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .cloud-status.connected {
            color: #6bffb8;
        }
        
        /* 鍔ㄧ敾 */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        /* 鍝嶅簲寮忚璁?*/
        @media (max-width: 768px) {
            .status-bar {
                padding: 15px 20px;
                flex-wrap: wrap;
                gap: 15px;
            }
            
            .main-content {
                padding: 20px 15px;
            }
            
            .resume-card {
                padding: 25px;
            }
            
            .resume-title {
                font-size: 1.8rem;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .form-actions {
                flex-direction: column;
                gap: 15px;
            }
            
            .btn-submit, .btn-reset {
                width: 100%;
                min-width: auto;
            }
            
            /* 鍝嶅簲寮忎笅鐨勮繑鍥炴寜閽?*/
            .back-btn span {
                display: none;
            }
            
            .back-btn i {
                margin-right: 0;
                font-size: 0.9rem;
            }
            
            .department-options {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 480px) {
            .resume-card {
                padding: 20px;
            }
            
            .form-section {
                padding: 20px;
            }
            
            .success-toast {
                top: 10px;
                right: 10px;
                left: 10px;
                max-width: none;
            }
        }
    </style>
</head>

    // 鏄剧ず浜戠鐘舵€?

    // 鏇存柊鏃堕棿鏄剧ず
    function updateTime() {
        const now = new Date();
        const hours = now.getHours().toString().padStart(2, '0');
        const minutes = now.getMinutes().toString().padStart(2, '0');
        const seconds = now.getSeconds().toString().padStart(2, '0');
        document.getElementById('currentTime').textContent = `${hours}:${minutes}:${seconds}`;
    }

    function initAttributes() {
        const container = document.getElementById('attributesContainer');
        if (!container) return;
        
        container.innerHTML = '';
        
        attributesData.forEach(attr => {
            const tag = document.createElement('div');
            tag.className = `attribute-tag ${attr.class}`;
            tag.id = `attr-${attr.id}`;
            tag.textContent = attr.name;
            tag.dataset.attrId = attr.id;
            tag.dataset.attrName = attr.name;
            
            tag.addEventListener('click', () => toggleAttribute(attr.id));
            
            container.appendChild(tag);
        });
    }
    
    // 鍒囨崲灞炴€ч€夋嫨
    function toggleAttribute(attrId) {
        const memeValue = document.getElementById('meme').value;
        
        // 濡傛灉妯″洜涓?鏃?锛屽垯鍙兘閫夋嫨"鏃?灞炴€?
        if (memeValue === '鏃?) {
            // 娓呴櫎鎵€鏈夐€夋嫨
            selectedAttributes = [];
            document.querySelectorAll('.attribute-tag').forEach(tag => {
                tag.classList.remove('selected');
            });
            
            // 閫夋嫨"鏃?灞炴€?
            const noneAttr = document.getElementById('attr-none');
            if (noneAttr) {
                noneAttr.classList.add('selected');
                selectedAttributes = ['鏃?];
            }
            
            updateDepartmentOptions();
            return;
        }
        
        const attrElement = document.getElementById(`attr-${attrId}`);
        
        // 濡傛灉宸茬粡鏄€変腑鐘舵€侊紝鍒欏彇娑堥€変腑
        if (attrElement.classList.contains('selected')) {
            attrElement.classList.remove('selected');
            selectedAttributes = selectedAttributes.filter(id => id !== attrId);
        } 
        // 鍚﹀垯閫変腑瀹?
        else {
            // 濡傛灉鏄?鏃?灞炴€э紝鍏堟竻闄ゅ叾浠栭€夋嫨
            if (attrId === 'none') {
                selectedAttributes = [];
                document.querySelectorAll('.attribute-tag').forEach(tag => {
                    tag.classList.remove('selected');
                });
            } else {
                // 娓呴櫎"鏃?灞炴€х殑閫夋嫨
                const noneAttr = document.getElementById('attr-none');
                if (noneAttr) noneAttr.classList.remove('selected');
                selectedAttributes = selectedAttributes.filter(id => id !== 'none');
            }
            
            attrElement.classList.add('selected');
            selectedAttributes.push(attrId);
        }
    }

            const deptOption = document.getElementById(`dept-${deptId}`);

            if (!allowedWithoutMeme) {

                } else {
                    option.style.opacity = '1';

                    option.style.pointerEvents = 'auto';

                option.style.opacity = '1';

                option.style.pointerEvents = 'auto';

        // 妫€鏌ュ綋鍓嶉€変腑鐨勯儴闂ㄦ槸鍚︿粛鐒舵湁鏁?

    // 楠岃瘉鍗曚釜瀛楁
    function validateField(field) {
        const fieldId = field.id;
        const value = field.value.trim();
        
        // 娓呴櫎涔嬪墠鐨勯敊璇?
        clearError(`${fieldId}Error`);
        
        // 鏍规嵁瀛楁ID杩涜楠岃瘉
        switch(fieldId) {
            case 'fullName':
                if (!value) {
                    showError('nameError', '璇疯緭鍏ュ鍚?);
                    return false;
                }
                if (value.length < 2 || value.length > 20) {
                    showError('nameError', '濮撳悕闀垮害搴斿湪2-20涓瓧绗︿箣闂?);
                    return false;
                }
                break;
                
            case 'age':
                if (!value) {
                    showError('ageError', '璇疯緭鍏ュ勾榫?);
                    return false;
                }
                const ageNum = parseInt(value);
                if (isNaN(ageNum) || ageNum < 16 || ageNum > 100) {
                    showError('ageError', '骞撮緞搴斿湪16-100宀佷箣闂?);
                    return false;
                }
                break;
                
            case 'gender':
                if (!value) {
                    showError('genderError', '璇烽€夋嫨鎬у埆');
                    return false;
                }
                break;
                
            case 'location':
                if (!value) {
                    showError('locationError', '璇疯緭鍏ュ眳浣忓湴');
                    return false;
                }
                break;
                
            case 'contact':
                // 鑱旂郴鏂瑰紡涓嶈兘涓虹┖锛堝彧鍋氶潪绌轰笌鏈€灏忛暱搴︽鏌ワ紝涓嶅己鍒堕偖绠?鎵嬫満鍙锋牸寮忥級
                if (!value) {
                    showError('contactError', '璇疯緭鍏ヨ仈绯绘柟寮?);
                    return false;
                }
                if (value.length < 3) {
                    showError('contactError', '鑱旂郴鏂瑰紡澶煭');
                    return false;
                }
                break;
                
            case 'meme':
                if (!value) {
                    showError('memeError', '璇烽€夋嫨妯″洜');
                    return false;
                }
                break;
                
            case 'ability':
                // 鑳藉姏鎻忚堪鍙€夛紝鏃犻渶楠岃瘉
                break;
        }
        
        return true;
    }
    
    // 楠岃瘉鏁翠釜琛ㄥ崟
    function validateForm() {
        let isValid = true;
        
        // 楠岃瘉鎵€鏈夊瓧娈?
        const fields = [
            'fullName', 'age', 'gender', 'location', 'contact', 'meme'
        ];
        
        fields.forEach(fieldId => {
            const field = document.getElementById(fieldId);
            if (!validateField(field)) {
                isValid = false;
            }
        });
        
        // 楠岃瘉灞炴€ч€夋嫨
        if (selectedAttributes.length === 0) {
            showError('attributesError', '璇疯嚦灏戦€夋嫨涓€涓睘鎬?);
            isValid = false;
        } else {
            clearError('attributesError');
        }
        
        // 楠岃瘉閮ㄩ棬閫夋嫨
        const selectedDept = document.querySelector('.department-option.selected');
        if (!selectedDept) {
            showError('departmentError', '璇烽€夋嫨鐢宠閮ㄩ棬');
            isValid = false;
        } else {
            // 濡傛灉鏄棤妯″洜鑰咃紝妫€鏌ラ儴闂ㄦ槸鍚﹀厑璁?
            const memeValue = document.getElementById('meme').value;
            if (memeValue === '鏃?) {
                const allowedWithoutMeme = selectedDept.dataset.allowedWithoutMeme === 'true';
                if (!allowedWithoutMeme) {
                    showError('departmentError', '鏃犳ā鍥犺€呭彧鑳界敵璇风爺绌跺鎴栧悗鍕ら儴');
                    isValid = false;
                }
            }
        }
        
        return isValid;
    }
    
    // 鏄剧ず閿欒淇℃伅
    function showError(errorId, message) {
        const errorEl = document.getElementById(errorId);
        if (errorEl) {
            errorEl.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${message}`;
            errorEl.style.display = 'block';
        }
    }
    
    // 娓呴櫎閿欒淇℃伅
    function clearError(errorId) {
        const errorEl = document.getElementById(errorId);
        if (errorEl) {
            errorEl.innerHTML = '';
            errorEl.style.display = 'none';
        }
    }
    
    // ================================================
    // 4. 琛ㄥ崟鎻愪氦鍑芥暟
    // ================================================
    
    // 鎻愪氦绠€鍘?
    async function submitResume() {
        console.log('寮€濮嬫彁浜ょ畝鍘?..');
        
        // 楠岃瘉琛ㄥ崟
        if (!validateForm()) {
            console.log('琛ㄥ崟楠岃瘉澶辫触');
            return;
        }
        
        // 鏄剧ず鍔犺浇鐘舵€?
        showLoading(true, '姝ｅ湪鎻愪氦鐢宠...');
        
        // 鏀堕泦琛ㄥ崟鏁版嵁
        const formData = collectFormData();
        console.log('鏀堕泦鐨勮〃鍗曟暟鎹?', formData);
        
        try {
            // 淇濆瓨鍒颁簯绔?
            const saveResult = await saveResumeToCloud(formData);
            
            if (saveResult.success) {
                // 鎻愪氦鎴愬姛
                console.log('绠€鍘嗘彁浜ゆ垚鍔?);
                
                // 闅愯棌鍔犺浇鐘舵€?
                showLoading(false);
                
                // 鏄剧ず鎴愬姛鎻愮ず
                showSuccessToast();
                
                // 5绉掑悗閲嶇疆琛ㄥ崟
                setTimeout(() => {
                    resetForm();
                }, 5000);
                
            } else {
                // 浜戠淇濆瓨澶辫触锛屽皾璇曟湰鍦颁繚瀛?
                console.warn('浜戠淇濆瓨澶辫触锛屽皾璇曟湰鍦颁繚瀛?', saveResult.message);
                
                const localResult = saveResumeToLocal(formData);
                
                if (localResult.success) {
                    // 鏈湴淇濆瓨鎴愬姛
                    showLoading(false);
                    showSuccessToast();
                    
                    setTimeout(() => {
                        resetForm();
                    }, 5000);
                } else {
                    // 鏈湴涔熶繚瀛樺け璐?
                    throw new Error('绠€鍘嗕繚瀛樺け璐? ' + localResult.message);
                }
            }
            
        } catch (error) {
            console.error('鎻愪氦绠€鍘嗗け璐?', error);
            
            // 闅愯棌鍔犺浇鐘舵€?
            showLoading(false);
            
            // 鏄剧ず閿欒鎻愮ず
            alert(`鎻愪氦澶辫触: ${error.message}\n璇风◢鍚庨噸璇曟垨鑱旂郴绠＄悊鍛樸€俙);
        }
    }
    
    // 鏀堕泦琛ㄥ崟鏁版嵁
    function collectFormData() {
        // 鑾峰彇閫変腑鐨勯儴闂?
        const selectedDept = document.querySelector('.department-option.selected');
        
        // 鑾峰彇灞炴€у悕绉帮紙鑰屼笉鏄疘D锛?
        const attributeNames = selectedAttributes.map(attrId => {
            const attr = attributesData.find(a => a.id === attrId);
            return attr ? attr.name : attrId;
        });
        
        // 鏋勫缓鏁版嵁瀵硅薄
        const data = {
            fullName: document.getElementById('fullName').value.trim(),
            age: parseInt(document.getElementById('age').value),
            gender: document.getElementById('gender').value,
            location: document.getElementById('location').value.trim(),
            contact: document.getElementById('contact').value.trim(),
            meme: document.getElementById('meme').value,
            attributes: attributeNames,
            ability: document.getElementById('ability').value.trim() || '鏃?,
            other: document.getElementById('other') ? document.getElementById('other').value.trim() : '',
            department: selectedDept ? selectedDept.dataset.deptName : '',
            submission_date: new Date().toISOString(),
            status: 'pending', // 寰呭鏍哥姸鎬?
            applicant_type: 'guest' // 鐢宠鑰呯被鍨嬶細娓稿
        };
        
        return data;
    }
    
    // 淇濆瓨绠€鍘嗗埌浜戠
    async function saveResumeToCloud(formData) {
        if (!supabaseClient) {
            return { 
                success: false, 
                message: '浜戠杩炴帴鏈厤缃? 
            };
        }
        
        try {
            console.log('寮€濮嬩繚瀛樺埌浜戠...');

            // 灏嗚〃鍗曞瓧娈垫槧灏勪负鏁版嵁搴撳垪锛坰nake_case锛?
            const dbPayload = mapFormDataToDb(formData);

            // 鍑嗗鏈€缁堟彃鍏ョ殑鏁版嵁
            const resumeData = {
                ...dbPayload,
                created_at: new Date().toISOString(),
                updated_at: new Date().toISOString()
            };
            
            // 鎻掑叆鏁版嵁鍒癝upabase
            const { data, error } = await supabaseClient
                .from('resume_applications')
                .insert([resumeData])
                .select();
            
            if (error) {
                console.error('Supabase淇濆瓨閿欒:', error);
                
                // 濡傛灉鏄〃涓嶅瓨鍦紝缁欏嚭鎻愮ず
                if (error.message.includes('does not exist') || error.code === '42P01') {
                    console.log('resume_applications琛ㄥ彲鑳戒笉瀛樺湪');
                    return { 
                        success: false, 
                        message: '璇峰厛鍦⊿upabase涓垱寤簉esume_applications琛? 
                    };
                }
                
                throw error;
            }
            
            console.log('浜戠淇濆瓨鎴愬姛锛岃繑鍥炴暟鎹?', data);
            
            return { 
                success: true, 
                message: '浜戠淇濆瓨鎴愬姛', 
                data: data ? data[0] : null 
            };
            
        } catch (error) {
            console.error('淇濆瓨鍒颁簯绔け璐?', error);
            return { 
                success: false, 
                message: '浜戠淇濆瓨澶辫触: ' + error.message,
                error: error 
            };
        }
    }

    // 灏嗗墠绔〃鍗曟暟鎹槧灏勪负鏁版嵁搴撳垪鍚嶏紙snake_case锛?
    function mapFormDataToDb(formData) {
        return {
            full_name: formData.fullName || '',
            age: formData.age || null,
            gender: formData.gender || '',
            location: formData.location || '',
            contact: formData.contact || '',
            meme: formData.meme || '',
            attributes: formData.attributes || [],
            ability: formData.ability || '鏃?,
            other: formData.other || '',
            department: formData.department || '',
            submission_date: formData.submission_date || new Date().toISOString(),
            status: formData.status || 'pending',
            applicant_type: formData.applicant_type || 'guest'
        };
    }
    
    // 淇濆瓨绠€鍘嗗埌鏈湴
    function saveResumeToLocal(formData) {
        try {
            console.log('寮€濮嬩繚瀛樺埌鏈湴...');
            
            // 鑾峰彇鐜版湁鐨勬湰鍦扮畝鍘嗘暟鎹?
            const LOCAL_RESUMES_KEY = 'qs_resume_applications_local';
            const stored = localStorage.getItem(LOCAL_RESUMES_KEY);
            const resumes = stored ? JSON.parse(stored) : [];
            
            // 娣诲姞鏂扮畝鍘?
            const newResume = {
                ...formData,
                id: Date.now(), // 浣跨敤鏃堕棿鎴充綔涓篒D
                localSave: true, // 鏍囪涓烘湰鍦颁繚瀛?
                savedAt: new Date().toISOString()
            };
            
            resumes.push(newResume);
            
            // 淇濆瓨鍥炴湰鍦板瓨鍌?
            localStorage.setItem(LOCAL_RESUMES_KEY, JSON.stringify(resumes));
            
            console.log('鏈湴淇濆瓨鎴愬姛锛屽凡淇濆瓨绠€鍘嗘暟閲?', resumes.length);
            
            return { 
                success: true, 
                message: '鏈湴淇濆瓨鎴愬姛', 
                data: newResume 
            };
            
        } catch (error) {
            console.error('淇濆瓨鍒版湰鍦板け璐?', error);
            return { 
                success: false, 
                message: '鏈湴淇濆瓨澶辫触: ' + error.message,
                error: error 
            };
        }
    }
    
    // ================================================
    // 5. 杈呭姪鍑芥暟
    // ================================================
    
    // 鏄剧ず/闅愯棌鍔犺浇鐘舵€?
    function showLoading(show, message = '姝ｅ湪鎻愪氦鐢宠...') {
        const overlay = document.getElementById('loadingOverlay');
        const text = document.getElementById('loadingText');
        
        if (overlay && text) {
            if (show) {
                text.textContent = message;
                overlay.style.display = 'flex';
            } else {
                overlay.style.display = 'none';
            }
        }
    }
    
    // 鏄剧ず鎴愬姛鎻愮ず
    function showSuccessToast() {
        const toast = document.getElementById('successToast');
        if (toast) {
            toast.style.display = 'flex';
            
            // 10绉掑悗鑷姩闅愯棌
            setTimeout(() => {
                toast.style.display = 'none';
            }, 10000);
        }
    }
    
    // 閲嶇疆琛ㄥ崟
    function resetForm() {
        // 閲嶇疆琛ㄥ崟瀛楁
        document.getElementById('resumeForm').reset();
        
        // 閲嶇疆灞炴€ч€夋嫨
        selectedAttributes = [];
        document.querySelectorAll('.attribute-tag').forEach(tag => {
            tag.classList.remove('selected');
        });
        
        // 榛樿閫夋嫨鐗╃悊灞炴€?
        toggleAttribute('physics');
        
        // 閲嶇疆閮ㄩ棬閫夋嫨
        document.querySelectorAll('.department-option').forEach(option => {
            option.classList.remove('selected');
        });
        
        // 榛樿閫夋嫨鐮旂┒澶?
        selectDepartment('research');
        
        // 鍚敤鑳藉姏鎻忚堪瀛楁
        document.getElementById('ability').disabled = false;
        document.getElementById('ability').placeholder = "璇锋弿杩版偍鐨勬ā鍥犺兘鍔?;
        
        // 閲嶇疆鏍囩鏂囧瓧
        document.getElementById('attributesLabel').innerHTML = `
            <i class="fas fa-bolt"></i> 灞炴€э紙鍙閫夛級
        `;
        
        document.getElementById('abilityLabel').innerHTML = `
            <i class="fas fa-fire"></i> 妯″洜鑳藉姏鎻忚堪
        `;
        
        // 娓呴櫎鎵€鏈夐敊璇俊鎭?
        clearError('nameError');
        clearError('ageError');
        clearError('genderError');
        clearError('locationError');
        clearError('contactError');
        clearError('memeError');
        clearError('attributesError');
        clearError('abilityError');
        clearError('otherError');
        clearError('departmentError');
        
        // 闅愯棌鎴愬姛鎻愮ず
        document.getElementById('successToast').style.display = 'none';
        
        console.log('琛ㄥ崟宸查噸缃?);
    }
    
    // 杩斿洖鍒版父瀹㈢晫闈紙鐩存帴璺宠浆锛?
    function goBack() {
        window.location.href = 'guest.html';
    }
</script>
