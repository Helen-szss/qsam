<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投递简历 - 管理局资料库</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 添加 Supabase 客户端库 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            min-height: 100vh;
            overflow: auto;
        }
        
        /* 控制台样式 */
        .desktop {
            min-height: 100vh;
            width: 100%;
            background: radial-gradient(circle at center, #0a2463, #000000);
            padding: 0;
            position: relative;
            overflow: visible;
        }
        
        /* 顶部状态栏 */
        .status-bar {
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(10, 36, 99, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 150, 255, 0.3);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .system-info {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: nowrap;
        }
        
        /* 返回按钮样式 */
        .back-btn {
            background: rgba(0, 150, 255, 0.2);
            border: 1px solid rgba(0, 150, 255, 0.5);
            color: #4fc3ff;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            white-space: nowrap;
            margin-right: 15px;
        }

        .back-btn:hover {
            background: rgba(0, 150, 255, 0.3);
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(0, 150, 255, 0.3);
        }

        .system-logo {
            width: 40px;
            height: 40px;
            filter: drop-shadow(0 0 10px rgba(0, 150, 255, 0.7));
        }
        
        .system-name {
            font-size: 1.5rem;
            background: linear-gradient(90deg, #4fc3ff, #a3d5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6b9ccc, #a3d5ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
        }
        
        .time-display {
            color: #a3d5ff;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }
        
        /* 主要内容区域 */
        .main-content {
            width: 100%;
            min-height: calc(100vh - 80px);
            padding: 40px 20px;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        
        .content-wrapper {
            max-width: 800px;
            width: 100%;
        }
        
        /* 简历表单卡片 */
        .resume-card {
            background: rgba(10, 36, 99, 0.7);
            border: 2px solid rgba(0, 150, 255, 0.3);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 150, 255, 0.2);
            backdrop-filter: blur(10px);
        }
        
        .resume-header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 1px solid rgba(0, 150, 255, 0.3);
        }
        
        .resume-title {
            font-size: 2.2rem;
            background: linear-gradient(90deg, #4fc3ff, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(79, 195, 255, 0.3);
        }
        
        .resume-subtitle {
            font-size: 1.1rem;
            color: #a3d5ff;
            line-height: 1.6;
        }
        
        /* 表单样式 */
        .resume-form {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        
        .form-section {
            background: rgba(0, 30, 80, 0.5);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(0, 150, 255, 0.2);
        }
        
        .section-title {
            font-size: 1.4rem;
            color: #4fc3ff;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 150, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title i {
            font-size: 1.2rem;
        }
        
        /* 表单行样式 */
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group.full-width {
            grid-column: 1 / -1;
        }
        
        .form-label {
            color: #a3d5ff;
            margin-bottom: 10px;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .required::after {
            content: " *";
            color: #ff6b6b;
            margin-left: 2px;
        }
        
        .form-control {
            padding: 12px 20px;
            background: rgba(0, 30, 80, 0.7);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 10px;
            color: #e0f7ff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            outline: none;
            border-color: rgba(79, 195, 255, 0.7);
            box-shadow: 0 0 15px rgba(79, 195, 255, 0.2);
        }
        
        select.form-control {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234fc3ff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 16px;
            padding-right: 45px;
        }
        
        textarea.form-control {
            resize: vertical;
            min-height: 100px;
        }
        
        /* 属性标签样式 */
        .attributes-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        
        .attribute-tag {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }
        
        /* 属性标签颜色 */
        .attr-fire { background: rgba(255, 87, 34, 0.2); color: #ff5722; border: 1px solid rgba(255, 87, 34, 0.5); }
        .attr-ice { background: rgba(3, 169, 244, 0.2); color: #03a9f4; border: 1px solid rgba(3, 169, 244, 0.5); }
        .attr-thunder { background: rgba(255, 193, 7, 0.2); color: #ffc107; border: 1px solid rgba(255, 193, 7, 0.5); }
        .attr-rock { background: rgba(121, 85, 72, 0.2); color: #795548; border: 1px solid rgba(121, 85, 72, 0.5); }
        .attr-wind { background: rgba(76, 175, 80, 0.2); color: #4caf50; border: 1px solid rgba(76, 175, 80, 0.5); }
        .attr-light { background: rgba(255, 235, 59, 0.2); color: #ffeb3b; border: 1px solid rgba(255, 235, 59, 0.5); }
        .attr-life { background: rgba(233, 30, 99, 0.2); color: #e91e63; border: 1px solid rgba(233, 30, 99, 0.5); }
        .attr-gravity { background: rgba(156, 39, 176, 0.2); color: #9c27b0; border: 1px solid rgba(156, 39, 176, 0.5); }
        .attr-fusion { background: rgba(255, 152, 0, 0.2); color: #ff9800; border: 1px solid rgba(255, 152, 0, 0.5); }
        .attr-physics { background: rgba(158, 158, 158, 0.2); color: #9e9e9e; border: 1px solid rgba(158, 158, 158, 0.5); }
        .attr-none { background: rgba(158, 158, 158, 0.1); color: #9e9e9e; border: 1px solid rgba(158, 158, 158, 0.3); }
        
        .attribute-tag.selected {
            opacity: 1;
            box-shadow: 0 0 15px currentColor;
            border-width: 2px;
            transform: scale(1.05);
        }
        
        .attribute-tag:not(.selected) {
            opacity: 0.6;
        }
        
        .attribute-tag:not(.selected):hover {
            opacity: 0.8;
            transform: translateY(-2px);
        }
        
        /* 部门选择样式 */
        .department-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }
        
        .department-option {
            padding: 15px;
            background: rgba(0, 30, 80, 0.5);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        
        .department-option:hover {
            background: rgba(0, 60, 120, 0.7);
            border-color: rgba(79, 195, 255, 0.5);
        }
        
        .department-option.selected {
            background: rgba(0, 100, 200, 0.7);
            border-color: rgba(79, 195, 255, 0.8);
            box-shadow: 0 0 20px rgba(79, 195, 255, 0.3);
        }
        
        .department-icon {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #4fc3ff;
        }
        
        .department-name {
            font-size: 1.2rem;
            color: #e0f7ff;
            margin-bottom: 5px;
        }
        
        .department-desc {
            font-size: 0.9rem;
            color: #a3d5ff;
        }
        
        /* 表单操作按钮 */
        .form-actions {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid rgba(0, 150, 255, 0.3);
        }
        
        .btn-submit, .btn-reset {
            padding: 15px 40px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 2px;
            min-width: 180px;
            justify-content: center;
        }
        
        .btn-submit {
            background: linear-gradient(135deg, #00a86b, #00cc88);
            color: white;
        }
        
        .btn-submit:hover:not(:disabled) {
            background: linear-gradient(135deg, #00cc88, #00e6a0);
            transform: translateY(-3px);
            box-shadow: 0 0 25px rgba(0, 204, 136, 0.5);
        }
        
        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-reset {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.5);
        }
        
        .btn-reset:hover {
            background: rgba(255, 107, 107, 0.3);
            transform: translateY(-3px);
        }
        
        /* 加载状态 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(10px);
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(79, 195, 255, 0.3);
            border-top: 5px solid #4fc3ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #e0f7ff;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }
        
        /* 成功提示 */
        .success-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(10, 36, 99, 0.95);
            color: #6bffb8;
            padding: 20px 30px;
            border-radius: 15px;
            border: 1px solid rgba(107, 255, 184, 0.5);
            z-index: 10000;
            display: flex;
            align-items: center;
            gap: 15px;
            backdrop-filter: blur(10px);
            animation: slideInRight 0.5s ease;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        
        .success-icon {
            font-size: 2.5rem;
        }
        
        .success-content {
            flex: 1;
        }
        
        .success-title {
            font-size: 1.4rem;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .success-message {
            font-size: 1rem;
            color: #a3d5ff;
            line-height: 1.5;
        }
        
        /* 错误提示 */
        .error-message {
            color: #ff6b6b;
            font-size: 0.9rem;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        /* 云端状态 */
        .cloud-status {
            text-align: center;
            margin-top: 20px;
            color: #6b9ccc;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .cloud-status.connected {
            color: #6bffb8;
        }
        
        /* 动画 */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .status-bar {
                padding: 15px 20px;
                flex-wrap: wrap;
                gap: 15px;
            }
            
            .main-content {
                padding: 20px 15px;
            }
            
            .resume-card {
                padding: 25px;
            }
            
            .resume-title {
                font-size: 1.8rem;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .form-actions {
                flex-direction: column;
                gap: 15px;
            }
            
            .btn-submit, .btn-reset {
                width: 100%;
                min-width: auto;
            }
            
            /* 响应式下的返回按钮 */
            .back-btn span {
                display: none;
            }
            
            .back-btn i {
                margin-right: 0;
                font-size: 0.9rem;
            }
            
            .department-options {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 480px) {
            .resume-card {
                padding: 20px;
            }
            
            .form-section {
                padding: 20px;
            }
            
            .success-toast {
                top: 10px;
                right: 10px;
                left: 10px;
                max-width: none;
            }
        }
    </style>
</head>
<body>
    <!-- 控制台界面 -->
    <div class="desktop">
        <!-- 顶部状态栏 -->
        <div class="status-bar">
            <div class="system-info">
                <!-- 返回按钮 -->
                <button class="back-btn" onclick="goBack()" title="返回游客主页">
                    <i class="fas fa-chevron-left"></i>
                    <span>返回</span>
                </button>
                
                <img src="qsamlogo.png" alt="系统标志" class="system-logo">
                <div class="system-name">投递简历 - 游客访问</div>
            </div>
            
            <div class="user-info">
                <div class="time-display" id="currentTime">00:00:00</div>
                <div class="user-avatar">
                    <i class="fas fa-user-clock"></i>
                </div>
                <div>
                    <div style="color: #a3d5ff;">访客</div>
                    <div style="font-size: 0.8rem; color: #6b9ccc;">游客访问权限</div>
                </div>
            </div>
        </div>
        
        <!-- 主要内容区域 -->
        <div class="main-content">
            <div class="content-wrapper">
                <!-- 简历表单 -->
                <div class="resume-card">
                    <div class="resume-header">
                        <h1 class="resume-title">管理局成员申请</h1>
                        <p class="resume-subtitle">
                            感谢您对管理局的关注！请填写以下信息申请加入。我们会在3-5个工作日内审核您的申请并给予回复。
                            <br><br>
                            <span style="color: #ffd93d;">
                                <i class="fas fa-exclamation-triangle"></i> 
                                请注意：如果您没有模因能力，请选择"无"模因，此时属性固定为"无"，且只能申请研究处或后勤部
                            </span>
                        </p>
                    </div>
                    
                    <form id="resumeForm" class="resume-form">
                        <!-- 基本信息 -->
                        <div class="form-section">
                            <h3 class="section-title">
                                <i class="fas fa-user"></i> 基本信息
                            </h3>
                            
                            <div class="form-row">
                                <div class="form-group">
                                    <label class="form-label required">
                                        <i class="fas fa-user-circle"></i> 姓名
                                    </label>
                                    <input type="text" id="fullName" class="form-control" placeholder="请输入您的真实姓名" required>
                                    <div class="error-message" id="nameError"></div>
                                </div>
                                
                                <div class="form-group">
                                    <label class="form-label required">
                                        <i class="fas fa-birthday-cake"></i> 年龄
                                    </label>
                                    <input type="number" id="age" class="form-control" placeholder="请输入您的年龄" min="16" max="100" required>
                                    <div class="error-message" id="ageError"></div>
                                </div>
                            </div>
                            
                            <div class="form-row">
                                <div class="form-group">
                                    <label class="form-label required">
                                        <i class="fas fa-venus-mars"></i> 性别
                                    </label>
                                    <select id="gender" class="form-control" required>
                                        <option value="">请选择性别</option>
                                        <option value="男">男</option>
                                        <option value="女">女</option>
                                        <option value="其他">其他</option>
                                    </select>
                                    <div class="error-message" id="genderError"></div>
                                </div>
                                
                                <div class="form-group">
                                    <label class="form-label required">
                                        <i class="fas fa-map-marker-alt"></i> 居住地
                                    </label>
                                    <input type="text" id="location" class="form-control" placeholder="请输入您的居住城市" required>
                                    <div class="error-message" id="locationError"></div>
                                </div>
                            </div>
                            
                            <div class="form-row">
                                <div class="form-group full-width">
                                    <label class="form-label required">
                                        <i class="fas fa-phone-alt"></i> 联系方式
                                    </label>
                                    <input type="text" id="contact" class="form-control" placeholder="请输入手机号码或电子邮箱" required>
                                    <div class="error-message" id="contactError"></div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 能力信息 -->
                        <div class="form-section">
                            <h3 class="section-title">
                                <i class="fas fa-magic"></i> 能力信息
                            </h3>
                            
                            <div class="form-row">
                                <div class="form-group">
                                    <label class="form-label required">
                                        <i class="fas fa-brain"></i> 模因
                                    </label>
                                    <select id="meme" class="form-control" required>
                                        <option value="">请选择模因</option>
                                        <option value="时骸">时骸</option>
                                        <option value="虚界">虚界</option>
                                        <option value="灵噬">灵噬</option>
                                        <option value="钢魂">钢魂</option>
                                        <option value="本源">本源</option>
                                        <option value="影狩">影狩</option>
                                        <option value="生链">生链</option>
                                        <option value="械灵">械灵</option>
                                        <option value="幻奏">幻奏</option>
                                        <option value="无">无</option>
                                    </select>
                                    <div class="error-message" id="memeError"></div>
                                </div>
                                
                                <div class="form-group">
                                    <label class="form-label required" id="attributesLabel">
                                        <i class="fas fa-bolt"></i> 属性
                                    </label>
                                    <div class="attributes-container" id="attributesContainer">
                                        <!-- 属性选项将通过JavaScript动态生成 -->
                                    </div>
                                    <div class="error-message" id="attributesError"></div>
                                </div>
                            </div>
                            
                            <div class="form-row">
                                <div class="form-group full-width">
                                    <label class="form-label" id="abilityLabel">
                                        <i class="fas fa-fire"></i> 模因能力描述
                                    </label>
                                    <textarea id="ability" class="form-control" placeholder="请描述您的模因能力（如无可留空）"></textarea>
                                    <div class="error-message" id="abilityError"></div>
                                </div>
                            </div>
                            
                            <div class="form-row">
                                <div class="form-group full-width">
                                    <label class="form-label">
                                        <i class="fas fa-ellipsis-h"></i> 其他（如有其他长处可填写）
                                    </label>
                                    <textarea id="other" class="form-control" placeholder="例如：团队协作、项目经验、语言能力等（可选）"></textarea>
                                    <div class="error-message" id="otherError"></div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 申请部门 -->
                        <div class="form-section">
                            <h3 class="section-title">
                                <i class="fas fa-briefcase"></i> 申请部门
                            </h3>
                            
                            <div class="department-options" id="departmentOptions">
                                <!-- 部门选项将通过JavaScript动态生成 -->

<script>
    // ================================================
    // 1. SUPABASE 配置和全局变量
    // ================================================
    const SUPABASE_URL = 'https://owfyycgomqclytnswobj.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_65fjjNxcUjAFpFJ3AEW9Tg_ctW41ZsV';
    
    let supabaseClient = null;
    let cloudEnabled = false;
    
    // 属性数据
    const attributesData = [
        { id: 'fire', name: '火', class: 'attr-fire' },
        { id: 'ice', name: '冰', class: 'attr-ice' },
        { id: 'thunder', name: '雷', class: 'attr-thunder' },
        { id: 'rock', name: '岩', class: 'attr-rock' },
        { id: 'wind', name: '风', class: 'attr-wind' },
        { id: 'light', name: '光', class: 'attr-light' },
        { id: 'life', name: '生命', class: 'attr-life' },
        { id: 'gravity', name: '重力', class: 'attr-gravity' },
        { id: 'fusion', name: '融合', class: 'attr-fusion' },
        { id: 'physics', name: '物理', class: 'attr-physics' },
        { id: 'none', name: '无', class: 'attr-none' }
    ];
    
    // 部门数据
    const departmentsData = [
        {

        },
        {

            icon: 'fas fa-truck',
            allowedWithoutMeme: true
        }
    ];
    
    // 当前选中的属性
    let selectedAttributes = [];
    
    // ================================================
    // 2. 页面加载时初始化
    // ================================================
    document.addEventListener('DOMContentLoaded', function() {
        console.log('简历页面加载完成，开始初始化...');
        
        // 检查登录状态
        const role = localStorage.getItem('auth_role');
        if (role !== 'guest') {
            // 如果不是游客，重定向到登录页
            window.location.href = 'index.html';
            return;
        }
        
        // 初始化Supabase
        initSupabase();
        
        // 更新时间显示
        updateTime();
        setInterval(updateTime, 1000);
        
        // 初始化表单
        initForm();
        
        // 添加表单事件监听
        setupEventListeners();
        
        // 添加ESC键返回支持
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                goBack();
            }
        });
    });
    
    // 初始化Supabase
    function initSupabase() {
        console.log('开始初始化Supabase...');
        
        try {
            // 检查Supabase库是否加载
            if (typeof window.supabase === 'undefined') {
                console.error('❌ Supabase JS库未加载！');
                showCloudStatus('Supabase库未加载，仅本地保存', false);
                return false;
            }
            
            // 检查配置
            if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
                console.warn('Supabase配置不完整');
                showCloudStatus('云端配置不完整，仅本地保存', false);
                return false;
            }
            
            // 创建Supabase客户端
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
                auth: {
                    persistSession: false,
                    autoRefreshToken: false
                }
            });
            
            cloudEnabled = true;
            console.log('✅ Supabase客户端已初始化');
            
            // 显示云端状态
            showCloudStatus('云端连接正常，简历将保存到云端', true);
            
            return true;
            
        } catch (e) {
            console.error('Supabase初始化失败:', e);
            showCloudStatus('云端初始化失败，仅本地保存', false);
            return false;
        }
    }
    
    // 显示云端状态
    function showCloudStatus(message, isConnected) {
        const statusEl = document.getElementById('cloudStatus');
        if (statusEl) {
            statusEl.innerHTML = `
                <i class="fas fa-cloud${isConnected ? '' : '-slash'}"></i>
                <span>${message}</span>
            `;
            statusEl.className = isConnected ? 'cloud-status connected' : 'cloud-status';
        }
    }
    
    // 更新时间显示
    function updateTime() {
        const now = new Date();
        const hours = now.getHours().toString().padStart(2, '0');
        const minutes = now.getMinutes().toString().padStart(2, '0');
        const seconds = now.getSeconds().toString().padStart(2, '0');
        document.getElementById('currentTime').textContent = `${hours}:${minutes}:${seconds}`;
    }
    
    // 初始化表单
    function initForm() {
        // 初始化属性选择器
        initAttributes();
        
        // 初始化部门选择器
        initDepartments();
        
        // 默认选择第一个属性
        if (selectedAttributes.length === 0) {
            const firstAttribute = document.querySelector('.attribute-tag');
            if (firstAttribute) {
                toggleAttribute('physics'); // 默认选择物理属性
            }
        }
        
        // 默认选择研究处
        selectDepartment('research');
    }
    
    // 初始化属性选择器
    function initAttributes() {
        const container = document.getElementById('attributesContainer');
        if (!container) return;
        
        container.innerHTML = '';
        
        attributesData.forEach(attr => {
            const tag = document.createElement('div');
            tag.className = `attribute-tag ${attr.class}`;
            tag.id = `attr-${attr.id}`;
            tag.textContent = attr.name;
            tag.dataset.attrId = attr.id;
            tag.dataset.attrName = attr.name;
            
            tag.addEventListener('click', () => toggleAttribute(attr.id));
            
            container.appendChild(tag);
        });
    }
    
    // 切换属性选择
    function toggleAttribute(attrId) {
        const memeValue = document.getElementById('meme').value;
        
        // 如果模因为"无"，则只能选择"无"属性
        if (memeValue === '无') {
            // 清除所有选择
            selectedAttributes = [];
            document.querySelectorAll('.attribute-tag').forEach(tag => {
                tag.classList.remove('selected');
            });
            
            // 选择"无"属性
            const noneAttr = document.getElementById('attr-none');
            if (noneAttr) {
                noneAttr.classList.add('selected');
                selectedAttributes = ['无'];
            }
            
            updateDepartmentOptions();
            return;
        }
        
        const attrElement = document.getElementById(`attr-${attrId}`);
        
        // 如果已经是选中状态，则取消选中
        if (attrElement.classList.contains('selected')) {
            attrElement.classList.remove('selected');
            selectedAttributes = selectedAttributes.filter(id => id !== attrId);
        } 
        // 否则选中它
        else {
            // 如果是"无"属性，先清除其他选择
            if (attrId === 'none') {
                selectedAttributes = [];
                document.querySelectorAll('.attribute-tag').forEach(tag => {
                    tag.classList.remove('selected');
                });
            } else {
                // 清除"无"属性的选择
                const noneAttr = document.getElementById('attr-none');
                if (noneAttr) noneAttr.classList.remove('selected');
                selectedAttributes = selectedAttributes.filter(id => id !== 'none');
            }
            
            attrElement.classList.add('selected');
            selectedAttributes.push(attrId);
        }
    }
    
    // 初始化部门选择器
    function initDepartments() {
        const container = document.getElementById('departmentOptions');
        if (!container) return;
        
        container.innerHTML = '';
        
        departmentsData.forEach(dept => {
            const option = document.createElement('div');
            option.className = 'department-option';
            option.id = `dept-${dept.id}`;
            option.dataset.deptId = dept.id;
            option.dataset.deptName = dept.name;
            option.dataset.allowedWithoutMeme = dept.allowedWithoutMeme;
            
            option.innerHTML = `
                <div class="department-icon">
                    <i class="${dept.icon}"></i>
                </div>
                <div class="department-name">${dept.name}</div>
                <div class="department-desc">${dept.description}</div>
            `;
            
            option.addEventListener('click', () => selectDepartment(dept.id));
            
            container.appendChild(option);
        });
    }
    
    // 选择部门
    function selectDepartment(deptId) {
        const memeValue = document.getElementById('meme').value;
        
        // 如果模因为"无"，检查该部门是否允许无模因者申请
        if (memeValue === '无') {
            const deptOption = document.getElementById(`dept-${deptId}`);
            const allowedWithoutMeme = deptOption.dataset.allowedWithoutMeme === 'true';
            
            if (!allowedWithoutMeme) {
                showError('departmentError', '无模因者只能申请研究处或后勤部');
                return;
            }
        }
        
        // 清除所有选择
        document.querySelectorAll('.department-option').forEach(option => {
            option.classList.remove('selected');
        });
        
        // 选中指定的部门
        const selectedDept = document.getElementById(`dept-${deptId}`);
        if (selectedDept) {
            selectedDept.classList.add('selected');
        }
        
        // 清除部门错误
        clearError('departmentError');
    }
    
    // 更新部门选项状态
    function updateDepartmentOptions() {
        const memeValue = document.getElementById('meme').value;
        
        document.querySelectorAll('.department-option').forEach(option => {
            const allowedWithoutMeme = option.dataset.allowedWithoutMeme === 'true';
            
            if (memeValue === '无') {
                if (!allowedWithoutMeme) {
                    option.style.opacity = '0.5';
                    option.style.cursor = 'not-allowed';
                    option.style.pointerEvents = 'none';
                } else {
                    option.style.opacity = '1';
                    option.style.cursor = 'pointer';
                    option.style.pointerEvents = 'auto';
                }
            } else {
                option.style.opacity = '1';
                option.style.cursor = 'pointer';
                option.style.pointerEvents = 'auto';
            }
        });
        
        // 检查当前选中的部门是否仍然有效
        const selectedDept = document.querySelector('.department-option.selected');
        if (selectedDept) {
            const deptId = selectedDept.dataset.deptId;
            selectDepartment(deptId); // 重新选择以验证有效性
        }
    }
    
    // 设置事件监听器
    function setupEventListeners() {
        // 模因选择变化事件
        const memeSelect = document.getElementById('meme');
        memeSelect.addEventListener('change', function() {
            const memeValue = this.value;
            
            // 更新属性标签
            if (memeValue === '无') {
                // 模因为"无"时，属性固定为"无"
                selectedAttributes = [];
                document.querySelectorAll('.attribute-tag').forEach(tag => {
                    tag.classList.remove('selected');
                });
                
                const noneAttr = document.getElementById('attr-none');
                if (noneAttr) {
                    noneAttr.classList.add('selected');
                    selectedAttributes = ['无'];
                }
                
                // 更新标签文字
                document.getElementById('attributesLabel').innerHTML = `
                    <i class="fas fa-ban"></i> 属性（固定为"无"）
                `;
                
                // 更新能力描述标签
                document.getElementById('abilityLabel').innerHTML = `
                    <i class="fas fa-ban"></i> 模因能力描述（无需填写）
                `;
                document.getElementById('ability').disabled = true;
                document.getElementById('ability').placeholder = "无模因能力";
            } else {
                // 模因不为"无"时，属性可自由选择
                document.getElementById('attributesLabel').innerHTML = `
                    <i class="fas fa-bolt"></i> 属性（可多选）
                `;
                
                // 更新能力描述标签
                document.getElementById('abilityLabel').innerHTML = `
                    <i class="fas fa-fire"></i> 模因能力描述
                `;
                document.getElementById('ability').disabled = false;
                document.getElementById('ability').placeholder = "请描述您的模因能力";
            }
            
            // 更新部门选项
            updateDepartmentOptions();
            
            // 清除相关错误信息
            clearError('attributesError');
            clearError('abilityError');
            clearError('departmentError');
        });
        
        // 表单提交事件
        const form = document.getElementById('resumeForm');
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            submitResume();
        });
        
        // 重置按钮事件
        const resetBtn = document.getElementById('resetBtn');
        resetBtn.addEventListener('click', function() {
            if (confirm('确定要重置表单吗？所有填写的信息都将丢失。')) {
                resetForm();
            }
        });
        
        // 输入框实时验证
        const inputs = form.querySelectorAll('input, select, textarea');
        inputs.forEach(input => {
            input.addEventListener('blur', function() {
                validateField(this);
            });
        });
    }
    
    // ================================================
    // 3. 表单验证函数
    // ================================================
    
    // 验证单个字段
    function validateField(field) {
        const fieldId = field.id;
        const value = field.value.trim();
        
        // 清除之前的错误
        clearError(`${fieldId}Error`);
        
        // 根据字段ID进行验证
        switch(fieldId) {
            case 'fullName':
                if (!value) {
                    showError('nameError', '请输入姓名');
                    return false;
                }
                if (value.length < 2 || value.length > 20) {
                    showError('nameError', '姓名长度应在2-20个字符之间');
                    return false;
                }
                break;
                
            case 'age':
                if (!value) {
                    showError('ageError', '请输入年龄');
                    return false;
                }
                const ageNum = parseInt(value);
                if (isNaN(ageNum) || ageNum < 16 || ageNum > 100) {
                    showError('ageError', '年龄应在16-100岁之间');
                    return false;
                }
                break;
                
            case 'gender':
                if (!value) {
                    showError('genderError', '请选择性别');
                    return false;
                }
                break;
                
            case 'location':
                if (!value) {
                    showError('locationError', '请输入居住地');
                    return false;
                }
                break;
                
            case 'contact':
                // 联系方式不能为空（只做非空与最小长度检查，不强制邮箱/手机号格式）
                if (!value) {
                    showError('contactError', '请输入联系方式');
                    return false;
                }
                if (value.length < 3) {
                    showError('contactError', '联系方式太短');
                    return false;
                }
                break;
                
            case 'meme':
                if (!value) {
                    showError('memeError', '请选择模因');
                    return false;
                }
                break;
                
            case 'ability':
                // 能力描述可选，无需验证
                break;
        }
        
        return true;
    }
    
    // 验证整个表单
    function validateForm() {
        let isValid = true;
        
        // 验证所有字段
        const fields = [
            'fullName', 'age', 'gender', 'location', 'contact', 'meme'
        ];
        
        fields.forEach(fieldId => {
            const field = document.getElementById(fieldId);
            if (!validateField(field)) {
                isValid = false;
            }
        });
        
        // 验证属性选择
        if (selectedAttributes.length === 0) {
            showError('attributesError', '请至少选择一个属性');
            isValid = false;
        } else {
            clearError('attributesError');
        }
        
        // 验证部门选择
        const selectedDept = document.querySelector('.department-option.selected');
        if (!selectedDept) {
            showError('departmentError', '请选择申请部门');
            isValid = false;
        } else {
            // 如果是无模因者，检查部门是否允许
            const memeValue = document.getElementById('meme').value;
            if (memeValue === '无') {
                const allowedWithoutMeme = selectedDept.dataset.allowedWithoutMeme === 'true';
                if (!allowedWithoutMeme) {
                    showError('departmentError', '无模因者只能申请研究处或后勤部');
                    isValid = false;
                }
            }
        }
        
        return isValid;
    }
    
    // 显示错误信息
    function showError(errorId, message) {
        const errorEl = document.getElementById(errorId);
        if (errorEl) {
            errorEl.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${message}`;
            errorEl.style.display = 'block';
        }
    }
    
    // 清除错误信息
    function clearError(errorId) {
        const errorEl = document.getElementById(errorId);
        if (errorEl) {
            errorEl.innerHTML = '';
            errorEl.style.display = 'none';
        }
    }
    
    // ================================================
    // 4. 表单提交函数
    // ================================================
    
    // 提交简历
    async function submitResume() {
        console.log('开始提交简历...');
        
        // 验证表单
        if (!validateForm()) {
            console.log('表单验证失败');
            return;
        }
        
        // 显示加载状态
        showLoading(true, '正在提交申请...');
        
        // 收集表单数据
        const formData = collectFormData();
        console.log('收集的表单数据:', formData);
        
        try {
            // 保存到云端
            const saveResult = await saveResumeToCloud(formData);
            
            if (saveResult.success) {
                // 提交成功
                console.log('简历提交成功');
                
                // 隐藏加载状态
                showLoading(false);
                
                // 显示成功提示
                showSuccessToast();
                
                // 5秒后重置表单
                setTimeout(() => {
                    resetForm();
                }, 5000);
                
            } else {
                // 云端保存失败，尝试本地保存
                console.warn('云端保存失败，尝试本地保存:', saveResult.message);
                
                const localResult = saveResumeToLocal(formData);
                
                if (localResult.success) {
                    // 本地保存成功
                    showLoading(false);
                    showSuccessToast();
                    
                    setTimeout(() => {
                        resetForm();
                    }, 5000);
                } else {
                    // 本地也保存失败
                    throw new Error('简历保存失败: ' + localResult.message);
                }
            }
            
        } catch (error) {
            console.error('提交简历失败:', error);
            
            // 隐藏加载状态
            showLoading(false);
            
            // 显示错误提示
            alert(`提交失败: ${error.message}\n请稍后重试或联系管理员。`);
        }
    }
    
    // 收集表单数据
    function collectFormData() {
        // 获取选中的部门
        const selectedDept = document.querySelector('.department-option.selected');
        
        // 获取属性名称（而不是ID）
        const attributeNames = selectedAttributes.map(attrId => {
            const attr = attributesData.find(a => a.id === attrId);
            return attr ? attr.name : attrId;
        });
        
        // 构建数据对象
        const data = {
            fullName: document.getElementById('fullName').value.trim(),
            age: parseInt(document.getElementById('age').value),
            gender: document.getElementById('gender').value,
            location: document.getElementById('location').value.trim(),
            contact: document.getElementById('contact').value.trim(),
            meme: document.getElementById('meme').value,
            attributes: attributeNames,
            ability: document.getElementById('ability').value.trim() || '无',
            other: document.getElementById('other') ? document.getElementById('other').value.trim() : '',
            department: selectedDept ? selectedDept.dataset.deptName : '',
            submission_date: new Date().toISOString(),
            status: 'pending', // 待审核状态
            applicant_type: 'guest' // 申请者类型：游客
        };
        
        return data;
    }
    
    // 保存简历到云端
    async function saveResumeToCloud(formData) {
        if (!supabaseClient) {
            return { 
                success: false, 
                message: '云端连接未配置' 
            };
        }
        
        try {
            console.log('开始保存到云端...');

            // 将表单字段映射为数据库列（snake_case）
            const dbPayload = mapFormDataToDb(formData);

            // 准备最终插入的数据
            const resumeData = {
                ...dbPayload,
                created_at: new Date().toISOString(),
                updated_at: new Date().toISOString()
            };
            
            // 插入数据到Supabase
            const { data, error } = await supabaseClient
                .from('resume_applications')
                .insert([resumeData])
                .select();
            
            if (error) {
                console.error('Supabase保存错误:', error);
                
                // 如果是表不存在，给出提示
                if (error.message.includes('does not exist') || error.code === '42P01') {
                    console.log('resume_applications表可能不存在');
                    return { 
                        success: false, 
                        message: '请先在Supabase中创建resume_applications表' 
                    };
                }
                
                throw error;
            }
            
            console.log('云端保存成功，返回数据:', data);
            
            return { 
                success: true, 
                message: '云端保存成功', 
                data: data ? data[0] : null 
            };
            
        } catch (error) {
            console.error('保存到云端失败:', error);
            return { 
                success: false, 
                message: '云端保存失败: ' + error.message,
                error: error 
            };
        }
    }

    // 将前端表单数据映射为数据库列名（snake_case）
    function mapFormDataToDb(formData) {
        return {
            full_name: formData.fullName || '',
            age: formData.age || null,
            gender: formData.gender || '',
            location: formData.location || '',
            contact: formData.contact || '',
            meme: formData.meme || '',
            attributes: formData.attributes || [],
            ability: formData.ability || '无',
            other: formData.other || '',
            department: formData.department || '',
            submission_date: formData.submission_date || new Date().toISOString(),
            status: formData.status || 'pending',
            applicant_type: formData.applicant_type || 'guest'
        };
    }
    
    // 保存简历到本地
    function saveResumeToLocal(formData) {
        try {
            console.log('开始保存到本地...');
            
            // 获取现有的本地简历数据
            const LOCAL_RESUMES_KEY = 'qs_resume_applications_local';
            const stored = localStorage.getItem(LOCAL_RESUMES_KEY);
            const resumes = stored ? JSON.parse(stored) : [];
            
            // 添加新简历
            const newResume = {
                ...formData,
                id: Date.now(), // 使用时间戳作为ID
                localSave: true, // 标记为本地保存
                savedAt: new Date().toISOString()
            };
            
            resumes.push(newResume);
            
            // 保存回本地存储
            localStorage.setItem(LOCAL_RESUMES_KEY, JSON.stringify(resumes));
            
            console.log('本地保存成功，已保存简历数量:', resumes.length);
            
            return { 
                success: true, 
                message: '本地保存成功', 
                data: newResume 
            };
            
        } catch (error) {
            console.error('保存到本地失败:', error);
            return { 
                success: false, 
                message: '本地保存失败: ' + error.message,
                error: error 
            };
        }
    }
    
    // ================================================
    // 5. 辅助函数
    // ================================================
    
    // 显示/隐藏加载状态
    function showLoading(show, message = '正在提交申请...') {
        const overlay = document.getElementById('loadingOverlay');
        const text = document.getElementById('loadingText');
        
        if (overlay && text) {
            if (show) {
                text.textContent = message;
                overlay.style.display = 'flex';
            } else {
                overlay.style.display = 'none';
            }
        }
    }
    
    // 显示成功提示
    function showSuccessToast() {
        const toast = document.getElementById('successToast');
        if (toast) {
            toast.style.display = 'flex';
            
            // 10秒后自动隐藏
            setTimeout(() => {
                toast.style.display = 'none';
            }, 10000);
        }
    }
    
    // 重置表单
    function resetForm() {
        // 重置表单字段
        document.getElementById('resumeForm').reset();
        
        // 重置属性选择
        selectedAttributes = [];
        document.querySelectorAll('.attribute-tag').forEach(tag => {
            tag.classList.remove('selected');
        });
        
        // 默认选择物理属性
        toggleAttribute('physics');
        
        // 重置部门选择
        document.querySelectorAll('.department-option').forEach(option => {
            option.classList.remove('selected');
        });
        
        // 默认选择研究处
        selectDepartment('research');
        
        // 启用能力描述字段
        document.getElementById('ability').disabled = false;
        document.getElementById('ability').placeholder = "请描述您的模因能力";
        
        // 重置标签文字
        document.getElementById('attributesLabel').innerHTML = `
            <i class="fas fa-bolt"></i> 属性（可多选）
        `;
        
        document.getElementById('abilityLabel').innerHTML = `
            <i class="fas fa-fire"></i> 模因能力描述
        `;
        
        // 清除所有错误信息
        clearError('nameError');
        clearError('ageError');
        clearError('genderError');
        clearError('locationError');
        clearError('contactError');
        clearError('memeError');
        clearError('attributesError');
        clearError('abilityError');
        clearError('otherError');
        clearError('departmentError');
        
        // 隐藏成功提示
        document.getElementById('successToast').style.display = 'none';
        
        console.log('表单已重置');
    }
    
    // 返回到游客界面（直接跳转）
    function goBack() {
        window.location.href = 'guest.html';
    }
</script>
