<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>观察员控制台 - 管理局资料库</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        :root{
            --desktop-bg: radial-gradient(circle at center, #0a2463, #000000);
            --status-bg: rgba(10, 36, 99, 0.8);
            --panel-bg: rgba(6,22,60,0.92);
            --panel-border: rgba(0,150,255,0.25);
            --accent-1: #4fc3ff;
            --accent-2: #6bffb8;
            --text-primary: #e0f7ff;
            --muted-color: #a3d5ff;
            --icon-glow: rgba(79, 195, 255, 0.2);
        }
        /* 主题类（通过在 documentElement 上添加类来切换） */
        .theme-dark {}
        .theme-light {
            --desktop-bg: radial-gradient(circle at center, #e6f0ff, #ffffff);
            --status-bg: rgba(240,248,255,0.95);
            --panel-bg: rgba(250,250,255,0.95);
            --panel-border: rgba(0,120,200,0.12);
            --accent-1: #0066cc;
            --accent-2: #0099ff;
            --text-primary: #0a2463;
            --muted-color: #0a2463;
            --icon-glow: rgba(0, 150, 255, 0.12);
        }
        .theme-high-contrast {
            --desktop-bg: linear-gradient(180deg,#000000,#111111);
            --status-bg: #000000;
            --panel-bg: #000000;
            --panel-border: #ffffff;
            --accent-1: #ffffff;
            --accent-2: #ffffff;
            --text-primary: #ffffff;
            --muted-color: #ffffff;
            --icon-glow: rgba(255,255,255,0.08);
        }
        
        /* 桌面样式 */
        .desktop {
            min-height: 100vh;
            background: var(--desktop-bg);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        
        /* 顶部状态栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: var(--status-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 150, 255, 0.3);
            margin-bottom: 40px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .system-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .system-logo {
            width: 40px;
            height: 40px;
            filter: drop-shadow(0 0 10px rgba(0, 150, 255, 0.7));
        }
        
        .system-name {
            font-size: 1.5rem;
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0066cc, #0099ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
        }
        
        .time-display {
            color: var(--muted-color);
            font-size: 1.1rem;
            letter-spacing: 1px;
        }
        
        /* 桌面图标网格 */
        .desktop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 桌面图标样式 */
        .desktop-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 150px;
            height: 150px;
            padding: 20px;
            background: rgba(10, 36, 99, 0.7);
            border-radius: 20px;
            border: 2px solid rgba(0, 150, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            position: relative;
            overflow: hidden;
            text-decoration: none;
        }
        
        .desktop-icon:hover {
            transform: translateY(-10px);
            border-color: rgba(0, 150, 255, 0.8);
            box-shadow: 
                0 10px 30px rgba(0, 150, 255, 0.3),
                inset 0 0 30px rgba(0, 150, 255, 0.1);
        }
        
        .desktop-icon.active {
            background: rgba(0, 60, 120, 0.8);
            border-color: rgba(0, 200, 255, 0.8);
        }
        
        .icon-image {
            width: 60px;
            height: 60px;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px rgba(0, 150, 255, 0.7));
            transition: transform 0.3s ease;
        }
        
        .desktop-icon:hover .icon-image {
            transform: scale(1.1);
        }
        
        .icon-label {
            color: #e0f7ff;
            font-size: 1rem;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(0, 150, 255, 0.5);
            line-height: 1.3;
        }
        
        /* 统一图标容器 */
        .icon-container {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            position: relative;
        }
        
        .icon-base {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #4fc3ff, #6b9ccc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(79, 195, 255, 0.5));
        }
        
        .icon-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            background: radial-gradient(circle, var(--icon-glow) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
        }
        
        /* 特殊图标颜色 */
        .icon-info .icon-base {
            background: linear-gradient(135deg, #4fc3ff, #0099ff);
            filter: drop-shadow(0 0 8px rgba(79, 195, 255, 0.5));
        }
        
        .icon-info .icon-glow {
            background: radial-gradient(circle, rgba(79, 195, 255, 0.2) 0%, transparent 70%);
        }
        
        .icon-task .icon-base {
            background: linear-gradient(135deg, #ffd93d, #ffa93d);
            filter: drop-shadow(0 0 8px rgba(255, 217, 61, 0.5));
        }
        
        .icon-task .icon-glow {
            background: radial-gradient(circle, rgba(255, 217, 61, 0.2) 0%, transparent 70%);
        }
        
        .icon-danger .icon-base {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            filter: drop-shadow(0 0 8px rgba(255, 107, 107, 0.5));
        }
        
        .icon-danger .icon-glow {
            background: radial-gradient(circle, rgba(255, 107, 107, 0.2) 0%, transparent 70%);
        }
        
        .icon-success .icon-base {
            background: linear-gradient(135deg, #6bffb8, #8effcc);
            filter: drop-shadow(0 0 8px rgba(107, 255, 184, 0.5));
        }
        
        .icon-success .icon-glow {
            background: radial-gradient(circle, rgba(107, 255, 184, 0.2) 0%, transparent 70%);
        }
        
        /* 加载动画 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            backdrop-filter: blur(10px);
        }
        
        .loading-spinner {
            width: 80px;
            height: 80px;
            border: 5px solid rgba(79, 195, 255, 0.3);
            border-top: 5px solid #4fc3ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #e0f7ff;
            margin-top: 20px;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }
        
        /* 欢迎提示 */
        .welcome-toast {
            position: fixed;
            top: 100px;
            right: 20px;
            padding: 20px 30px;
            background: rgba(10, 36, 99, 0.9);
            border: 1px solid rgba(0, 150, 255, 0.5);
            border-radius: 15px;
            color: #e0f7ff;
            box-shadow: 0 10px 30px rgba(0, 150, 255, 0.3);
            z-index: 1000;
            animation: slideIn 0.5s ease, fadeOut 0.5s ease 4.5s forwards;
            backdrop-filter: blur(10px);
        }
        
        .welcome-title {
            font-size: 1.2rem;
            margin-bottom: 5px;
            color: #4fc3ff;
        }
        
        .welcome-message {
            font-size: 1.5rem;
            background: linear-gradient(90deg, #4fc3ff, #6bffb8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
        }
        
        /* 底部功能面板 */
        .function-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            background: rgba(10,36,99,0.9);
            border-radius: 40px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0,150,255,0.25);
            display: flex;
            gap: 18px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .panel-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: rgba(0,60,120,0.85);
            border: 1px solid rgba(0,150,255,0.35);
            color: #a3d5ff;
            display:flex;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            transition: all .2s ease;
            font-size:1.2rem;
        }

        .panel-btn:hover {
            background: rgba(0,150,255,0.35);
            transform: scale(1.12);
            box-shadow: 0 0 12px rgba(0,150,255,0.4);
        }
        
        /* 动画 */
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        @keyframes fadeOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
                transform: translateX(100%);
            }
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .desktop-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 20px;
            }
            
            .desktop-icon {
                width: 120px;
                height: 120px;
            }
            
            .icon-container {
                width: 50px;
                height: 50px;
            }
            
            .icon-base {
                font-size: 2rem;
            }
        }
        
        /* 退出按钮样式 */
        .logout-btn {
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid rgba(255, 107, 107, 0.5);
            color: #ff6b6b;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-left: 15px;
        }
        
        .logout-btn:hover {
            background: rgba(255, 107, 107, 0.3);
            transform: scale(1.05);
        }

        /* 部门选择弹窗 */
        .department-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(10px);
            display: none;
        }
        
        .department-modal.active {
            display: flex;
        }
        
        .department-content {
            background: rgba(10, 36, 99, 0.95);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(0, 150, 255, 0.3);
            box-shadow: 0 20px 50px rgba(0, 150, 255, 0.2);
            max-width: 500px;
            width: 90%;
        }
        
        .department-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .department-header h2 {
            font-size: 1.8rem;
            color: #4fc3ff;
            margin-bottom: 10px;
        }
        
        .department-header p {
            color: #a3d5ff;
            font-size: 1.1rem;
        }
        
        .department-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .department-option {
            background: rgba(0, 30, 80, 0.7);
            border: 2px solid rgba(0, 150, 255, 0.2);
            border-radius: 15px;
            padding: 25px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .department-option:hover {
            border-color: rgba(0, 150, 255, 0.6);
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 150, 255, 0.3);
        }
        
        .department-option i {
            font-size: 2.5rem;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #4fc3ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .department-option h3 {
            font-size: 1.3rem;
            color: #e0f7ff;
            margin-bottom: 10px;
        }
        
        .department-option p {
            color: #a3d5ff;
            font-size: 0.9rem;
            line-height: 1.4;
        }
        
        .modal-actions {
            text-align: center;
        }
        
        .btn-cancel {
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid rgba(255, 107, 107, 0.4);
            color: #ff6b6b;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .btn-cancel:hover {
            background: rgba(255, 107, 107, 0.3);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <!-- 欢迎提示 -->
    <div class="welcome-toast" id="welcomeToast">
        <div class="welcome-message" id="userGreeting">观察员。</div>
    </div>
    
    <!-- 加载动画 -->
    <div class="loading-overlay" id="loadingOverlay" style="display: none;">
        <div>
            <div class="loading-spinner"></div>
            <div class="loading-text" id="loadingText">正在加载...</div>
        </div>
    </div>
    
    <!-- 部门选择弹窗 -->
    <div class="department-modal" id="departmentModal">
        <div class="department-content">
            <div class="department-header">
                <h2>选择您的部门</h2>
                <p>请选择您所属的部门，系统将为您显示相应的功能和信息</p>
            </div>
            <div class="department-options">
                <div class="department-option" onclick="selectDepartment('research')">
                    <i class="fas fa-microscope"></i>
                    <h3>研究处</h3>
                    <p>负责裂隙现象研究、实验体分析和技术开发</p>
                </div>
                <div class="department-option" onclick="selectDepartment('logistics')">
                    <i class="fas fa-truck"></i>
                    <h3>后勤部</h3>
                    <p>负责物资调配、设备维护和基地运营保障</p>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeDepartmentModal()">取消</button>
            </div>
        </div>
    </div>
    
    <!-- 桌面界面 -->
    <div class="desktop">
        <!-- 顶部状态栏 -->
        <div class="status-bar">
            <div class="system-info">
                <img src="qsamlogo.png" alt="系统标志" class="system-logo">
                <div class="system-name">管理局 - 观察员控制台</div>
            </div>
            
            <div class="user-info">
                <div class="time-display" id="currentTime">00:00:00</div>
                <div class="user-avatar">
                    <i class="fas fa-user-tie"></i>
                </div>
                <div>
                    <div style="color: #6bffb8;" id="userDisplayName">观察员</div>
                    <div style="font-size: 0.8rem; color: #a3d5ff;">观察员权限</div>
                </div>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> 退出
                </button>
            </div>
        </div>
        
        <!-- 桌面图标网格 -->
        <div class="desktop-grid">
            <!-- 部门详情 -->
            <a href="#" class="desktop-icon" onclick="openDepartmentModal(event)" data-page-name="部门详情">
                <div class="icon-container">
                    <i class="fas fa-building icon-base icon-info"></i>
                    <div class="icon-glow"></div>
                </div>
                <div class="icon-label">部门详情</div>
            </a>
            
            <!-- 任务详情 -->
            <a href="tasks-viewer.html" class="desktop-icon" data-page-name="任务详情">
                <div class="icon-container">
                    <i class="fas fa-tasks icon-base icon-task"></i>
                    <div class="icon-glow"></div>
                </div>
                <div class="icon-label">任务详情</div>
            </a>
            
            <!-- 登记裂隙怪物 -->
            <a href="monster-register.html" class="desktop-icon" data-page-name="登记裂隙怪物">
                <div class="icon-container">
                    <i class="fas fa-dragon icon-base icon-danger"></i>
                    <div class="icon-glow"></div>
                </div>
                <div class="icon-label">登记<br>裂隙怪物</div>
            </a>
            
            <!-- 登记实验体 -->
            <a href="subject-register.html" class="desktop-icon" data-page-name="登记实验体">
                <div class="icon-container">
                    <i class="fas fa-flask icon-base icon-success"></i>
                    <div class="icon-glow"></div>
                </div>
                <div class="icon-label">登记<br>实验体</div>
            </a>
        </div>
        
        <!-- 底部功能面板：笔记与主题 -->
        <div class="function-panel">
            <div class="panel-btn" title="笔记" onclick="openPanel('notesPanel')">
                <i class="fas fa-sticky-note"></i>
            </div>
            <div class="panel-btn" title="主题" onclick="openPanel('themePanel')">
                <i class="fas fa-palette"></i>
            </div>
        </div>
    </div>

    <!-- Notes 面板 -->
    <div id="notesPanel" class="bottom-panel" style="display: none; position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); width: min(500px, 90%); background: rgba(10,36,99,0.95); border: 1px solid rgba(0,150,255,0.3); border-radius: 14px; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); z-index: 2500;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <div style="font-size: 1.1rem; color: #4fc3ff; font-weight: bold;">笔记</div>
            <button onclick="closePanel('notesPanel')" style="background: rgba(255,107,107,0.2); border: 1px solid rgba(255,107,107,0.4); color: #ff6b6b; padding: 6px 12px; border-radius: 6px; cursor: pointer;">关闭</button>
        </div>
        <div>
            <textarea id="notesTextarea" class="notes-area" placeholder="在此记录观察员笔记..." style="width: 100%; height: 160px; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: #e0f7ff; resize: vertical;"></textarea>
            <div style="margin-top: 12px; display: flex; justify-content: space-between; align-items: center;">
                <div id="notesStatus" style="color: #6b9ccc; font-size: 0.9rem;"></div>
                <div>
                    <button onclick="saveNotes()" style="background: rgba(79,195,255,0.2); border: 1px solid rgba(79,195,255,0.4); color: #4fc3ff; padding: 8px 16px; border-radius: 6px; cursor: pointer;">保存笔记</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Theme 面板 -->
    <div id="themePanel" class="bottom-panel" style="display: none; position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); width: min(500px, 90%); background: rgba(10,36,99,0.95); border: 1px solid rgba(0,150,255,0.3); border-radius: 14px; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); z-index: 2500;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <div style="font-size: 1.1rem; color: #4fc3ff; font-weight: bold;">界面主题</div>
            <button onclick="closePanel('themePanel')" style="background: rgba(255,107,107,0.2); border: 1px solid rgba(255,107,107,0.4); color: #ff6b6b; padding: 6px 12px; border-radius: 6px; cursor: pointer;">关闭</button>
        </div>
        <div>
            <div style="margin-bottom: 15px;">
                <div style="display: flex; align-items: center; gap: 10px; margin: 10px 0;">
                    <input type="radio" name="viewerTheme" id="themeDark" value="dark" onclick="applyViewerTheme('dark', false)">
                    <label for="themeDark" style="color: #e0f7ff;">深色（默认）</label>
                </div>
                <div style="display: flex; align-items: center; gap: 10px; margin: 10px 0;">
                    <input type="radio" name="viewerTheme" id="themeLight" value="light" onclick="applyViewerTheme('light', false)">
                    <label for="themeLight" style="color: #e0f7ff;">浅色（演示）</label>
                </div>
                <div style="display: flex; align-items: center; gap: 10px; margin: 10px 0;">
                    <input type="radio" name="viewerTheme" id="themeHC" value="high-contrast" onclick="applyViewerTheme('high-contrast', false)">
                    <label for="themeHC" style="color: #e0f7ff;">高对比</label>
                </div>
            </div>
            <div style="color: #6b9ccc; font-size: 0.9rem; margin-bottom: 15px;">
                切换为预览后点击"应用"保存为本地偏好。
            </div>
            <div style="display: flex; gap: 12px; align-items: center;">
                <div id="themePreview" style="flex: 1; height: 44px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; color: #e0f7ff;" data-theme="dark">预览区域</div>
                <button onclick="applyViewerThemeAndClose()" style="background: rgba(79,195,255,0.2); border: 1px solid rgba(79,195,255,0.4); color: #4fc3ff; padding: 8px 16px; border-radius: 6px; cursor: pointer;">应用</button>
            </div>
        </div>
    </div>
    
    <script>
        // 检查登录状态
        const role = localStorage.getItem('auth_role');
        const username = localStorage.getItem('auth_user');
        
        if (role !== 'viewer') {
            alert('请先以观察员身份登录！');
            window.location.href = 'index.html';
        }
        
        // 获取时间并显示问候语
        function updateTime() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const seconds = now.getSeconds().toString().padStart(2, '0');
            
            // 更新时间显示
            document.getElementById('currentTime').textContent = `${hours}:${minutes}:${seconds}`;
            
            // 问候语
            let greeting = '';
            if (hours >= 5 && hours < 12) {
                greeting = '早上好';
            } else if (hours >= 12 && hours < 18) {
                greeting = '下午好';
            } else if (hours >= 18 && hours < 22) {
                greeting = '晚上好';
            } else {
                greeting = '夜深了';
            }
            
            document.getElementById('userGreeting').textContent = `${greeting}，${username}。`;
        }
        
        // 显示用户信息
        function displayUserInfo() {
            const userDisplayName = document.getElementById('userDisplayName');
            if (userDisplayName && username) {
                userDisplayName.textContent = username;
            }
        }
        
        // 打开部门选择弹窗：优先根据登录者已登记信息直接跳转到对应页面
        function openDepartmentModal(event) {
            event.preventDefault();

            try {
                // 尝试从本地用户数据中读取已登记的部门信息
                const stored = localStorage.getItem('qs_users_data');
                if (stored && username) {
                    const users = JSON.parse(stored);
                    const userInfo = users[username];
                    if (userInfo && userInfo.department) {
                        const deptText = (userInfo.department || '').toLowerCase();
                        let deptPage = '';

                        // 简单映射常见文案到页面 key
                        if (deptText.includes('研究') || deptText.includes('research')) {
                            deptPage = 'research-department.html';
                        } else if (deptText.includes('后勤') || deptText.includes('logistics')) {
                            deptPage = 'logistics-department.html';
                        }

                        if (deptPage) {
                            showLoading(`正在进入相关部门页面...`);
                            setTimeout(() => {
                                window.location.href = deptPage;
                            }, 800);
                            return;
                        }
                    }
                }
            } catch (e) {
                console.warn('读取用户登记信息失败，显示选择弹窗:', e);
            }

            // 没有登记或无法识别，显示选择弹窗
            document.getElementById('departmentModal').classList.add('active');
        }
        
        // 关闭部门选择弹窗
        function closeDepartmentModal() {
            document.getElementById('departmentModal').classList.remove('active');
        }
        
        // 选择部门
        function selectDepartment(dept) {
            closeDepartmentModal();
            
            // 根据选择的部门跳转到不同的页面
            let deptPage = '';
            if (dept === 'research') {
                deptPage = 'research-department.html';
            } else if (dept === 'logistics') {
                deptPage = 'logistics-department.html';
            }
            
            if (deptPage) {
                // 显示加载动画
                showLoading(`正在进入${dept === 'research' ? '研究处' : '后勤部'}页面...`);
                
                // 模拟加载延迟
                setTimeout(() => {
                    window.location.href = deptPage;
                }, 1000);
            }
        }
        
        // 显示加载动画
        function showLoading(message = '正在加载...') {
            const overlay = document.getElementById('loadingOverlay');
            const text = document.getElementById('loadingText');
            text.textContent = message;
            overlay.style.display = 'flex';
        }
        
        // 隐藏加载动画
        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }
        
        // 打开面板
        function openPanel(panelId) {
            // 关闭所有面板
            closeAllPanels();
            
            // 打开目标面板
            const panel = document.getElementById(panelId);
            if (panel) {
                panel.style.display = 'block';
                
                // 填充内容
                if (panelId === 'notesPanel') {
                    populateNotesPanel();
                } else if (panelId === 'themePanel') {
                    populateThemePanel();
                }
            }
        }

        // 获取当前用户所属部门（从本地存储的用户登记信息中读取）
        function getUserDepartment() {
            try {
                const stored = localStorage.getItem('qs_users_data');
                if (!stored || !username) return null;
                const users = JSON.parse(stored);
                const userInfo = users[username];
                if (!userInfo || !userInfo.department) return null;
                const deptText = (userInfo.department || '').toLowerCase();
                if (deptText.includes('后勤') || deptText.includes('logistics')) return 'logistics';
                if (deptText.includes('研究') || deptText.includes('research')) return 'research';
                return null;
            } catch (e) {
                console.warn('getUserDepartment error', e);
                return null;
            }
        }

        // 检查当前用户是否为管理层观察员（多重检测以兼容不同登录方式）
        function getUserIsManagement() {
            try {
                // 1. 显式本地存储标志
                if (localStorage.getItem('viewer_management') === '1') return true;
                if (localStorage.getItem('auth_viewer_level') === 'management') return true;
                if (localStorage.getItem('viewer_role') === 'management') return true;

                // 2. 从通用用户数据中读取可能的角色/级别字段
                const stored = localStorage.getItem('qs_users_data');
                if (stored && username) {
                    const users = JSON.parse(stored);
                    const userInfo = users[username];
                    if (userInfo) {
                        const lvl = (userInfo.viewer_level || userInfo.level || userInfo.role || '').toString().toLowerCase();
                        if (lvl === 'management' || lvl === '管理' || lvl === '管理层') return true;

                        // 检查 department 字段（例如界面中的“所属部门：管理层”）
                        const deptField = (userInfo.department || '').toString().toLowerCase();
                        if (deptField.includes('管理') || deptField.includes('management')) return true;

                        // 有时角色存为数组或标签
                        if (Array.isArray(userInfo.roles) && userInfo.roles.map(r=>r.toString().toLowerCase()).includes('management')) return true;
                        if (Array.isArray(userInfo.tags) && userInfo.tags.map(t=>t.toString().toLowerCase()).includes('management')) return true;
                    }
                }
            } catch (e) {
                console.warn('getUserIsManagement error', e);
            }

            return false;
        }

        // 如果当前观察员属于管理层观察员，则替换桌面为管理层快捷入口（四个按钮）
        function adjustForManagementObserver() {
            // 仅当用户确认为管理层观察员时替换为管理快捷入口
            if (!getUserIsManagement()) return;

            const grid = document.querySelector('.desktop-grid');
            if (!grid) return;

            grid.innerHTML = `
            <a href="department-details-viewer.html" class="desktop-icon" data-page-name="部门详情">
                <div class="icon-container">
                    <i class="fas fa-building icon-base icon-info"></i>
                    <div class="icon-glow"></div>
                </div>
                <div class="icon-label">部门详情</div>
            </a>

            <a href="final-check.html" class="desktop-icon" data-page-name="终审简历">
                <div class="icon-container">
                    <i class="fas fa-file-alt icon-base icon-success"></i>
                    <div class="icon-glow"></div>
                </div>
                <div class="icon-label">终审简历</div>
            </a>

            <a href="tasks.html" class="desktop-icon" data-page-name="任务详情">
                <div class="icon-container">
                    <i class="fas fa-tasks icon-base icon-task"></i>
                    <div class="icon-glow"></div>
                </div>
                <div class="icon-label">任务详情</div>
            </a>

            <a href="members.html" class="desktop-icon" data-page-name="管理成员">
                <div class="icon-container">
                    <i class="fas fa-users icon-base"></i>
                    <div class="icon-glow"></div>
                </div>
                <div class="icon-label">管理成员</div>
            </a>
            `;
        }

        // 根据部门调整桌面上的可点击按钮（后勤部显示 部门详情、初审简历、基础建设概况）
        function adjustIconsForDepartment() {
            // 管理层观察员使用管理专用入口，不应被部门配置覆盖
            if (getUserIsManagement()) return;
            const dept = getUserDepartment();
            if (dept === 'logistics') {
                const grid = document.querySelector('.desktop-grid');
                if (!grid) return;

                grid.innerHTML = `
            <a href="logistics-department.html" class="desktop-icon" data-page-name="部门详情">
                <div class="icon-container">
                    <i class="fas fa-building icon-base icon-info"></i>
                    <div class="icon-glow"></div>
                </div>
                <div class="icon-label">部门详情</div>
            </a>

            <a href="first-check.html" class="desktop-icon" data-page-name="初审简历">
                <div class="icon-container">
                    <i class="fas fa-file-alt icon-base icon-task"></i>
                    <div class="icon-glow"></div>
                </div>
                <div class="icon-label">初审简历</div>
            </a>

            <a href="basic-build.html" class="desktop-icon" data-page-name="基础建设概况">
                <div class="icon-container">
                    <i class="fas fa-tools icon-base icon-success"></i>
                    <div class="icon-glow"></div>
                </div>
                <div class="icon-label">基础建设概况</div>
            </a>
                `;
            }
            // 如果是 research 或未识别的部门，则保持原有图标不变
        }
        
        // 关闭面板
        function closePanel(panelId) {
            const panel = document.getElementById(panelId);
            if (panel) {
                panel.style.display = 'none';
            }
        }
        
        // 关闭所有面板
        function closeAllPanels() {
            const panels = ['notesPanel', 'themePanel'];
            panels.forEach(panelId => {
                closePanel(panelId);
            });
        }
        
        // 填充笔记面板
        function populateNotesPanel() {
            const textarea = document.getElementById('notesTextarea');
            const status = document.getElementById('notesStatus');
            
            if (textarea) {
                try {
                    const notes = localStorage.getItem(`viewer_notes_${username}`) || '';
                    textarea.value = notes;
                } catch (e) {
                    textarea.value = '';
                }
            }
            
            if (status) {
                status.textContent = '';
            }
        }
        
        // 保存笔记
        function saveNotes() {
            const textarea = document.getElementById('notesTextarea');
            const status = document.getElementById('notesStatus');
            
            if (!textarea) return;
            
            try {
                localStorage.setItem(`viewer_notes_${username}`, textarea.value);
                if (status) {
                    status.textContent = '已保存';
                    status.style.color = '#6bffb8';
                    setTimeout(() => {
                        status.textContent = '';
                    }, 1500);
                }
            } catch (e) {
                if (status) {
                    status.textContent = '保存失败';
                    status.style.color = '#ff6b6b';
                }
            }
        }
        
        // 填充主题面板
        function populateThemePanel() {
            const currentTheme = localStorage.getItem('viewer_theme') || 'dark';
            const radios = document.getElementsByName('viewerTheme');
            
            radios.forEach(radio => {
                radio.checked = (radio.value === currentTheme);
            });
            
            // 预览当前主题
            applyViewerTheme(currentTheme, false);
        }
        
        // 应用主题
        function applyViewerTheme(theme, persist = true) {
            // 移除所有主题类
            document.documentElement.classList.remove('theme-dark', 'theme-light', 'theme-high-contrast');
            
            // 添加新主题类
            if (!theme || theme === 'dark') {
                document.documentElement.classList.add('theme-dark');
            } else if (theme === 'light') {
                document.documentElement.classList.add('theme-light');
            } else if (theme === 'high-contrast') {
                document.documentElement.classList.add('theme-high-contrast');
            }
            
            // 保存到本地存储
            if (persist) {
                localStorage.setItem('viewer_theme', theme || 'dark');
            }
            
            // 更新预览
            const preview = document.getElementById('themePreview');
            if (preview) {
                preview.setAttribute('data-theme', theme || 'dark');
                preview.textContent = theme === 'dark' ? '深色主题预览' : 
                                    theme === 'light' ? '浅色主题预览' : 
                                    '高对比主题预览';
            }
        }
        
        // 应用主题并关闭面板
        function applyViewerThemeAndClose() {
            const radios = document.getElementsByName('viewerTheme');
            let selectedTheme = 'dark';
            
            radios.forEach(radio => {
                if (radio.checked) {
                    selectedTheme = radio.value;
                }
            });
            
            applyViewerTheme(selectedTheme, true);
            closePanel('themePanel');
        }
        
        // 退出登录
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                showLoading('正在退出系统...');
                
                setTimeout(() => {
                    // 清除登录状态
                    localStorage.removeItem('auth_user');
                    localStorage.removeItem('auth_role');
                    localStorage.removeItem('auth_time');
                    
                    // 跳转到登录页
                    window.location.href = 'index.html';
                }, 1000);
            }
        }
        
        // 页面加载完成
        window.onload = function() {
            updateTime();
            displayUserInfo();
            // 如果为管理层观察员，显示管理层专用快捷入口；否则按部门或默认图标显示
            adjustForManagementObserver();
            // 根据已登记部门调整桌面按钮（若为后勤部则替换为指定按钮）
            adjustIconsForDepartment();
            setInterval(updateTime, 1000);
            
            // 应用已保存的主题
            const savedTheme = localStorage.getItem('viewer_theme') || 'dark';
            applyViewerTheme(savedTheme, false);
            
            // 5秒后隐藏欢迎提示
            setTimeout(() => {
                const welcomeToast = document.getElementById('welcomeToast');
                if (welcomeToast) {
                    welcomeToast.style.display = 'none';
                }
            }, 5000);
            
            // 点击空白处关闭面板
            document.addEventListener('click', function(event) {
                const panels = ['notesPanel', 'themePanel'];
                let isPanelClick = false;
                
                panels.forEach(panelId => {
                    const panel = document.getElementById(panelId);
                    if (panel && panel.contains(event.target)) {
                        isPanelClick = true;
                    }
                });
                
                // 点击功能面板按钮
                const functionPanel = document.querySelector('.function-panel');
                if (functionPanel && functionPanel.contains(event.target)) {
                    isPanelClick = true;
                }
                
                // 如果不是点击面板或功能按钮，关闭所有面板
                if (!isPanelClick) {
                    closeAllPanels();
                }
            });
        };
    </script>
</body>
</html>
