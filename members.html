<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>绠＄悊鎴愬憳 - 绠＄悊灞€鎺у埗鍙?/title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 娣诲姞 Supabase 瀹㈡埛绔簱 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        /* 鍏ㄥ眬鏍峰紡 - 纭繚鍏ㄥ睆 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            overflow: auto;
        }
        
        /* 鎺у埗鍙版牱寮?- 鍏ㄥ睆 */
        .desktop {
            min-height: 100vh;
            width: 100%;
            background: radial-gradient(circle at center, #0a2463, #000000);
            padding: 0;
            position: relative;
            overflow: visible;
        }
        
        /* 椤堕儴鐘舵€佹爮 - 鍥哄畾 */
        .status-bar {
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(10, 36, 99, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 150, 255, 0.3);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .system-info {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: nowrap;
        }
        
        /* 杩斿洖鎸夐挳鏍峰紡 */
        .back-btn {
            background: rgba(0, 150, 255, 0.2);
            border: 1px solid rgba(0, 150, 255, 0.5);
            color: #4fc3ff;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            white-space: nowrap;
            margin-right: 15px;
        }

        .back-btn:hover {
            background: rgba(0, 150, 255, 0.3);
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(0, 150, 255, 0.3);
        }

        .back-btn i {
            font-size: 0.8rem;
        }
        
        .system-logo {
            width: 40px;
            height: 40px;
            filter: drop-shadow(0 0 10px rgba(0, 150, 255, 0.7));
        }
        
        .system-name {
            font-size: 1.5rem;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0066cc, #0099ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
        }
        
        .time-display {
            color: #a3d5ff;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }
        
        /* 涓昏鍐呭鍖哄煙 - 鍏ㄥ睆 */
        .main-content {
            width: 100%;
            min-height: calc(100vh - 80px);
            padding: 30px;
            overflow: auto;
        }
        
        /* 鍐呭瀹瑰櫒 */
        .content-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }
        
        /* 缁熻鍗＄墖缃戞牸 */
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            width: 100%;
        }
        
        .stat-card {
            background: rgba(10, 36, 99, 0.7);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 15px;
            padding: 25px 20px;
            text-align: center;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 150, 255, 0.2);
            border-color: rgba(0, 150, 255, 0.5);
        }
        
        .stat-value {
            font-size: 2.2rem;
            font-weight: bold;
            background: linear-gradient(90deg, #4fc3ff, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 10px 0;
            text-shadow: 0 0 10px rgba(79, 195, 255, 0.3);
        }
        
        .stat-label {
            color: #a3d5ff;
            font-size: 0.95rem;
            letter-spacing: 1px;
        }
        
        /* 蹇€熸搷浣?*/
        .quick-actions {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            width: 100%;
        }
        
        .action-btn {
            padding: 12px 25px;
            background: rgba(10, 36, 99, 0.7);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 10px;
            color: #a3d5ff;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            white-space: nowrap;
        }
        
        .action-btn:hover {
            background: rgba(0, 150, 255, 0.2);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 150, 255, 0.2);
        }
        
        .action-btn.primary {
            background: linear-gradient(135deg, #0066cc, #0099ff);
            color: white;
            border: none;
        }
        
        .action-btn.primary:hover {
            background: linear-gradient(135deg, #0099ff, #00ccff);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 150, 255, 0.3);
        }
        
        /* 鎴愬憳鍒楄〃鍗＄墖 - 鍏ㄥ */
        .card-container {
            background: rgba(10, 36, 99, 0.7);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            width: 100%;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .card-title {
            font-size: 1.5rem;
            background: linear-gradient(90deg, #4fc3ff, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }
        
        /* 鎼滅储妗?*/
        .search-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            min-width: 250px;
        }
        
        .search-input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            background: rgba(0, 30, 80, 0.7);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 10px;
            color: #e0f7ff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .search-input:focus {
            outline: none;
            border-color: rgba(0, 200, 255, 0.6);
            box-shadow: 0 0 20px rgba(0, 150, 255, 0.3);
        }
        
        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #4fc3ff;
            font-size: 1.2rem;
        }
        
        /* 鎴愬憳缃戞牸 */
        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            width: 100%;
        }
        
        .member-card {
            background: rgba(0, 30, 80, 0.5);
            border: 1px solid rgba(0, 150, 255, 0.2);
            border-radius: 12px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            cursor: pointer;
            height: 100%;
        }
        
        .member-card:hover {
            background: rgba(0, 60, 120, 0.3);
            border-color: rgba(0, 150, 255, 0.4);
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 150, 255, 0.2);
        }
        
        .member-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .member-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0066cc, #0099ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: white;
            flex-shrink: 0;
        }
        
        .member-title {
            flex: 1;
        }
        
        .member-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: #e0f7ff;
        }
        
        .member-username {
            font-size: 0.95rem;
            color: #a3d5ff;
            margin-bottom: 5px;
        }
        
        /* 鎴愬憳璇︾粏淇℃伅 */
        .member-details {
            flex: 1;
            margin-bottom: 20px;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(0, 150, 255, 0.1);
        }
        
        .detail-label {
            color: #6b9ccc;
            font-size: 0.9rem;
        }
        
        .detail-value {
            color: #e0f7ff;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .status-active {
            background: rgba(107, 255, 184, 0.2);
            color: #6bffb8;
            border: 1px solid rgba(107, 255, 184, 0.5);
        }
        
        .role-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
            background: rgba(79, 195, 255, 0.2);
            color: #4fc3ff;
            border: 1px solid rgba(79, 195, 255, 0.5);
        }
        
        .department-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
            border: 1px solid rgba(255, 193, 7, 0.5);
        }
        
        .team-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
            background: rgba(156, 39, 176, 0.2);
            color: #9c27b0;
            border: 1px solid rgba(156, 39, 176, 0.5);
        }
        
        .position-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 1px solid rgba(76, 175, 80, 0.5);
        }
        
        /* 鎴愬憳鎿嶄綔鍖哄煙 */
        .member-actions {
            display: flex;
            gap: 10px;
            margin-top: auto;
            padding-top: 15px;
            border-top: 1px solid rgba(0, 150, 255, 0.1);
        }
        
        .action-icon {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-size: 0.9rem;
            gap: 6px;
        }
        
        .action-view {
            background: rgba(79, 195, 255, 0.2);
            color: #4fc3ff;
        }
        
        .action-view:hover {
            background: rgba(79, 195, 255, 0.3);
            transform: translateY(-2px);
        }
        
        .action-edit {
            background: rgba(255, 217, 61, 0.2);
            color: #ffd93d;
        }
        
        .action-edit:hover {
            background: rgba(255, 217, 61, 0.3);
            transform: translateY(-2px);
        }
        
        .action-delete {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
        }
        
        .action-delete:hover {
            background: rgba(255, 107, 107, 0.3);
            transform: translateY(-2px);
        }
        
        /* 寮圭獥鏍峰紡 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }
        
        .modal-content {
            background: radial-gradient(circle at center, #0a2463, #000000);
            border: 2px solid rgba(0, 150, 255, 0.5);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 0 50px rgba(0, 150, 255, 0.3);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        
        .modal-title {
            background: linear-gradient(90deg, #4fc3ff, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.4rem;
        }
        
        .close-btn {
            background: none;
            border: none;
            color: #ff6b6b;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
        }
        
        /* 琛ㄥ崟鏍峰紡 */
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #a3d5ff;
            font-size: 0.95rem;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 20px;
            background: rgba(0, 30, 80, 0.7);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 10px;
            color: #e0f7ff;
            font-size: 1rem;
        }
        
        .form-input:focus {
            outline: none;
            border-color: rgba(0, 200, 255, 0.6);
            box-shadow: 0 0 15px rgba(0, 150, 255, 0.2);
        }
        
        .password-wrapper {
            position: relative;
        }
        
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #a3d5ff;
            cursor: pointer;
            padding: 5px;
        }
        
        .form-select {
            width: 100%;
            padding: 12px 20px;
            background: rgba(0, 30, 80, 0.7);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 10px;
            color: #e0f7ff;
            cursor: pointer;
        }
        
        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 30px;
        }
        
        .btn {
            padding: 12px 25px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }
        
        .btn-cancel {
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid rgba(255, 107, 107, 0.5);
            color: #ff6b6b;
        }
        
        .btn-cancel:hover {
            background: rgba(255, 107, 107, 0.3);
        }
        
        .btn-save {
            background: linear-gradient(135deg, #00a86b, #00cc88);
            color: white;
        }
        
        .btn-save:hover {
            background: linear-gradient(135deg, #00cc88, #00a86b);
            transform: translateY(-2px);
        }
        
        /* 绌虹姸鎬?*/
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b9ccc;
            grid-column: 1 / -1;
        }
        
        .empty-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            color: rgba(0, 150, 255, 0.3);
        }
        
        /* 鍝嶅簲寮忚璁?*/
        @media (max-width: 1200px) {
            .members-grid {
                grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            }
        }
        
        @media (max-width: 768px) {
            .main-content {
                padding: 20px 15px;
            }
            
            .status-bar {
                padding: 15px 20px;
                flex-wrap: wrap;
                gap: 15px;
            }
            
            .members-grid {
                grid-template-columns: 1fr;
            }
            
            .card-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .search-container {
                max-width: 100%;
            }
            
            .quick-actions {
                justify-content: center;
            }
            
            .action-btn {
                flex: 1;
                min-width: 150px;
                justify-content: center;
            }
            
            /* 鍝嶅簲寮忎笅鐨勮繑鍥炴寜閽?*/
            .back-btn {
                margin-right: 10px;
                padding: 6px 12px;
                font-size: 0.8rem;
            }
            
            .back-btn span {
                display: none; /* 鍦ㄥ皬灞忓箷涓婇殣钘?杩斿洖"鏂囧瓧 */
            }
            
            .back-btn i {
                margin-right: 0;
                font-size: 0.9rem;
            }
        }
        
        /* 閫€鍑烘寜閽?*/
        .logout-btn {
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid rgba(255, 107, 107, 0.5);
            color: #ff6b6b;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-left: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .logout-btn:hover {
            background: rgba(255, 107, 107, 0.3);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <!-- 鎺у埗鍙扮晫闈?-->
    <div class="desktop">
        <!-- 椤堕儴鐘舵€佹爮 -->
        <div class="status-bar">
            <div class="system-info">
                <!-- 杩斿洖鎸夐挳 -->
                <button class="back-btn" onclick="goBackToAdmin()" title="杩斿洖">
                    <i class="fas fa-chevron-left"></i>
                    <span>杩斿洖</span>
                </button>
                
                <img src="qsamlogo.png" alt="绯荤粺鏍囧織" class="system-logo">
                <div class="system-name">鎴愬憳绠＄悊鎺у埗鍙?/div>
            </div>
            
            <div class="user-info">
                <div class="time-display" id="currentTime">00:00:00</div>
                <div class="user-avatar">
                    <i class="fas fa-user-shield"></i>
                </div>
                <div>
                    <div id="userDisplayName" style="color: #ffd93d;">璁垮</div>
                    <div id="userRoleText" style="font-size: 0.8rem; color: #a3d5ff;">-</div>
                </div>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> 閫€鍑?
                </button>
            </div>
        </div>
        
        <!-- 涓昏鍐呭鍖哄煙 -->
        <div class="main-content">
            <div class="content-wrapper">
                <!-- 缁熻鍗＄墖 -->
                <div class="stats-cards">
                    <div class="stat-card">
                        <div class="stat-label">鎬绘垚鍛樻暟</div>
                        <div class="stat-value" id="totalMembers">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">鎴樻枟缃叉垚鍛?/div>
                        <div class="stat-value" id="combatMembers">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">绠＄悊鍛?/div>
                        <div class="stat-value" id="adminCount">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">浠婃棩鏂板</div>
                        <div class="stat-value" id="todayNew">0</div>
                    </div>
                </div>
                
                <!-- 蹇€熸搷浣?-->
                <div class="quick-actions">
                    <button class="action-btn primary" onclick="showAddModal()">
                        <i class="fas fa-plus"></i> 娣诲姞鏂版垚鍛?
                    </button>
                    <button class="action-btn" onclick="refreshMembers()">
                        <i class="fas fa-sync-alt"></i> 鍒锋柊鍒楄〃
                    </button>
                    <button class="action-btn" onclick="exportMembers()">
                        <i class="fas fa-download"></i> 瀵煎嚭鏁版嵁
                    </button>
                    <button class="action-btn" onclick="syncToCloud()" title="鍚屾鏁版嵁鍒颁簯绔?>
                        <i class="fas fa-cloud-upload-alt"></i> 鍚屾鍒颁簯绔?
                    </button>
                </div>
                
                <!-- 浜戠鐘舵€佹寚绀哄櫒 -->
                <div id="cloudStatus" style="margin-bottom: 20px; display: none;">
                    <div style="background: rgba(0, 60, 120, 0.5); padding: 10px 20px; border-radius: 10px; border: 1px solid rgba(0, 150, 255, 0.3);">
                        <span id="cloudStatusText" style="color: #a3d5ff;">
                            <i class="fas fa-cloud"></i> 姝ｅ湪妫€鏌ヤ簯绔繛鎺?..
                        </span>
                    </div>

        // 淇濆瓨鐢ㄦ埛鏁版嵁鍒版湰鍦板瓨鍌?
        async function saveUsersToLocalStorage(cloudUsers) {
            const usersData = {};
            const loginUsersData = {};
            
            cloudUsers.forEach(user => {
                usersData[user.username] = {
                    id: user.id,
                    name: user.name,
                    password: user.password,
                    role: user.role,
                    status: user.status,
                    joinDate: user.join_date,
                    notes: user.notes,
                    department: user.department || '鏈垎閰?,
                    team: user.team || '',
                    position: user.position || ''
                };
                
                // 瑙掕壊杞崲锛?user' -> 'member' 鐢ㄤ簬鐧诲綍绯荤粺
                const loginRole = user.role === 'user' ? 'member' : user.role;
                loginUsersData[user.username] = {
                    password: user.password,
                    role: loginRole,
                    name: user.name,
                    department: user.department || '鏈垎閰?,
                    team: user.team || '',
                    position: user.position || ''
                };
            });
            
            localStorage.setItem(USERS_STORAGE_KEY, JSON.stringify(usersData));
            localStorage.setItem('login_users', JSON.stringify(loginUsersData));
        }

        // 鏇存柊鐧诲綍绯荤粺鐨勭敤鎴锋暟鎹?
        function updateLoginSystemUsers(users) {
            const loginUsers = {};
            for (const [username, user] of Object.entries(users)) {
                const loginRole = user.role === 'user' ? 'member' : user.role;
                loginUsers[username] = {
                    password: user.password,
                    role: loginRole,
                    name: user.name,
                    department: user.department || '鏈垎閰?,
                    team: user.team || '',
                    position: user.position || ''

            localStorage.setItem('login_users', JSON.stringify(loginUsers));

            // 鏍规嵁閮ㄩ棬鏄剧ず/闅愯棌闃熶紞鍜岃亴浣嶅瓧娈?
            toggleTeamFields();
            
            if (member.department === '鎴樻枟缃?) {
                document.getElementById('team').value = member.team;
                document.getElementById('position').value = member.position;
            }
            
            const form = document.getElementById('memberForm');
            form.onsubmit = handleEditMember;
            
            document.getElementById('memberModal').style.display = 'flex';
        }
        
        // 鍒囨崲闃熶紞鍜岃亴浣嶅瓧娈电殑鏄剧ず
        function toggleTeamFields() {
            const department = document.getElementById('department').value;
            const teamGroup = document.getElementById('teamGroup');
            const positionGroup = document.getElementById('positionGroup');
            
            if (department === '鎴樻枟缃?) {
                teamGroup.style.display = 'block';
                positionGroup.style.display = 'block';
                document.getElementById('team').required = true;
                document.getElementById('position').required = true;
            } else {
                teamGroup.style.display = 'none';
                positionGroup.style.display = 'none';
                document.getElementById('team').required = false;
                document.getElementById('position').required = false;
                document.getElementById('team').value = '';
                document.getElementById('position').value = '';
            }
        }
        
        // 澶勭悊娣诲姞鎴愬憳
        async function handleAddMember(e) {
            e.preventDefault();
            
            const department = document.getElementById('department').value;
            
            const formData = {
                name: document.getElementById('name').value.trim(),
                username: document.getElementById('username').value.trim(),
                password: document.getElementById('password').value,
                role: document.getElementById('role').value,
                department: department,
                team: department === '鎴樻枟缃? ? document.getElementById('team').value : '',
                position: department === '鎴樻枟缃? ? document.getElementById('position').value : '',
                status: document.getElementById('status').value,
                joinDate: new Date().toISOString().split('T')[0],
                notes: '鏂版坊鍔犵殑鎴愬憳'
            };
            
            // 楠岃瘉鏁版嵁
            if (!validateMemberData(formData, true)) return;
            
            // 鏄剧ず淇濆瓨涓姸鎬?
            const originalBtnText = document.getElementById('submitBtn').innerHTML;
            document.getElementById('submitBtn').innerHTML = '<i class="fas fa-spinner fa-spin"></i> 淇濆瓨涓?..';
            document.getElementById('submitBtn').disabled = true;
            
            try {
                // 1. 棣栧厛灏濊瘯淇濆瓨鍒颁簯绔?
                let cloudResult = null;
                if (cloudEnabled) {
                    cloudResult = await addUserToSupabase(formData);
                }
                
                // 鐢熸垚鏂癐D锛堝鏋滀簯绔繚瀛樺け璐ワ紝浣跨敤鏈湴ID锛?
                let newId;
                if (cloudResult && cloudResult.success) {
                    newId = cloudResult.data.id; // 浣跨敤浜戠杩斿洖鐨処D
                    formData.id = newId;
                    console.log('浣跨敤浜戠鐢熸垚鐨処D:', newId);
                } else {
                    newId = members.length > 0 ? Math.max(...members.map(m => m.id)) + 1 : 1;
                    formData.id = newId;
                    console.log('浣跨敤鏈湴鐢熸垚鐨処D:', newId);
                }
                
                // 2. 娣诲姞鍒版湰鍦版垚鍛樺垪琛?
                members.push({
                    id: formData.id,
                    name: formData.name,
                    username: formData.username,
                    role: formData.role,
                    department: formData.department,
                    team: formData.team,
                    position: formData.position,
                    status: formData.status,
                    joinDate: formData.joinDate,
                    notes: formData.notes
                });
                
                // 3. 淇濆瓨鍒版湰鍦板瓨鍌?
                saveMemberData(formData.username, formData);
                
                // 4. 鏇存柊鏄剧ず
                filteredMembers = [...members];
                hideModal();
                updateStats();
                renderMembers();
                
                // 5. 鏄剧ず鎴愬姛娑堟伅
                let successMsg = `鎴愬憳 "${formData.name}" 娣诲姞鎴愬姛锛乗n鐢ㄦ埛鍚? ${formData.username}\n瀵嗙爜: ${formData.password}`;
                if (cloudResult && cloudResult.success) {
                    successMsg += '\n\n鉁?宸插悓姝ュ埌浜戠';
                    currentCloudSync = true;
                } else if (cloudEnabled) {
                    successMsg += '\n\n鈿狅笍 浜戠淇濆瓨澶辫触锛屼粎淇濆瓨鍒版湰鍦?;
                }
                
                alert(successMsg);
                
            } catch (error) {
                console.error('娣诲姞鎴愬憳澶辫触:', error);
                alert('娣诲姞鎴愬憳澶辫触: ' + error.message);
            } finally {
                // 鎭㈠鎸夐挳鐘舵€?
                document.getElementById('submitBtn').innerHTML = originalBtnText;
                document.getElementById('submitBtn').disabled = false;
            }
        }
        
        // 澶勭悊缂栬緫鎴愬憳
        async function handleEditMember(e) {
            e.preventDefault();
            
            if (!editingMemberId) return;
            
            const memberIndex = members.findIndex(m => m.id === editingMemberId);
            if (memberIndex === -1) return;
            
            const oldMember = members[memberIndex];
            const department = document.getElementById('department').value;
            
            const formData = {
                name: document.getElementById('name').value.trim(),
                username: document.getElementById('username').value.trim(),
                password: document.getElementById('password').value,
                role: document.getElementById('role').value,
                department: department,
                team: department === '鎴樻枟缃? ? document.getElementById('team').value : '',
                position: department === '鎴樻枟缃? ? document.getElementById('position').value : '',
                status: document.getElementById('status').value
            };
            
            // 楠岃瘉鏁版嵁
            if (!validateMemberData(formData, false, oldMember.username)) return;
            
            // 鏄剧ず淇濆瓨涓姸鎬?
            const originalBtnText = document.getElementById('submitBtn').innerHTML;
            document.getElementById('submitBtn').innerHTML = '<i class="fas fa-spinner fa-spin"></i> 淇濆瓨涓?..';
            document.getElementById('submitBtn').disabled = true;
            
            try {
                // 1. 棣栧厛灏濊瘯鏇存柊鍒颁簯绔?
                let cloudResult = null;
                if (cloudEnabled && currentCloudSync) {
                    cloudResult = await updateUserInSupabase(oldMember.id, {
                        ...formData,
                        joinDate: oldMember.joinDate,
                        notes: oldMember.notes
                    });
                }
                
                // 2. 鏇存柊鏈湴鎴愬憳淇℃伅
                members[memberIndex] = {
                    ...oldMember,
                    name: formData.name,
                    username: formData.username,
                    role: formData.role,
                    department: formData.department,
                    team: formData.team,
                    position: formData.position,
                    status: formData.status
                };
                
                // 3. 鏇存柊鏈湴瀛樺偍
                if (oldMember.username !== formData.username) {
                    // 濡傛灉鐢ㄦ埛鍚嶆敼鍙橈紝鍒犻櫎鏃ф暟鎹紝娣诲姞鏂版暟鎹?
                    deleteMemberData(oldMember.username);
                }
                saveMemberData(formData.username, {
                    ...formData,
                    id: oldMember.id,
                    joinDate: oldMember.joinDate,
                    notes: oldMember.notes
                });
                
                // 4. 鏇存柊鏄剧ず
                filteredMembers = [...members];
                hideModal();
                updateStats();
                renderMembers();
                
                // 5. 鏄剧ず鎴愬姛娑堟伅
                let successMsg = '鎴愬憳淇℃伅宸叉洿鏂帮紒';
                if (cloudResult && cloudResult.success) {
                    successMsg += '\n\n鉁?浜戠鏁版嵁宸插悓姝?;
                } else if (cloudEnabled && currentCloudSync) {
                    successMsg += '\n\n鈿狅笍 浜戠鏇存柊澶辫触锛屼粎鏇存柊鏈湴鏁版嵁';
                }
                
                alert(successMsg);
                
            } catch (error) {
                console.error('缂栬緫鎴愬憳澶辫触:', error);
                alert('缂栬緫鎴愬憳澶辫触: ' + error.message);
            } finally {
                // 鎭㈠鎸夐挳鐘舵€?
                document.getElementById('submitBtn').innerHTML = originalBtnText;
                document.getElementById('submitBtn').disabled = false;
            }
        }
        
        // 楠岃瘉鎴愬憳鏁版嵁
        function validateMemberData(data, isNew = false, oldUsername = '') {
            // 楠岃瘉鐢ㄦ埛鍚?
            if (!/^[a-zA-Z0-9_\u4e00-\u9fa5]{2,20}$/.test(data.username)) {
                alert('鐢ㄦ埛鍚嶆牸寮忎笉姝ｇ‘锛佸彧鑳藉寘鍚腑鏂囥€佽嫳鏂囥€佹暟瀛楀拰涓嬪垝绾匡紝闀垮害2-20浣?);
                return false;
            }
            
            // 楠岃瘉鏂扮敤鎴峰悕鐨勫敮涓€鎬?
            if (isNew && members.some(m => m.username === data.username)) {
                alert('璇ョ敤鎴峰悕宸茶浣跨敤锛岃閫夋嫨鍏朵粬鐢ㄦ埛鍚嶏紒');
                return false;
            }
            
            // 楠岃瘉缂栬緫鏃剁敤鎴峰悕鐨勫敮涓€鎬э紙鎺掗櫎褰撳墠鎴愬憳锛?
            if (!isNew && oldUsername !== data.username && members.some(m => m.username === data.username && m.id !== editingMemberId)) {
                alert('璇ョ敤鎴峰悕宸茶鍏朵粬鎴愬憳浣跨敤锛?);
                return false;
            }
            
            // 楠岃瘉瀵嗙爜
            if (data.password.length < 6) {
                alert('瀵嗙爜闀垮害鑷冲皯涓?浣嶏紒');
                return false;
            }
            
            if (data.password !== document.getElementById('confirmPassword').value) {
                alert('涓ゆ杈撳叆鐨勫瘑鐮佷笉涓€鑷达紒');
                return false;
            }
            
            // 楠岃瘉鎴樻枟缃叉垚鍛樼殑闃熶紞鍜岃亴浣?
            if (data.department === '鎴樻枟缃?) {
                if (!data.team || data.team === '璇烽€夋嫨闃熶紞') {
                    alert('鎴樻枟缃叉垚鍛樺繀椤婚€夋嫨鎵€灞為槦浼嶏紒');
                    return false;
                }
                if (!data.position || data.position === '璇烽€夋嫨鑱屼綅') {
                    alert('鎴樻枟缃叉垚鍛樺繀椤婚€夋嫨缁勫唴鑱屼綅锛?);
                    return false;
                }
            }
            
            return true;
        }
        
        // 淇濆瓨鎴愬憳鏁版嵁鍒版湰鍦板瓨鍌?
        function saveMemberData(username, data) {
            const usersData = JSON.parse(localStorage.getItem(USERS_STORAGE_KEY) || '{}');
            usersData[username] = {
                id: data.id,
                name: data.name,
                password: data.password,
                role: data.role,
                status: data.status,
                joinDate: data.joinDate,
                notes: data.notes,
                department: data.department,
                team: data.team,
                position: data.position
            };
            
            localStorage.setItem(USERS_STORAGE_KEY, JSON.stringify(usersData));
            updateLoginSystemUsers(usersData);
            
            const loginUsers = JSON.parse(localStorage.getItem('login_users') || '{}');
            const loginRole = data.role === 'user' ? 'member' : data.role;
            loginUsers[username] = {
                password: data.password,
                role: loginRole,
                name: data.name,
                department: data.department,
                team: data.team,
                position: data.position
            };
            
            localStorage.setItem('login_users', JSON.stringify(loginUsers));
        }
        
        // 鍒犻櫎鎴愬憳鏁版嵁浠庢湰鍦板瓨鍌?
        function deleteMemberData(username) {
            const usersData = JSON.parse(localStorage.getItem(USERS_STORAGE_KEY) || '{}');
            delete usersData[username];
            localStorage.setItem(USERS_STORAGE_KEY, JSON.stringify(usersData));
            updateLoginSystemUsers(usersData);
            
            const loginUsers = JSON.parse(localStorage.getItem('login_users') || '{}');
            delete loginUsers[username];
            localStorage.setItem('login_users', JSON.stringify(loginUsers));
        }
        
        // 鏄剧ず鍒犻櫎纭寮圭獥
        function showDeleteModal(memberId) {
            deletingMemberId = memberId;
            const member = members.find(m => m.id === memberId);
            
            if (member) {
                // 涓嶈兘鍒犻櫎褰撳墠鐧诲綍鐨勭鐞嗗憳鑷繁
                const currentUser = localStorage.getItem('auth_user');
                if (member.username === currentUser) {
                    alert('涓嶈兘鍒犻櫎鎮ㄨ嚜宸辩殑璐︽埛锛?);
                    return;
                }
                
                document.getElementById('deleteMemberName').textContent = `${member.name} (@${member.username})`;
                document.getElementById('deleteModal').style.display = 'flex';
            }
        }
        
        // 纭鍒犻櫎鎴愬憳
        async function confirmDelete() {
            if (!deletingMemberId) return;
            
            const memberIndex = members.findIndex(m => m.id === deletingMemberId);
            if (memberIndex === -1) return;
            
            const memberToDelete = members[memberIndex];
            
            // 鏄剧ず鍒犻櫎涓姸鎬?
            const deleteBtn = document.querySelector('.btn[style*="background: rgba(255, 107, 107, 0.8)"]');
            const originalBtnText = deleteBtn.innerHTML;
            deleteBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 鍒犻櫎涓?..';
            deleteBtn.disabled = true;
            
            try {
                // 1. 棣栧厛灏濊瘯浠庝簯绔垹闄?
                let cloudResult = null;
                if (cloudEnabled && currentCloudSync) {
                    cloudResult = await deleteUserFromSupabase(memberToDelete.id);
                }
                
                // 2. 浠庢湰鍦版暟缁勪腑鍒犻櫎
                members.splice(memberIndex, 1);
                
                // 3. 浠庢湰鍦板瓨鍌ㄥ垹闄?
                deleteMemberData(memberToDelete.username);
                
                // 4. 鏇存柊鏄剧ず
                filteredMembers = [...members];
                hideDeleteModal();
                updateStats();
                renderMembers();
                
                // 5. 鏄剧ず鎴愬姛娑堟伅
                let successMsg = `鎴愬憳 "${memberToDelete.name}" 宸插垹闄わ紒`;
                if (cloudResult && cloudResult.success) {
                    successMsg += '\n\n鉁?浜戠鏁版嵁宸插悓姝ュ垹闄?;
                } else if (cloudEnabled && currentCloudSync) {
                    successMsg += '\n\n鈿狅笍 浜戠鍒犻櫎澶辫触锛屼粎鍒犻櫎鏈湴鏁版嵁';
                }
                
                alert(successMsg);
                
            } catch (error) {
                console.error('鍒犻櫎鎴愬憳澶辫触:', error);
                alert('鍒犻櫎鎴愬憳澶辫触: ' + error.message);
            } finally {
                // 鎭㈠鎸夐挳鐘舵€?
                deleteBtn.innerHTML = originalBtnText;
                deleteBtn.disabled = false;
            }
        }
        
        // ================================================
        // 8. 杈呭姪鍑芥暟
        // ================================================
        
        // 闅愯棌寮圭獥
        function hideModal() {
            document.getElementById('memberModal').style.display = 'none';
        }
        
        function hideDeleteModal() {
            document.getElementById('deleteModal').style.display = 'none';
        }
        
        // 鍒囨崲瀵嗙爜鏄剧ず
        function togglePassword(fieldId) {
            const input = document.getElementById(fieldId);
            const icon = input.nextElementSibling.querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }
        
        // 鍒锋柊鎴愬憳鍒楄〃
        async function refreshMembers() {
            await loadMembers();
            document.getElementById('searchInput').value = '';
            alert('鎴愬憳鍒楄〃宸插埛鏂帮紒');
        }
        
        // 鍚屾鍒颁簯绔寜閽?
        async function syncToCloud() {
            const result = await syncLocalToSupabase();
            if (result) {
                // 閲嶆柊鍔犺浇鏁版嵁锛岀‘淇濇樉绀轰簯绔姸鎬?
                await loadMembers();
            }
        }
        
        // 瀵煎嚭鎴愬憳鏁版嵁
        function exportMembers() {
            const exportData = {
                exportTime: new Date().toISOString(),
                cloudSync: currentCloudSync,
                totalMembers: members.length,
                members: members.map(m => ({
                    id: m.id,
                    name: m.name,
                    username: m.username,
                    role: m.role,
                    department: m.department,
                    team: m.team,
                    position: m.position,
                    status: m.status,
                    joinDate: m.joinDate
                }))
            };
            
            const dataStr = JSON.stringify(exportData, null, 2);
            const dataBlob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(dataBlob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `members-${new Date().toISOString().split('T')[0]}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            alert('鏁版嵁瀵煎嚭鎴愬姛锛?);
        }
        
        // 閫€鍑虹櫥褰?
        function logout() {
            if (confirm('纭畾瑕侀€€鍑虹櫥褰曞悧锛?)) {
                localStorage.removeItem('auth_user');
                localStorage.removeItem('auth_role');
                localStorage.removeItem('auth_time');
                window.location.href = 'index.html';
            }
        }
    </script>
