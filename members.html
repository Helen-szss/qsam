<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理成员 - 管理局控制台</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 添加 Supabase 客户端库 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        /* 全局样式 - 确保全屏 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            overflow: auto;
        }
        
        /* 控制台样式 - 全屏 */
        .desktop {
            min-height: 100vh;
            width: 100%;
            background: radial-gradient(circle at center, #0a2463, #000000);
            padding: 0;
            position: relative;
            overflow: visible;
        }
        
        /* 顶部状态栏 - 固定 */
        .status-bar {
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(10, 36, 99, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 150, 255, 0.3);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .system-info {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: nowrap;
        }
        
        /* 返回按钮样式 */
        .back-btn {
            background: rgba(0, 150, 255, 0.2);
            border: 1px solid rgba(0, 150, 255, 0.5);
            color: #4fc3ff;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            white-space: nowrap;
            margin-right: 15px;
        }

        .back-btn:hover {
            background: rgba(0, 150, 255, 0.3);
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(0, 150, 255, 0.3);
        }

        .back-btn i {
            font-size: 0.8rem;
        }
        
        .system-logo {
            width: 40px;
            height: 40px;
            filter: drop-shadow(0 0 10px rgba(0, 150, 255, 0.7));
        }
        
        .system-name {
            font-size: 1.5rem;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0066cc, #0099ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
        }
        
        .time-display {
            color: #a3d5ff;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }
        
        /* 主要内容区域 - 全屏 */
        .main-content {
            width: 100%;
            min-height: calc(100vh - 80px);
            padding: 30px;
            overflow: auto;
        }
        
        /* 内容容器 */
        .content-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }
        
        /* 统计卡片网格 */
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            width: 100%;
        }
        
        .stat-card {
            background: rgba(10, 36, 99, 0.7);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 15px;
            padding: 25px 20px;
            text-align: center;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 150, 255, 0.2);
            border-color: rgba(0, 150, 255, 0.5);
        }
        
        .stat-value {
            font-size: 2.2rem;
            font-weight: bold;
            background: linear-gradient(90deg, #4fc3ff, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 10px 0;
            text-shadow: 0 0 10px rgba(79, 195, 255, 0.3);
        }
        
        .stat-label {
            color: #a3d5ff;
            font-size: 0.95rem;
            letter-spacing: 1px;
        }
        
        /* 快速操作 */
        .quick-actions {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            width: 100%;
        }
        
        .action-btn {
            padding: 12px 25px;
            background: rgba(10, 36, 99, 0.7);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 10px;
            color: #a3d5ff;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            white-space: nowrap;
        }
        
        .action-btn:hover {
            background: rgba(0, 150, 255, 0.2);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 150, 255, 0.2);
        }
        
        .action-btn.primary {
            background: linear-gradient(135deg, #0066cc, #0099ff);
            color: white;
            border: none;
        }
        
        .action-btn.primary:hover {
            background: linear-gradient(135deg, #0099ff, #00ccff);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 150, 255, 0.3);
        }
        
        /* 成员列表卡片 - 全宽 */
        .card-container {
            background: rgba(10, 36, 99, 0.7);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            width: 100%;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .card-title {
            font-size: 1.5rem;
            background: linear-gradient(90deg, #4fc3ff, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }
        
        /* 搜索框 */
        .search-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            min-width: 250px;
        }
        
        .search-input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            background: rgba(0, 30, 80, 0.7);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 10px;
            color: #e0f7ff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .search-input:focus {
            outline: none;
            border-color: rgba(0, 200, 255, 0.6);
            box-shadow: 0 0 20px rgba(0, 150, 255, 0.3);
        }
        
        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #4fc3ff;
            font-size: 1.2rem;
        }
        
        /* 成员网格 */
        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            width: 100%;
        }
        
        .member-card {
            background: rgba(0, 30, 80, 0.5);
            border: 1px solid rgba(0, 150, 255, 0.2);
            border-radius: 12px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            cursor: pointer;
            height: 100%;
        }
        
        .member-card:hover {
            background: rgba(0, 60, 120, 0.3);
            border-color: rgba(0, 150, 255, 0.4);
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 150, 255, 0.2);
        }
        
        .member-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .member-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0066cc, #0099ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: white;
            flex-shrink: 0;
        }
        
        .member-title {
            flex: 1;
        }
        
        .member-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: #e0f7ff;
        }
        
        .member-username {
            font-size: 0.95rem;
            color: #a3d5ff;
            margin-bottom: 5px;
        }
        
        /* 成员详细信息 */
        .member-details {
            flex: 1;
            margin-bottom: 20px;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(0, 150, 255, 0.1);
        }
        
        .detail-label {
            color: #6b9ccc;
            font-size: 0.9rem;
        }
        
        .detail-value {
            color: #e0f7ff;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .status-active {
            background: rgba(107, 255, 184, 0.2);
            color: #6bffb8;
            border: 1px solid rgba(107, 255, 184, 0.5);
        }
        
        .role-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
            background: rgba(79, 195, 255, 0.2);
            color: #4fc3ff;
            border: 1px solid rgba(79, 195, 255, 0.5);
        }
        
        .department-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
            border: 1px solid rgba(255, 193, 7, 0.5);
        }
        
        .team-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
            background: rgba(156, 39, 176, 0.2);
            color: #9c27b0;
            border: 1px solid rgba(156, 39, 176, 0.5);
        }
        
        .position-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 1px solid rgba(76, 175, 80, 0.5);
        }
        
        /* 成员操作区域 */
        .member-actions {
            display: flex;
            gap: 10px;
            margin-top: auto;
            padding-top: 15px;
            border-top: 1px solid rgba(0, 150, 255, 0.1);
        }
        
        .action-icon {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-size: 0.9rem;
            gap: 6px;
        }
        
        .action-view {
            background: rgba(79, 195, 255, 0.2);
            color: #4fc3ff;
        }
        
        .action-view:hover {
            background: rgba(79, 195, 255, 0.3);
            transform: translateY(-2px);
        }
        
        .action-edit {
            background: rgba(255, 217, 61, 0.2);
            color: #ffd93d;
        }
        
        .action-edit:hover {
            background: rgba(255, 217, 61, 0.3);
            transform: translateY(-2px);
        }
        
        .action-delete {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
        }
        
        .action-delete:hover {
            background: rgba(255, 107, 107, 0.3);
            transform: translateY(-2px);
        }
        
        /* 弹窗样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }
        
        .modal-content {
            background: radial-gradient(circle at center, #0a2463, #000000);
            border: 2px solid rgba(0, 150, 255, 0.5);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 0 50px rgba(0, 150, 255, 0.3);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        
        .modal-title {
            background: linear-gradient(90deg, #4fc3ff, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.4rem;
        }
        
        .close-btn {
            background: none;
            border: none;
            color: #ff6b6b;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
        }
        
        /* 表单样式 */
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #a3d5ff;
            font-size: 0.95rem;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 20px;
            background: rgba(0, 30, 80, 0.7);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 10px;
            color: #e0f7ff;
            font-size: 1rem;
        }
        
        .form-input:focus {
            outline: none;
            border-color: rgba(0, 200, 255, 0.6);
            box-shadow: 0 0 15px rgba(0, 150, 255, 0.2);
        }
        
        .password-wrapper {
            position: relative;
        }
        
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #a3d5ff;
            cursor: pointer;
            padding: 5px;
        }
        
        .form-select {
            width: 100%;
            padding: 12px 20px;
            background: rgba(0, 30, 80, 0.7);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 10px;
            color: #e0f7ff;
            cursor: pointer;
        }
        
        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 30px;
        }
        
        .btn {
            padding: 12px 25px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }
        
        .btn-cancel {
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid rgba(255, 107, 107, 0.5);
            color: #ff6b6b;
        }
        
        .btn-cancel:hover {
            background: rgba(255, 107, 107, 0.3);
        }
        
        .btn-save {
            background: linear-gradient(135deg, #00a86b, #00cc88);
            color: white;
        }
        
        .btn-save:hover {
            background: linear-gradient(135deg, #00cc88, #00a86b);
            transform: translateY(-2px);
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b9ccc;
            grid-column: 1 / -1;
        }
        
        .empty-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            color: rgba(0, 150, 255, 0.3);
        }
        
        /* 响应式设计 */
        @media (max-width: 1200px) {
            .members-grid {
                grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            }
        }
        
        @media (max-width: 768px) {
            .main-content {
                padding: 20px 15px;
            }
            
            .status-bar {
                padding: 15px 20px;
                flex-wrap: wrap;
                gap: 15px;
            }
            
            .members-grid {
                grid-template-columns: 1fr;
            }
            
            .card-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .search-container {
                max-width: 100%;
            }
            
            .quick-actions {
                justify-content: center;
            }
            
            .action-btn {
                flex: 1;
                min-width: 150px;
                justify-content: center;
            }
            
            /* 响应式下的返回按钮 */
            .back-btn {
                margin-right: 10px;
                padding: 6px 12px;
                font-size: 0.8rem;
            }
            
            .back-btn span {
                display: none; /* 在小屏幕上隐藏"返回"文字 */
            }
            
            .back-btn i {
                margin-right: 0;
                font-size: 0.9rem;
            }
        }
        
        /* 退出按钮 */
        .logout-btn {
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid rgba(255, 107, 107, 0.5);
            color: #ff6b6b;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-left: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .logout-btn:hover {
            background: rgba(255, 107, 107, 0.3);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <!-- 控制台界面 -->
    <div class="desktop">
        <!-- 顶部状态栏 -->
        <div class="status-bar">
            <div class="system-info">
                <!-- 返回按钮 -->
                <button class="back-btn" onclick="goBackToAdmin()" title="返回">
                    <i class="fas fa-chevron-left"></i>
                    <span>返回</span>
                </button>
                
                <img src="qsamlogo.png" alt="系统标志" class="system-logo">
                <div class="system-name">成员管理控制台</div>
            </div>
            
            <div class="user-info">
                <div class="time-display" id="currentTime">00:00:00</div>
                <div class="user-avatar">
                    <i class="fas fa-user-shield"></i>
                </div>
                <div>
                    <div id="userDisplayName" style="color: #ffd93d;">访客</div>
                    <div id="userRoleText" style="font-size: 0.8rem; color: #a3d5ff;">-</div>
                </div>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> 退出
                </button>
            </div>
        </div>
        
        <!-- 主要内容区域 -->
        <div class="main-content">
            <div class="content-wrapper">
                <!-- 统计卡片 -->
                <div class="stats-cards">
                    <div class="stat-card">
                        <div class="stat-label">总成员数</div>
                        <div class="stat-value" id="totalMembers">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">战斗署成员</div>
                        <div class="stat-value" id="combatMembers">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">管理员</div>
                        <div class="stat-value" id="adminCount">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">今日新增</div>
                        <div class="stat-value" id="todayNew">0</div>
                    </div>
                </div>
                
                <!-- 快速操作 -->
                <div class="quick-actions">
                    <button class="action-btn primary" onclick="showAddModal()">
                        <i class="fas fa-plus"></i> 添加新成员
                    </button>
                    <button class="action-btn" onclick="refreshMembers()">
                        <i class="fas fa-sync-alt"></i> 刷新列表
                    </button>
                    <button class="action-btn" onclick="exportMembers()">
                        <i class="fas fa-download"></i> 导出数据
                    </button>
                    <button class="action-btn" onclick="syncToCloud()" title="同步数据到云端">
                        <i class="fas fa-cloud-upload-alt"></i> 同步到云端
                    </button>
                </div>
                
                <!-- 云端状态指示器 -->
                <div id="cloudStatus" style="margin-bottom: 20px; display: none;">
                    <div style="background: rgba(0, 60, 120, 0.5); padding: 10px 20px; border-radius: 10px; border: 1px solid rgba(0, 150, 255, 0.3);">
                        <span id="cloudStatusText" style="color: #a3d5ff;">
                            <i class="fas fa-cloud"></i> 正在检查云端连接...
                        </span>
                    </div>
                </div>
                
                <!-- 成员列表卡片 -->
                <div class="card-container">
                    <div class="card-header">
                        <h2 class="card-title">成员列表</h2>
                        <div class="search-container">
                            <i class="fas fa-search search-icon"></i>
                            <input type="text" class="search-input" placeholder="搜索成员姓名或用户名..." id="searchInput" onkeyup="searchMembers()">
                        </div>
                    </div>
                    
                    <div class="members-grid" id="membersContainer">
                        <!-- 成员列表会通过JavaScript动态生成 -->
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 添加/编辑成员弹窗 -->
    <div class="modal-overlay" id="memberModal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">添加新成员</h2>
                <button class="close-btn" onclick="hideModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="memberForm">
                <div class="form-group">
                    <label class="form-label">姓名 *</label>
                    <input type="text" class="form-input" id="name" name="name" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">登录用户名 *</label>
                    <input type="text" class="form-input" id="username" name="username" required>
                    <div style="font-size: 0.8rem; color: #a3d5ff; margin-top: 5px;">
                        用于登录系统的唯一用户名
                    </div>

                switch(status) {

                const cloudUsers = await loadUsersFromSupabase();
                
                if (cloudUsers && cloudUsers.length > 0) {
                    // 云端数据可用，使用云端数据
                    console.log('使用云端数据');
                    members = cloudUsers.map(user => ({
                        id: user.id,
                        name: user.name,
                        username: user.username,
                        role: user.role,
                        status: user.status,
                        joinDate: user.join_date,
                        notes: user.notes,
                        department: user.department || '未分配',
                        team: user.team || '',
                        position: user.position || ''
                    }));
                    
                    // 同步到本地存储作为缓存
                    await saveUsersToLocalStorage(cloudUsers);
                    currentCloudSync = true;
                    
                } else {
                    // 云端不可用，使用本地数据
                    console.log('云端数据不可用，使用本地数据');
                    const stored = localStorage.getItem(USERS_STORAGE_KEY);
                    
                    if (stored) {
                        try {
                            const usersData = JSON.parse(stored);
                            members = Object.entries(usersData).map(([username, user]) => ({
                                id: user.id,
                                name: user.name,
                                username: username,
                                role: user.role,
                                status: user.status,
                                joinDate: user.joinDate,
                                notes: user.notes,
                                department: user.department || '未分配',
                                team: user.team || '',
                                position: user.position || ''
                            }));
                        } catch (e) {
                            console.error('加载用户数据失败:', e);
                            loadDefaultMembers();
                        }
                    } else {
                        loadDefaultMembers();
                    }
                    currentCloudSync = false;
                }
                
                filteredMembers = [...members];
                updateStats();
                renderMembers();
                
            } catch (error) {
                console.error('加载成员数据失败:', error);
                
                // 显示错误状态
                if (membersContainer) {
                    membersContainer.innerHTML = `
                        <div style="grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: #ff6b6b;">
                            <i class="fas fa-exclamation-triangle" style="font-size: 3rem; margin-bottom: 20px;"></i>
                            <h3>加载失败</h3>
                            <p>${error.message}</p>
                            <button onclick="location.reload()" style="
                                margin-top: 20px;
                                padding: 10px 20px;
                                background: rgba(255, 107, 107, 0.2);
                                border: 1px solid rgba(255, 107, 107, 0.5);
                                color: #ff6b6b;
                                border-radius: 8px;
                                cursor: pointer;
                            ">
                                <i class="fas fa-redo"></i> 重新加载
                            </button>
                        </div>
                    `;
                }
            }
        }
        
        // 保存用户数据到本地存储
        async function saveUsersToLocalStorage(cloudUsers) {
            const usersData = {};
            const loginUsersData = {};
            
            cloudUsers.forEach(user => {
                usersData[user.username] = {
                    id: user.id,
                    name: user.name,
                    password: user.password,
                    role: user.role,
                    status: user.status,
                    joinDate: user.join_date,
                    notes: user.notes,
                    department: user.department || '未分配',
                    team: user.team || '',
                    position: user.position || ''
                };
                
                // 角色转换：'user' -> 'member' 用于登录系统
                const loginRole = user.role === 'user' ? 'member' : user.role;
                loginUsersData[user.username] = {
                    password: user.password,
                    role: loginRole,
                    name: user.name,
                    department: user.department || '未分配',
                    team: user.team || '',
                    position: user.position || ''
                };
            });
            
            localStorage.setItem(USERS_STORAGE_KEY, JSON.stringify(usersData));
            localStorage.setItem('login_users', JSON.stringify(loginUsersData));
        }
        
        // 加载默认成员数据
        function loadDefaultMembers() {
            const usersData = DEFAULT_USERS;
            members = Object.entries(usersData).map(([username, user]) => ({
                id: user.id,
                name: user.name,
                username: username,
                role: user.role,
                status: user.status,
                joinDate: user.joinDate,
                notes: user.notes,
                department: user.department || '未分配',
                team: user.team || '',
                position: user.position || ''
            }));
            
            // 保存到本地存储
            localStorage.setItem(USERS_STORAGE_KEY, JSON.stringify(usersData));
            updateLoginSystemUsers(usersData);
        }
        
        // 更新登录系统的用户数据
        function updateLoginSystemUsers(users) {
            const loginUsers = {};
            for (const [username, user] of Object.entries(users)) {
                const loginRole = user.role === 'user' ? 'member' : user.role;
                loginUsers[username] = {
                    password: user.password,
                    role: loginRole,
                    name: user.name,
                    department: user.department || '未分配',
                    team: user.team || '',
                    position: user.position || ''
                };
            }
            localStorage.setItem('login_users', JSON.stringify(loginUsers));
        }
        
        // 更新统计数据
        function updateStats() {
            const total = members.length;
            const combat = members.filter(m => m.department === '战斗署').length;
            const admins = members.filter(m => m.role === 'admin').length;
            const today = new Date().toISOString().split('T')[0];
            const todayNew = members.filter(m => m.joinDate === today).length;
            
            document.getElementById('totalMembers').textContent = total;
            document.getElementById('combatMembers').textContent = combat;
            document.getElementById('adminCount').textContent = admins;
            document.getElementById('todayNew').textContent = todayNew;
        }
        
        // ================================================
        // 6. 渲染和界面函数
        // ================================================
        
        // 渲染成员列表
        function renderMembers() {
            const container = document.getElementById('membersContainer');
            
            if (filteredMembers.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <i class="fas fa-users"></i>
                        </div>

                        <p>点击"添加新成员"按钮创建第一个成员</p>

                `;
            } else {
                container.innerHTML = filteredMembers.map(member => `
                    <div class="member-card">

                                <i class="fas fa-user"></i>
                            </div>
                            <div class="member-title">
                                <div class="member-name">${member.name}</div>
                                <div class="member-username">@${member.username}</div>

                            </div>
                        </div>
                        
                        <div class="member-details">

                                <span class="detail-label">ID</span>

                            </div>
                            <div class="detail-row">
                                <span class="detail-label">部门</span>
                                <span class="detail-value">
                                    <span class="department-badge">${member.department}</span>
                                </span>
                            </div>
                            ${member.department === '战斗署' ? `
                                <div class="detail-row">
                                    <span class="detail-label">队伍</span>
                                    <span class="detail-value">
                                        <span class="team-badge">${member.team}</span>

                                </div>
                                <div class="detail-row">

                            <div class="detail-row">

                                    <span class="status-badge status-${member.status}">${getStatusText(member.status)}</span>

                        <div class="member-actions">
                            ${member.role === 'user' ? `
                                <button class="action-icon action-view" onclick="viewMemberDetail(${member.id})" title="查看详情">
                                    <i class="fas fa-eye"></i> 详情
                                </button>
                            ` : ''}

                            </button>
                            <button class="action-icon action-delete" onclick="showDeleteModal(${member.id})" title="删除成员">
                                <i class="fas fa-trash-alt"></i> 删除
                            </button>
                        </div>
                    </div>
                `).join('');
            }
        }
        
        // 查看成员详情
        function viewMemberDetail(memberId) {
            const member = members.find(m => m.id === memberId);
            if (member) {
                // 记录来源页面，供详情页的“返回”按钮优先使用
                try { sessionStorage.setItem('previousPage', 'members.html'); } catch (e) { /* ignore */ }
                // 跳转到成员详情页面
                localStorage.setItem('viewing_member_id', memberId);
                localStorage.setItem('viewing_member_username', member.username);
                window.location.href = 'member-detail.html';
            }
        }
        
        // 获取状态文本
        function getStatusText(status) {
            const statusMap = {
                'active': '活跃',
                'inactive': '未激活',
                'pending': '待审核'
            };
            return statusMap[status] || status;
        }
        
        // 获取角色文本
        function getRoleText(role) {
            const roleMap = {
                'admin': '管理员',
                'user': '普通成员',
                'viewer': '观察员'
            };
            return roleMap[role] || role;
        }
        
        // 搜索成员
        function searchMembers() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            filteredMembers = members.filter(member => {
                return !searchTerm || 
                    member.name.toLowerCase().includes(searchTerm) ||
                    member.username.toLowerCase().includes(searchTerm) ||
                    member.department.toLowerCase().includes(searchTerm) ||
                    (member.team && member.team.toLowerCase().includes(searchTerm));
            });
            
            renderMembers();
        }
        
        // ================================================
        // 7. 成员操作函数（添加/编辑/删除）
        // ================================================
        
        // 显示添加成员弹窗
        function showAddModal(prefill = null) {
            editingMemberId = null;
            document.getElementById('modalTitle').textContent = '添加新成员';
            document.getElementById('submitBtn').textContent = '添加成员';
            
            const form = document.getElementById('memberForm');
            form.reset();
            pendingMemberNotes = '';
            
            // 重置部门相关字段显示
            document.getElementById('department').value = '未分配';
            document.getElementById('teamGroup').style.display = 'none';
            document.getElementById('positionGroup').style.display = 'none';
            document.getElementById('team').value = '';
            document.getElementById('position').value = '';

            if (prefill) {
                applyMemberPrefill(prefill);
            }
            
            form.onsubmit = handleAddMember;
            
            document.getElementById('memberModal').style.display = 'flex';
        }

        function applyMemberPrefill(prefill) {
            const nameInput = document.getElementById('name');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const confirmPasswordInput = document.getElementById('confirmPassword');
            const roleSelect = document.getElementById('role');
            const departmentSelect = document.getElementById('department');
            const statusSelect = document.getElementById('status');

            if (nameInput) nameInput.value = prefill.name || '';
            if (usernameInput) usernameInput.value = prefill.username || '';
            if (passwordInput) passwordInput.value = prefill.password || '';
            if (confirmPasswordInput) confirmPasswordInput.value = prefill.password || '';
            if (roleSelect) roleSelect.value = prefill.role || 'user';
            if (departmentSelect) departmentSelect.value = prefill.department || '未分配';
            if (statusSelect) statusSelect.value = prefill.status || 'active';

            toggleTeamFields();

            if (prefill.department === '战斗署') {
                const teamSelect = document.getElementById('team');
                const positionSelect = document.getElementById('position');
                if (teamSelect) teamSelect.value = prefill.team || '';
                if (positionSelect) positionSelect.value = prefill.position || '';
            }

            pendingMemberNotes = prefill.notes || '';
        }

        function consumePendingMemberSetup() {
            const pendingKey = 'pending_member_setup';
            const raw = sessionStorage.getItem(pendingKey);
            if (!raw) return;

            sessionStorage.removeItem(pendingKey);

            try {
                const pendingSetup = JSON.parse(raw);
                showAddModal(pendingSetup);
            } catch (e) {
                console.warn('解析终审转入的成员预填数据失败:', e);
            }
        }
        
        // 编辑成员
        function editMember(memberId) {
            editingMemberId = memberId;
            const member = members.find(m => m.id === memberId);
            
            if (!member) return;
            
            document.getElementById('modalTitle').textContent = '编辑成员信息';
            document.getElementById('submitBtn').textContent = '保存修改';
            
            // 从本地存储获取完整数据
            const usersData = JSON.parse(localStorage.getItem(USERS_STORAGE_KEY) || '{}');
            const userData = usersData[member.username];
            const password = userData ? userData.password : '********';
            
            document.getElementById('name').value = member.name;
            document.getElementById('username').value = member.username;
            document.getElementById('password').value = password;
            document.getElementById('confirmPassword').value = password;
            document.getElementById('role').value = member.role;
            document.getElementById('department').value = member.department;
            document.getElementById('status').value = member.status;
            
            // 根据部门显示/隐藏队伍和职位字段
            toggleTeamFields();
            
            if (member.department === '战斗署') {
                document.getElementById('team').value = member.team;
                document.getElementById('position').value = member.position;
            }
            
            const form = document.getElementById('memberForm');
            form.onsubmit = handleEditMember;
            
            document.getElementById('memberModal').style.display = 'flex';
        }
        
        // 切换队伍和职位字段的显示
        function toggleTeamFields() {
            const department = document.getElementById('department').value;
            const teamGroup = document.getElementById('teamGroup');
            const positionGroup = document.getElementById('positionGroup');
            
            if (department === '战斗署') {
                teamGroup.style.display = 'block';
                positionGroup.style.display = 'block';
                document.getElementById('team').required = true;
                document.getElementById('position').required = true;
            } else {
                teamGroup.style.display = 'none';
                positionGroup.style.display = 'none';
                document.getElementById('team').required = false;
                document.getElementById('position').required = false;
                document.getElementById('team').value = '';
                document.getElementById('position').value = '';
            }
        }
        
        // 处理添加成员
        async function handleAddMember(e) {
            e.preventDefault();
            
            const department = document.getElementById('department').value;
            
            const formData = {
                name: document.getElementById('name').value.trim(),
                username: document.getElementById('username').value.trim(),
                password: document.getElementById('password').value,
                role: document.getElementById('role').value,
                department: department,
                team: department === '战斗署' ? document.getElementById('team').value : '',
                position: department === '战斗署' ? document.getElementById('position').value : '',
                status: document.getElementById('status').value,
                joinDate: new Date().toISOString().split('T')[0],
                notes: '新添加的成员'
            };
            
            // 验证数据
            if (!validateMemberData(formData, true)) return;
            
            // 显示保存中状态
            const originalBtnText = document.getElementById('submitBtn').innerHTML;
            document.getElementById('submitBtn').innerHTML = '<i class="fas fa-spinner fa-spin"></i> 保存中...';
            document.getElementById('submitBtn').disabled = true;
            
            try {
                // 1. 首先尝试保存到云端
                let cloudResult = null;
                if (cloudEnabled) {
                    cloudResult = await addUserToSupabase(formData);
                }
                
                // 生成新ID（如果云端保存失败，使用本地ID）
                let newId;
                if (cloudResult && cloudResult.success) {
                    newId = cloudResult.data.id; // 使用云端返回的ID
                    formData.id = newId;
                    console.log('使用云端生成的ID:', newId);
                } else {
                    newId = members.length > 0 ? Math.max(...members.map(m => m.id)) + 1 : 1;
                    formData.id = newId;
                    console.log('使用本地生成的ID:', newId);
                }
                
                // 2. 添加到本地成员列表
                members.push({
                    id: formData.id,
                    name: formData.name,
                    username: formData.username,
                    role: formData.role,
                    department: formData.department,
                    team: formData.team,
                    position: formData.position,
                    status: formData.status,
                    joinDate: formData.joinDate,
                    notes: formData.notes
                });
                
                // 3. 保存到本地存储
                saveMemberData(formData.username, formData);
                
                // 4. 更新显示
                filteredMembers = [...members];
                hideModal();
                updateStats();
                renderMembers();
                
                // 5. 显示成功消息
                let successMsg = `成员 "${formData.name}" 添加成功！\n用户名: ${formData.username}\n密码: ${formData.password}`;
                if (cloudResult && cloudResult.success) {
                    successMsg += '\n\n✅ 已同步到云端';
                    currentCloudSync = true;
                } else if (cloudEnabled) {
                    successMsg += '\n\n⚠️ 云端保存失败，仅保存到本地';
                }
                
                alert(successMsg);
                pendingMemberNotes = '';
                
            } catch (error) {
                console.error('添加成员失败:', error);
                alert('添加成员失败: ' + error.message);
            } finally {
                // 恢复按钮状态
                document.getElementById('submitBtn').innerHTML = originalBtnText;
                document.getElementById('submitBtn').disabled = false;
            }
        }
        
        // 处理编辑成员
        async function handleEditMember(e) {
            e.preventDefault();
            
            if (!editingMemberId) return;
            
            const memberIndex = members.findIndex(m => m.id === editingMemberId);
            if (memberIndex === -1) return;
            
            const oldMember = members[memberIndex];
            const department = document.getElementById('department').value;
            
            const formData = {
                name: document.getElementById('name').value.trim(),
                username: document.getElementById('username').value.trim(),
                password: document.getElementById('password').value,
                role: document.getElementById('role').value,
                department: department,
                team: department === '战斗署' ? document.getElementById('team').value : '',
                position: department === '战斗署' ? document.getElementById('position').value : '',
                status: document.getElementById('status').value
            };
            
            // 验证数据
            if (!validateMemberData(formData, false, oldMember.username)) return;
            
            // 显示保存中状态
            const originalBtnText = document.getElementById('submitBtn').innerHTML;
            document.getElementById('submitBtn').innerHTML = '<i class="fas fa-spinner fa-spin"></i> 保存中...';
            document.getElementById('submitBtn').disabled = true;
            
            try {
                // 1. 首先尝试更新到云端
                let cloudResult = null;
                if (cloudEnabled && currentCloudSync) {
                    cloudResult = await updateUserInSupabase(oldMember.id, {
                        ...formData,
                        joinDate: oldMember.joinDate,
                        notes: oldMember.notes
                    });
                }
                
                // 2. 更新本地成员信息
                members[memberIndex] = {
                    ...oldMember,
                    name: formData.name,
                    username: formData.username,
                    role: formData.role,
                    department: formData.department,
                    team: formData.team,
                    position: formData.position,
                    status: formData.status
                };
                
                // 3. 更新本地存储
                if (oldMember.username !== formData.username) {
                    // 如果用户名改变，删除旧数据，添加新数据
                    deleteMemberData(oldMember.username);
                }
                saveMemberData(formData.username, {
                    ...formData,
                    id: oldMember.id,
                    joinDate: oldMember.joinDate,
                    notes: oldMember.notes
                });
                
                // 4. 更新显示
                filteredMembers = [...members];
                hideModal();
                updateStats();
                renderMembers();
                
                // 5. 显示成功消息
                let successMsg = '成员信息已更新！';
                if (cloudResult && cloudResult.success) {
                    successMsg += '\n\n✅ 云端数据已同步';
                } else if (cloudEnabled && currentCloudSync) {
                    successMsg += '\n\n⚠️ 云端更新失败，仅更新本地数据';
                }
                
                alert(successMsg);
                
            } catch (error) {
                console.error('编辑成员失败:', error);
                alert('编辑成员失败: ' + error.message);
            } finally {
                // 恢复按钮状态
                document.getElementById('submitBtn').innerHTML = originalBtnText;
                document.getElementById('submitBtn').disabled = false;
            }
        }
        
        // 验证成员数据
        function validateMemberData(data, isNew = false, oldUsername = '') {
            // 验证用户名
            if (!/^[a-zA-Z0-9_\u4e00-\u9fa5]{2,20}$/.test(data.username)) {
                alert('用户名格式不正确！只能包含中文、英文、数字和下划线，长度2-20位');
                return false;
            }
            
            // 验证新用户名的唯一性
            if (isNew && members.some(m => m.username === data.username)) {
                alert('该用户名已被使用，请选择其他用户名！');
                return false;
            }
            
            // 验证编辑时用户名的唯一性（排除当前成员）
            if (!isNew && oldUsername !== data.username && members.some(m => m.username === data.username && m.id !== editingMemberId)) {
                alert('该用户名已被其他成员使用！');
                return false;
            }
            
            // 验证密码
            if (data.password.length < 6) {
                alert('密码长度至少为6位！');
                return false;
            }
            
            if (data.password !== document.getElementById('confirmPassword').value) {
                alert('两次输入的密码不一致！');
                return false;
            }
            
            // 验证战斗署成员的队伍和职位
            if (data.department === '战斗署') {
                if (!data.team || data.team === '请选择队伍') {
                    alert('战斗署成员必须选择所属队伍！');
                    return false;
                }
                if (!data.position || data.position === '请选择职位') {
                    alert('战斗署成员必须选择组内职位！');
                    return false;
                }
            }
            
            return true;
        }
        
        // 保存成员数据到本地存储
        function saveMemberData(username, data) {
            const usersData = JSON.parse(localStorage.getItem(USERS_STORAGE_KEY) || '{}');
            usersData[username] = {
                id: data.id,
                name: data.name,
                password: data.password,
                role: data.role,
                status: data.status,
                joinDate: data.joinDate,
                notes: data.notes,
                department: data.department,
                team: data.team,
                position: data.position
            };
            
            localStorage.setItem(USERS_STORAGE_KEY, JSON.stringify(usersData));
            updateLoginSystemUsers(usersData);
            
            const loginUsers = JSON.parse(localStorage.getItem('login_users') || '{}');
            const loginRole = data.role === 'user' ? 'member' : data.role;
            loginUsers[username] = {
                password: data.password,
                role: loginRole,
                name: data.name,
                department: data.department,
                team: data.team,
                position: data.position
            };
            
            localStorage.setItem('login_users', JSON.stringify(loginUsers));
        }
        
        // 删除成员数据从本地存储
        function deleteMemberData(username) {
            const usersData = JSON.parse(localStorage.getItem(USERS_STORAGE_KEY) || '{}');
            delete usersData[username];
            localStorage.setItem(USERS_STORAGE_KEY, JSON.stringify(usersData));
            updateLoginSystemUsers(usersData);
            
            const loginUsers = JSON.parse(localStorage.getItem('login_users') || '{}');
            delete loginUsers[username];
            localStorage.setItem('login_users', JSON.stringify(loginUsers));
        }
        
        // 显示删除确认弹窗
        function showDeleteModal(memberId) {
            deletingMemberId = memberId;
            const member = members.find(m => m.id === memberId);
            
            if (member) {
                // 不能删除当前登录的管理员自己
                const currentUser = localStorage.getItem('auth_user');
                if (member.username === currentUser) {
                    alert('不能删除您自己的账户！');
                    return;
                }
                
                document.getElementById('deleteMemberName').textContent = `${member.name} (@${member.username})`;
                document.getElementById('deleteModal').style.display = 'flex';
            }
        }
        
        // 确认删除成员
        async function confirmDelete() {
            if (!deletingMemberId) return;
            
            const memberIndex = members.findIndex(m => m.id === deletingMemberId);
            if (memberIndex === -1) return;
            
            const memberToDelete = members[memberIndex];
            
            // 显示删除中状态
            const deleteBtn = document.querySelector('.btn[style*="background: rgba(255, 107, 107, 0.8)"]');
            const originalBtnText = deleteBtn.innerHTML;
            deleteBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 删除中...';
            deleteBtn.disabled = true;
            
            try {
                // 1. 首先尝试从云端删除
                let cloudResult = null;
                if (cloudEnabled && currentCloudSync) {
                    cloudResult = await deleteUserFromSupabase(memberToDelete.id);
                }
                
                // 2. 从本地数组中删除
                members.splice(memberIndex, 1);
                
                // 3. 从本地存储删除
                deleteMemberData(memberToDelete.username);
                
                // 4. 更新显示
                filteredMembers = [...members];
                hideDeleteModal();
                updateStats();
                renderMembers();
                
                // 5. 显示成功消息
                let successMsg = `成员 "${memberToDelete.name}" 已删除！`;
                if (cloudResult && cloudResult.success) {
                    successMsg += '\n\n✅ 云端数据已同步删除';
                } else if (cloudEnabled && currentCloudSync) {
                    successMsg += '\n\n⚠️ 云端删除失败，仅删除本地数据';
                }
                
                alert(successMsg);
                
            } catch (error) {
                console.error('删除成员失败:', error);
                alert('删除成员失败: ' + error.message);
            } finally {
                // 恢复按钮状态
                deleteBtn.innerHTML = originalBtnText;
                deleteBtn.disabled = false;
            }
        }
        
        // ================================================
        // 8. 辅助函数
        // ================================================
        
        // 隐藏弹窗
        function hideModal() {
            document.getElementById('memberModal').style.display = 'none';
        }
        
        function hideDeleteModal() {
            document.getElementById('deleteModal').style.display = 'none';
        }
        
        // 切换密码显示
        function togglePassword(fieldId) {
            const input = document.getElementById(fieldId);
            const icon = input.nextElementSibling.querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }
        
        // 刷新成员列表
        async function refreshMembers() {
            await loadMembers();
            document.getElementById('searchInput').value = '';
            alert('成员列表已刷新！');
        }
        
        // 同步到云端按钮
        async function syncToCloud() {
            const result = await syncLocalToSupabase();
            if (result) {
                // 重新加载数据，确保显示云端状态
                await loadMembers();
            }
        }
        
        // 导出成员数据
        function exportMembers() {
            const exportData = {
                exportTime: new Date().toISOString(),
                cloudSync: currentCloudSync,
                totalMembers: members.length,
                members: members.map(m => ({
                    id: m.id,
                    name: m.name,
                    username: m.username,
                    role: m.role,
                    department: m.department,
                    team: m.team,
                    position: m.position,
                    status: m.status,
                    joinDate: m.joinDate,
                    notes: m.notes || ''
                }))
            };
            
            const dataStr = JSON.stringify(exportData, null, 2);
            const dataBlob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(dataBlob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `members-${new Date().toISOString().split('T')[0]}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            alert('数据导出成功！');
        }
        
        // 退出登录
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('auth_user');
                localStorage.removeItem('auth_role');
                localStorage.removeItem('auth_time');
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
