        function updateTime() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const seconds = now.getSeconds().toString().padStart(2, '0');
            document.getElementById('currentTime').textContent = `${hours}:${minutes}:${seconds}`;
        }
        
        // 鍔犺浇瀹為獙浣撴暟鎹?
        async function loadSubjects() {
            showLoading('姝ｅ湪浠庝簯绔姞杞芥暟鎹?..');
            
            try {
                // 浠嶴upabase鍔犺浇瀹為獙浣撴暟鎹?
                const { data: subjects, error } = await supabaseClient
                    .from('subjects')
                    .select(`
                        *,
                        subject_details (*)
                    `)
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                
                allSubjects = subjects || [];
                filteredSubjects = [...allSubjects];
                
                // 鏇存柊缁熻鏁版嵁
                updateStats();
                
                // 娓叉煋瀹為獙浣撳垪琛?
                renderSubjects();
                
                console.log(`鎴愬姛鍔犺浇 ${allSubjects.length} 涓疄楠屼綋`);
                
            } catch (error) {
                console.error('鍔犺浇瀹為獙浣撴暟鎹け璐?', error);
                showError('鏁版嵁鍔犺浇澶辫触: ' + error.message);
                
                // 鏄剧ず绌虹姸鎬?
                document.getElementById('emptyState').style.display = 'block';
                document.getElementById('subjectsGrid').innerHTML = '';
                document.getElementById('statsCard').innerHTML = '';
                document.getElementById('pagination').style.display = 'none';
            } finally {
                hideLoading();
            }
        }
        
        // 鏇存柊缁熻鏁版嵁
        function updateStats() {
            const statsCard = document.getElementById('statsCard');

            const total = allSubjects.length;
            const active = allSubjects.filter(s => s.status === 'active').length;
            // 鏍规嵁 details.danger_level 缁熻宸叉敹瀹?/ 宸叉竻鍓?
            const contained = allSubjects.filter(s => (s.subject_details?.[0]?.danger_level || 'safe') === 'safe').length;
            const neutralized = allSubjects.filter(s => (s.subject_details?.[0]?.danger_level) === 'neutralized').length;

            statsCard.innerHTML = `
                <div class="stat-item">
                    <div class="stat-value">${total}</div>
                    <div class="stat-label">鎬诲疄楠屼綋鏁?/div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" style="color: #6bffb8;">${active}</div>
                    <div class="stat-label">娲昏穬涓?/div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" style="color: #ffd93d;">${contained}</div>
                    <div class="stat-label">宸叉敹瀹?/div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" style="color: #ff6b6b;">${neutralized}</div>
                    <div class="stat-label">宸叉竻鍓?/div>
                </div>
            `;
        }
        
        // 绛涢€夊疄楠屼綋
        function filterSubjects() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const statusFilter = document.getElementById('filterStatus').value;
            const dangerFilter = document.getElementById('filterDanger').value;
            const sortBy = document.getElementById('filterSort').value;
            
                // 绛涢€?
                filteredSubjects = allSubjects.filter(subject => {
                    // 鎼滅储鏉′欢
                    const matchesSearch = !searchTerm || 
                        (subject.subject_code && subject.subject_code.toLowerCase().includes(searchTerm)) ||
                        (subject.subject_name && subject.subject_name.toLowerCase().includes(searchTerm)) ||
                        (subject.description && subject.description.toLowerCase().includes(searchTerm));

                    // 鍗遍櫓绛夌骇绛涢€夛紙闇€瑕佷粠details涓幏鍙栵級
                    const details = subject.subject_details?.[0];
                    const dangerLevel = details?.danger_level || 'safe';
                    const matchesDanger = !dangerFilter || dangerLevel === dangerFilter;

                    // 鐘舵€佺瓫閫夛細'active'鍩轰簬subject.status锛屽惁鍒欏熀浜巇etails.danger_level
                    let matchesStatus = true;
                    if (statusFilter) {
                        if (statusFilter === 'active') {
                            matchesStatus = subject.status === 'active';
                        } else {
                            // 'safe' or 'neutralized' map to danger_level
                            matchesStatus = dangerLevel === statusFilter;
                        }
                    }

                    return matchesSearch && matchesStatus && matchesDanger;
                });
            
            // 鎺掑簭
            filteredSubjects.sort((a, b) => {
                const detailsA = a.subject_details?.[0];
                const detailsB = b.subject_details?.[0];
                const dangerA = detailsA?.danger_level || 'safe';
                const dangerB = detailsB?.danger_level || 'safe';
                
                switch (sortBy) {
                    case 'newest':
                        return new Date(b.created_at) - new Date(a.created_at);
                    case 'oldest':
                        return new Date(a.created_at) - new Date(b.created_at);
                    case 'name':
                        return (a.subject_name || '').localeCompare(b.subject_name || '');
                    case 'danger':
                        // 鍗遍櫓绛夌骇鎺掑簭锛歬eter > euclid > safe > neutralized
                        const dangerOrder = { 'keter': 0, 'euclid': 1, 'safe': 2, 'neutralized': 3 };
                        return (dangerOrder[dangerA] || 4) - (dangerOrder[dangerB] || 4);
                    default:
                        return 0;
                }
            });
            
            currentPage = 1;
            renderSubjects();
        }
        
        // 娓叉煋瀹為獙浣撳垪琛?
        function renderSubjects() {
            const subjectsGrid = document.getElementById('subjectsGrid');
            const emptyState = document.getElementById('emptyState');
            const pagination = document.getElementById('pagination');
            
            if (filteredSubjects.length === 0) {
                subjectsGrid.innerHTML = '';
                emptyState.style.display = 'block';
                pagination.style.display = 'none';
                return;
            }
            
            emptyState.style.display = 'none';
            
            // 璁＄畻鍒嗛〉
            const totalPages = Math.ceil(filteredSubjects.length / itemsPerPage);
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pageSubjects = filteredSubjects.slice(startIndex, endIndex);
            
            // 娓叉煋瀹為獙浣撳崱鐗?
            let html = '';
            pageSubjects.forEach(subject => {
                const details = subject.subject_details?.[0] || {};
                const dangerLevel = details.danger_level || 'safe';
                const dangerInfo = dangerMap[dangerLevel] || dangerMap.safe;
                const statusInfo = statusMap[subject.status] || statusMap.active;
                // 璁＄畻鍗＄墖鏄剧ず鐨勭姸鎬佹枃妗堜笌鏍峰紡锛堜紭鍏堟椿璺冿紝鍚﹀垯鏍规嵁 dangerLevel 鏄剧ず宸叉敹瀹?宸叉竻鍓匡級
                let statusText = statusInfo.text || '鏈煡';
                let statusClass = statusInfo.class || '';
                if (subject.status === 'active') {
                    statusText = statusMap['active'].text;
                    statusClass = statusMap['active'].class;
                } else if (dangerLevel === 'safe') {
                    statusText = dangerInfo.text;
                    statusClass = statusMap['safe']?.class || 'status-contained';
                } else if (dangerLevel === 'neutralized') {
                    statusText = dangerInfo.text;
                    statusClass = statusMap['neutralized']?.class || 'status-neutralized';
                }
                
                // 瑙ｆ瀽缂栧彿
                const code = subject.subject_code || '';
                const gen = code[0] ? generationMap[code[0]] || '鏈煡浠ｆ' : '鏈煡';
                
                // 鎴柇鎻忚堪
                const desc = subject.description || '鏆傛棤鎻忚堪';
                const shortDesc = desc.length > 100 ? desc.substring(0, 100) + '...' : desc;
                
                html += `
                <div class="subject-card" onclick="viewSubject('${subject.id}')">
                    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
                        <div>
                            <div class="subject-name">${subject.subject_name || '鏈懡鍚?}</div>
                            <div class="subject-code">CF-${subject.subject_code}</div>
                        </div>
                            <div style="text-align:right;">
                                <div class="danger-${dangerLevel}">${dangerInfo.text}</div>
                            </div>
                    </div>
                    <div class="info-item"><div class="info-label">浠ｆ锛?/div><div class="info-value">${gen}</div></div>
                    <div class="info-item"><div class="info-label">渚濇嵁锛?/div><div class="info-value">${subject.creation_basis || '鏈煡'}</div></div>
                    <div class="info-item"><div class="info-label">鎻忚堪锛?/div><div class="info-value">${shortDesc}</div></div>
                    <div style="margin-top:12px; display:flex; gap:10px; align-items:center; justify-content:space-between;">
                        <div class="subject-status ${statusClass}" style="color:inherit">${statusText}</div>
                        <button class="view-details-btn" onclick="event.stopPropagation(); viewSubject('${subject.id}')">
                            <i class="fas fa-eye"></i> 鏌ョ湅璇︽儏
                        </button>
                    </div>
                </div>
                `;
            });
            
            subjectsGrid.innerHTML = html;
            
            // 娓叉煋鍒嗛〉
            if (totalPages > 1) {
                let paginationHtml = '';
                
                if (currentPage > 1) {
                    paginationHtml += `<button class="page-btn" onclick="goToPage(${currentPage - 1})">涓婁竴椤?/button>`;
                }
                
                for (let i = 1; i <= totalPages; i++) {
                    if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                        paginationHtml += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
                    } else if (i === currentPage - 3 || i === currentPage + 3) {
                        paginationHtml += `<span class="page-btn">...</span>`;
                    }
                }
                
                if (currentPage < totalPages) {
                    paginationHtml += `<button class="page-btn" onclick="goToPage(${currentPage + 1})">涓嬩竴椤?/button>`;
                }
                
                pagination.innerHTML = paginationHtml;
                pagination.style.display = 'flex';
            } else {
                pagination.style.display = 'none';
            }
        }
        
        // 璺宠浆鍒版寚瀹氶〉闈?
        function goToPage(page) {
            currentPage = page;
            renderSubjects();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        // 鏌ョ湅瀹為獙浣撹鎯?
        async function viewSubject(subjectId) {
            showLoading('姝ｅ湪鍔犺浇璇︽儏...');
            
            try {
                // 浠嶴upabase鍔犺浇瀹為獙浣撹鎯?
                const { data: subject, error } = await supabaseClient
                    .from('subjects')
                    .select(`
                        *,
                        subject_details (*)
                    `)
                    .eq('id', subjectId)
                    .single();
                
                if (error) throw error;
                
                const details = subject.subject_details?.[0] || {};
                const dangerLevel = details.danger_level || 'safe';
                const dangerInfo = dangerMap[dangerLevel] || dangerMap.safe;
                
                // 瑙ｆ瀽缂栧彿
                const code = subject.subject_code || '';
                const gen = code[0] ? generationMap[code[0]] : '鏈煡';
                const basis = code[1] ? basisMap[code[1]] : '鏈煡';
                const meme = code[2] ? memeMap[code[2]] : '鏈煡';
                const attr = code[3] ? attributeMap[code[3]] : '鏈煡';
                // 鐘舵€佹枃鏈笌鏍峰紡锛氫紭鍏堟椿璺冿紝鍏舵鐢卞嵄闄╃瓑绾у喅瀹?
                let statusText, statusClass;
                if (subject.status === 'active') {
                    statusText = statusMap['active'].text;
                    statusClass = statusMap['active'].class;
                } else if (dangerLevel === 'safe') {
                    statusText = dangerInfo.text;
                    statusClass = statusMap['safe']?.class || 'status-contained';
                } else if (dangerLevel === 'neutralized') {
                    statusText = dangerInfo.text;
                    statusClass = statusMap['neutralized']?.class || 'status-neutralized';
                } else {
                    statusText = statusMap[subject.status]?.text || '鏈煡';
                    statusClass = statusMap[subject.status]?.class || '';
                }
                
                // 鏋勫缓璇︽儏HTML锛堝垎闂ㄥ埆绫汇€侀啋鐩睍绀猴級
                let html = `
                    <div style="line-height:1.6;">
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
                            <div>
                                <div style="font-size:1.6rem;font-weight:bold;color:#ffa93d;">${subject.subject_name || '鏈懡鍚?}</div>
                                <div style="color:#a3d5ff;margin-top:4px;">CF-${subject.subject_code}</div>
                            </div>
                            <div style="text-align:right;">
                                <div style="margin-bottom:6px;"><span class="subject-status ${statusClass}">${statusText}</span></div>
                                <div><span class="info-badge ${dangerInfo.class}">${dangerInfo.text}</span></div>
                            </div>
                        </div>

                        <div class="detail-section">
                            <h3>鍩烘湰淇℃伅</h3>
                            <div class="detail-row"><div class="detail-label">缂栧彿锛?/div><div class="detail-value">CF-${subject.subject_code}</div></div>
                            <div class="detail-row"><div class="detail-label">鍚嶇О锛?/div><div class="detail-value">${subject.subject_name || '鏈懡鍚?}</div></div>
                            <div class="detail-row"><div class="detail-label">鍒涘缓鑰咃細</div><div class="detail-value">${subject.created_by || '鏈煡'}</div></div>
                            <div class="detail-row"><div class="detail-label">鍒涘缓鏃堕棿锛?/div><div class="detail-value">${new Date(subject.created_at).toLocaleString()}</div></div>
                        </div>

                        <div class="detail-section">
                            <h3>鐘舵€佷笌浣嶇疆</h3>
                            <div class="detail-row"><div class="detail-label">鐘舵€侊細</div><div class="detail-value"><strong style="color:#6bffb8;">${statusText}</strong></div></div>
                            <div class="detail-row"><div class="detail-label">鍗遍櫓绛夌骇锛?/div><div class="detail-value">${dangerInfo.text}</div></div>
                            <div class="detail-row"><div class="detail-label">褰撳墠浣嶇疆锛?/div><div class="detail-value">${details.location || '鏈褰?}</div></div>
                        </div>

                        <div class="detail-section">
                            <h3>鏋勬垚淇℃伅</h3>
                            <div class="detail-row"><div class="detail-label">浠ｆ锛?/div><div class="detail-value">${gen}</div></div>
                            <div class="detail-row"><div class="detail-label">渚濇嵁锛?/div><div class="detail-value">${basis}</div></div>
                            <div class="detail-row"><div class="detail-label">妯″洜锛?/div><div class="detail-value">${meme}</div></div>
                            <div class="detail-row"><div class="detail-label">灞炴€э細</div><div class="detail-value">${attr}</div></div>
                        </div>

                        <div class="detail-section">
                            <h3>鎻忚堪</h3>
                            <div class="detail-value" style="white-space:pre-wrap;">${subject.description || '鏆傛棤鎻忚堪'}</div>
                        </div>

                        <div class="detail-section">
                            <h3>澶栬矊 / 鑳藉姏 / 寮辩偣</h3>
                            <div class="detail-row"><div class="detail-label">澶栬矊锛?/div><div class="detail-value">${details.appearance || '鏈褰?}</div></div>
                            <div class="detail-row"><div class="detail-label">鑳藉姏锛?/div><div class="detail-value">${details.abilities || '鏈褰?}</div></div>
                            <div class="detail-row"><div class="detail-label">寮辩偣锛?/div><div class="detail-value">${details.weaknesses || '鏈褰?}</div></div>
                        </div>

                        <div class="detail-section">
                            <h3>鏀跺鎺柦 / 澶囨敞</h3>
                            <div class="detail-row"><div class="detail-label">鏀跺锛?/div><div class="detail-value">${details.containment_procedures || '鏈褰?}</div></div>
                            <div class="detail-row"><div class="detail-label">澶囨敞锛?/div><div class="detail-value">${details.notes || '鏃?}</div></div>
                        </div>
                    </div>
                `;
                
                document.getElementById('modalTitle').textContent = `${subject.subject_name} (CF-${subject.subject_code})`;
                document.getElementById('modalBody').innerHTML = html;
                openModal();
                
            } catch (error) {
                console.error('鍔犺浇瀹為獙浣撹鎯呭け璐?', error);
                alert('鍔犺浇璇︽儏澶辫触: ' + error.message);
            } finally {
                hideLoading();
            }
        }
        
        // 鎵撳紑妯℃€佹
        function openModal() {
            document.getElementById('detailModal').classList.add('active');
        }
        
        // 鍏抽棴妯℃€佹
        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
        }
        
        // 鏄剧ず鍔犺浇鍔ㄧ敾
        function showLoading(message = '姝ｅ湪澶勭悊...') {
            document.getElementById('loadingText').textContent = message;
            document.getElementById('loadingOverlay').style.display = 'flex';
        }
        
        // 闅愯棌鍔犺浇鍔ㄧ敾
        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }
        
        // 鏄剧ず閿欒娑堟伅
        function showError(message) {
            alert(message);
        }
        
        // 杩斿洖涓婁竴椤?
        function goBack() {
            if (currentRole === 'admin') {
                window.location.href = 'admin.html';
            } else {
                window.location.href = 'member.html';
            }
        }
        
        // 妯℃€佹鐐瑰嚮澶栭儴鍏抽棴
        window.onclick = function(event) {
            const modal = document.getElementById('detailModal');
            if (event.target === modal) {
                closeModal();
            }
        };
        
        // 妯℃€佹ESC閿叧闂?
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>
