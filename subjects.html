<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实验体档案 - 管理局资料库</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        /* Copied theme from monsters.html and adapted for subjects page.
           Also include mapping rules so existing subjects HTML keeps working. */
        :root {
            --desktop-bg: radial-gradient(circle at center, #0a2463, #000000);
            --status-bg: rgba(10, 36, 99, 0.8);
            --panel-bg: rgba(6, 22, 60, 0.95);
            --panel-border: rgba(0, 150, 255, 0.3);
            --accent-danger: #ff6b6b;
            --accent-warning: #ffa93d;
            --accent-info: #4fc3ff;
            --accent-success: #6bffb8;
            --text-primary: #e0f7ff;
            --muted-color: #a3d5ff;
        }

        body {
            display: block;
            overflow: auto;
            min-height: 100vh;
            margin: 0;
            background: var(--desktop-bg);
            color: var(--text-primary);
            font-family: 'ZhengQingKeShuMaTi', 'Microsoft YaHei', sans-serif;
        }

        /* 顶部状态栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 30px;
            background: var(--status-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 150, 255, 0.3);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.45);
            height: 72px;
            box-sizing: border-box;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 2000;
        }

        .system-info { display:flex; align-items:center; gap:15px; }
        .system-logo { width:40px; height:40px; filter: drop-shadow(0 0 8px rgba(0,150,255,0.7)); }
        .system-name { font-size:1.25rem; background:linear-gradient(90deg,#4fc3ff,#a3d5ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; letter-spacing:1.5px; }
        .system-subtitle { font-size:0.85rem; color:var(--muted-color); }

        .user-info { display:flex; align-items:center; gap:15px; }
        .user-avatar { width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,#0066cc,#0099ff); display:flex; align-items:center; justify-content:center; color:white; font-size:1rem; }
        .time-display { color:var(--muted-color); font-size:1.1rem; }

        .logout-btn, .back-btn { background: rgba(0,60,120,0.7); border:1px solid rgba(0,150,255,0.3); color:var(--muted-color); padding:8px 16px; border-radius:8px; cursor:pointer; display:inline-flex; align-items:center; gap:8px; text-decoration:none; }
        .logout-btn:hover, .back-btn:hover { background: rgba(0,100,200,0.85); transform: translateY(-1px); }

        /* 主内容区域: map .container to monsters' .main-content layout */
        .container, .main-content { padding: 110px 30px 30px; max-width:1400px; margin:0 auto; }

        .page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:40px; flex-wrap:wrap; gap:20px; }
        .page-title { }
        .page-title .page-title-text, .page-title h1 { font-size:2.5rem; margin-bottom:10px; background: linear-gradient(90deg,#ff6b6b,#ffa93d); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .page-subtitle, .page-title p { color:var(--muted-color); font-size:1.1rem; max-width:700px; }

        /* Filter: map .filter-bar to .filter-section */
        .filter-bar, .filter-section { background: var(--panel-bg); border-radius:15px; padding:25px; border:1px solid var(--panel-border); margin-bottom:30px; display:flex; gap:20px; flex-wrap:wrap; align-items:center; }

        .search-box { flex:1; min-width:300px; position:relative; }
        .search-box .search-icon { position:absolute; left:20px; top:50%; transform:translateY(-50%); color:#4fc3ff; font-size:1.2rem; }
        .search-input { width:100%; padding:15px 15px 15px 50px; background: rgba(0,30,80,0.7); border:1px solid rgba(0,150,255,0.2); border-radius:10px; color:var(--text-primary); font-size:1rem; }
        .search-input:focus { outline:none; border-color:rgba(0,150,255,0.6); box-shadow:0 0 0 3px rgba(0,150,255,0.1); }

        .filter-select { padding:12px 20px; background: rgba(0,30,80,0.7); border:1px solid rgba(0,150,255,0.2); border-radius:10px; color:var(--text-primary); font-size:1rem; cursor:pointer; min-width:150px; }

        /* Stats mapping (keep previous stat styles but adjust look) */
        .stats-card, .page-stats { display:flex; gap:20px; flex-wrap:wrap; margin-bottom:30px; }
        .stat-item { background: rgba(0,30,80,0.5); padding:15px 25px; border-radius:12px; border:1px solid rgba(0,150,255,0.2); text-align:center; min-width:150px; }
        .stat-value { font-size:2.2rem; font-weight:bold; margin-bottom:5px; }
        .stat-label { color:var(--muted-color); font-size:0.9rem; }

        /* Subjects grid mapped to monster-list styles */
        .subjects-grid, .monster-list { display:grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap:25px; margin-bottom:50px; }

        .subject-card, .monster-card { background: var(--panel-bg); border-radius:15px; padding:25px; border:1px solid var(--panel-border); transition: all 0.3s ease; position:relative; overflow:hidden; cursor:pointer; }
        .subject-card:hover, .monster-card:hover { transform: translateY(-5px); border-color: rgba(0,150,255,0.6); box-shadow: 0 15px 30px rgba(0,150,255,0.2); }

        .subject-code { font-size:1.1rem; color: #ffd93d; margin-bottom:8px; }
        .subject-name { font-size:1.6rem; font-weight:bold; color:#ffa93d; margin-bottom:8px; }
        .subject-desc { color:var(--muted-color); margin-bottom:12px; }
        .subject-footer { display:flex; gap:10px; align-items:center; justify-content:space-between; margin-top:10px; }

        .view-btn, .view-details-btn { padding:12px; background: rgba(79,195,255,0.2); border:1px solid rgba(79,195,255,0.4); border-radius:10px; color:#4fc3ff; cursor:pointer; }
        .view-btn:hover, .view-details-btn:hover { background: rgba(79,195,255,0.3); }

        /* Card info rows similar to monsters layout */
        .info-item { display:flex; margin-bottom:8px; font-size:1rem; }
        .info-label { width:110px; color:var(--muted-color); flex-shrink:0; }
        .info-value { flex:1; color:var(--text-primary); }

        /* Status badges (ensure three-character labels fit on one line) */
        .subject-status { display:inline-block; white-space:nowrap; padding:6px 10px; border-radius:14px; font-weight:700; font-size:0.95rem; }
        .subject-status.status-active { background: rgba(107,255,184,0.12); color:#6bffb8; border:1px solid rgba(107,255,184,0.25); }
        .subject-status.status-contained { background: rgba(255,217,61,0.08); color:#ffd93d; border:1px solid rgba(255,217,61,0.18); }
        .subject-status.status-neutralized { background: rgba(255,107,107,0.08); color:#ff6b6b; border:1px solid rgba(255,107,107,0.18); }

        /* Danger level badges on card */
        .danger-safe { background: rgba(107,255,184,0.08); color:#6bffb8; border:1px solid rgba(107,255,184,0.18); padding:6px 10px; border-radius:16px; }
        .danger-euclid { background: rgba(79,195,255,0.08); color:#4fc3ff; border:1px solid rgba(79,195,255,0.18); padding:6px 10px; border-radius:16px; }
        .danger-keter { background: rgba(255,167,61,0.08); color:#ffa93d; border:1px solid rgba(255,167,61,0.18); padding:6px 10px; border-radius:16px; }
        .danger-neutralized { background: rgba(255,107,107,0.06); color:#ff6b6b; border:1px solid rgba(255,107,107,0.12); padding:6px 10px; border-radius:16px; }

        /* Shrink view-details button so it's no longer full-width */
        .view-details-btn { width: auto; min-width:120px; padding:8px 14px; background: rgba(79,195,255,0.12); border:1px solid rgba(79,195,255,0.18); border-radius:10px; color:#4fc3ff; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; }
        .view-details-btn i { margin-right:6px; }

        /* Modal detail rows */
        .detail-section { margin-bottom: 18px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.04); }
        .detail-section h3 { font-size:1.2rem; color:#4fc3ff; margin-bottom:10px; }
        .detail-row { display:flex; margin-bottom:10px; }
        .detail-label { width:140px; color:var(--muted-color); flex-shrink:0; }
        .detail-value { flex:1; color:var(--text-primary); }

        /* Empty state */
        .empty-state { grid-column:1 / -1; text-align:center; padding:60px 20px; background: rgba(10,36,99,0.5); border-radius:15px; border:2px dashed rgba(0,150,255,0.3); }

        /* Loading & modal (use monsters styles) */
        .loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display:flex; justify-content:center; align-items:center; z-index:3000; backdrop-filter: blur(10px); visibility:hidden; }
        .loading-overlay[style*="display: flex"] { visibility:visible; }
        .loading-spinner { width:80px; height:80px; border:5px solid rgba(79,195,255,0.3); border-top:5px solid #4fc3ff; border-radius:50%; animation:spin 1s linear infinite; }
        .loading-text { color:#e0f7ff; margin-top:20px; font-size:1.2rem; }

        .modal, .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display:flex; justify-content:center; align-items:center; z-index:10010; backdrop-filter: blur(10px); visibility:hidden; }
        .modal.active, .modal-overlay.active { visibility:visible; }
        .modal-content { background: var(--panel-bg); border-radius:20px; padding:40px; border:1px solid var(--panel-border); box-shadow:0 25px 50px rgba(0,150,255,0.2); max-width:800px; width:100%; max-height:calc(100vh - 120px); overflow-y:auto; position:relative; }
        .close-btn { position:absolute; top:20px; right:20px; background: rgba(255,107,107,0.2); border:1px solid rgba(255,107,107,0.4); color:#ff6b6b; width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; }
        .close-btn:hover { transform: rotate(90deg); }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Responsive tweaks */
        @media (max-width: 768px) {
            .status-bar { padding:10px 15px; flex-direction:column; gap:15px; height:auto; }
            .system-info, .user-info { width:100%; justify-content:space-between; }
            .container { padding: 20px 15px; }
            .page-header { flex-direction:column; align-items:flex-start; }
            .subjects-grid { grid-template-columns: 1fr; }
                .filter-bar { flex-direction:column; align-items:stretch; }
                .search-box { min-width:100%; }
            }
        </style>
    </head>
    <body>
    <!-- 顶部状态栏 -->
    <div class="status-bar">
        <div class="system-info">
            <img src="qsamlogo.png" alt="系统标志" class="system-logo">
            <div class="system-name">管理局 - 实验体档案</div>
        </div>
        
        <div class="user-info">
            <div class="time-display" id="currentTime">00:00:00</div>
            <div class="user-avatar" id="userAvatar">
                <i class="fas fa-user"></i>
            </div>
            <div>
                <div style="color: #4fc3ff;" id="userDisplayName">加载中...</div>
                <div style="font-size: 0.8rem; color: #a3d5ff;" id="userRole"></div>
            </div>
            <button class="back-btn" onclick="goBack()">
                <i class="fas fa-arrow-left"></i> 返回
            </button>
        </div>
    </div>
    
    <!-- 加载动画 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div>
            <div class="loading-spinner"></div>
            <div class="loading-text" id="loadingText">正在加载...</div>
        </div>
    </div>
    
    <!-- 详情模态框 -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">实验体详情</div>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- 详情内容将通过JS动态填充 -->
            </div>
        </div>
    </div>
    
    <main class="main-content container">
        <!-- 页面标题 -->
        <div class="page-header">
            <div class="page-title">
                <h1><i class="fas fa-flask"></i> 已收录实验体</h1>
                <p>浏览管理局已收录的所有实验体档案</p>
            </div>
        </div>
        
        <!-- 统计卡片 -->
        <div class="stats-card" id="statsCard">
            <!-- 统计数据将通过JS动态填充 -->
        </div>
        
        <!-- 筛选和搜索栏 -->
        <div class="filter-bar">
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索实验体编号、名称或描述...">
                <i class="fas fa-search search-icon"></i>
            </div>
            <select class="filter-select" id="filterStatus">
                <option value="">所有状态</option>
                <option value="active">活跃中</option>
                <option value="safe">已收容</option>
                <option value="neutralized">已清剿</option>
            </select>
            <select class="filter-select" id="filterDanger">
                <option value="">所有危险等级</option>
                <option value="safe">已收容</option>
                <option value="euclid">警戒</option>
                <option value="keter">严重警戒</option>
                <option value="neutralized">已清剿</option>
            </select>
            <select class="filter-select" id="filterSort">
                <option value="newest">最新添加</option>
                <option value="oldest">最早添加</option>
                <option value="name">名称 A-Z</option>
                <option value="danger">危险等级</option>
            </select>
        </div>
        
        <!-- 实验体网格 -->
        <div class="subjects-grid" id="subjectsGrid">
            <!-- 实验体卡片将通过JS动态填充 -->
        </div>
        
        <!-- 空状态 -->
        <div class="empty-state" id="emptyState" style="display: none;">
            <i class="fas fa-flask"></i>
            <h3>暂无实验体数据</h3>
            <p>没有找到匹配的实验体记录</p>
        </div>
        
        <!-- 分页 -->
        <div class="pagination" id="pagination" style="display: none;">
            <!-- 分页按钮将通过JS动态生成 -->
        </div>
    </main>
    
    <script>
        // Supabase配置
        const SUPABASE_URL = 'https://owfyycgomqclytnswobj.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_65fjjNxcUjAFpFJ3AEW9Tg_ctW41ZsV';
        
        // 初始化变量
        let supabaseClient = null;
        let currentUser = null;
        let currentRole = null;
        let allSubjects = [];
        let filteredSubjects = [];
        let currentPage = 1;
        const itemsPerPage = 12;
        
        // 危险等级映射
        const dangerMap = {
            'safe': { text: '已收容', class: 'danger-safe' },
            'euclid': { text: '警戒', class: 'danger-euclid' },
            'keter': { text: '严重警戒', class: 'danger-keter' },
            'neutralized': { text: '已清剿', class: 'danger-neutralized' }
        };
        
        // 状态映射（UI 以“活跃中 / 已收容 / 已清剿”为主要三态）
        const statusMap = {
            'active': { text: '活跃中', class: 'status-active' },
            // 以下两项作为映射占位（实际“已收容 / 已清剿”将根据 details.danger_level 决定）
            'safe': { text: '已收容', class: 'status-contained' },
            'neutralized': { text: '已清剿', class: 'status-neutralized' }
        };
        
        // 实验体编号解析映射（与登记页面一致）
        const generationMap = {
            '0': '第一代', '1': '第二代', '2': '第三代', '3': '第四代',
            '4': '第五代', '5': '第六代', '6': '第七代', '7': '第八代',
            '8': '第九代', '9': '第十代'
        };
        
        const basisMap = {
            '0': '原本物种不变',
            '1': '裂隙怪物',
            '2': '现实中存在的动物',
            '3': '现实中存在的植物',
            '4': '现实中存在的昆虫',
            '5': '东方幻想生物',
            '6': '西方幻想生物',
            '7': '无生命实体',
            '8': '无实体生物'
        };
        
        const memeMap = {
            '0': '时散',
            '1': '虚界',
            '2': '灵噬',
            '3': '钢魂',
            '4': '本源',
            '5': '影狩',
            '6': '生链',
            '7': '械灵',
            '8': '幻奏'
        };
        
        const attributeMap = {
            '0': '火',
            '1': '冰',
            '2': '雷',
            '3': '岩',
            '4': '风',
            '5': '光',
            '6': '生命',
            '7': '重力',
            '8': '融合',
            '9': '物理'
        };
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            initApp();
        });
        
        // 初始化应用
        async function initApp() {
            showLoading('正在初始化...');
            
            // 检查登录状态
            currentRole = localStorage.getItem('auth_role');
            currentUser = localStorage.getItem('auth_user');
            
            if (!currentRole || !currentUser) {
                alert('请先登录！');
                window.location.href = 'index.html';
                return;
            }
            
            // 显示用户信息
            document.getElementById('userDisplayName').textContent = currentUser;
            document.getElementById('userRole').textContent = 
                currentRole === 'admin' ? '管理员' : '普通成员';
            
            // 初始化Supabase客户端
            try {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log('Supabase客户端已初始化');
            } catch (e) {
                console.error('Supabase初始化失败:', e);
                showError('云端连接失败，请检查网络');
                hideLoading();
                return;
            }
            
            // 加载实验体数据
            await loadSubjects();
            
            // 设置搜索和筛选事件监听
            document.getElementById('searchInput').addEventListener('input', filterSubjects);
            document.getElementById('filterStatus').addEventListener('change', filterSubjects);
            document.getElementById('filterDanger').addEventListener('change', filterSubjects);
            document.getElementById('filterSort').addEventListener('change', filterSubjects);
            
            // 更新时间显示
            updateTime();
            setInterval(updateTime, 1000);
            
            hideLoading();
        }
        
        // 更新时间显示
        function updateTime() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const seconds = now.getSeconds().toString().padStart(2, '0');
            document.getElementById('currentTime').textContent = `${hours}:${minutes}:${seconds}`;
        }
        
        // 加载实验体数据
        async function loadSubjects() {
            showLoading('正在从云端加载数据...');
            
            try {
                // 从Supabase加载实验体数据
                const { data: subjects, error } = await supabaseClient
                    .from('subjects')
                    .select(`
                        *,
                        subject_details (*)
                    `)
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                
                allSubjects = subjects || [];
                filteredSubjects = [...allSubjects];
                
                // 更新统计数据
                updateStats();
                
                // 渲染实验体列表
                renderSubjects();
                
                console.log(`成功加载 ${allSubjects.length} 个实验体`);
                
            } catch (error) {
                console.error('加载实验体数据失败:', error);
                showError('数据加载失败: ' + error.message);
                
                // 显示空状态
                document.getElementById('emptyState').style.display = 'block';
                document.getElementById('subjectsGrid').innerHTML = '';
                document.getElementById('statsCard').innerHTML = '';
                document.getElementById('pagination').style.display = 'none';
            } finally {
                hideLoading();
            }
        }
        
        // 更新统计数据
        function updateStats() {
            const statsCard = document.getElementById('statsCard');

            const total = allSubjects.length;
            const active = allSubjects.filter(s => s.status === 'active').length;
            // 根据 details.danger_level 统计已收容 / 已清剿
            const contained = allSubjects.filter(s => (s.subject_details?.[0]?.danger_level || 'safe') === 'safe').length;
            const neutralized = allSubjects.filter(s => (s.subject_details?.[0]?.danger_level) === 'neutralized').length;

            statsCard.innerHTML = `
                <div class="stat-item">
                    <div class="stat-value">${total}</div>
                    <div class="stat-label">总实验体数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" style="color: #6bffb8;">${active}</div>
                    <div class="stat-label">活跃中</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" style="color: #ffd93d;">${contained}</div>
                    <div class="stat-label">已收容</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" style="color: #ff6b6b;">${neutralized}</div>
                    <div class="stat-label">已清剿</div>
                </div>
            `;
        }
        
        // 筛选实验体
        function filterSubjects() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const statusFilter = document.getElementById('filterStatus').value;
            const dangerFilter = document.getElementById('filterDanger').value;
            const sortBy = document.getElementById('filterSort').value;
            
                // 筛选
                filteredSubjects = allSubjects.filter(subject => {
                    // 搜索条件
                    const matchesSearch = !searchTerm || 
                        (subject.subject_code && subject.subject_code.toLowerCase().includes(searchTerm)) ||
                        (subject.subject_name && subject.subject_name.toLowerCase().includes(searchTerm)) ||
                        (subject.description && subject.description.toLowerCase().includes(searchTerm));

                    // 危险等级筛选（需要从details中获取）
                    const details = subject.subject_details?.[0];
                    const dangerLevel = details?.danger_level || 'safe';
                    const matchesDanger = !dangerFilter || dangerLevel === dangerFilter;

                    // 状态筛选：'active'基于subject.status，否则基于details.danger_level
                    let matchesStatus = true;
                    if (statusFilter) {
                        if (statusFilter === 'active') {
                            matchesStatus = subject.status === 'active';
                        } else {
                            // 'safe' or 'neutralized' map to danger_level
                            matchesStatus = dangerLevel === statusFilter;
                        }
                    }

                    return matchesSearch && matchesStatus && matchesDanger;
                });
            
            // 排序
            filteredSubjects.sort((a, b) => {
                const detailsA = a.subject_details?.[0];
                const detailsB = b.subject_details?.[0];
                const dangerA = detailsA?.danger_level || 'safe';
                const dangerB = detailsB?.danger_level || 'safe';
                
                switch (sortBy) {
                    case 'newest':
                        return new Date(b.created_at) - new Date(a.created_at);
                    case 'oldest':
                        return new Date(a.created_at) - new Date(b.created_at);
                    case 'name':
                        return (a.subject_name || '').localeCompare(b.subject_name || '');
                    case 'danger':
                        // 危险等级排序：keter > euclid > safe > neutralized
                        const dangerOrder = { 'keter': 0, 'euclid': 1, 'safe': 2, 'neutralized': 3 };
                        return (dangerOrder[dangerA] || 4) - (dangerOrder[dangerB] || 4);
                    default:
                        return 0;
                }
            });
            
            currentPage = 1;
            renderSubjects();
        }
        
        // 渲染实验体列表
        function renderSubjects() {
            const subjectsGrid = document.getElementById('subjectsGrid');
            const emptyState = document.getElementById('emptyState');
            const pagination = document.getElementById('pagination');
            
            if (filteredSubjects.length === 0) {
                subjectsGrid.innerHTML = '';
                emptyState.style.display = 'block';
                pagination.style.display = 'none';
                return;
            }
            
            emptyState.style.display = 'none';
            
            // 计算分页
            const totalPages = Math.ceil(filteredSubjects.length / itemsPerPage);
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pageSubjects = filteredSubjects.slice(startIndex, endIndex);
            
            // 渲染实验体卡片
            let html = '';
            pageSubjects.forEach(subject => {
                const details = subject.subject_details?.[0] || {};
                const dangerLevel = details.danger_level || 'safe';
                const dangerInfo = dangerMap[dangerLevel] || dangerMap.safe;
                const statusInfo = statusMap[subject.status] || statusMap.active;
                // 计算卡片显示的状态文案与样式（优先活跃，否则根据 dangerLevel 显示已收容/已清剿）
                let statusText = statusInfo.text || '未知';
                let statusClass = statusInfo.class || '';
                if (subject.status === 'active') {
                    statusText = statusMap['active'].text;
                    statusClass = statusMap['active'].class;
                } else if (dangerLevel === 'safe') {
                    statusText = dangerInfo.text;
                    statusClass = statusMap['safe']?.class || 'status-contained';
                } else if (dangerLevel === 'neutralized') {
                    statusText = dangerInfo.text;
                    statusClass = statusMap['neutralized']?.class || 'status-neutralized';
                }
                
                // 解析编号
                const code = subject.subject_code || '';
                const gen = code[0] ? generationMap[code[0]] || '未知代次' : '未知';
                
                // 截断描述
                const desc = subject.description || '暂无描述';
                const shortDesc = desc.length > 100 ? desc.substring(0, 100) + '...' : desc;
                
                html += `
                <div class="subject-card" onclick="viewSubject('${subject.id}')">
                    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
                        <div>
                            <div class="subject-name">${subject.subject_name || '未命名'}</div>
                            <div class="subject-code">CF-${subject.subject_code}</div>
                        </div>
                            <div style="text-align:right;">
                                <div class="danger-${dangerLevel}">${dangerInfo.text}</div>
                            </div>
                    </div>
                    <div class="info-item"><div class="info-label">代次：</div><div class="info-value">${gen}</div></div>
                    <div class="info-item"><div class="info-label">依据：</div><div class="info-value">${subject.creation_basis || '未知'}</div></div>
                    <div class="info-item"><div class="info-label">描述：</div><div class="info-value">${shortDesc}</div></div>
                    <div style="margin-top:12px; display:flex; gap:10px; align-items:center; justify-content:space-between;">
                        <div class="subject-status ${statusClass}" style="color:inherit">${statusText}</div>
                        <button class="view-details-btn" onclick="event.stopPropagation(); viewSubject('${subject.id}')">
                            <i class="fas fa-eye"></i> 查看详情
                        </button>
                    </div>
                </div>
                `;
            });
            
            subjectsGrid.innerHTML = html;
            
            // 渲染分页
            if (totalPages > 1) {
                let paginationHtml = '';
                
                if (currentPage > 1) {
                    paginationHtml += `<button class="page-btn" onclick="goToPage(${currentPage - 1})">上一页</button>`;
                }
                
                for (let i = 1; i <= totalPages; i++) {
                    if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                        paginationHtml += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
                    } else if (i === currentPage - 3 || i === currentPage + 3) {
                        paginationHtml += `<span class="page-btn">...</span>`;
                    }
                }
                
                if (currentPage < totalPages) {
                    paginationHtml += `<button class="page-btn" onclick="goToPage(${currentPage + 1})">下一页</button>`;
                }
                
                pagination.innerHTML = paginationHtml;
                pagination.style.display = 'flex';
            } else {
                pagination.style.display = 'none';
            }
        }
        
        // 跳转到指定页面
        function goToPage(page) {
            currentPage = page;
            renderSubjects();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        // 查看实验体详情
        async function viewSubject(subjectId) {
            showLoading('正在加载详情...');
            
            try {
                // 从Supabase加载实验体详情
                const { data: subject, error } = await supabaseClient
                    .from('subjects')
                    .select(`
                        *,
                        subject_details (*)
                    `)
                    .eq('id', subjectId)
                    .single();
                
                if (error) throw error;
                
                const details = subject.subject_details?.[0] || {};
                const dangerLevel = details.danger_level || 'safe';
                const dangerInfo = dangerMap[dangerLevel] || dangerMap.safe;
                
                // 解析编号
                const code = subject.subject_code || '';
                const gen = code[0] ? generationMap[code[0]] : '未知';
                const basis = code[1] ? basisMap[code[1]] : '未知';
                const meme = code[2] ? memeMap[code[2]] : '未知';
                const attr = code[3] ? attributeMap[code[3]] : '未知';
                // 状态文本与样式：优先活跃，其次由危险等级决定
                let statusText, statusClass;
                if (subject.status === 'active') {
                    statusText = statusMap['active'].text;
                    statusClass = statusMap['active'].class;
                } else if (dangerLevel === 'safe') {
                    statusText = dangerInfo.text;
                    statusClass = statusMap['safe']?.class || 'status-contained';
                } else if (dangerLevel === 'neutralized') {
                    statusText = dangerInfo.text;
                    statusClass = statusMap['neutralized']?.class || 'status-neutralized';
                } else {
                    statusText = statusMap[subject.status]?.text || '未知';
                    statusClass = statusMap[subject.status]?.class || '';
                }
                
                // 构建详情HTML（分门别类、醒目展示）
                let html = `
                    <div style="line-height:1.6;">
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
                            <div>
                                <div style="font-size:1.6rem;font-weight:bold;color:#ffa93d;">${subject.subject_name || '未命名'}</div>
                                <div style="color:#a3d5ff;margin-top:4px;">CF-${subject.subject_code}</div>
                            </div>
                            <div style="text-align:right;">
                                <div style="margin-bottom:6px;"><span class="subject-status ${statusClass}">${statusText}</span></div>
                                <div><span class="info-badge ${dangerInfo.class}">${dangerInfo.text}</span></div>
                            </div>
                        </div>

                        <div class="detail-section">
                            <h3>基本信息</h3>
                            <div class="detail-row"><div class="detail-label">编号：</div><div class="detail-value">CF-${subject.subject_code}</div></div>
                            <div class="detail-row"><div class="detail-label">名称：</div><div class="detail-value">${subject.subject_name || '未命名'}</div></div>
                            <div class="detail-row"><div class="detail-label">创建者：</div><div class="detail-value">${subject.created_by || '未知'}</div></div>
                            <div class="detail-row"><div class="detail-label">创建时间：</div><div class="detail-value">${new Date(subject.created_at).toLocaleString()}</div></div>
                        </div>

                        <div class="detail-section">
                            <h3>状态与位置</h3>
                            <div class="detail-row"><div class="detail-label">状态：</div><div class="detail-value"><strong style="color:#6bffb8;">${statusText}</strong></div></div>
                            <div class="detail-row"><div class="detail-label">危险等级：</div><div class="detail-value">${dangerInfo.text}</div></div>
                            <div class="detail-row"><div class="detail-label">当前位置：</div><div class="detail-value">${details.location || '未记录'}</div></div>
                        </div>

                        <div class="detail-section">
                            <h3>构成信息</h3>
                            <div class="detail-row"><div class="detail-label">代次：</div><div class="detail-value">${gen}</div></div>
                            <div class="detail-row"><div class="detail-label">依据：</div><div class="detail-value">${basis}</div></div>
                            <div class="detail-row"><div class="detail-label">模因：</div><div class="detail-value">${meme}</div></div>
                            <div class="detail-row"><div class="detail-label">属性：</div><div class="detail-value">${attr}</div></div>
                        </div>

                        <div class="detail-section">
                            <h3>描述</h3>
                            <div class="detail-value" style="white-space:pre-wrap;">${subject.description || '暂无描述'}</div>
                        </div>

                        <div class="detail-section">
                            <h3>外貌 / 能力 / 弱点</h3>
                            <div class="detail-row"><div class="detail-label">外貌：</div><div class="detail-value">${details.appearance || '未记录'}</div></div>
                            <div class="detail-row"><div class="detail-label">能力：</div><div class="detail-value">${details.abilities || '未记录'}</div></div>
                            <div class="detail-row"><div class="detail-label">弱点：</div><div class="detail-value">${details.weaknesses || '未记录'}</div></div>
                        </div>

                        <div class="detail-section">
                            <h3>收容措施 / 备注</h3>
                            <div class="detail-row"><div class="detail-label">收容：</div><div class="detail-value">${details.containment_procedures || '未记录'}</div></div>
                            <div class="detail-row"><div class="detail-label">备注：</div><div class="detail-value">${details.notes || '无'}</div></div>
                        </div>
                    </div>
                `;
                
                document.getElementById('modalTitle').textContent = `${subject.subject_name} (CF-${subject.subject_code})`;
                document.getElementById('modalBody').innerHTML = html;
                openModal();
                
            } catch (error) {
                console.error('加载实验体详情失败:', error);
                alert('加载详情失败: ' + error.message);
            } finally {
                hideLoading();
            }
        }
        
        // 打开模态框
        function openModal() {
            document.getElementById('detailModal').classList.add('active');
        }
        
        // 关闭模态框
        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
        }
        
        // 显示加载动画
        function showLoading(message = '正在处理...') {
            document.getElementById('loadingText').textContent = message;
            document.getElementById('loadingOverlay').style.display = 'flex';
        }
        
        // 隐藏加载动画
        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }
        
        // 显示错误消息
        function showError(message) {
            alert(message);
        }
        
        // 返回上一页
        function goBack() {
            if (currentRole === 'admin') {
                window.location.href = 'admin.html';
            } else {
                window.location.href = 'member.html';
            }
        }
        
        // 模态框点击外部关闭
        window.onclick = function(event) {
            const modal = document.getElementById('detailModal');
            if (event.target === modal) {
                closeModal();
            }
        };
        
        // 模态框ESC键关闭
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>
