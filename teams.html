<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>闃熶紞鍚嶅崟 - 绠＄悊灞€鎺у埗鍙?/title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 娣诲姞 Supabase 瀹㈡埛绔簱 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        /* 鍏ㄥ眬鏍峰紡 - 纭繚鍏ㄥ睆 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            overflow: auto;
        }
        
        /* 鎺у埗鍙版牱寮?- 鍏ㄥ睆 */
        .desktop {
            min-height: 100vh;
            width: 100%;
            background: radial-gradient(circle at center, #0a2463, #000000);
            padding: 0;
            position: relative;
            overflow: visible;
        }
        
        /* 椤堕儴鐘舵€佹爮 - 鍥哄畾 */
        .status-bar {
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(10, 36, 99, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 150, 255, 0.3);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .system-info {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: nowrap;
        }
        
        /* 杩斿洖鎸夐挳鏍峰紡 */
        .back-btn {
            background: rgba(0, 150, 255, 0.2);
            border: 1px solid rgba(0, 150, 255, 0.5);
            color: #4fc3ff;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            white-space: nowrap;
            margin-right: 15px;
        }

        .back-btn:hover {
            background: rgba(0, 150, 255, 0.3);
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(0, 150, 255, 0.3);
        }

        .back-btn i {
            font-size: 0.8rem;
        }
        
        .system-logo {
            width: 40px;
            height: 40px;
            filter: drop-shadow(0 0 10px rgba(0, 150, 255, 0.7));
        }
        
        .system-name {
            font-size: 1.5rem;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0066cc, #0099ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
        }
        
        .time-display {
            color: #a3d5ff;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }
        
        /* 涓昏鍐呭鍖哄煙 - 鍏ㄥ睆 */
        .main-content {
            width: 100%;
            min-height: calc(100vh - 80px);
            padding: 30px;
            overflow: auto;
        }
        
        /* 鍐呭瀹瑰櫒 */
        .content-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }
        
        /* 椤甸潰鏍囬 */
        .page-header {
            margin-bottom: 30px;
            text-align: center;
        }
        
        .page-title {
            font-size: 2.2rem;
            background: linear-gradient(90deg, #4fc3ff, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(79, 195, 255, 0.3);
        }
        
        .page-subtitle {
            color: #a3d5ff;
            font-size: 1.1rem;
            letter-spacing: 1px;
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.5;
        }
        
        /* 缁熻鍗＄墖缃戞牸 */
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            width: 100%;
        }
        
        .stat-card {
            background: rgba(10, 36, 99, 0.7);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 15px;
            padding: 25px 20px;
            text-align: center;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 150, 255, 0.2);
            border-color: rgba(0, 150, 255, 0.5);
        }
        
        .stat-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }
        
        .stat-value {
            font-size: 2.2rem;
            font-weight: bold;
            background: linear-gradient(90deg, #4fc3ff, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 10px 0;
            text-shadow: 0 0 10px rgba(79, 195, 255, 0.3);
        }
        
        .stat-label {
            color: #a3d5ff;
            font-size: 0.95rem;
            letter-spacing: 1px;
        }
        
        /* 闃熶紞缃戞牸 */
        .teams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
            width: 100%;
        }
        
        .team-card {
            background: rgba(10, 36, 99, 0.7);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 15px;
            padding: 30px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            height: 100%;
        }
        
        .team-card:hover {
            background: rgba(0, 60, 120, 0.3);
            border-color: rgba(0, 200, 255, 0.5);
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0, 150, 255, 0.2);
        }
        
        .team-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--team-color), transparent);
        }
        
        .team-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .team-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(0, 150, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: var(--team-color);
            flex-shrink: 0;
        }
        
        .team-title {
            flex: 1;
        }
        
        .team-name {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: #e0f7ff;
        }
        
        .team-code {
            font-size: 0.9rem;
            color: #a3d5ff;
        }
        
        .team-description {
            color: #a3d5ff;
            line-height: 1.6;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }
        
        /* 闃熶紞淇℃伅璇︽儏 */
        .team-details {
            margin-top: 20px;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 150, 255, 0.1);
        }
        
        .detail-label {
            color: #6b9ccc;
            font-size: 0.9rem;
        }
        
        .detail-value {
            color: #e0f7ff;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        /* 鐘舵€佹爣绛?*/
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .status-active {
            background: rgba(107, 255, 184, 0.2);
            color: #6bffb8;
            border: 1px solid rgba(107, 255, 184, 0.5);
        }
        
        .status-inactive {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.5);
        }
        
        /* 闃熷憳鍒楄〃 */
        .members-list {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(0, 150, 255, 0.1);
        }
        
        .members-title {
            font-size: 1.1rem;
            color: #4fc3ff;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }
        
        .member-item {
            background: rgba(0, 30, 80, 0.5);
            border-radius: 10px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .member-item:hover {
            background: rgba(0, 60, 120, 0.3);
            transform: translateY(-3px);
        }
        
        .member-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0066cc, #0099ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            margin-bottom: 10px;
        }
        
        .member-name {
            font-size: 0.95rem;
            font-weight: 500;
            color: #e0f7ff;
            margin-bottom: 5px;
        }
        
        .member-position {
            font-size: 0.8rem;
            color: #a3d5ff;
        }
        
        /* 绌虹姸鎬?*/
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b9ccc;
            grid-column: 1 / -1;
        }
        
        .empty-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            color: rgba(0, 150, 255, 0.3);
        }
        
        /* 闃熶紞璇︽儏妯℃€佹 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal-content {
            background: radial-gradient(circle at center, #0a2463, #000000);
            border: 2px solid rgba(0, 150, 255, 0.5);
            border-radius: 20px;
            padding: 30px;
            max-width: 900px;
            width: 95%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 0 60px rgba(0, 150, 255, 0.4);
            transform: translateY(20px);
            transition: transform 0.3s ease;
            position: relative;
        }
        
        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 150, 255, 0.3);
        }
        
        .modal-title {
            background: linear-gradient(90deg, #4fc3ff, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .close-btn {
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid rgba(255, 107, 107, 0.5);
            color: #ff6b6b;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .close-btn:hover {
            background: rgba(255, 107, 107, 0.3);
            transform: rotate(90deg);
        }
        
        /* 闃熶紞璇︽儏鍐呭 */
        .team-detail-header {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .team-badge-large {
            width: 100px;
            height: 100px;
            border-radius: 20px;
            background: rgba(0, 150, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--team-color);
            flex-shrink: 0;
        }
        
        .team-basic-info {
            flex: 1;
            min-width: 300px;
        }
        
        .team-basic-info h3 {
            font-size: 1.6rem;
            color: #e0f7ff;
            margin-bottom: 10px;
        }
        
        .team-basic-info p {
            color: #a3d5ff;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        
        /* 淇℃伅鍗＄墖 */
        .info-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .info-card {
            background: rgba(0, 30, 80, 0.5);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(0, 150, 255, 0.2);
        }
        
        .info-card-title {
            font-size: 1.1rem;
            color: #4fc3ff;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 150, 255, 0.1);
        }
        
        .info-label {
            color: #6b9ccc;
            font-size: 0.9rem;
        }
        
        .info-value {
            color: #e0f7ff;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        /* 鎴愬憳琛ㄦ牸 */
        .members-table-container {
            margin-top: 30px;
        }
        
        .members-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        
        .members-table th {
            background: rgba(0, 60, 120, 0.5);
            color: #4fc3ff;
            padding: 15px;
            text-align: left;
            border-bottom: 2px solid rgba(0, 150, 255, 0.3);
            font-weight: 500;
        }
        
        .members-table td {
            padding: 15px;
            border-bottom: 1px solid rgba(0, 150, 255, 0.1);
            color: #e0f7ff;
        }
        
        .members-table tr:hover {
            background: rgba(0, 60, 120, 0.2);
        }
        
        /* 鎿嶄綔鎸夐挳 */
        .action-btn {
            padding: 12px 25px;
            background: rgba(10, 36, 99, 0.7);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 10px;
            color: #a3d5ff;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            white-space: nowrap;
        }
        
        .action-btn:hover {
            background: rgba(0, 150, 255, 0.2);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 150, 255, 0.2);
        }
        
        .action-btn.primary {
            background: linear-gradient(135deg, #0066cc, #0099ff);
            color: white;
            border: none;
        }
        
        .action-btn.primary:hover {
            background: linear-gradient(135deg, #0099ff, #00ccff);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 150, 255, 0.3);
        }
        
        /* 閫€鍑烘寜閽?*/
        .logout-btn {
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid rgba(255, 107, 107, 0.5);
            color: #ff6b6b;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-left: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .logout-btn:hover {
            background: rgba(255, 107, 107, 0.3);
            transform: scale(1.05);
        }
        
        /* 鍝嶅簲寮忚璁?*/
        @media (max-width: 1200px) {
            .teams-grid {
                grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            }
        }
        
        @media (max-width: 768px) {
            .main-content {
                padding: 20px 15px;
            }
            
            .status-bar {
                padding: 15px 20px;
                flex-wrap: wrap;
                gap: 15px;
            }
            
            .teams-grid {
                grid-template-columns: 1fr;
            }
            
            .page-title {
                font-size: 1.8rem;
            }
            
            .page-subtitle {
                font-size: 1rem;
            }
            
            .modal-content {
                padding: 20px;
                width: 98%;
            }
            
            .team-detail-header {
                flex-direction: column;
                gap: 20px;
            }
            
            .team-basic-info {
                min-width: auto;
            }
            
            /* 鍝嶅簲寮忎笅鐨勮繑鍥炴寜閽?*/
            .back-btn {
                margin-right: 10px;
                padding: 6px 12px;
                font-size: 0.8rem;
            }
            
            .back-btn span {
                display: none; /* 鍦ㄥ皬灞忓箷涓婇殣钘?杩斿洖"鏂囧瓧 */
            }
            
            .back-btn i {
                margin-right: 0;
                font-size: 0.9rem;
            }
        }
        
        /* 鍔犺浇鍔ㄧ敾 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            backdrop-filter: blur(10px);
            flex-direction: column;
        }
        
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(79, 195, 255, 0.3);
            border-top: 5px solid #4fc3ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #e0f7ff;
            margin-top: 20px;
            font-size: 1.1rem;
            letter-spacing: 2px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- 鍔犺浇鍔ㄧ敾 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="loadingText">姝ｅ湪鍔犺浇闃熶紞鏁版嵁...</div>
    </div>
    
    <!-- 鎺у埗鍙扮晫闈?-->
    <div class="desktop" style="display: none;" id="mainContent">
        <!-- 椤堕儴鐘舵€佹爮 -->
        <div class="status-bar">
            <div class="system-info">
                <!-- 杩斿洖鎸夐挳 -->
                <button class="back-btn" onclick="goBackToAdmin()" title="杩斿洖鎺у埗鍙?>
                    <i class="fas fa-chevron-left"></i>
                    <span>杩斿洖鎺у埗鍙?/span>
                </button>
                
                <img src="qsamlogo.png" alt="绯荤粺鏍囧織" class="system-logo">
                <div class="system-name">闃熶紞绠＄悊鎺у埗鍙?/div>
            </div>
            
            <div class="user-info">
                <div class="time-display" id="currentTime">00:00:00</div>
                <div class="user-avatar">
                    <i class="fas fa-user-shield"></i>
                </div>
                <div>
                    <div style="color: #ffd93d;">Ophelia</div>
                    <div style="font-size: 0.8rem; color: #a3d5ff;">鏈€楂樻潈闄愮鐞嗗憳</div>
                </div>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> 閫€鍑?
                </button>
            </div>
        </div>
        
        <!-- 涓昏鍐呭鍖哄煙 -->
        <div class="main-content">
            <div class="content-wrapper">
                <!-- 椤甸潰鏍囬 -->
                <div class="page-header">
                    <h1 class="page-title">鎴樻枟缃?- 闃熶紞鍚嶅崟</h1>
                    <p class="page-subtitle">绠＄悊灞€鎴樻枟缃蹭笅灞炵殑鎵€鏈夎鍔ㄥ皬闃熴€傜偣鍑婚槦浼嶅崱鐗囨煡鐪嬭缁嗕俊鎭拰鎴愬憳鍒楄〃銆?/p>
                </div>
                
                <!-- 缁熻鍗＄墖 -->
                <div class="stats-cards">
                    <div class="stat-card">
                        <div class="stat-icon" style="color: #4fc3ff;">
                            <i class="fas fa-users"></i>
                        </div>
                        <div class="stat-label">鎬婚槦浼嶆暟</div>
                        <div class="stat-value" id="totalTeams">0</div>
                    </div>

                                        <div class="member-position">${member.position}</div>
                                    </div>
                                `).join('')}
                                ${team.memberCount > 3 ? `
                                    <div class="member-item" style="background: rgba(0, 150, 255, 0.1);">
                                        <div class="member-avatar" style="background: rgba(0, 150, 255, 0.3);">
                                            <i class="fas fa-ellipsis-h"></i>
                                        </div>
                                        <div class="member-name">杩樻湁 ${team.memberCount - 3} 浜?/div>
                                        <div class="member-position">鐐瑰嚮鏌ョ湅鍏ㄩ儴</div>
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                    ` : `
                        <div class="members-list">
                            <div class="members-title">
                                <i class="fas fa-user-slash"></i> 鏆傛棤鎴愬憳
                            </div>
                            <p style="color: #6b9ccc; text-align: center; font-size: 0.9rem; margin-top: 10px;">
                                璇ラ槦浼嶅綋鍓嶆病鏈夊垎閰嶆垚鍛?
                            </p>
                        </div>
                    `}
                </div>
            `).join('');
        }
        
        // 鏌ョ湅闃熶紞璇︽儏
        function viewTeamDetail(teamName) {
            currentViewingTeam = teams.find(team => team.name === teamName);
            
            if (!currentViewingTeam) return;
            
            // 鏇存柊妯℃€佹鏍囬
            document.getElementById('modalTeamName').textContent = currentViewingTeam.name;
            document.getElementById('modalIcon').className = currentViewingTeam.icon;
            document.getElementById('modalIcon').style.color = currentViewingTeam.color;
            
            // 鐢熸垚璇︽儏鍐呭
            const detailContent = generateTeamDetailContent(currentViewingTeam);
            document.getElementById('teamDetailContent').innerHTML = detailContent;
            
            // 鏄剧ず妯℃€佹
            document.getElementById('teamModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        // 鐢熸垚闃熶紞璇︽儏鍐呭
        function generateTeamDetailContent(team) {
            return `
                <div class="team-detail-header">
                    <div class="team-badge-large" style="color: ${team.color}">
                        <i class="${team.icon}"></i>
                    </div>
                    <div class="team-basic-info">
                        <h3>${team.name} (${team.code})</h3>
                        <p>${team.description}</p>
                        <div style="display: flex; gap: 15px; margin-top: 20px; flex-wrap: wrap;">
                            <div style="background: rgba(0, 150, 255, 0.1); padding: 8px 15px; border-radius: 8px;">
                                <div style="color: #6b9ccc; font-size: 0.85rem;">鐘舵€?/div>
                                <div style="color: ${team.status === 'active' ? '#6bffb8' : '#ff6b6b'}; font-weight: bold;">
                                    ${team.status === 'active' ? '娲昏穬涓? : '寰呭懡涓?}
                                </div>
                            </div>
                            <div style="background: rgba(0, 150, 255, 0.1); padding: 8px 15px; border-radius: 8px;">
                                <div style="color: #6b9ccc; font-size: 0.85rem;">鎴愬憳</div>
                                <div style="color: #4fc3ff; font-weight: bold;">${team.memberCount} 浜?/div>
                            </div>
                            <div style="background: rgba(0, 150, 255, 0.1); padding: 8px 15px; border-radius: 8px;">
                                <div style="color: #6b9ccc; font-size: 0.85rem;">鎴愮珛鏃堕棿</div>
                                <div style="color: #ffd93d; font-weight: bold;">${team.established}</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="info-cards">
                    <div class="info-card">
                        <div class="info-card-title">
                            <i class="fas fa-info-circle"></i> 闃熶紞淇℃伅
                        </div>
                        <div class="info-item">
                            <span class="info-label">闃熶紞浠ｅ彿</span>
                            <span class="info-value">${team.code}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">闃熼暱</span>
                            <span class="info-value">${team.leader ? team.leader.name : '鏈寚瀹?}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">闃熼暱鑱屼綅</span>
                            <span class="info-value">${team.leaderTitle}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">闃熶紞鏍艰█</span>
                            <span class="info-value">${team.motto}</span>
                        </div>
                    </div>
                    
                    <div class="info-card">
                        <div class="info-card-title">
                            <i class="fas fa-map-marker-alt"></i> 閮ㄧ讲淇℃伅
                        </div>
                        <div class="info-item">
                            <span class="info-label">閮ㄧ讲绫诲瀷</span>
                            <span class="info-value">${team.deployment}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">椹诲湴鍩哄湴</span>
                            <span class="info-value">${team.base}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">鏍囧噯瑁呭</span>
                            <span class="info-value">${team.equipment}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">鏁版嵁鏉ユ簮</span>
                            <span class="info-value">${cloudEnabled ? '浜戠鏁版嵁搴? : '鏈湴瀛樺偍'}</span>
                        </div>
                    </div>
                </div>
                
                <div class="members-table-container">
                    <div class="info-card-title">
                        <i class="fas fa-user-friends"></i> 鎴愬憳鍒楄〃 (${team.memberCount} 浜?
                    </div>
                    
                    ${team.memberCount > 0 ? `
                        <table class="members-table">
                            <thead>
                                <tr>
                                    <th>濮撳悕</th>
                                    <th>鑱屼綅</th>
                                    <th>鐘舵€?/th>
                                    <th>鐢ㄦ埛鍚?/th>
                                    <th>鍔犲叆鏃堕棿</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${team.members.map(member => `
                                    <tr onclick="viewMemberDetail('${member.username}')" style="cursor: pointer;">
                                        <td>
                                            <div style="display: flex; align-items: center; gap: 10px;">
                                                <div style="width: 30px; height: 30px; border-radius: 50%; background: rgba(0, 150, 255, 0.2); display: flex; align-items: center; justify-content: center;">
                                                    <i class="fas fa-user" style="font-size: 0.8rem; color: #4fc3ff;"></i>
                                                </div>
                                                ${member.name}
                                                ${member.position === '闃熼暱' ? '<span class="status-badge status-active" style="margin-left: 8px; font-size: 0.7rem;">闃熼暱</span>' : ''}
                                            </div>
                                        </td>
                                        <td>${member.position}</td>
                                        <td>
                                            <span class="status-badge ${member.status === 'active' ? 'status-active' : 'status-inactive'}" style="font-size: 0.7rem;">
                                                ${member.status === 'active' ? '娲昏穬' : '鏈縺娲?}
                                            </span>
                                        </td>
                                        <td>${member.username}</td>
                                        <td>${member.joinDate}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    ` : `
                        <div style="text-align: center; padding: 40px 20px; color: #6b9ccc;">
                            <i class="fas fa-user-slash" style="font-size: 3rem; margin-bottom: 15px; opacity: 0.5;"></i>
                            <p>璇ラ槦浼嶅綋鍓嶆病鏈夊垎閰嶆垚鍛?/p>
                            <p style="font-size: 0.9rem; margin-top: 10px;">鍙互鍦ㄦ垚鍛樼鐞嗛〉闈负鎴愬憳鍒嗛厤闃熶紞</p>
                        </div>
                    `}
                </div>
            `;
        }
        
        // 鏌ョ湅鎴愬憳璇︽儏锛堜粠闃熶紞椤甸潰杩涘叆鏃惰褰曟潵婧愬苟鍦ㄥ悓涓€鏍囩椤垫墦寮€锛?
        function viewMemberDetail(username) {
            // 淇濆瓨鎴愬憳淇℃伅鍒版湰鍦板瓨鍌?
            localStorage.setItem('viewing_member_username', username);
            // 璁板綍鏉ユ簮椤甸潰锛屼緵璇︽儏椤佃繑鍥炰娇鐢?
            try { sessionStorage.setItem('previousPage', 'teams.html'); } catch (e) { /* ignore */ }
            // 鍦ㄥ綋鍓嶆爣绛鹃〉璺宠浆鍒拌鎯呴〉锛堜繚璇佽繑鍥炶兘鍥炲埌闃熶紞鍒楄〃锛?
            window.location.href = 'member-detail.html';
        }
        
        // 鍏抽棴闃熶紞璇︽儏妯℃€佹
        function closeTeamModal() {
            document.getElementById('teamModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }
        
        // ================================================
        // 5. 杈呭姪鍑芥暟
        // ================================================
        
        // 杩斿洖 admin 椤甸潰
        function goBackToAdmin() {
            if (confirm('纭畾瑕佽繑鍥炴帶鍒跺彴鍚楋紵')) {
                // 鏄剧ず鍔犺浇鐘舵€?
                const backBtn = document.querySelector('.back-btn');
                const originalHTML = backBtn.innerHTML;
                backBtn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> 杩斿洖涓?..`;
                backBtn.disabled = true;
                
                // 妯℃嫙寤惰繜鍚庤烦杞?
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 500);
            }
        }
        
        // 鏇存柊鏃堕棿鏄剧ず
        function updateTime() {
            try {
                const now = new Date();
                const hours = now.getHours().toString().padStart(2, '0');
                const minutes = now.getMinutes().toString().padStart(2, '0');
                const seconds = now.getSeconds().toString().padStart(2, '0');
                
                const timeDisplay = document.getElementById('currentTime');
                if (timeDisplay) {
                    timeDisplay.textContent = `${hours}:${minutes}:${seconds}`;
                }
            } catch (e) {
                console.error('鏇存柊鏃堕棿澶辫触:', e);
            }
        }
        
        // 鏄剧ず閿欒娑堟伅
        function showErrorMessage(message) {
            const container = document.getElementById('teamsContainer');
            if (container) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <i class="fas fa-exclamation-triangle"></i>
                        </div>
                        <h3>鏁版嵁鍔犺浇澶辫触</h3>
                        <p>${message}</p>
                        <button onclick="loadTeamsData()" class="action-btn primary" style="margin-top: 20px;">
                            <i class="fas fa-redo"></i> 閲嶆柊鍔犺浇
                        </button>
                    </div>
                `;
            }
        }
        
        // 鍒锋柊鏁版嵁
        function refreshData() {
            document.getElementById('loadingOverlay').style.display = 'flex';
            document.getElementById('mainContent').style.display = 'none';
            loadTeamsData().then(() => {
                document.getElementById('loadingOverlay').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                alert('鏁版嵁宸插埛鏂帮紒');
            });
        }
        
        // 閫€鍑虹櫥褰?
        function logout() {
            if (confirm('纭畾瑕侀€€鍑虹櫥褰曞悧锛?)) {
                localStorage.removeItem('auth_user');
                localStorage.removeItem('auth_role');
                localStorage.removeItem('auth_time');
                window.location.href = 'index.html';
            }
        }
        
        // 娣诲姞鍒锋柊鎸夐挳浜嬩欢鐩戝惉
        document.addEventListener('DOMContentLoaded', function() {
            // 娣诲姞閿洏蹇嵎閿?
            document.addEventListener('keydown', function(e) {
                // Ctrl+R 鍒锋柊
                if (e.ctrlKey && e.key === 'r') {
                    e.preventDefault();
                    refreshData();
                }
                // F5 鍒锋柊
                if (e.key === 'F5') {
                    e.preventDefault();
                    refreshData();
                }
            });
        });
    </script>
</body>
</html>
