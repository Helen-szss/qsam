<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>队伍名单 - 管理局控制台</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 添加 Supabase 客户端库 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        /* 全局样式 - 确保全屏 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            overflow: auto;
        }
        
        /* 控制台样式 - 全屏 */
        .desktop {
            min-height: 100vh;
            width: 100%;
            background: radial-gradient(circle at center, #0a2463, #000000);
            padding: 0;
            position: relative;
            overflow: visible;
        }
        
        /* 顶部状态栏 - 固定 */
        .status-bar {
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(10, 36, 99, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 150, 255, 0.3);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .system-info {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: nowrap;
        }
        
        /* 返回按钮样式 */
        .back-btn {
            background: rgba(0, 150, 255, 0.2);
            border: 1px solid rgba(0, 150, 255, 0.5);
            color: #4fc3ff;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            white-space: nowrap;
            margin-right: 15px;
        }

        .back-btn:hover {
            background: rgba(0, 150, 255, 0.3);
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(0, 150, 255, 0.3);
        }

        .back-btn i {
            font-size: 0.8rem;
        }
        
        .system-logo {
            width: 40px;
            height: 40px;
            filter: drop-shadow(0 0 10px rgba(0, 150, 255, 0.7));
        }
        
        .system-name {
            font-size: 1.5rem;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0066cc, #0099ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
        }
        
        .time-display {
            color: #a3d5ff;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }
        
        /* 主要内容区域 - 全屏 */
        .main-content {
            width: 100%;
            min-height: calc(100vh - 80px);
            padding: 30px;
            overflow: auto;
        }
        
        /* 内容容器 */
        .content-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }
        
        /* 页面标题 */
        .page-header {
            margin-bottom: 30px;
            text-align: center;
        }
        
        .page-title {
            font-size: 2.2rem;
            background: linear-gradient(90deg, #4fc3ff, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(79, 195, 255, 0.3);
        }
        
        .page-subtitle {
            color: #a3d5ff;
            font-size: 1.1rem;
            letter-spacing: 1px;
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.5;
        }
        
        /* 统计卡片网格 */
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            width: 100%;
        }
        
        .stat-card {
            background: rgba(10, 36, 99, 0.7);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 15px;
            padding: 25px 20px;
            text-align: center;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 150, 255, 0.2);
            border-color: rgba(0, 150, 255, 0.5);
        }
        
        .stat-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }
        
        .stat-value {
            font-size: 2.2rem;
            font-weight: bold;
            background: linear-gradient(90deg, #4fc3ff, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 10px 0;
            text-shadow: 0 0 10px rgba(79, 195, 255, 0.3);
        }
        
        .stat-label {
            color: #a3d5ff;
            font-size: 0.95rem;
            letter-spacing: 1px;
        }
        
        /* 队伍网格 */
        .teams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
            width: 100%;
        }
        
        .team-card {
            background: rgba(10, 36, 99, 0.7);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 15px;
            padding: 30px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            height: 100%;
        }
        
        .team-card:hover {
            background: rgba(0, 60, 120, 0.3);
            border-color: rgba(0, 200, 255, 0.5);
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0, 150, 255, 0.2);
        }
        
        .team-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--team-color), transparent);
        }
        
        .team-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .team-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(0, 150, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: var(--team-color);
            flex-shrink: 0;
        }
        
        .team-title {
            flex: 1;
        }
        
        .team-name {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: #e0f7ff;
        }
        
        .team-code {
            font-size: 0.9rem;
            color: #a3d5ff;
        }
        
        .team-description {
            color: #a3d5ff;
            line-height: 1.6;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }
        
        /* 队伍信息详情 */
        .team-details {
            margin-top: 20px;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 150, 255, 0.1);
        }
        
        .detail-label {
            color: #6b9ccc;
            font-size: 0.9rem;
        }
        
        .detail-value {
            color: #e0f7ff;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        /* 状态标签 */
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .status-active {
            background: rgba(107, 255, 184, 0.2);
            color: #6bffb8;
            border: 1px solid rgba(107, 255, 184, 0.5);
        }
        
        .status-inactive {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.5);
        }
        
        /* 队员列表 */
        .members-list {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(0, 150, 255, 0.1);
        }
        
        .members-title {
            font-size: 1.1rem;
            color: #4fc3ff;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }
        
        .member-item {
            background: rgba(0, 30, 80, 0.5);
            border-radius: 10px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .member-item:hover {
            background: rgba(0, 60, 120, 0.3);
            transform: translateY(-3px);
        }
        
        .member-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0066cc, #0099ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            margin-bottom: 10px;
        }
        
        .member-name {
            font-size: 0.95rem;
            font-weight: 500;
            color: #e0f7ff;
            margin-bottom: 5px;
        }
        
        .member-position {
            font-size: 0.8rem;
            color: #a3d5ff;
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b9ccc;
            grid-column: 1 / -1;
        }
        
        .empty-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            color: rgba(0, 150, 255, 0.3);
        }
        
        /* 队伍详情模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal-content {
            background: radial-gradient(circle at center, #0a2463, #000000);
            border: 2px solid rgba(0, 150, 255, 0.5);
            border-radius: 20px;
            padding: 30px;
            max-width: 900px;
            width: 95%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 0 60px rgba(0, 150, 255, 0.4);
            transform: translateY(20px);
            transition: transform 0.3s ease;
            position: relative;
        }
        
        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 150, 255, 0.3);
        }
        
        .modal-title {
            background: linear-gradient(90deg, #4fc3ff, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .close-btn {
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid rgba(255, 107, 107, 0.5);
            color: #ff6b6b;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .close-btn:hover {
            background: rgba(255, 107, 107, 0.3);
            transform: rotate(90deg);
        }
        
        /* 队伍详情内容 */
        .team-detail-header {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .team-badge-large {
            width: 100px;
            height: 100px;
            border-radius: 20px;
            background: rgba(0, 150, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--team-color);
            flex-shrink: 0;
        }
        
        .team-basic-info {
            flex: 1;
            min-width: 300px;
        }
        
        .team-basic-info h3 {
            font-size: 1.6rem;
            color: #e0f7ff;
            margin-bottom: 10px;
        }
        
        .team-basic-info p {
            color: #a3d5ff;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        
        /* 信息卡片 */
        .info-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .info-card {
            background: rgba(0, 30, 80, 0.5);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(0, 150, 255, 0.2);
        }
        
        .info-card-title {
            font-size: 1.1rem;
            color: #4fc3ff;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 150, 255, 0.1);
        }
        
        .info-label {
            color: #6b9ccc;
            font-size: 0.9rem;
        }
        
        .info-value {
            color: #e0f7ff;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        /* 成员表格 */
        .members-table-container {
            margin-top: 30px;
        }
        
        .members-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        
        .members-table th {
            background: rgba(0, 60, 120, 0.5);
            color: #4fc3ff;
            padding: 15px;
            text-align: left;
            border-bottom: 2px solid rgba(0, 150, 255, 0.3);
            font-weight: 500;
        }
        
        .members-table td {
            padding: 15px;
            border-bottom: 1px solid rgba(0, 150, 255, 0.1);
            color: #e0f7ff;
        }
        
        .members-table tr:hover {
            background: rgba(0, 60, 120, 0.2);
        }
        
        /* 操作按钮 */
        .action-btn {
            padding: 12px 25px;
            background: rgba(10, 36, 99, 0.7);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 10px;
            color: #a3d5ff;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            white-space: nowrap;
        }
        
        .action-btn:hover {
            background: rgba(0, 150, 255, 0.2);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 150, 255, 0.2);
        }
        
        .action-btn.primary {
            background: linear-gradient(135deg, #0066cc, #0099ff);
            color: white;
            border: none;
        }
        
        .action-btn.primary:hover {
            background: linear-gradient(135deg, #0099ff, #00ccff);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 150, 255, 0.3);
        }
        
        /* 退出按钮 */
        .logout-btn {
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid rgba(255, 107, 107, 0.5);
            color: #ff6b6b;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-left: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .logout-btn:hover {
            background: rgba(255, 107, 107, 0.3);
            transform: scale(1.05);
        }
        
        /* 响应式设计 */
        @media (max-width: 1200px) {
            .teams-grid {
                grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            }
        }
        
        @media (max-width: 768px) {
            .main-content {
                padding: 20px 15px;
            }
            
            .status-bar {
                padding: 15px 20px;
                flex-wrap: wrap;
                gap: 15px;
            }
            
            .teams-grid {
                grid-template-columns: 1fr;
            }
            
            .page-title {
                font-size: 1.8rem;
            }
            
            .page-subtitle {
                font-size: 1rem;
            }
            
            .modal-content {
                padding: 20px;
                width: 98%;
            }
            
            .team-detail-header {
                flex-direction: column;
                gap: 20px;
            }
            
            .team-basic-info {
                min-width: auto;
            }
            
            /* 响应式下的返回按钮 */
            .back-btn {
                margin-right: 10px;
                padding: 6px 12px;
                font-size: 0.8rem;
            }
            
            .back-btn span {
                display: none; /* 在小屏幕上隐藏"返回"文字 */
            }
            
            .back-btn i {
                margin-right: 0;
                font-size: 0.9rem;
            }
        }
        
        /* 加载动画 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            backdrop-filter: blur(10px);
            flex-direction: column;
        }
        
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(79, 195, 255, 0.3);
            border-top: 5px solid #4fc3ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #e0f7ff;
            margin-top: 20px;
            font-size: 1.1rem;
            letter-spacing: 2px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- 加载动画 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="loadingText">正在加载队伍数据...</div>
    </div>
    
    <!-- 控制台界面 -->
    <div class="desktop" style="display: none;" id="mainContent">
        <!-- 顶部状态栏 -->
        <div class="status-bar">
            <div class="system-info">
                <!-- 返回按钮 -->
                <button class="back-btn" onclick="goBackToAdmin()" title="返回控制台">
                    <i class="fas fa-chevron-left"></i>
                    <span>返回控制台</span>
                </button>
                
                <img src="qsamlogo.png" alt="系统标志" class="system-logo">
                <div class="system-name">队伍管理控制台</div>
            </div>
            
            <div class="user-info">
                <div class="time-display" id="currentTime">00:00:00</div>
                <div class="user-avatar">
                    <i class="fas fa-user-shield"></i>
                </div>
                <div>
                    <div style="color: #ffd93d;">Ophelia</div>
                    <div style="font-size: 0.8rem; color: #a3d5ff;">最高权限管理员</div>
                </div>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> 退出
                </button>
            </div>
        </div>
        
        <!-- 主要内容区域 -->
        <div class="main-content">
            <div class="content-wrapper">
                <!-- 页面标题 -->
                <div class="page-header">
                    <h1 class="page-title">战斗署 - 队伍名单</h1>
                    <p class="page-subtitle">管理局战斗署下属的所有行动小队。点击队伍卡片查看详细信息和成员列表。</p>
                </div>
                
                <!-- 统计卡片 -->
                <div class="stats-cards">
                    <div class="stat-card">
                        <div class="stat-icon" style="color: #4fc3ff;">
                            <i class="fas fa-users"></i>
                        </div>
                        <div class="stat-label">总队伍数</div>
                        <div class="stat-value" id="totalTeams">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="color: #6bffb8;">
                            <i class="fas fa-user-check"></i>
                        </div>
                        <div class="stat-label">总成员数</div>
                        <div class="stat-value" id="totalMembers">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="color: #ffd93d;">
                            <i class="fas fa-user-shield"></i>
                        </div>
                        <div class="stat-label">队长人数</div>
                        <div class="stat-value" id="totalLeaders">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="color: #ff6b6b;">
                            <i class="fas fa-running"></i>
                        </div>
                        <div class="stat-label">活跃队伍</div>
                        <div class="stat-value" id="activeTeams">0</div>
                    </div>
                </div>
                
                <!-- 队伍列表 -->
                <div class="teams-grid" id="teamsContainer">
                    <!-- 队伍卡片会通过JavaScript动态生成 -->
                </div>
                
                <!-- 云端状态 -->
                <div style="margin-top: 40px; text-align: center; color: #6b9ccc; font-size: 0.9rem;">
                    <i class="fas fa-cloud" id="cloudIcon"></i>
                    <span id="cloudStatus">正在连接云端数据库...</span>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 队伍详情模态框 -->
    <div class="modal-overlay" id="teamModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">
                    <i class="fas fa-users" id="modalIcon"></i>

        // ================================================

            // 1. 检查登录状态

            updateTime();

            await initSupabase();

            await loadTeamsData();
            
            // 5. 显示主界面
            document.getElementById('loadingOverlay').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            
            // 6. 添加ESC键返回支持
            document.addEventListener('keydown', function(e) {

        // 初始化Supabase
        async function initSupabase() {
            try {
                console.log('初始化Supabase连接...');
                
                // 等待Supabase库加载完成
                if (typeof window.supabase === 'undefined') {
                    console.error('Supabase库未加载！');
                    updateCloudStatus('error', 'Supabase库未加载');
                    return false;
                }
                
                // 检查配置是否完整
                if (!SUPABASE_URL || SUPABASE_URL.includes('your-project-id') || 
                    !SUPABASE_ANON_KEY || SUPABASE_ANON_KEY.includes('your-anon-key')) {
                    console.warn('Supabase配置不完整');
                    updateCloudStatus('disabled', 'Supabase配置不完整');
                    return false;
                }
                
                // 创建Supabase客户端
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
                    auth: {
                        persistSession: false,
                        autoRefreshToken: false
                    }
                });
                
                // 测试连接
                const connected = await testSupabaseConnection();
                if (connected) {
                    cloudEnabled = true;
                    console.log('✅ Supabase连接成功');
                    updateCloudStatus('connected', '云端数据库连接成功');
                    return true;
                } else {
                    updateCloudStatus('error', '云端连接失败');
                    return false;
                }
                
            } catch (e) {
                console.error('Supabase初始化失败:', e);
                updateCloudStatus('error', '初始化失败: ' + e.message);
                return false;
            }
        }
        
        // 测试Supabase连接
        async function testSupabaseConnection() {
            if (!supabaseClient) return false;
            
            try {
                updateLoadingText('正在测试云端连接...');
                
                // 尝试查询users表
                const { data, error } = await supabaseClient
                    .from('users')
                    .select('id')
                    .limit(1);
                
                if (error) {
                    console.error('❌ Supabase连接测试失败:', error);
                    return false;
                }
                
                console.log('✅ Supabase连接测试成功');
                return true;
            } catch (e) {
                console.error('连接测试异常:', e);
                return false;
            }
        }
        
        // 更新加载文本
        function updateLoadingText(text) {
            const loadingText = document.getElementById('loadingText');
            if (loadingText) {
                loadingText.textContent = text;
            }
        }
        
        // 更新云端状态显示
        function updateCloudStatus(status, message) {
            const cloudIcon = document.getElementById('cloudIcon');
            const cloudStatus = document.getElementById('cloudStatus');
            
            if (!cloudIcon || !cloudStatus) return;
            
            switch(status) {
                case 'connected':
                    cloudIcon.style.color = '#6bffb8';
                    cloudIcon.className = 'fas fa-cloud';
                    cloudStatus.textContent = message;
                    break;
                case 'connecting':
                    cloudIcon.style.color = '#ffd93d';
                    cloudIcon.className = 'fas fa-spinner fa-spin';
                    cloudStatus.textContent = message;
                    break;
                case 'error':
                    cloudIcon.style.color = '#ff6b6b';
                    cloudIcon.className = 'fas fa-cloud-slash';
                    cloudStatus.textContent = message;
                    break;
                case 'disabled':
                    cloudIcon.style.color = '#a3d5ff';
                    cloudIcon.className = 'fas fa-cloud-slash';
                    cloudStatus.textContent = message;
                    break;
            }
        }

        // 加载队伍数据

            try {

                // 1. 从云端或本地加载所有成员
                const usersData = await loadUsersData();
                
                // 2. 筛选战斗署成员
                allCombatMembers = usersData.filter(user => 
                    user.department === '战斗署' && user.team && user.team !== ''
                );
                
                console.log(`找到 ${allCombatMembers.length} 名战斗署成员`);
                
                // 3. 构建队伍数据
                teams = buildTeamsData(allCombatMembers);

                updateStats();
                
                // 5. 渲染队伍列表
                renderTeams();
                
            } catch (error) {
                console.error('加载队伍数据失败:', error);
                showErrorMessage('数据加载失败: ' + error.message);
            }
        }
        
        // 加载用户数据（云端优先）
        async function loadUsersData() {
            if (cloudEnabled && supabaseClient) {
                try {
                    updateLoadingText('正在从云端数据库获取成员信息...');
                    
                    // 从云端获取所有用户
                    const { data: users, error } = await supabaseClient
                        .from('users')
                        .select('*')
                        .order('id', { ascending: true });
                    
                    if (error) throw error;
                    
                    console.log(`从云端获取了 ${users.length} 个用户`);
                    
                    // 转换为统一格式
                    return users.map(user => ({
                        id: user.id,
                        name: user.name,
                        username: user.username,
                        role: user.role,
                        status: user.status,
                        department: user.department || '未分配',
                        team: user.team || '',
                        position: user.position || '',
                        joinDate: user.join_date,
                        notes: user.notes
                    }));
                    
                } catch (error) {
                    console.error('从云端加载用户失败，回退到本地数据:', error);
                    // 回退到本地数据
                }
            }
            
            // 使用本地数据
            updateLoadingText('正在从本地数据获取成员信息...');
            const stored = localStorage.getItem('qs_users_data');
            
            if (stored) {
                try {
                    const usersData = JSON.parse(stored);
                    return Object.entries(usersData).map(([username, user]) => ({
                        id: user.id,
                        name: user.name,
                        username: username,
                        role: user.role,
                        status: user.status,
                        department: user.department || '未分配',
                        team: user.team || '',
                        position: user.position || '',
                        joinDate: user.joinDate,
                        notes: user.notes
                    }));
                } catch (e) {
                    console.error('解析本地用户数据失败:', e);
                }
            }
            
            // 返回空数组
            return [];
        }
        
        // 构建队伍数据
        function buildTeamsData(members) {
            const teamsData = [];
            
            // 遍历所有预定义的队伍
            for (const [teamName, teamInfo] of Object.entries(TEAMS_INFO)) {
                // 筛选属于该队伍的成员
                const teamMembers = members.filter(member => member.team === teamName);
                
                // 查找队长
                const leader = teamMembers.find(member => member.position === '队长');
                
                // 构建队伍数据对象
                teamsData.push({
                    ...teamInfo,
                    members: teamMembers,
                    memberCount: teamMembers.length,
                    leader: leader ? {
                        name: leader.name,
                        username: leader.username,
                        position: leader.position
                    } : null
                });
            }
            
            return teamsData;
        }
        
        // 更新统计数据
        function updateStats() {
            const totalTeams = teams.length;
            const totalMembers = allCombatMembers.length;
            const totalLeaders = teams.filter(team => team.leader).length;
            const activeTeams = teams.filter(team => team.status === 'active').length;
            
            document.getElementById('totalTeams').textContent = totalTeams;
            document.getElementById('totalMembers').textContent = totalMembers;
            document.getElementById('totalLeaders').textContent = totalLeaders;
            document.getElementById('activeTeams').textContent = activeTeams;
        }

            // 记录来源页面，供详情页返回使用
            try { sessionStorage.setItem('previousPage', 'teams.html'); } catch (e) { /* ignore */ }
            // 在当前标签页跳转到详情页（保证返回能回到队伍列表）
            window.location.href = 'member-detail.html';
        }
        
        // 关闭队伍详情模态框
        function closeTeamModal() {
            document.getElementById('teamModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }
        
        // ================================================
        // 5. 辅助函数
        // ================================================
        
        // 返回 admin 页面
        function goBackToAdmin() {
            if (confirm('确定要返回控制台吗？')) {
                // 显示加载状态
                const backBtn = document.querySelector('.back-btn');
                const originalHTML = backBtn.innerHTML;
                backBtn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> 返回中...`;
                backBtn.disabled = true;
                
                // 模拟延迟后跳转
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 500);
            }
        }
        
        // 更新时间显示
        function updateTime() {
            try {
                const now = new Date();
                const hours = now.getHours().toString().padStart(2, '0');
                const minutes = now.getMinutes().toString().padStart(2, '0');
                const seconds = now.getSeconds().toString().padStart(2, '0');
                
                const timeDisplay = document.getElementById('currentTime');
                if (timeDisplay) {
                    timeDisplay.textContent = `${hours}:${minutes}:${seconds}`;
                }
            } catch (e) {
                console.error('更新时间失败:', e);
            }
        }
        
        // 显示错误消息
        function showErrorMessage(message) {
            const container = document.getElementById('teamsContainer');
            if (container) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <i class="fas fa-exclamation-triangle"></i>
                        </div>
                        <h3>数据加载失败</h3>
                        <p>${message}</p>
                        <button onclick="loadTeamsData()" class="action-btn primary" style="margin-top: 20px;">
                            <i class="fas fa-redo"></i> 重新加载
                        </button>
                    </div>
                `;
            }
        }
        
        // 刷新数据
        function refreshData() {
            document.getElementById('loadingOverlay').style.display = 'flex';
            document.getElementById('mainContent').style.display = 'none';
            loadTeamsData().then(() => {
                document.getElementById('loadingOverlay').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                alert('数据已刷新！');
            });
        }
        
        // 退出登录
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('auth_user');
                localStorage.removeItem('auth_role');
                localStorage.removeItem('auth_time');
                window.location.href = 'index.html';
            }
        }
        
        // 添加刷新按钮事件监听
        document.addEventListener('DOMContentLoaded', function() {
            // 添加键盘快捷键
            document.addEventListener('keydown', function(e) {
                // Ctrl+R 刷新
                if (e.ctrlKey && e.key === 'r') {
                    e.preventDefault();
                    refreshData();
                }
                // F5 刷新
                if (e.key === 'F5') {
                    e.preventDefault();
                    refreshData();
                }
            });
        });
    </script>
</body>
</html>
