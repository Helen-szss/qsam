<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>终审简历 - 最高权限管理员</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 添加 Supabase 客户端库 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            min-height: 100vh;
            overflow: auto;
        }
        
        /* 控制台样式 */
        .desktop {
            min-height: 100vh;
            width: 100%;
            background: radial-gradient(circle at center, #0a2463, #000000);
            padding: 0;
            position: relative;
            overflow: visible;
        }
        
        /* 顶部状态栏 */
        .status-bar {
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(10, 36, 99, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 150, 255, 0.3);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .system-info {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: nowrap;
        }
        
        /* 返回按钮样式 */
        .back-btn {
            background: rgba(0, 150, 255, 0.2);
            border: 1px solid rgba(0, 150, 255, 0.5);
            color: #4fc3ff;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            white-space: nowrap;
            margin-right: 15px;
        }

        .back-btn:hover {
            background: rgba(0, 150, 255, 0.3);
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(0, 150, 255, 0.3);
        }

        .system-logo {
            width: 40px;
            height: 40px;
            filter: drop-shadow(0 0 10px rgba(0, 150, 255, 0.7));
        }
        
        .system-name {
            font-size: 1.5rem;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
        }
        
        .time-display {
            color: #a3d5ff;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }
        
        /* 主要内容区域 */
        .main-content {
            width: 100%;
            min-height: calc(100vh - 80px);
            padding: 30px 20px;
            overflow: auto;
        }
        
        .content-wrapper {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* 页面标题 */
        .page-header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0, 150, 255, 0.3);
        }
        
        .page-title {
            font-size: 2.2rem;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.3);
        }
        
        .page-subtitle {
            font-size: 1.1rem;
            color: #a3d5ff;
            line-height: 1.6;
        }
        
        /* 控制面板 */
        .control-panel {
            background: rgba(10, 36, 99, 0.7);
            border: 2px solid rgba(0, 150, 255, 0.3);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .stats-box {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .stat-item {
            padding: 12px 20px;
            background: rgba(0, 30, 80, 0.5);
            border-radius: 10px;
            border: 1px solid rgba(0, 150, 255, 0.2);
            min-width: 150px;
        }
        
        .stat-label {
            color: #a3d5ff;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }
        
        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffd93d;
        }
        
        .stat-value.pending { color: #ffa93d; }
        .stat-value.approved { color: #6bffb8; }
        .stat-value.rejected { color: #ff6b6b; }
        .stat-value.final-approved { color: #6bffb8; }
        .stat-value.final-rejected { color: #ff6b6b; }
        
        .filter-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .filter-select {
            padding: 10px 20px;
            background: rgba(0, 30, 80, 0.7);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 8px;
            color: #e0f7ff;
            cursor: pointer;
            min-width: 150px;
        }
        
        .refresh-btn {
            padding: 10px 20px;
            background: rgba(0, 100, 200, 0.7);
            border: 1px solid rgba(0, 150, 255, 0.5);
            border-radius: 8px;
            color: #e0f7ff;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .refresh-btn:hover {
            background: rgba(0, 150, 255, 0.7);
            transform: scale(1.05);
        }
        
        /* 简历列表 */
        .resume-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        
        .resume-card {
            background: rgba(10, 36, 99, 0.7);
            border: 2px solid rgba(0, 150, 255, 0.3);
            border-radius: 15px;
            padding: 25px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .resume-card:hover {
            border-color: rgba(0, 150, 255, 0.8);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 150, 255, 0.2);
        }
        
        .resume-card.approved { border-left: 5px solid #6bffb8; }
        .resume-card.final-approved { border-left: 5px solid #0066cc; }
        .resume-card.final-rejected { border-left: 5px solid #ff6b6b; }
        
        .resume-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }
        
        .applicant-info h3 {
            font-size: 1.3rem;
            color: #e0f7ff;
            margin-bottom: 5px;
        }
        
        .applicant-id {
            color: #a3d5ff;
            font-size: 0.9rem;
        }
        
        .status-badge {
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
        }
        
        .status-approved {
            background: rgba(107, 255, 184, 0.2);
            color: #6bffb8;
            border: 1px solid rgba(107, 255, 184, 0.5);
        }
        
        .status-final-approved {
            background: rgba(0, 102, 204, 0.2);
            color: #0066cc;
            border: 1px solid rgba(0, 102, 204, 0.5);
        }
        
        .status-final-rejected {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.5);
        }
        
        .resume-details {
            margin-bottom: 20px;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 150, 255, 0.1);
        }
        
        .detail-label {
            color: #a3d5ff;
            font-size: 0.9rem;
        }
        
        .detail-value {
            color: #e0f7ff;
            font-size: 0.95rem;
            text-align: right;
            max-width: 60%;
            word-break: break-word;
        }
        
        .resume-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
        
        .action-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn-view {
            background: rgba(79, 195, 255, 0.2);
            color: #4fc3ff;
            border: 1px solid rgba(79, 195, 255, 0.5);
        }
        
        .btn-view:hover {
            background: rgba(79, 195, 255, 0.3);
        }
        
        .btn-approve-final {
            background: rgba(0, 102, 204, 0.2);
            color: #0066cc;
            border: 1px solid rgba(0, 102, 204, 0.5);
        }
        
        .btn-approve-final:hover {
            background: rgba(0, 102, 204, 0.3);
        }
        
        .btn-reject-final {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.5);
        }
        
        .btn-reject-final:hover {
            background: rgba(255, 107, 107, 0.3);
        }
        
        /* 加载状态 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(10px);
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(79, 195, 255, 0.3);
            border-top: 5px solid #4fc3ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #e0f7ff;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }
        
        /* 详情模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            backdrop-filter: blur(10px);
            padding: 20px;
            display: none;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal-content {
            background: rgba(10, 36, 99, 0.95);
            border: 2px solid rgba(0, 150, 255, 0.3);
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0, 150, 255, 0.3);
        }
        
        .modal-title {
            font-size: 1.8rem;
            color: #ffd93d;
        }
        
        .close-modal {
            background: none;
            border: none;
            color: #a3d5ff;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
        }
        
        .close-modal:hover {
            color: #ff6b6b;
        }
        
        .modal-section {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0, 150, 255, 0.1);
        }
        
        .section-title {
            font-size: 1.3rem;
            color: #a3d5ff;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title i {
            font-size: 1.1rem;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
        }
        
        .info-label {
            color: #a3d5ff;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }
        
        .info-value {
            color: #e0f7ff;
            font-size: 1.1rem;
            padding: 10px;
            background: rgba(0, 30, 80, 0.5);
            border-radius: 8px;
            border: 1px solid rgba(0, 150, 255, 0.2);
        }
        
        .full-width {
            grid-column: 1 / -1;
        }
        
        /* 终审表单 */
        .final-review-form {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid rgba(0, 150, 255, 0.3);
        }
        
        .review-title {
            font-size: 1.3rem;
            color: #ffd93d;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .review-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .review-option {
            padding: 25px 20px;
            border: 2px solid rgba(0, 150, 255, 0.3);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        
        .review-option:hover {
            transform: translateY(-5px);
        }
        
        .review-option.selected {
            box-shadow: 0 0 25px rgba(79, 195, 255, 0.3);
        }
        
        .option-approve-final {
            border-color: rgba(0, 102, 204, 0.5);
        }
        
        .option-approve-final.selected {
            background: rgba(0, 102, 204, 0.1);
            border-color: rgba(0, 102, 204, 0.8);
        }
        
        .option-reject-final {
            border-color: rgba(255, 107, 107, 0.5);
        }
        
        .option-reject-final.selected {
            background: rgba(255, 107, 107, 0.1);
            border-color: rgba(255, 107, 107, 0.8);
        }
        
        .option-icon {
            font-size: 2rem;
            margin-bottom: 15px;
        }
        
        .option-approve-final .option-icon {
            color: #0066cc;
        }
        
        .option-reject-final .option-icon {
            color: #ff6b6b;
        }
        
        .option-title {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }
        
        .option-approve-final .option-title {
            color: #0066cc;
        }
        
        .option-reject-final .option-title {
            color: #ff6b6b;
        }
        
        .option-desc {
            color: #a3d5ff;
            font-size: 0.9rem;
        }
        
        .reason-container {
            display: none;
            margin-top: 25px;
            margin-bottom: 30px;
        }
        
        .reason-container.active {
            display: block;
        }
        
        .reason-label {
            color: #a3d5ff;
            margin-bottom: 10px;
            font-size: 1rem;
        }
        
        .reason-textarea {
            width: 100%;
            padding: 15px;
            background: rgba(0, 30, 80, 0.7);
            border: 1px solid rgba(255, 107, 107, 0.5);
            border-radius: 10px;
            color: #e0f7ff;
            font-size: 1rem;
            min-height: 120px;
            resize: vertical;
        }
        
        .review-actions {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 30px;
        }
        
        .btn-cancel {
            padding: 12px 30px;
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid rgba(255, 107, 107, 0.4);
            color: #ff6b6b;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .btn-cancel:hover {
            background: rgba(255, 107, 107, 0.3);
        }
        
        .btn-submit-final-review {
            padding: 12px 30px;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .btn-submit-final-review:hover:not(:disabled) {
            background: linear-gradient(135deg, #ff8e8e, #ffe066);
            transform: scale(1.05);
        }
        
        .btn-submit-final-review:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            grid-column: 1 / -1;
        }
        
        .empty-icon {
            font-size: 4rem;
            color: rgba(79, 195, 255, 0.3);
            margin-bottom: 20px;
        }
        
        .empty-text {
            color: #a3d5ff;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }
        
        /* 成功提示 */
        .success-toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(10, 36, 99, 0.95);
            color: #6bffb8;
            padding: 20px 30px;
            border-radius: 15px;
            border: 1px solid rgba(107, 255, 184, 0.5);
            z-index: 10000;
            display: flex;
            align-items: center;
            gap: 15px;
            backdrop-filter: blur(10px);
            animation: slideInUp 0.5s ease;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        
        /* 属性标签 */
        .attributes-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        
        .attribute-tag {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .attr-fire { background: rgba(255, 87, 34, 0.2); color: #ff5722; border: 1px solid rgba(255, 87, 34, 0.5); }
        .attr-ice { background: rgba(3, 169, 244, 0.2); color: #03a9f4; border: 1px solid rgba(3, 169, 244, 0.5); }
        .attr-thunder { background: rgba(255, 193, 7, 0.2); color: #ffc107; border: 1px solid rgba(255, 193, 7, 0.5); }
        .attr-rock { background: rgba(121, 85, 72, 0.2); color: #795548; border: 1px solid rgba(121, 85, 72, 0.5); }
        .attr-wind { background: rgba(76, 175, 80, 0.2); color: #4caf50; border: 1px solid rgba(76, 175, 80, 0.5); }
        .attr-light { background: rgba(255, 235, 59, 0.2); color: #ffeb3b; border: 1px solid rgba(255, 235, 59, 0.5); }
        .attr-life { background: rgba(233, 30, 99, 0.2); color: #e91e63; border: 1px solid rgba(233, 30, 99, 0.5); }
        .attr-gravity { background: rgba(156, 39, 176, 0.2); color: #9c27b0; border: 1px solid rgba(156, 39, 176, 0.5); }
        .attr-fusion { background: rgba(255, 152, 0, 0.2); color: #ff9800; border: 1px solid rgba(255, 152, 0, 0.5); }
        .attr-physics { background: rgba(158, 158, 158, 0.2); color: #9e9e9e; border: 1px solid rgba(158, 158, 158, 0.5); }
        .attr-none { background: rgba(158, 158, 158, 0.1); color: #9e9e9e; border: 1px solid rgba(158, 158, 158, 0.3); }
        
        /* 动画 */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes slideInUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .status-bar {
                padding: 15px 20px;
                flex-wrap: wrap;
                gap: 15px;
            }
            
            .control-panel {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .resume-list {
                grid-template-columns: 1fr;
            }
            
            .modal-content {
                padding: 25px;
            }
            
            .review-options {
                grid-template-columns: 1fr;
            }
            
            .stats-box {
                width: 100%;
                justify-content: space-between;
            }
            
            .stat-item {
                flex: 1;
                min-width: auto;
            }
        }
        
        @media (max-width: 480px) {
            .main-content {
                padding: 20px 15px;
            }
            
            .page-title {
                font-size: 1.8rem;
            }
            
            .modal-content {
                padding: 20px;
            }
            
            .review-actions {
                flex-direction: column;
            }
            
            .btn-cancel, .btn-submit-final-review {
                width: 100%;
                text-align: center;
                justify-content: center;
            }
            
            .success-toast {
                bottom: 20px;
                right: 20px;
                left: 20px;
                max-width: none;
            }
        }
    </style>
</head>
<body>
    <!-- 控制台界面 -->
    <div class="desktop">
        <!-- 顶部状态栏 -->
        <div class="status-bar">
            <div class="system-info">
                <!-- 返回按钮 -->
                <button class="back-btn" onclick="goBack()" title="返回管理员控制台">
                    <i class="fas fa-chevron-left"></i>
                    <span>返回</span>
                </button>
                
                <img src="qsamlogo.png" alt="系统标志" class="system-logo">
                <div class="system-name">终审简历 - 最高权限管理员</div>
            </div>
            
            <div class="user-info">
                <div class="time-display" id="currentTime">00:00:00</div>
                <div class="user-avatar" id="userAvatar">
                    <i class="fas fa-user-shield"></i>
                </div>
                <div>
                    <div id="userDisplayName" style="color: #ffd93d;">访客</div>
                    <div id="userRoleText" style="font-size: 0.8rem; color: #6b9ccc;">-</div>
                </div>
            </div>
        </div>

<script>
    // ================================================
    // 1. SUPABASE 配置和全局变量
    // ================================================
    const SUPABASE_URL = 'https://owfyycgomqclytnswobj.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_65fjjNxcUjAFpFJ3AEW9Tg_ctW41ZsV';
    
    let supabaseClient = null;
    let cloudEnabled = false;
    let currentUser = null;
    let currentUserRole = null;
    let allResumes = [];
    let filteredResumes = [];
    let currentResumeId = null;
    let selectedFinalReviewOption = null;
    
    // ================================================
    // 2. 页面加载时初始化
    // ================================================
    document.addEventListener('DOMContentLoaded', function() {
        console.log('终审简历页面加载完成，开始初始化...');
        
        // 检查登录状态和权限
        checkLoginStatus();
        
        // 初始化Supabase
        initSupabase();
        
        // 更新时间显示
        updateTime();
        setInterval(updateTime, 1000);
        
        // 加载简历数据
        loadResumes();
        
        // 添加事件监听器
        setupEventListeners();
        
        // 添加ESC键支持
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
    });
    
    // 检查登录状态和权限
    function checkLoginStatus() {
        currentUser = localStorage.getItem('auth_user');
        currentUserRole = localStorage.getItem('auth_role');
        
        // 管理员或管理层观察员可以访问
        if (currentUserRole !== 'admin') {
            // 额外检查管理层标志
            let isMgmt = false;
            try {
                if (localStorage.getItem('viewer_management') === '1') isMgmt = true;
                if (localStorage.getItem('auth_viewer_level') === 'management') isMgmt = true;
                const stored = localStorage.getItem('qs_users_data') || localStorage.getItem('login_users');
                if (stored && currentUser) {
                    const parsed = JSON.parse(stored);
                    const userInfo = parsed[currentUser];
                    if (userInfo) {
                        const lvl = (userInfo.viewer_level || userInfo.level || userInfo.role || '').toString().toLowerCase();
                        const dept = (userInfo.department || '').toString().toLowerCase();
                        if (lvl === 'management' || lvl === '管理' || lvl === '管理层') isMgmt = true;
                        if (dept.includes('管理') || dept.includes('management')) isMgmt = true;
                    }
                }
            } catch (e) {
                console.warn('management detection failed', e);
            }
            if (!isMgmt) {
                alert('您没有权限访问终审页面！');
                window.location.href = 'index.html';
                return;
            }
            // 若是管理层，继续进入
        }
        
        // 显示用户信息（名字 + 角色/部门）
        try {
            const displayName = localStorage.getItem('auth_user_name') || currentUser || '访客';
            document.getElementById('userDisplayName').textContent = displayName;
            const roleTextEl = document.getElementById('userRoleText');
            if (roleTextEl) {
                if (currentUserRole === 'admin') roleTextEl.textContent = '最高权限管理员';
                else roleTextEl.textContent = (currentUserRole || '管理层观察员');
            }
            if (currentUser && currentUser.length > 0) {
                const firstChar = currentUser.charAt(0).toUpperCase();
                document.getElementById('userAvatar').innerHTML = firstChar;
            }
        } catch (e) {
            console.warn('set user display failed', e);
        }
    }
    
    // 初始化Supabase
    function initSupabase() {
        console.log('开始初始化Supabase...');
        
        try {
            // 检查Supabase库是否加载
            if (typeof window.supabase === 'undefined') {
                console.error('❌ Supabase JS库未加载！');
                showCloudStatus(false);
                return false;
            }
            
            // 检查配置
            if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
                console.warn('Supabase配置不完整');
                showCloudStatus(false);
                return false;
            }
            
            // 创建Supabase客户端
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
                auth: {
                    persistSession: false,
                    autoRefreshToken: false
                }
            });
            
            cloudEnabled = true;
            console.log('✅ Supabase客户端已初始化');
            showCloudStatus(true);
            return true;
            
        } catch (e) {
            console.error('Supabase初始化失败:', e);
            showCloudStatus(false);
            return false;
        }
    }
    
    // 显示云端状态
    function showCloudStatus(isConnected) {
        console.log(`云端状态: ${isConnected ? '已连接' : '未连接'}`);
    }
    
    // 更新时间显示
    function updateTime() {
        const now = new Date();
        const hours = now.getHours().toString().padStart(2, '0');
        const minutes = now.getMinutes().toString().padStart(2, '0');
        const seconds = now.getSeconds().toString().padStart(2, '0');
        document.getElementById('currentTime').textContent = `${hours}:${minutes}:${seconds}`;
    }
    
    // 设置事件监听器
    function setupEventListeners() {
        // 终审状态筛选器变化事件
        const statusFilter = document.getElementById('finalStatusFilter');
        statusFilter.addEventListener('change', function() {
            filterResumes();
        });
        
        // 驳回原因输入框字符计数
        const rejectReason = document.getElementById('rejectFinalReason');
        if (rejectReason) {
            rejectReason.addEventListener('input', function() {
                const charCount = document.getElementById('charCount');
                if (charCount) {
                    charCount.textContent = this.value.length;
                }
            });
        }
    }
    
    // ================================================
    // 3. 简历数据加载和显示
    // ================================================
    
    // 加载简历数据
    async function loadResumes() {
        console.log('开始加载简历数据...');
        showLoading('正在加载简历数据...');
        
        try {
            // 从Supabase加载简历
            const result = await loadResumesFromSupabase();
            
            if (result.success) {
                allResumes = result.data || [];
                console.log(`成功加载 ${allResumes.length} 份简历`);
                
                // 更新统计数据
                updateStats();
                
                // 筛选并显示简历
                filterResumes();
                
                // 隐藏加载动画
                hideLoading();
                
            } else {
                console.warn('从 Supabase 加载失败，启用本地回退示例数据：', result.message);
                // 回退到本地 sample_resumes.json 以便页面仍可显示示例项
                try {
                    const resp = await fetch('sample_resumes.json');
                    if (resp.ok) {
                        const localData = await resp.json();
                        allResumes = localData || [];
                        console.log(`已加载本地 ${allResumes.length} 份示例简历`);
                        updateStats();
                        filterResumes();
                        hideLoading();
                        return;
                    }
                } catch (e) {
                    console.error('加载本地回退数据失败:', e);
                }

                throw new Error(result.message || '加载简历失败');
            }
            
        } catch (error) {
            console.error('加载简历失败:', error);
            hideLoading();
            
            // 显示空状态
            document.getElementById('emptyState').style.display = 'block';
            document.getElementById('emptyText').textContent = '加载简历失败，请检查网络连接';
        }
    }
    
    // 从Supabase加载简历（只加载初审通过的）
    async function loadResumesFromSupabase() {
        if (!supabaseClient) {
            return { 
                success: false, 
                message: '云端连接未配置' 
            };
        }
        
        try {
            console.log('从Supabase加载简历数据（初审通过的）... 先做基本可用性检查');

            // 1) 基本检测：尝试最小查询以确认表是否存在并且可读
            try {
                const testRes = await supabaseClient
                    .from('resume_applications')
                    .select('id')
                    .limit(1);

                if (testRes.error) {
                    console.error('Supabase 基本查询错误:', testRes.error);
                    // 如果 Postgres 报表不存在，会有 code 或 message 指示
                    const errMsg = (testRes.error && (testRes.error.message || JSON.stringify(testRes.error))) || '';
                    if (errMsg.includes('does not exist') || errMsg.includes('42P01') || (errMsg.includes('relation') && errMsg.includes('does not exist'))) {
                        return {
                            success: false,
                            message: '检测到 resume_applications 表不可用（表不存在或名称错误）。请在 Supabase 控制台确认表名与架构。',
                            error: testRes.error
                        };
                    }

                    // 其他错误比如 RLS（行级安全）或权限问题，会在这里返回
                    return {
                        success: false,
                        message: '对 resume_applications 的基本查询失败，可能是权限或 RLS 策略阻止匿名访问。查看控制台中 error 对象获取更多信息。',
                        error: testRes.error
                    };
                }

            } catch (e) {
                console.error('执行基本检测时抛出异常:', e);
                // 继续尝试更详细的查询以记录信息
                return {
                    success: false,
                    message: '对 resume_applications 的基本检测抛出异常: ' + (e && e.message),
                    error: e
                };
            }

            // 2) 如果基本检测通过，则执行原始复杂查询并记录完整错误信息以供排查
            const { data, error } = await supabaseClient
                .from('resume_applications')
                .select('*')
                .or('status.eq.approved,final_status.eq.final_approved,final_status.eq.final_rejected')
                .order('created_at', { ascending: false });

            if (error) {
                // 输出更完整的错误信息，方便定位（Supabase error 可能是对象）
                let errStr = null;
                try {
                    errStr = JSON.stringify(error);
                    console.error('Supabase 查询错误（详细）:', errStr);
                } catch (e) {
                    errStr = String(error || '');
                    console.error('Supabase 查询错误（无法序列化）:', error);
                }

                // 如果错误中包含 final_status 列不存在的提示，尝试回退到仅使用 status 过滤的查询
                const missingFinalStatus = errStr && (errStr.includes('final_status') || errStr.includes('42703') || errStr.includes('does not exist'));
                if (missingFinalStatus) {
                    console.warn('检测到 resume_applications.final_status 不存在，尝试回退到使用 status 过滤的查询...');
                    try {
                        const { data: fallbackData, error: fallbackError } = await supabaseClient
                            .from('resume_applications')
                            .select('*')
                            .eq('status', 'approved')
                            .order('created_at', { ascending: false });

                        if (fallbackError) {
                            try { console.error('回退查询错误（详细）:', JSON.stringify(fallbackError)); } catch (e) { console.error('回退查询错误:', fallbackError); }
                            return {
                                success: false,
                                message: '回退查询失败: ' + (fallbackError.message || JSON.stringify(fallbackError)),
                                error: fallbackError
                            };
                        }

                        console.log(`回退查询从云端获取到 ${fallbackData ? fallbackData.length : 0} 份简历`);
                        return {
                            success: true,
                            data: fallbackData || []
                        };
                    } catch (e) {
                        console.error('执行回退查询时抛出异常:', e);
                        return {
                            success: false,
                            message: '回退查询抛出异常: ' + (e && (e.message || JSON.stringify(e))),
                            error: e
                        };
                    }
                }

                return {
                    success: false,
                    message: '从 Supabase 查询数据失败: ' + (error.message || errStr),
                    error: error
                };
            }

            console.log(`从云端获取到 ${data ? data.length : 0} 份简历（初审通过的）`);

            return {
                success: true,
                data: data || []
            };
            
        } catch (error) {
            console.error('从Supabase加载简历失败:', error);
            return { 
                success: false, 
                message: '云端加载失败: ' + error.message,
                error: error 
            };
        }
    }

    function buildPendingMemberSetup(resume) {
        const rawName = (resume.full_name || '新成员').toString().trim();
        const safeName = rawName.replace(/\s+/g, '');
        const resumeIdText = String(resume.id || Date.now()).replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g, '');
        const usernameSeed = `${safeName}_${resumeIdText.slice(-4) || Date.now().toString().slice(-4)}`;
        const username = usernameSeed.replace(/[^a-zA-Z0-9_\u4e00-\u9fa5]/g, '').slice(0, 20) || `member_${Date.now().toString().slice(-6)}`;
        const password = `QSAM${resumeIdText.slice(-6) || Date.now().toString().slice(-6)}!`;

        return {
            name: rawName,
            username: username,
            password: password,
            role: 'user',
            department: resume.department || '未分配',
            team: '',
            position: '',
            status: 'active',
            notes: `来源：终审通过；简历ID：${resume.id || '未知'}`,
            sourceResumeId: resume.id || null,
            sourcePage: 'final-check.html'
        };
    }
    
    // 更新统计数据
    function updateStats() {
        // 待终审（初审通过但未终审）
        const pendingFinalCount = allResumes.filter(r => 
            r.status === 'approved' && (!r.final_status || r.final_status === 'pending_final')
        ).length;
        
        // 终审通过
        const finalApprovedCount = allResumes.filter(r => 
            r.final_status === 'final_approved'
        ).length;
        
        // 终审驳回
        const finalRejectedCount = allResumes.filter(r => 
            r.final_status === 'final_rejected'
        ).length;
        
        document.getElementById('pendingFinalCount').textContent = pendingFinalCount;
        document.getElementById('finalApprovedCount').textContent = finalApprovedCount;
        document.getElementById('finalRejectedCount').textContent = finalRejectedCount;
    }
    
    // 筛选简历
    function filterResumes() {
        const filterValue = document.getElementById('finalStatusFilter').value;
        
        if (filterValue === 'all') {
            // 显示所有初审通过的（无论终审状态）
            filteredResumes = allResumes.filter(r => r.status === 'approved');
        } else if (filterValue === 'approved') {
            // 仅显示待终审的（初审通过且未终审）
            filteredResumes = allResumes.filter(r => 
                r.status === 'approved' && (!r.final_status || r.final_status === 'pending_final')
            );
        } else if (filterValue === 'final_approved') {
            // 显示终审通过的
            filteredResumes = allResumes.filter(r => r.final_status === 'final_approved');
        } else if (filterValue === 'final_rejected') {
            // 显示终审驳回的
            filteredResumes = allResumes.filter(r => r.final_status === 'final_rejected');
        }
        
        // 显示筛选后的简历
        displayResumes();
    }
    
    // 显示简历列表
    function displayResumes() {
        const resumeList = document.getElementById('resumeList');
        const emptyState = document.getElementById('emptyState');
        
        if (filteredResumes.length === 0) {
            resumeList.innerHTML = '';
            emptyState.style.display = 'block';
            document.getElementById('emptyText').textContent = 
                document.getElementById('finalStatusFilter').value === 'approved' 
                    ? '暂无待终审的简历申请' 
                    : `暂无${getFinalStatusText(document.getElementById('finalStatusFilter').value)}的申请`;
            return;
        }
        
        emptyState.style.display = 'none';
        
        // 生成简历卡片HTML
        resumeList.innerHTML = filteredResumes.map(resume => createResumeCard(resume)).join('');
    }
    
    // 创建简历卡片
    function createResumeCard(resume) {
        const id = resume.id || 'N/A';
        const fullName = resume.full_name || '未填写';
        const age = resume.age || '未填写';
        const gender = resume.gender || '未填写';
        const location = resume.location || '未填写';
        const meme = resume.meme || '无';
        const department = resume.department || '未选择';
        const status = resume.status || 'approved';
        const finalStatus = resume.final_status || 'pending_final';
        const submissionDate = resume.submission_date ? formatDate(resume.submission_date) : '未记录';
        const reviewer = resume.reviewer || '未初审';
        
        // 确定卡片的CSS类和状态标签
        let statusClass = 'approved'; // 默认
        let statusText = '待终审';
        let statusBadgeClass = 'status-approved';
        
        if (finalStatus === 'final_approved') {
            statusClass = 'final-approved';
            statusText = '终审通过';
            statusBadgeClass = 'status-final-approved';
        } else if (finalStatus === 'final_rejected') {
            statusClass = 'final-rejected';
            statusText = '终审驳回';
            statusBadgeClass = 'status-final-rejected';
        } else if (status === 'approved') {
            statusClass = 'approved';
            statusText = '待终审';
            statusBadgeClass = 'status-approved';

    // 选择终审选项

        } else if (option === 'reject_final') {
            document.querySelector('.option-reject-final').classList.add('selected');
            document.getElementById('reasonContainer').classList.add('active');
        }
        
        // 启用提交按钮
        document.getElementById('submitFinalReviewBtn').disabled = false;

    // 重置终审表单
    function resetFinalReviewForm() {

        // 移除所有选择
        document.querySelectorAll('.review-option').forEach(el => {
            el.classList.remove('selected');
        });
        
        // 隐藏驳回原因输入
        document.getElementById('reasonContainer').classList.remove('active');
        
        // 清空驳回原因
        document.getElementById('rejectFinalReason').value = '';
        document.getElementById('charCount').textContent = '0';
        
        // 禁用提交按钮
        document.getElementById('submitFinalReviewBtn').disabled = true;

    // 提交终审
    async function submitFinalReview() {
        if (!selectedFinalReviewOption) {
            alert('请选择终审选项');
            return;
        }
        
        // 如果是驳回，必须填写原因
        if (selectedFinalReviewOption === 'reject_final') {
            const reason = document.getElementById('rejectFinalReason').value.trim();
            if (!reason) {
                alert('请填写终审驳回原因');
                return;
            }
            if (reason.length < 20) {
                alert('终审驳回原因至少需要20个字符');
                return;
            }
        }
        
        // 显示加载状态
        showLoading('正在提交终审结果...');
        
        try {
            // 准备终审数据
            const finalReviewData = {
                final_status: selectedFinalReviewOption === 'approve_final' ? 'final_approved' : 'final_rejected',
                final_reviewer: currentUser,
                final_review_date: new Date().toISOString(),
                final_review_reason: selectedFinalReviewOption === 'reject_final' ? 
                    document.getElementById('rejectFinalReason').value.trim() : null,
                updated_at: new Date().toISOString()
            };
            
            // 更新到Supabase
            const result = await updateResumeFinalReview(currentResumeId, finalReviewData);
            
            if (result.success) {
                // 更新本地数据
                const resumeIndex = allResumes.findIndex(r => r.id == currentResumeId);
                if (resumeIndex !== -1) {
                    allResumes[resumeIndex] = {
                        ...allResumes[resumeIndex],
                        ...finalReviewData
                    };
                }
                
                // 更新统计数据
                updateStats();
                
                // 筛选并显示简历
                filterResumes();
                
                // 隐藏加载状态
                hideLoading();
                
                // 显示成功提示
                showSuccessToast(
                    '终审成功！',
                    `已${selectedFinalReviewOption === 'approve_final' ? '通过' : '驳回'}该申请`
                );
                
                // 关闭模态框
                closeModal();

                // 终审通过后直接接入成员管理界面并预填成员信息
                if (selectedFinalReviewOption === 'approve_final') {
                    const approvedResume = resumeIndex !== -1
                        ? allResumes[resumeIndex]
                        : (allResumes.find(r => r.id == currentResumeId) || { id: currentResumeId });
                    const pendingMemberSetup = buildPendingMemberSetup(approvedResume);
                    sessionStorage.setItem('pending_member_setup', JSON.stringify(pendingMemberSetup));

                    setTimeout(() => {
                        window.location.href = 'members.html';
                    }, 1200);
                    return;
                }

                // 驳回时保留原逻辑：刷新列表
                setTimeout(() => {
                    loadResumes();
                }, 3000);
                
            } else {
                throw new Error(result.message || '提交终审失败');
            }
            
        } catch (error) {
            console.error('提交终审失败:', error);
            hideLoading();
            alert(`提交终审失败: ${error.message}`);
        }
    }
    
    // 更新简历终审状态到Supabase
    async function updateResumeFinalReview(resumeId, finalReviewData) {
        if (!supabaseClient) {
            return { 
                success: false, 
                message: '云端连接未配置' 
            };
        }
        
        try {
            console.log(`更新简历 ${resumeId} 的终审状态...`);
            
            // 构建更新数据（仅使用 snake_case 字段名）
            let updateData = {
                updated_at: new Date().toISOString()
            };

            if (finalReviewData.final_status) updateData.final_status = finalReviewData.final_status;
            if (finalReviewData.final_reviewer) updateData.final_reviewer = finalReviewData.final_reviewer;
            if (finalReviewData.final_review_date) updateData.final_review_date = finalReviewData.final_review_date;
            if (finalReviewData.final_review_reason !== undefined) updateData.final_review_reason = finalReviewData.final_review_reason;

            console.log('尝试更新的数据（初始）:', updateData);

            // 如果服务器返回缺列错误，解析列名并从 updateData 中移除该键后重试（最多 5 次）
            let attempt = 0;
            let lastError = null;
            while (attempt < 5) {
                attempt++;
                try {
                    const { data, error } = await supabaseClient
                        .from('resume_applications')
                        .update(updateData)
                        .eq('id', resumeId)
                        .select();

                    if (!error) {
                        console.log('云端更新成功:', data);
                        return {
                            success: true,
                            message: '云端更新成功',
                            data: data ? data[0] : null
                        };
                    }

                    // 如果是列不存在或找不到列的错误，尝试从 updateData 中移除该字段并重试
                    const errMsg = (error && (error.message || JSON.stringify(error))) || '';
                    console.error(`Supabase 更新尝试 ${attempt} 返回错误:`, errMsg);

                    // 解析可能的列名（例如: Could not find the 'finalReviewDate' column of 'resume_applications')
                    const match = errMsg.match(/(?:find the |column )'?([a-zA-Z0-9_\-]+)'? column/);
                    let missingCol = null;
                    if (match && match[1]) {
                        missingCol = match[1];
                    } else {
                        // 另一种消息格式： column "xxx" does not exist
                        const match2 = errMsg.match(/column\s+"?([a-zA-Z0-9_\-]+)"?\s+does not exist/);
                        if (match2 && match2[1]) missingCol = match2[1];
                    }

                    if (missingCol) {
                        console.warn('检测到缺失列:', missingCol, '，将从更新对象中删除后重试');
                        // 尝试删除与 missingCol 对应的 key（支持 camelCase 和 snake_case）
                        const keysToTry = [missingCol, missingCol.toLowerCase(), missingCol.replace(/[A-Z]/g, m => '_' + m.toLowerCase())];
                        let removed = false;
                        for (const k of keysToTry) {
                            if (k && Object.prototype.hasOwnProperty.call(updateData, k)) {
                                delete updateData[k];
                                removed = true;
                                console.log('已删除 updateData 中的键:', k);
                            }
                        }

                        // 如果没有删除任何键，那就尝试直接移除常见 final_* 字段
                        if (!removed) {
                            ['final_status','final_reviewer','final_review_date','final_review_reason'].forEach(k => {
                                if (Object.prototype.hasOwnProperty.call(updateData, k)) {
                                    delete updateData[k];
                                    removed = true;
                                    console.log('fallback 删除键:', k);
                                }
                            });
                        }

                        // 如果删除后 updateData 只剩下 updated_at 也没必要继续很多次，继续下一轮重试
                        lastError = error;
                        continue;
                    }

                    // 非列缺失错误或无法解析列名，保存最后错误并退出重试循环
                    lastError = error;
                    break;
                } catch (e) {
                    console.error('尝试更新时抛出异常:', e);
                    lastError = e;
                    break;
                }
            }

            // 如果循环结束仍未成功，进入下面的错误处理逻辑
            if (lastError) {
                throw lastError;
            }
            
            if (error) {
                console.error('Supabase更新错误:', error);
                
                // 如果是缺列错误，尝试使用最简化的更新
                if (error.message.includes('column')) {
                    console.log('检测到字段名不匹配，尝试简化更新...');
                    
                    // 只更新我们确定存在的字段
                    const simplifiedUpdate = {
                        updated_at: new Date().toISOString()
                    };
                    
                    // 尝试直接使用字段名（不进行映射）
                    if (finalReviewData.final_status) {
                        simplifiedUpdate.final_status = finalReviewData.final_status;
                    }
                    
                    const { data: simplifiedData, error: simplifiedError } = await supabaseClient
                        .from('resume_applications')
                        .update(simplifiedUpdate)
                        .eq('id', resumeId)
                        .select();
                    
                    if (simplifiedError) {
                        throw simplifiedError;
                    }
                    
                    console.log('简化更新成功:', simplifiedData);
                    return { 
                        success: true, 
                        message: '云端更新成功（简化字段）', 
                        data: simplifiedData ? simplifiedData[0] : null 
                    };
                }
                
                throw error;
            }
            
            console.log('云端更新成功:', data);
            return { 
                success: true, 
                message: '云端更新成功', 
                data: data ? data[0] : null 
            };
            
        } catch (error) {
            console.error('更新到云端失败:', error);
            return { 
                success: false, 
                message: '云端更新失败: ' + error.message,
                error: error 
            };
        }
    }
    
    // 快速通过终审
    async function approveFinalResume(resumeId) {
        if (!confirm('确定要通过终审这份申请吗？通过后将通知申请人进行面试。')) {
            return;
        }
        
        showLoading('正在通过终审...');
        
        try {
            const finalReviewData = {
                final_status: 'final_approved',
                final_reviewer: currentUser,
                final_review_date: new Date().toISOString(),
                final_review_reason: null,
                updated_at: new Date().toISOString()
            };
            
            const result = await updateResumeFinalReview(resumeId, finalReviewData);
            
            if (result.success) {
                // 更新本地数据
                const resumeIndex = allResumes.findIndex(r => r.id == resumeId);
                if (resumeIndex !== -1) {
                    allResumes[resumeIndex] = {
                        ...allResumes[resumeIndex],
                        ...finalReviewData
                    };
                }

                const approvedResume = resumeIndex !== -1 ? allResumes[resumeIndex] : null;
                if (approvedResume) {
                    const pendingMemberSetup = buildPendingMemberSetup(approvedResume);
                    sessionStorage.setItem('pending_member_setup', JSON.stringify(pendingMemberSetup));
                }
                
                // 更新统计数据
                updateStats();
                
                // 筛选并显示简历
                filterResumes();
                
                hideLoading();
                showSuccessToast('终审成功！', '已通过该申请的终审，正在跳转到成员管理界面...');
                closeModal();

                // 直接接入成员管理界面，继续设置成员信息
                setTimeout(() => {
                    window.location.href = 'members.html';
                }, 1200);
                
            } else {
                throw new Error(result.message || '操作失败');
            }
            
        } catch (error) {
            console.error('通过终审失败:', error);
            hideLoading();
            alert(`操作失败: ${error.message}`);
        }
    }
    
    // 快速驳回终审
    async function rejectFinalResume(resumeId) {
        const reason = prompt('请输入终审驳回原因（至少20个字符）：');
        
        if (!reason) {
            return;
        }
        
        if (reason.length < 20) {
            alert('终审驳回原因至少需要20个字符');
            return;
        }
        
        if (!confirm('确定要驳回终审这份申请吗？此操作不可撤销。')) {
            return;
        }
        
        showLoading('正在驳回终审...');
        
        try {
            const finalReviewData = {
                final_status: 'final_rejected',
                final_reviewer: currentUser,
                final_review_date: new Date().toISOString(),
                final_review_reason: reason,
                updated_at: new Date().toISOString()
            };
            
            const result = await updateResumeFinalReview(resumeId, finalReviewData);
            
            if (result.success) {
                // 更新本地数据
                const resumeIndex = allResumes.findIndex(r => r.id == resumeId);
                if (resumeIndex !== -1) {
                    allResumes[resumeIndex] = {
                        ...allResumes[resumeIndex],
                        ...finalReviewData
                    };
                }
                
                // 更新统计数据
                updateStats();
                
                // 筛选并显示简历
                filterResumes();
                
                hideLoading();
                showSuccessToast('终审成功！', '已驳回该申请的终审');
                
                // 3秒后刷新列表
                setTimeout(() => {
                    loadResumes();
                }, 3000);
                
            } else {
                throw new Error(result.message || '操作失败');
            }
            
        } catch (error) {
            console.error('驳回终审失败:', error);
            hideLoading();
            alert(`操作失败: ${error.message}`);
        }
    }

    }
    
    // 隐藏加载状态
    function hideLoading() {
        const overlay = document.getElementById('loadingOverlay');
        if (overlay) {
            overlay.style.display = 'none';
        }
    }
    
    // 显示成功提示
    function showSuccessToast(title, message) {
        const toast = document.getElementById('successToast');
        const titleEl = document.getElementById('successTitle');
        const messageEl = document.getElementById('successMessage');
        
        if (toast && titleEl && messageEl) {
            titleEl.textContent = title;
            messageEl.textContent = message;
            toast.style.display = 'flex';
            
            // 5秒后自动隐藏
            setTimeout(() => {
                toast.style.display = 'none';
            }, 5000);
        }
    }
    
    // 关闭模态框
    function closeModal() {
        document.getElementById('detailModal').classList.remove('active');
    }
    
    // 返回上一页
    function goBack() {
        // 优先使用浏览器历史
        if (window.history && window.history.length > 1) {
            window.history.back();
        } else {
            // 如果没有历史记录，优先判断是否为管理层观察员再决定返回目标
            try {
                // 复用页面已有的 detection 逻辑
                let isMgmt = false;
                if (localStorage.getItem('viewer_management') === '1') isMgmt = true;
                if (localStorage.getItem('auth_viewer_level') === 'management') isMgmt = true;
                const stored = localStorage.getItem('qs_users_data') || localStorage.getItem('login_users');
                const currentUser = localStorage.getItem('auth_user');
                if (stored && currentUser) {
                    const parsed = JSON.parse(stored);
                    const userInfo = parsed[currentUser];
                    if (userInfo) {
                        const lvl = (userInfo.viewer_level || userInfo.level || userInfo.role || '').toString().toLowerCase();
                        const dept = (userInfo.department || '').toString().toLowerCase();
                        if (lvl === 'management' || lvl === '管理' || lvl === '管理层') isMgmt = true;
                        if (dept.includes('管理') || dept.includes('management')) isMgmt = true;
                    }
                }

                if (isMgmt) window.location.href = 'viewer.html';
                else window.location.href = 'admin.html';
            } catch (e) {
                window.location.href = 'admin.html';
            }
        }
    }
    
    // 格式化日期
    function formatDate(dateString) {
        try {
            const date = new Date(dateString);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        } catch (e) {
            return dateString;
        }
    }
    
    // 获取初审状态文本
    function getStatusText(status) {
        switch(status) {
            case 'pending': return '待初审';
            case 'approved': return '初审通过';
            case 'rejected': return '初审驳回';
            default: return '未知';
        }
    }
    
    // 获取终审状态文本
    function getFinalStatusText(finalStatus) {
        switch(finalStatus) {
            case 'pending_final': return '待终审';
            case 'final_approved': return '终审通过';
            case 'final_rejected': return '终审驳回';
            default: return '待终审';
        }
    }
    
    // 获取属性CSS类
    function getAttributeClass(attr) {
        const attrMap = {
            '火': 'fire',
            '冰': 'ice',
            '雷': 'thunder',
            '岩': 'rock',
            '风': 'wind',
            '光': 'light',
            '生命': 'life',
            '重力': 'gravity',
            '融合': 'fusion',
            '物理': 'physics',
            '无': 'none'
        };
        
        return attrMap[attr] || 'none';
    }
</script>
