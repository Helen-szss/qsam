<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>裂隙怪物资料库 - 管理局资料库</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        :root {
            --desktop-bg: radial-gradient(circle at center, #0a2463, #000000);
            --status-bg: rgba(10, 36, 99, 0.8);
            --panel-bg: rgba(6, 22, 60, 0.95);
            --panel-border: rgba(0, 150, 255, 0.3);
            --accent-danger: #ff6b6b;
            --accent-warning: #ffa93d;
            --accent-info: #4fc3ff;
            --accent-success: #6bffb8;
            --text-primary: #e0f7ff;
            --muted-color: #a3d5ff;
        }
        
        body {
            /* Override global stylesheet that forces centered layout and disables scrolling.
               Allow normal document flow and scrolling for this data-heavy page. */
            display: block;
            overflow: auto;
            min-height: 100vh;
            margin: 0;
            background: var(--desktop-bg);
            color: var(--text-primary);
            font-family: 'ZhengQingKeShuMaTi', 'Microsoft YaHei', sans-serif;
        }
        
        /* 顶部状态栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 30px;
            background: var(--status-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 150, 255, 0.3);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.45);
            height: 72px;
            box-sizing: border-box;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 2000;
        }
        
        .system-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .system-logo {
            width: 40px;
            height: 40px;
            filter: drop-shadow(0 0 8px rgba(0, 150, 255, 0.7));
        }
        
        .system-name {
            font-size: 1.25rem;
            background: linear-gradient(90deg, #4fc3ff, #a3d5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1.5px;
        }

        .system-subtitle {
            font-size: 0.85rem;
            color: var(--muted-color);
            letter-spacing: 1px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0066cc, #0099ff);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1rem;
        }
        
        .time-display {
            color: var(--muted-color);
            font-size: 1.1rem;
            letter-spacing: 1px;
        }
        
        .logout-btn, .back-btn {
            background: rgba(0, 60, 120, 0.7);
            border: 1px solid rgba(0, 150, 255, 0.3);
            color: var(--muted-color);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
        }
        
        .logout-btn:hover, .back-btn:hover {
            background: rgba(0, 100, 200, 0.85);
            transform: translateY(-1px);
        }
        
        /* 主要内容区域 */
        .main-content {
            padding: 110px 30px 30px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .page-title h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff6b6b, #ffa93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .page-title p {
            color: var(--muted-color);
            font-size: 1.2rem;
            max-width: 700px;
        }
        
        .page-stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .stat-item {
            background: rgba(0, 30, 80, 0.5);
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid rgba(0, 150, 255, 0.2);
            text-align: center;
            min-width: 150px;
        }
        
        .stat-value {
            font-size: 2.2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: var(--muted-color);
            font-size: 0.9rem;
        }
        
        /* 搜索和筛选区域 */
        .filter-section {
            background: var(--panel-bg);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid var(--panel-border);
            margin-bottom: 30px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .search-box {
            flex: 1;
            min-width: 300px;
            position: relative;
        }
        
        .search-box input {
            width: 100%;
            padding: 15px 15px 15px 50px;
            background: rgba(0, 30, 80, 0.7);
            border: 1px solid rgba(0, 150, 255, 0.2);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: rgba(0, 150, 255, 0.6);
            box-shadow: 0 0 0 3px rgba(0, 150, 255, 0.1);
        }
        
        .search-box i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #4fc3ff;
            font-size: 1.2rem;
        }
        
        .filter-controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .filter-select {
            padding: 12px 20px;
            background: rgba(0, 30, 80, 0.7);
            border: 1px solid rgba(0, 150, 255, 0.2);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 1rem;
            cursor: pointer;
            min-width: 150px;
        }
        
        /* 怪物列表 */
        .monster-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }
        
        .monster-card {
            background: var(--panel-bg);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid var(--panel-border);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        
        .monster-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 150, 255, 0.6);
            box-shadow: 0 15px 30px rgba(0, 150, 255, 0.2);
        }
        
        .monster-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }
        
        .monster-name {
            font-size: 1.6rem;
            font-weight: bold;
            color: #ffa93d;
            margin-bottom: 5px;
        }
        
        .monster-id {
            font-size: 0.9rem;
            color: var(--muted-color);
        }
        
        .monster-level {
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            text-align: center;
            display: inline-block;
            margin-top: 5px;
        }
        
        .level-low { background: rgba(107, 255, 184, 0.2); color: #6bffb8; border: 1px solid rgba(107, 255, 184, 0.5); }
        .level-medium { background: rgba(255, 217, 61, 0.2); color: #ffd93d; border: 1px solid rgba(255, 217, 61, 0.5); }
        .level-high { background: rgba(255, 167, 61, 0.2); color: #ffa73d; border: 1px solid rgba(255, 167, 61, 0.5); }
        .level-very-high { background: rgba(255, 107, 107, 0.2); color: #ff6b6b; border: 1px solid rgba(255, 107, 107, 0.5); }
        .level-disaster { background: rgba(153, 0, 153, 0.2); color: #ff66ff; border: 1px solid rgba(153, 0, 153, 0.5); }
        
        .monster-info {
            margin-bottom: 20px;
        }
        
        .info-item {
            display: flex;
            margin-bottom: 12px;
            font-size: 1rem;
        }
        
        .info-label {
            width: 80px;
            color: var(--muted-color);
            flex-shrink: 0;
        }
        
        .info-value {
            flex: 1;
            color: var(--text-primary);
        }
        
        .attribute-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 5px;
        }
        
        .attribute-tag {
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            display: inline-block;
        }
        
        .weakness-tag { background: rgba(255, 107, 107, 0.15); color: #ff8e8e; border: 1px solid rgba(255, 107, 107, 0.3); }
        .resistance-tag { background: rgba(79, 195, 255, 0.15); color: #8ed1ff; border: 1px solid rgba(79, 195, 255, 0.3); }
        
        .view-details-btn {
            width: 100%;
            padding: 12px;
            background: rgba(79, 195, 255, 0.2);
            border: 1px solid rgba(79, 195, 255, 0.4);
            border-radius: 10px;
            color: #4fc3ff;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }
        
        .view-details-btn:hover {
            background: rgba(79, 195, 255, 0.3);
            transform: translateY(-2px);
        }
        
        /* 空状态 */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            background: rgba(10, 36, 99, 0.5);
            border-radius: 15px;
            border: 2px dashed rgba(0, 150, 255, 0.3);
        }
        
        .empty-icon {
            font-size: 4rem;
            color: rgba(0, 150, 255, 0.5);
            margin-bottom: 20px;
        }
        
        .empty-state h3 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: var(--muted-color);
        }
        
        .empty-state p {
            color: var(--muted-color);
            max-width: 600px;
            margin: 0 auto 25px;
            font-size: 1.1rem;
        }
        
        /* 加载动画 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            backdrop-filter: blur(10px);
        }
        
        .loading-spinner {
            width: 80px;
            height: 80px;
            border: 5px solid rgba(79, 195, 255, 0.3);
            border-top: 5px solid #4fc3ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #e0f7ff;
            margin-top: 20px;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }
        
        /* 分页 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 40px;
        }
        
        .pagination-btn {
            padding: 10px 20px;
            background: rgba(0, 30, 80, 0.5);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .pagination-btn:hover:not(:disabled) {
            background: rgba(0, 60, 120, 0.7);
        }
        
        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .page-number {
            padding: 10px 15px;
            background: rgba(79, 195, 255, 0.2);
            border-radius: 8px;
            color: #4fc3ff;
            font-weight: bold;
        }
        
        /* 详情模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10010;
            backdrop-filter: blur(10px);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            padding: 20px;
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal-content {
            background: var(--panel-bg);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid var(--panel-border);
            box-shadow: 0 25px 50px rgba(0, 150, 255, 0.2);
            max-width: 800px;
            width: 100%;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
            position: relative;
        }
        
        .modal-header {
            margin-bottom: 30px;
        }
        
        .modal-header h2 {
            font-size: 2.2rem;
            color: #ffa93d;
            margin-bottom: 10px;
        }
        
        .modal-header .monster-id {
            color: var(--muted-color);
            font-size: 1rem;
        }
        
        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid rgba(255, 107, 107, 0.4);
            color: #ff6b6b;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .close-modal:hover {
            background: rgba(255, 107, 107, 0.3);
            transform: rotate(90deg);
        }
        
        .detail-section {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .detail-section h3 {
            font-size: 1.4rem;
            color: #4fc3ff;
            margin-bottom: 15px;
        }
        
        .detail-row {
            display: flex;
            margin-bottom: 12px;
        }
        
        .detail-label {
            width: 120px;
            color: var(--muted-color);
            flex-shrink: 0;
        }
        
        .detail-value {
            flex: 1;
            color: var(--text-primary);
        }
        
        /* 属性图标 */
        .fire { color: #ff6b6b; }
        .thunder { color: #ffd93d; }
        .ice { color: #4fc3ff; }
        .wind { color: #6bffb8; }
        .rock { color: #c8a951; }
        .light { color: #ffffa0; }
        .gravity { color: #b366ff; }
        .life { color: #6bff6b; }
        .fusion { color: #ff66cc; }
        .physical { color: #cccccc; }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .status-bar {
                padding: 10px 15px;
                flex-direction: column;
                gap: 15px;
                height: auto;
            }
            
            .system-info, .user-info {
                width: 100%;
                justify-content: space-between;
            }
            
            .main-content {
                padding: 20px 15px;
            }
            
            .page-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .monster-list {
                grid-template-columns: 1fr;
            }
            
            .filter-section {
                flex-direction: column;
                align-items: stretch;
            }
            
            .search-box {
                min-width: 100%;
            }
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- 顶部状态栏 -->
    <div class="status-bar">
        <div class="system-info">
            <img src="qsamlogo.png" alt="系统标志" class="system-logo">
            <div>
                <div class="system-name">管理局 - 裂隙怪物资料库</div>
                <div class="system-subtitle">查看已收录的裂隙怪物档案</div>
            </div>
        </div>
        
        <div class="user-info">
            <div class="time-display" id="currentTime">00:00:00</div>
            <div class="user-avatar">
                <i class="fas fa-user-shield"></i>
            </div>
            <div>
                <div id="userDisplayName" style="color: #ffd93d;">加载中...</div>
                <div id="userRoleText" style="font-size: 0.8rem; color: #a3d5ff;">加载中...</div>
            </div>
            <button class="back-btn" onclick="goBack()">
                <i class="fas fa-arrow-left"></i> 返回
            </button>
        </div>
    </div>
    
    <!-- 加载动画 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div>
            <div class="loading-spinner"></div>
            <div class="loading-text" id="loadingText">正在从云端加载数据...</div>
        </div>
    </div>
    
    <!-- 主要内容区域 -->
    <main class="main-content">
        <div class="page-header">
            <div class="page-title">
                <h1>裂隙怪物数据库</h1>
                <p>管理局已收录的所有裂隙怪物档案资料，包含属性、弱点和威胁等级信息</p>
            </div>
            <div class="page-stats">
                <div class="stat-item">
                    <div class="stat-value" id="totalMonsters">0</div>
                    <div class="stat-label">总怪物数量</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="highLevelMonsters">0</div>
                    <div class="stat-label">高危及以上</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="commonRegion">-</div>
                    <div class="stat-label">最常见地区</div>
                </div>
            </div>
        </div>
        
        <!-- 搜索和筛选区域 -->
        <div class="filter-section">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="搜索怪物名称或出没地区...">
            </div>
            <div class="filter-controls">
                <select class="filter-select" id="levelFilter">
                    <option value="">所有难度等级</option>
                    <option value="低危">低危</option>
                    <option value="中危">中危</option>
                    <option value="高危">高危</option>
                    <option value="极高危">极高危</option>
                    <option value="灾难">灾难</option>
                </select>
                <select class="filter-select" id="attributeFilter">
                    <option value="">所有属性</option>
                    <option value="火">火属性</option>
                    <option value="雷">雷属性</option>
                    <option value="冰">冰属性</option>
                    <option value="风">风属性</option>
                    <option value="岩">岩属性</option>
                    <option value="光">光属性</option>
                    <option value="重力">重力属性</option>
                    <option value="生命">生命属性</option>
                    <option value="融合">融合属性</option>
                    <option value="物理">物理属性</option>
                </select>
            </div>
        </div>
        
        <!-- 怪物列表 -->
        <div class="monster-list" id="monsterList">
            <!-- 怪物卡片会通过JavaScript动态生成 -->
        </div>
        
        <!-- 分页 -->
        <div class="pagination" id="pagination">
            <button class="pagination-btn" id="prevPage" disabled>上一页</button>
            <div class="page-number" id="currentPage">1</div>
            <button class="pagination-btn" id="nextPage" disabled>下一页</button>
        </div>
    </main>
    
    <!-- 怪物详情模态框 -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal-content">
            <div class="close-modal" id="closeDetailModal">
                <i class="fas fa-times"></i>
            </div>
            <div class="modal-header">
                <h2 id="detailName">怪物名称</h2>
                <div class="monster-id" id="detailId">ID: -</div>
                <div class="monster-level" id="detailLevel">等级</div>
            </div>
            
            <div class="detail-section">
                <h3>基本信息</h3>
                <div class="detail-row">
                    <div class="detail-label">出没地区:</div>
                    <div class="detail-value" id="detailRegion">-</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">出现频次:</div>
                    <div class="detail-value" id="detailFrequency">-</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">威胁等级:</div>
                    <div class="detail-value" id="detailLevelText">-</div>
                </div>
            </div>
            
            <div class="detail-section">
                <h3>属性信息</h3>
                <div class="detail-row">
                    <div class="detail-label">弱点属性:</div>
                    <div class="detail-value">
                        <div class="attribute-list" id="detailWeaknesses">
                            <!-- 弱点属性会动态生成 -->
                        </div>
                    </div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">抗性属性:</div>
                    <div class="detail-value">
                        <div class="attribute-list" id="detailResistances">
                            <!-- 抗性属性会动态生成 -->
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="detail-section">
                <h3>详细描述</h3>
                <div class="detail-value" id="detailNotes" style="line-height: 1.6;">
                    暂无详细描述
                </div>
            </div>
            
            <div class="detail-section">
                <h3>记录信息</h3>
                <div class="detail-row">
                    <div class="detail-label">首次记录:</div>
                    <div class="detail-value" id="detailCreatedAt">-</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">最后更新:</div>
                    <div class="detail-value" id="detailUpdatedAt">-</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // ================================================
        // 配置和初始化
        // ================================================
        // Supabase配置
        const SUPABASE_URL = 'https://owfyycgomqclytnswobj.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_65fjjNxcUjAFpFJ3AEW9Tg_ctW41ZsV';
        
        let supabaseClient = null;
        let currentUser = null;
        let currentRole = null;
        
        // 怪物数据
        let allMonsters = [];
        let filteredMonsters = [];
        let currentPage = 1;
        const itemsPerPage = 12;
        
        // 属性配置
        const attributes = [
            { id: 'fire', name: '火', icon: 'fa-fire', colorClass: 'fire' },
            { id: 'thunder', name: '雷', icon: 'fa-bolt', colorClass: 'thunder' },
            { id: 'ice', name: '冰', icon: 'fa-snowflake', colorClass: 'ice' },
            { id: 'wind', name: '风', icon: 'fa-wind', colorClass: 'wind' },
            { id: 'rock', name: '岩', icon: 'fa-mountain', colorClass: 'rock' },
            { id: 'light', name: '光', icon: 'fa-sun', colorClass: 'light' },
            { id: 'gravity', name: '重力', icon: 'fa-weight-hanging', colorClass: 'gravity' },
            { id: 'life', name: '生命', icon: 'fa-heart', colorClass: 'life' },
            { id: 'fusion', name: '融合', icon: 'fa-atom', colorClass: 'fusion' },
            { id: 'physical', name: '物理', icon: 'fa-fist-raised', colorClass: 'physical' }
        ];
        
        // 难度等级配置
        const levels = [
            { id: '低危', name: '低危', colorClass: 'level-low' },
            { id: '中危', name: '中危', colorClass: 'level-medium' },
            { id: '高危', name: '高危', colorClass: 'level-high' },
            { id: '极高危', name: '极高危', colorClass: 'level-very-high' },
            { id: '灾难', name: '灾难', colorClass: 'level-disaster' }
        ];
        
        // ================================================
        // 初始化函数
        // ================================================
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('页面加载完成，开始初始化...');
            
            // 检查登录状态
            await checkAuth();
            
            // 初始化Supabase客户端
            initSupabase();
            
            // 更新时间和显示用户信息
            updateTime();
            setInterval(updateTime, 1000);
            
            // 加载怪物数据
            await loadMonsters();
            
            // 设置事件监听器
            setupEventListeners();
            
            console.log('初始化完成');
        });
        
        // 检查登录状态
        async function checkAuth() {
            currentUser = localStorage.getItem('auth_user');
            currentRole = localStorage.getItem('auth_role');
            
            if (!currentUser || !currentRole) {
                alert('请先登录！');
                window.location.href = 'index.html';
                return;
            }
            
            // 显示用户信息
            document.getElementById('userDisplayName').textContent = currentUser;
            
            // 根据角色显示不同的文本
            let roleText = '';
            switch(currentRole) {
                case 'admin':
                    roleText = '最高权限管理员';
                    break;
                case 'member':
                case 'user':
                    roleText = '管理局成员';
                    break;
                case 'viewer':
                    roleText = '观察员';
                    break;
                default:
                    roleText = '用户';
            }
            document.getElementById('userRoleText').textContent = roleText;
        }
        
        // 初始化Supabase客户端
        function initSupabase() {
            try {
                if (window.supabase && SUPABASE_URL && SUPABASE_ANON_KEY) {
                    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    console.log('Supabase客户端已初始化');
                } else {
                    console.warn('Supabase未配置，将使用本地数据');
                }
            } catch (e) {
                console.error('Supabase初始化失败:', e);
            }
        }
        
        // 更新当前时间
        function updateTime() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const seconds = now.getSeconds().toString().padStart(2, '0');
            document.getElementById('currentTime').textContent = `${hours}:${minutes}:${seconds}`;
        }
        
        // ================================================
        // 数据加载函数
        // ================================================
        // 从Supabase加载怪物数据
        async function loadMonsters() {
            showLoading('正在从云端加载怪物数据...');
            
            try {
                let monsters = [];
                
                // 首先尝试从Supabase加载
                if (supabaseClient) {
                    console.log('尝试从Supabase加载怪物数据...');
                    
                    const { data, error } = await supabaseClient
                        .from('rift_monsters')
                        .select('*')
                        .order('created_at', { ascending: false });
                    
                    if (error) {
                        console.error('从Supabase加载怪物失败:', error);
                        // 回退到本地数据
                        monsters = loadLocalMonsters();
                    } else if (data && data.length > 0) {
                        console.log(`从Supabase加载了 ${data.length} 条怪物记录`);
                        monsters = formatSupabaseMonsters(data);
                        // 更新本地缓存
                        localStorage.setItem('rift_monsters_cache', JSON.stringify(monsters));
                    } else {
                        console.log('Supabase中没有怪物数据，使用本地数据');
                        monsters = loadLocalMonsters();
                    }
                } else {
                    console.log('Supabase未配置，使用本地数据');
                    monsters = loadLocalMonsters();
                }
                
                allMonsters = monsters;
                filteredMonsters = [...allMonsters];
                
                // 更新统计数据
                updateStatistics();
                
                // 渲染列表
                renderMonsterList();
                
                // 隐藏加载动画
                setTimeout(() => {
                    hideLoading();
                }, 500);
                
            } catch (error) {
                console.error('加载怪物数据时出错:', error);
                hideLoading();
                showNotification('加载数据失败，请检查网络连接', 'error');
                
                // 尝试使用本地缓存
                allMonsters = loadLocalMonsters();
                filteredMonsters = [...allMonsters];
                updateStatistics();
                renderMonsterList();
            }
        }
        
        // 从本地存储加载怪物数据
        function loadLocalMonsters() {
            try {
                // 尝试从本地缓存加载
                const cached = localStorage.getItem('rift_monsters_cache');
                if (cached) {
                    const monsters = JSON.parse(cached);
                    console.log(`从本地缓存加载了 ${monsters.length} 条怪物记录`);
                    return monsters;
                }
                
                // 如果没有缓存，尝试从其他本地存储位置加载
                const stored = localStorage.getItem('rift_monsters_data');
                if (stored) {
                    const monsters = JSON.parse(stored);
                    console.log(`从本地存储加载了 ${monsters.length} 条怪物记录`);
                    return monsters;
                }
                
                console.log('本地没有怪物数据');
                return [];
            } catch (e) {
                console.error('加载本地怪物数据失败:', e);
                return [];
            }
        }
        
        // 格式化Supabase数据
        function formatSupabaseMonsters(supabaseData) {
            return supabaseData.map(monster => ({
                id: monster.id || monster.local_id || `monster_${Date.now()}`,
                name: monster.name || monster.title || '未知怪物',
                region: monster.region || '未知区域',
                frequency: monster.frequency || '未知',
                level: monster.level || '中危',
                weaknesses: Array.isArray(monster.weaknesses) ? monster.weaknesses : 
                           (monster.weaknesses ? JSON.parse(monster.weaknesses) : []),
                resistances: Array.isArray(monster.resistances) ? monster.resistances : 
                            (monster.resistances ? JSON.parse(monster.resistances) : []),
                notes: monster.notes || '',
                createdAt: monster.created_at || monster.createdAt || new Date().toISOString(),
                updatedAt: monster.updated_at || monster.updatedAt || new Date().toISOString(),
                cloudId: monster.id || null
            }));
        }
        
        // ================================================
        // 渲染函数
        // ================================================
        // 更新统计数据
        function updateStatistics() {
            const total = allMonsters.length;
            const highLevel = allMonsters.filter(m => 
                m.level === '高危' || m.level === '极高危' || m.level === '灾难'
            ).length;
            
            // 找出最常见的出没地区
            const regionCounts = {};
            allMonsters.forEach(monster => {
                const region = monster.region;
                regionCounts[region] = (regionCounts[region] || 0) + 1;
            });
            
            let mostCommonRegion = '-';
            let maxCount = 0;
            for (const [region, count] of Object.entries(regionCounts)) {
                if (count > maxCount) {
                    maxCount = count;
                    mostCommonRegion = region;
                }
            }
            
            document.getElementById('totalMonsters').textContent = total;
            document.getElementById('highLevelMonsters').textContent = highLevel;
            document.getElementById('commonRegion').textContent = mostCommonRegion;
        }
        
        // 渲染怪物列表
        function renderMonsterList() {
            const monsterList = document.getElementById('monsterList');
            const pagination = document.getElementById('pagination');
            
            // 清空列表
            monsterList.innerHTML = '';
            
            // 如果没有怪物，显示空状态
            if (filteredMonsters.length === 0) {
                monsterList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <i class="fas fa-dragon"></i>
                        </div>
                        <h3>没有找到怪物记录</h3>
                        <p>请尝试调整搜索条件或筛选条件</p>
                    </div>
                `;
                pagination.style.display = 'none';
                return;
            }
            
            // 计算分页
            const totalPages = Math.ceil(filteredMonsters.length / itemsPerPage);
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = Math.min(startIndex + itemsPerPage, filteredMonsters.length);
            const pageMonsters = filteredMonsters.slice(startIndex, endIndex);
            
            // 渲染当前页的怪物卡片
            pageMonsters.forEach(monster => {
                const card = document.createElement('div');
                card.className = 'monster-card';
                card.dataset.id = monster.id;
                
                // 获取难度等级样式
                const levelClass = levels.find(l => l.id === monster.level)?.colorClass || 'level-medium';
                
                // 获取属性图标
                const weaknessIcons = monster.weaknesses.map(weakness => {
                    const attr = attributes.find(a => a.id === weakness);
                    return attr ? `<i class="fas ${attr.icon} ${attr.colorClass}" title="${attr.name}"></i>` : '';
                }).filter(icon => icon).join(' ');
                
                const resistanceIcons = monster.resistances.map(resistance => {
                    const attr = attributes.find(a => a.id === resistance);
                    return attr ? `<i class="fas ${attr.icon} ${attr.colorClass}" title="${attr.name}"></i>` : '';
                }).filter(icon => icon).join(' ');
                
                // 安全处理 id（有时后端返回数字或 null）
                const _idStr = (monster.id === undefined || monster.id === null) ? '' : String(monster.id);
                const displayId = _idStr ? (_idStr.length > 8 ? _idStr.substring(0, 8) + '...' : _idStr) : '-';

                card.innerHTML = `
                    <div class="monster-header">
                        <div>
                            <div class="monster-name">${monster.name}</div>
                            <div class="monster-id">ID: ${displayId}</div>
                        </div>
                        <div class="monster-level ${levelClass}">${monster.level}</div>
                    </div>
                    
                    <div class="monster-info">
                        <div class="info-item">
                            <div class="info-label">出没地区:</div>
                            <div class="info-value">${monster.region}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">出现频次:</div>
                            <div class="info-value">${monster.frequency}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">弱点:</div>
                            <div class="info-value">
                                ${weaknessIcons || '无'}
                            </div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">抗性:</div>
                            <div class="info-value">
                                ${resistanceIcons || '无'}
                            </div>
                        </div>
                    </div>
                    
                    <button class="view-details-btn" onclick="viewMonsterDetail('${monster.id}')">
                        <i class="fas fa-eye"></i> 查看详情
                    </button>
                `;
                
                monsterList.appendChild(card);

                // Attach click handler to the details button (avoid inline onclick fragility)
                const detailsBtn = card.querySelector('.view-details-btn');
                if (detailsBtn) {
                    detailsBtn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        try {
                            viewMonsterDetail(monster.id);
                        } catch (err) {
                            console.error('无法打开详情:', err);
                        }
                    });
                }
            });
            
            // 更新分页控件
            updatePagination(totalPages);
        }
        
        // 更新分页控件
        function updatePagination(totalPages) {
            const prevBtn = document.getElementById('prevPage');
            const nextBtn = document.getElementById('nextPage');
            const currentPageEl = document.getElementById('currentPage');
            const pagination = document.getElementById('pagination');
            
            pagination.style.display = totalPages > 1 ? 'flex' : 'none';
            currentPageEl.textContent = currentPage;
            
            prevBtn.disabled = currentPage === 1;
            nextBtn.disabled = currentPage === totalPages || totalPages === 0;
        }
        
        // ================================================
        // 事件处理函数
        // ================================================
        // 设置事件监听器
        function setupEventListeners() {
            // 搜索输入
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('input', debounce(filterMonsters, 300));
            }
            
            // 筛选器
            const levelFilter = document.getElementById('levelFilter');
            const attributeFilter = document.getElementById('attributeFilter');
            
            if (levelFilter) {
                levelFilter.addEventListener('change', filterMonsters);
            }
            
            if (attributeFilter) {
                attributeFilter.addEventListener('change', filterMonsters);
            }
            
            // 分页按钮
            const prevBtn = document.getElementById('prevPage');
            const nextBtn = document.getElementById('nextPage');
            
            if (prevBtn) {
                prevBtn.addEventListener('click', () => {
                    if (currentPage > 1) {
                        currentPage--;
                        renderMonsterList();
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }
                });
            }
            
            if (nextBtn) {
                nextBtn.addEventListener('click', () => {
                    const totalPages = Math.ceil(filteredMonsters.length / itemsPerPage);
                    if (currentPage < totalPages) {
                        currentPage++;
                        renderMonsterList();
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }
                });
            }
            
            // 详情模态框关闭按钮
            const closeDetailBtn = document.getElementById('closeDetailModal');
            if (closeDetailBtn) {
                closeDetailBtn.addEventListener('click', closeDetailModal);
            }
            
            // 点击模态框外部关闭
            const detailModal = document.getElementById('detailModal');
            if (detailModal) {
                detailModal.addEventListener('click', function(e) {
                    if (e.target === this) {
                        closeDetailModal();
                    }
                });
            }
        }
        
        // 防抖函数
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }
        
        // 筛选怪物
        function filterMonsters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const levelFilterValue = document.getElementById('levelFilter').value;
            const attributeFilterValue = document.getElementById('attributeFilter').value;
            
            filteredMonsters = allMonsters.filter(monster => {
                // 搜索筛选
                const matchesSearch = !searchTerm || 
                    monster.name.toLowerCase().includes(searchTerm) ||
                    monster.region.toLowerCase().includes(searchTerm);
                
                // 难度等级筛选
                const matchesLevel = !levelFilterValue || monster.level === levelFilterValue;
                
                // 属性筛选
                let matchesAttribute = true;
                if (attributeFilterValue) {
                    const attrName = attributeFilterValue;
                    const attribute = attributes.find(a => a.name === attrName);
                    if (attribute) {
                        matchesAttribute = monster.weaknesses.includes(attribute.id) || 
                                         monster.resistances.includes(attribute.id);
                    }
                }
                
                return matchesSearch && matchesLevel && matchesAttribute;
            });
            
            // 重置到第一页
            currentPage = 1;
            
            // 重新渲染列表
            renderMonsterList();
        }
        
        // 查看怪物详情
        function viewMonsterDetail(monsterId) {
            // Be tolerant of id types (string/number/object). Compare by string form as fallback.
            const lookupIdStr = monsterId === undefined || monsterId === null ? '' : String(monsterId);
            const monster = allMonsters.find(m => {
                if (m == null) return false;
                try {
                    return m.id === monsterId || String(m.id) === lookupIdStr;
                } catch (e) {
                    return false;
                }
            });
            if (!monster) {
                console.warn('未找到对应怪物，id=', monsterId);
                return;
            }
            
            // 更新模态框内容
            document.getElementById('detailName').textContent = monster.name;
            document.getElementById('detailId').textContent = `ID: ${monster.id}`;
            document.getElementById('detailRegion').textContent = monster.region;
            document.getElementById('detailFrequency').textContent = monster.frequency;
            document.getElementById('detailLevelText').textContent = monster.level;
            document.getElementById('detailNotes').textContent = monster.notes || '暂无详细描述';
            
            // 设置难度等级样式
            const levelEl = document.getElementById('detailLevel');
            const levelClass = levels.find(l => l.id === monster.level)?.colorClass || 'level-medium';
            levelEl.className = `monster-level ${levelClass}`;
            levelEl.textContent = monster.level;
            
            // 格式化日期
            const formatDate = (dateString) => {
                try {
                    const date = new Date(dateString);
                    return date.toLocaleString('zh-CN', {
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                } catch (e) {
                    return dateString;
                }
            };
            
            document.getElementById('detailCreatedAt').textContent = formatDate(monster.createdAt);
            document.getElementById('detailUpdatedAt').textContent = formatDate(monster.updatedAt);
            
            // 渲染弱点属性
            const weaknessesEl = document.getElementById('detailWeaknesses');
            weaknessesEl.innerHTML = '';
            monster.weaknesses.forEach(weakness => {
                const attr = attributes.find(a => a.id === weakness);
                if (attr) {
                    const tag = document.createElement('span');
                    tag.className = 'attribute-tag weakness-tag';
                    tag.innerHTML = `<i class="fas ${attr.icon} ${attr.colorClass}"></i> ${attr.name}`;
                    weaknessesEl.appendChild(tag);
                }
            });
            
            // 渲染抗性属性
            const resistancesEl = document.getElementById('detailResistances');
            resistancesEl.innerHTML = '';
            monster.resistances.forEach(resistance => {
                const attr = attributes.find(a => a.id === resistance);
                if (attr) {
                    const tag = document.createElement('span');
                    tag.className = 'attribute-tag resistance-tag';
                    tag.innerHTML = `<i class="fas ${attr.icon} ${attr.colorClass}"></i> ${attr.name}`;
                    resistancesEl.appendChild(tag);
                }
            });
            
            // 显示模态框
            document.getElementById('detailModal').classList.add('active');
        }
        
        // 关闭详情模态框
        function closeDetailModal() {
            document.getElementById('detailModal').classList.remove('active');
        }
        
        // ================================================
        // 工具函数
        // ================================================
        // 显示加载动画
        function showLoading(message = '正在加载...') {
            const overlay = document.getElementById('loadingOverlay');
            const text = document.getElementById('loadingText');
            if (text) text.textContent = message;
            if (overlay) overlay.style.display = 'flex';
        }
        
        // 隐藏加载动画
        function hideLoading() {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) overlay.style.display = 'none';
        }
        
        // 显示通知
        function showNotification(message, type = 'info') {
            // 移除现有通知
            const existingNotification = document.querySelector('.notification');
            if (existingNotification) {
                existingNotification.remove();
            }
            
            // 创建新通知
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            notification.style.cssText = `
                position: fixed;
                top: 100px;
                right: 20px;
                padding: 15px 25px;
                background: ${type === 'success' ? 'rgba(107, 255, 184, 0.9)' : type === 'error' ? 'rgba(255, 107, 107, 0.9)' : 'rgba(79, 195, 255, 0.9)'};
                color: white;
                border-radius: 10px;
                box-shadow: 0 10px 25px rgba(0,0,0,0.3);
                z-index: 2000;
                animation: fadeIn 0.5s ease;
                backdrop-filter: blur(10px);
                border: 1px solid ${type === 'success' ? 'rgba(107, 255, 184, 0.5)' : type === 'error' ? 'rgba(255, 107, 107, 0.5)' : 'rgba(79, 195, 255, 0.5)'};
            `;
            
            document.body.appendChild(notification);
            
            // 3秒后移除通知
            setTimeout(() => {
                notification.style.animation = 'fadeOut 0.5s ease';
                setTimeout(() => {
                    if (notification.parentNode) {
                        notification.parentNode.removeChild(notification);
                    }
                }, 500);
            }, 3000);
        }
        
        // 返回上一页
        function goBack() {
            const role = localStorage.getItem('auth_role');
            if (role === 'admin') {
                window.location.href = 'admin.html';
            } else {
                window.location.href = 'member.html';
            }
        }
        
        // 退出登录
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('auth_user');
                localStorage.removeItem('auth_role');
                localStorage.removeItem('auth_time');
                showLoading('正在退出系统...');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            }
        }
        
        // 添加CSS动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeIn {
                from { opacity: 0; }
                to { opacity: 1; }
            }
            
            @keyframes fadeOut {
                from { opacity: 1; }
                to { opacity: 0; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
