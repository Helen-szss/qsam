            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;

        .search-box {

            gap: 10px;
            margin-top: 40px;

        .pagination-btn:disabled {

            left: 0;

            padding: 40px;
            border: 1px solid var(--panel-border);
            box-shadow: 0 25px 50px rgba(0, 150, 255, 0.2);

        .modal-header {

        .close-modal {

            right: 20px;

        }
        
        .detail-section {

            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .detail-section h3 {

            color: #4fc3ff;
            margin-bottom: 15px;
        }
        
        .detail-row {
            display: flex;

        }
        
        .detail-label {
            width: 120px;
            color: var(--muted-color);
            flex-shrink: 0;
        }
        
        .detail-value {
            flex: 1;

        }
        
        /* 灞炴€у浘鏍?*/
        .fire { color: #ff6b6b; }
        .thunder { color: #ffd93d; }
        .ice { color: #4fc3ff; }
        .wind { color: #6bffb8; }
        .rock { color: #c8a951; }
        .light { color: #ffffa0; }
        .gravity { color: #b366ff; }
        .life { color: #6bff6b; }
        .fusion { color: #ff66cc; }
        .physical { color: #cccccc; }
        
        /* 鍝嶅簲寮忚璁?*/
        @media (max-width: 768px) {

            }
            
            .system-info, .user-info {

            }
            
            .monster-list {
                grid-template-columns: 1fr;
            }
            
            .filter-section {
                flex-direction: column;
                align-items: stretch;
            }
            
            .search-box {
                min-width: 100%;
            }
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>

        // 鏇存柊褰撳墠鏃堕棿

            const minutes = now.getMinutes().toString().padStart(2, '0');
            const seconds = now.getSeconds().toString().padStart(2, '0');

        // ================================================

        // 浠嶴upabase鍔犺浇鎬墿鏁版嵁
        async function loadMonsters() {
            showLoading('姝ｅ湪浠庝簯绔姞杞芥€墿鏁版嵁...');
            
            try {
                let monsters = [];
                
                // 棣栧厛灏濊瘯浠嶴upabase鍔犺浇
                if (supabaseClient) {
                    console.log('灏濊瘯浠嶴upabase鍔犺浇鎬墿鏁版嵁...');
                    
                    const { data, error } = await supabaseClient
                        .from('rift_monsters')
                        .select('*')
                        .order('created_at', { ascending: false });
                    
                    if (error) {
                        console.error('浠嶴upabase鍔犺浇鎬墿澶辫触:', error);
                        // 鍥為€€鍒版湰鍦版暟鎹?
                        monsters = loadLocalMonsters();
                    } else if (data && data.length > 0) {
                        console.log(`浠嶴upabase鍔犺浇浜?${data.length} 鏉℃€墿璁板綍`);
                        monsters = formatSupabaseMonsters(data);
                        // 鏇存柊鏈湴缂撳瓨
                        localStorage.setItem('rift_monsters_cache', JSON.stringify(monsters));
                    } else {
                        console.log('Supabase涓病鏈夋€墿鏁版嵁锛屼娇鐢ㄦ湰鍦版暟鎹?);
                        monsters = loadLocalMonsters();
                    }
                } else {
                    console.log('Supabase鏈厤缃紝浣跨敤鏈湴鏁版嵁');
                    monsters = loadLocalMonsters();
                }
                
                allMonsters = monsters;
                filteredMonsters = [...allMonsters];
                
                // 鏇存柊缁熻鏁版嵁
                updateStatistics();
                
                // 娓叉煋鍒楄〃
                renderMonsterList();
                
                // 闅愯棌鍔犺浇鍔ㄧ敾
                setTimeout(() => {
                    hideLoading();
                }, 500);
                
            } catch (error) {
                console.error('鍔犺浇鎬墿鏁版嵁鏃跺嚭閿?', error);
                hideLoading();
                showNotification('鍔犺浇鏁版嵁澶辫触锛岃妫€鏌ョ綉缁滆繛鎺?, 'error');
                
                // 灏濊瘯浣跨敤鏈湴缂撳瓨
                allMonsters = loadLocalMonsters();
                filteredMonsters = [...allMonsters];
                updateStatistics();
                renderMonsterList();

        // 浠庢湰鍦板瓨鍌ㄥ姞杞芥€墿鏁版嵁
        function loadLocalMonsters() {
            try {
                // 灏濊瘯浠庢湰鍦扮紦瀛樺姞杞?
                const cached = localStorage.getItem('rift_monsters_cache');
                if (cached) {
                    const monsters = JSON.parse(cached);
                    console.log(`浠庢湰鍦扮紦瀛樺姞杞戒簡 ${monsters.length} 鏉℃€墿璁板綍`);
                    return monsters;
                }
                
                // 濡傛灉娌℃湁缂撳瓨锛屽皾璇曚粠鍏朵粬鏈湴瀛樺偍浣嶇疆鍔犺浇
                const stored = localStorage.getItem('rift_monsters_data');
                if (stored) {
                    const monsters = JSON.parse(stored);
                    console.log(`浠庢湰鍦板瓨鍌ㄥ姞杞戒簡 ${monsters.length} 鏉℃€墿璁板綍`);
                    return monsters;
                }
                
                console.log('鏈湴娌℃湁鎬墿鏁版嵁');
                return [];
            } catch (e) {
                console.error('鍔犺浇鏈湴鎬墿鏁版嵁澶辫触:', e);

        }
        
        // 鏍煎紡鍖朣upabase鏁版嵁
        function formatSupabaseMonsters(supabaseData) {
            return supabaseData.map(monster => ({
                id: monster.id || monster.local_id || `monster_${Date.now()}`,
                name: monster.name || monster.title || '鏈煡鎬墿',
                region: monster.region || '鏈煡鍖哄煙',
                frequency: monster.frequency || '鏈煡',
                level: monster.level || '涓嵄',
                weaknesses: Array.isArray(monster.weaknesses) ? monster.weaknesses : 
                           (monster.weaknesses ? JSON.parse(monster.weaknesses) : []),
                resistances: Array.isArray(monster.resistances) ? monster.resistances : 
                            (monster.resistances ? JSON.parse(monster.resistances) : []),
                notes: monster.notes || '',
                createdAt: monster.created_at || monster.createdAt || new Date().toISOString(),
                updatedAt: monster.updated_at || monster.updatedAt || new Date().toISOString(),
                cloudId: monster.id || null
            }));
        }
        
        // ================================================
        // 娓叉煋鍑芥暟
        // ================================================
        // 鏇存柊缁熻鏁版嵁
        function updateStatistics() {
            const total = allMonsters.length;
            const highLevel = allMonsters.filter(m => 
                m.level === '楂樺嵄' || m.level === '鏋侀珮鍗? || m.level === '鐏鹃毦'
            ).length;
            
            // 鎵惧嚭鏈€甯歌鐨勫嚭娌″湴鍖?
            const regionCounts = {};
            allMonsters.forEach(monster => {
                const region = monster.region;
                regionCounts[region] = (regionCounts[region] || 0) + 1;
            });
            
            let mostCommonRegion = '-';
            let maxCount = 0;
            for (const [region, count] of Object.entries(regionCounts)) {
                if (count > maxCount) {
                    maxCount = count;
                    mostCommonRegion = region;
                }
            }
            
            document.getElementById('totalMonsters').textContent = total;
            document.getElementById('highLevelMonsters').textContent = highLevel;
            document.getElementById('commonRegion').textContent = mostCommonRegion;
        }
        
        // 娓叉煋鎬墿鍒楄〃
        function renderMonsterList() {
            const monsterList = document.getElementById('monsterList');
            const pagination = document.getElementById('pagination');
            
            // 娓呯┖鍒楄〃
            monsterList.innerHTML = '';
            
            // 濡傛灉娌℃湁鎬墿锛屾樉绀虹┖鐘舵€?
            if (filteredMonsters.length === 0) {
                monsterList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <i class="fas fa-dragon"></i>
                        </div>
                        <h3>娌℃湁鎵惧埌鎬墿璁板綍</h3>
                        <p>璇峰皾璇曡皟鏁存悳绱㈡潯浠舵垨绛涢€夋潯浠?/p>
                    </div>
                `;
                pagination.style.display = 'none';
                return;
            }
            
            // 璁＄畻鍒嗛〉
            const totalPages = Math.ceil(filteredMonsters.length / itemsPerPage);
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = Math.min(startIndex + itemsPerPage, filteredMonsters.length);
            const pageMonsters = filteredMonsters.slice(startIndex, endIndex);
            
            // 娓叉煋褰撳墠椤电殑鎬墿鍗＄墖
            pageMonsters.forEach(monster => {
                const card = document.createElement('div');
                card.className = 'monster-card';
                card.dataset.id = monster.id;
                
                // 鑾峰彇闅惧害绛夌骇鏍峰紡
                const levelClass = levels.find(l => l.id === monster.level)?.colorClass || 'level-medium';
                
                // 鑾峰彇灞炴€у浘鏍?
                const weaknessIcons = monster.weaknesses.map(weakness => {
                    const attr = attributes.find(a => a.id === weakness);
                    return attr ? `<i class="fas ${attr.icon} ${attr.colorClass}" title="${attr.name}"></i>` : '';
                }).filter(icon => icon).join(' ');
                
                const resistanceIcons = monster.resistances.map(resistance => {
                    const attr = attributes.find(a => a.id === resistance);
                    return attr ? `<i class="fas ${attr.icon} ${attr.colorClass}" title="${attr.name}"></i>` : '';
                }).filter(icon => icon).join(' ');
                
                // 瀹夊叏澶勭悊 id锛堟湁鏃跺悗绔繑鍥炴暟瀛楁垨 null锛?
                const _idStr = (monster.id === undefined || monster.id === null) ? '' : String(monster.id);
                const displayId = _idStr ? (_idStr.length > 8 ? _idStr.substring(0, 8) + '...' : _idStr) : '-';

                card.innerHTML = `
                    <div class="monster-header">
                        <div>
                            <div class="monster-name">${monster.name}</div>
                            <div class="monster-id">ID: ${displayId}</div>
                        </div>
                        <div class="monster-level ${levelClass}">${monster.level}</div>
                    </div>
                    
                    <div class="monster-info">
                        <div class="info-item">
                            <div class="info-label">鍑烘病鍦板尯:</div>
                            <div class="info-value">${monster.region}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">鍑虹幇棰戞:</div>
                            <div class="info-value">${monster.frequency}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">寮辩偣:</div>
                            <div class="info-value">
                                ${weaknessIcons || '鏃?}
                            </div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">鎶楁€?</div>
                            <div class="info-value">
                                ${resistanceIcons || '鏃?}
                            </div>
                        </div>
                    </div>
                    
                    <button class="view-details-btn" onclick="viewMonsterDetail('${monster.id}')">
                        <i class="fas fa-eye"></i> 鏌ョ湅璇︽儏
                    </button>
                `;
                
                monsterList.appendChild(card);

                // Attach click handler to the details button (avoid inline onclick fragility)
                const detailsBtn = card.querySelector('.view-details-btn');
                if (detailsBtn) {
                    detailsBtn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        try {
                            viewMonsterDetail(monster.id);
                        } catch (err) {
                            console.error('鏃犳硶鎵撳紑璇︽儏:', err);
                        }
                    });
                }
            });
            
            // 鏇存柊鍒嗛〉鎺т欢
            updatePagination(totalPages);
        }
        
        // 鏇存柊鍒嗛〉鎺т欢
        function updatePagination(totalPages) {
            const prevBtn = document.getElementById('prevPage');
            const nextBtn = document.getElementById('nextPage');
            const currentPageEl = document.getElementById('currentPage');
            const pagination = document.getElementById('pagination');
            
            pagination.style.display = totalPages > 1 ? 'flex' : 'none';
            currentPageEl.textContent = currentPage;
            
            prevBtn.disabled = currentPage === 1;
            nextBtn.disabled = currentPage === totalPages || totalPages === 0;
        }
        
        // ================================================
        // 浜嬩欢澶勭悊鍑芥暟
        // ================================================
        // 璁剧疆浜嬩欢鐩戝惉鍣?
        function setupEventListeners() {
            // 鎼滅储杈撳叆
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('input', debounce(filterMonsters, 300));
            }
            
            // 绛涢€夊櫒
            const levelFilter = document.getElementById('levelFilter');
            const attributeFilter = document.getElementById('attributeFilter');
            
            if (levelFilter) {
                levelFilter.addEventListener('change', filterMonsters);
            }
            
            if (attributeFilter) {
                attributeFilter.addEventListener('change', filterMonsters);
            }
            
            // 鍒嗛〉鎸夐挳
            const prevBtn = document.getElementById('prevPage');
            const nextBtn = document.getElementById('nextPage');
            
            if (prevBtn) {
                prevBtn.addEventListener('click', () => {
                    if (currentPage > 1) {
                        currentPage--;
                        renderMonsterList();
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }
                });
            }
            
            if (nextBtn) {
                nextBtn.addEventListener('click', () => {
                    const totalPages = Math.ceil(filteredMonsters.length / itemsPerPage);
                    if (currentPage < totalPages) {
                        currentPage++;
                        renderMonsterList();
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }
                });
            }
            
            // 璇︽儏妯℃€佹鍏抽棴鎸夐挳
            const closeDetailBtn = document.getElementById('closeDetailModal');
            if (closeDetailBtn) {
                closeDetailBtn.addEventListener('click', closeDetailModal);
            }
            
            // 鐐瑰嚮妯℃€佹澶栭儴鍏抽棴
            const detailModal = document.getElementById('detailModal');
            if (detailModal) {
                detailModal.addEventListener('click', function(e) {
                    if (e.target === this) {
                        closeDetailModal();
                    }
                });
            }
        }
        
        // 闃叉姈鍑芥暟
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }
        
        // 绛涢€夋€墿
        function filterMonsters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const levelFilterValue = document.getElementById('levelFilter').value;
            const attributeFilterValue = document.getElementById('attributeFilter').value;
            
            filteredMonsters = allMonsters.filter(monster => {
                // 鎼滅储绛涢€?
                const matchesSearch = !searchTerm || 
                    monster.name.toLowerCase().includes(searchTerm) ||
                    monster.region.toLowerCase().includes(searchTerm);
                
                // 闅惧害绛夌骇绛涢€?
                const matchesLevel = !levelFilterValue || monster.level === levelFilterValue;
                
                // 灞炴€х瓫閫?
                let matchesAttribute = true;
                if (attributeFilterValue) {
                    const attrName = attributeFilterValue;
                    const attribute = attributes.find(a => a.name === attrName);
                    if (attribute) {
                        matchesAttribute = monster.weaknesses.includes(attribute.id) || 
                                         monster.resistances.includes(attribute.id);
                    }
                }
                
                return matchesSearch && matchesLevel && matchesAttribute;
            });
            
            // 閲嶇疆鍒扮涓€椤?
            currentPage = 1;
            
            // 閲嶆柊娓叉煋鍒楄〃
            renderMonsterList();
        }
        
        // 鏌ョ湅鎬墿璇︽儏
        function viewMonsterDetail(monsterId) {
            // Be tolerant of id types (string/number/object). Compare by string form as fallback.
            const lookupIdStr = monsterId === undefined || monsterId === null ? '' : String(monsterId);
            const monster = allMonsters.find(m => {
                if (m == null) return false;
                try {
                    return m.id === monsterId || String(m.id) === lookupIdStr;
                } catch (e) {
                    return false;
                }
            });
            if (!monster) {
                console.warn('鏈壘鍒板搴旀€墿锛宨d=', monsterId);
                return;
            }
            
            // 鏇存柊妯℃€佹鍐呭
            document.getElementById('detailName').textContent = monster.name;
            document.getElementById('detailId').textContent = `ID: ${monster.id}`;
            document.getElementById('detailRegion').textContent = monster.region;
            document.getElementById('detailFrequency').textContent = monster.frequency;
            document.getElementById('detailLevelText').textContent = monster.level;
            document.getElementById('detailNotes').textContent = monster.notes || '鏆傛棤璇︾粏鎻忚堪';
            
            // 璁剧疆闅惧害绛夌骇鏍峰紡
            const levelEl = document.getElementById('detailLevel');
            const levelClass = levels.find(l => l.id === monster.level)?.colorClass || 'level-medium';
            levelEl.className = `monster-level ${levelClass}`;
            levelEl.textContent = monster.level;
            
            // 鏍煎紡鍖栨棩鏈?
            const formatDate = (dateString) => {
                try {
                    const date = new Date(dateString);
                    return date.toLocaleString('zh-CN', {
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                } catch (e) {
                    return dateString;
                }
            };
            
            document.getElementById('detailCreatedAt').textContent = formatDate(monster.createdAt);
            document.getElementById('detailUpdatedAt').textContent = formatDate(monster.updatedAt);
            
            // 娓叉煋寮辩偣灞炴€?
            const weaknessesEl = document.getElementById('detailWeaknesses');
            weaknessesEl.innerHTML = '';
            monster.weaknesses.forEach(weakness => {
                const attr = attributes.find(a => a.id === weakness);
                if (attr) {
                    const tag = document.createElement('span');
                    tag.className = 'attribute-tag weakness-tag';
                    tag.innerHTML = `<i class="fas ${attr.icon} ${attr.colorClass}"></i> ${attr.name}`;
                    weaknessesEl.appendChild(tag);
                }
            });
            
            // 娓叉煋鎶楁€у睘鎬?
            const resistancesEl = document.getElementById('detailResistances');
            resistancesEl.innerHTML = '';
            monster.resistances.forEach(resistance => {
                const attr = attributes.find(a => a.id === resistance);
                if (attr) {
                    const tag = document.createElement('span');
                    tag.className = 'attribute-tag resistance-tag';
                    tag.innerHTML = `<i class="fas ${attr.icon} ${attr.colorClass}"></i> ${attr.name}`;
                    resistancesEl.appendChild(tag);
                }
            });
            
            // 鏄剧ず妯℃€佹
            document.getElementById('detailModal').classList.add('active');
        }
        
        // 鍏抽棴璇︽儏妯℃€佹
        function closeDetailModal() {
            document.getElementById('detailModal').classList.remove('active');
        }
        
        // ================================================
        // 宸ュ叿鍑芥暟
        // ================================================
        // 鏄剧ず鍔犺浇鍔ㄧ敾
        function showLoading(message = '姝ｅ湪鍔犺浇...') {
            const overlay = document.getElementById('loadingOverlay');
            const text = document.getElementById('loadingText');
            if (text) text.textContent = message;
            if (overlay) overlay.style.display = 'flex';
        }
        
        // 闅愯棌鍔犺浇鍔ㄧ敾
        function hideLoading() {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) overlay.style.display = 'none';
        }
        
        // 鏄剧ず閫氱煡
        function showNotification(message, type = 'info') {
            // 绉婚櫎鐜版湁閫氱煡
            const existingNotification = document.querySelector('.notification');
            if (existingNotification) {
                existingNotification.remove();
            }
            
            // 鍒涘缓鏂伴€氱煡
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            notification.style.cssText = `
                position: fixed;
                top: 100px;
                right: 20px;
                padding: 15px 25px;
                background: ${type === 'success' ? 'rgba(107, 255, 184, 0.9)' : type === 'error' ? 'rgba(255, 107, 107, 0.9)' : 'rgba(79, 195, 255, 0.9)'};
                color: white;
                border-radius: 10px;
                box-shadow: 0 10px 25px rgba(0,0,0,0.3);
                z-index: 2000;
                animation: fadeIn 0.5s ease;
                backdrop-filter: blur(10px);
                border: 1px solid ${type === 'success' ? 'rgba(107, 255, 184, 0.5)' : type === 'error' ? 'rgba(255, 107, 107, 0.5)' : 'rgba(79, 195, 255, 0.5)'};
            `;
            
            document.body.appendChild(notification);
            
            // 3绉掑悗绉婚櫎閫氱煡
            setTimeout(() => {
                notification.style.animation = 'fadeOut 0.5s ease';
                setTimeout(() => {
                    if (notification.parentNode) {
                        notification.parentNode.removeChild(notification);
                    }
                }, 500);
            }, 3000);
        }
        
        // 杩斿洖涓婁竴椤?
        function goBack() {
            const role = localStorage.getItem('auth_role');
            if (role === 'admin') {
                window.location.href = 'admin.html';
            } else {
                window.location.href = 'member.html';
            }
        }
        
        // 閫€鍑虹櫥褰?
        function logout() {
            if (confirm('纭畾瑕侀€€鍑虹櫥褰曞悧锛?)) {
                localStorage.removeItem('auth_user');
                localStorage.removeItem('auth_role');
                localStorage.removeItem('auth_time');
                showLoading('姝ｅ湪閫€鍑虹郴缁?..');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            }
        }
        
        // 娣诲姞CSS鍔ㄧ敾
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeIn {
                from { opacity: 0; }
                to { opacity: 1; }
            }
            
            @keyframes fadeOut {
                from { opacity: 1; }
                to { opacity: 0; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
